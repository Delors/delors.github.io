<div class="ld-exercise incremental" data-exercise-id="13" data-exercise-title="13 - Ist immer ein Timing-Angriff möglich bei nicht-konstantem Zeitverhalten?" id="ld-exercise-13">
<p class="ld-exercise-title rubric">Ist immer ein Timing-Angriff möglich bei nicht-konstantem Zeitverhalten?</p>
<p>Sie haben folgende Situation: Ein Client übermittelt das Passwort in gehashter Form (<span class="math">\(H_1\)</span>) an den Server. Der Server hasht den Hash noch einmal in Verbindung mit einem Salt <span class="math">\(H_2 = \text{hash}(H_1 \parallel SALT)\)</span>. Danach vergleicht er den berechneten Wert <span class="math">\(H_2\)</span> mit dem äquivalent konstruierten, gespeicherten Hash <span class="math">\(H_{2_{\text{gespeichert}}}\)</span>. Ist in diesem Szenario eine Timing-Angriff möglich?</p>
<ld-supplemental><aside class="admonition remark">
<p class="admonition-title">Bemerkung</p>
<p>Hash-Funktionen: Zur Erinnerung/Als Hinweis</p>
</aside>
<p>Jede noch so kleine Änderung an H<sub>1</sub> führt zu einem pseudo-zufällig komplett neuen H<sub>2</sub>.</p>
</ld-supplemental><aside class="admonition remark">
<p class="admonition-title">Bemerkung</p>

</aside>
