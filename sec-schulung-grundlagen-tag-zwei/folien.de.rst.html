<ld-topic class="new-section transition-flip" id="verschlusselung">
<h2>Verschlüsselung</h2>
</ld-topic>
<ld-topic class="repetition" id="zentrale-begriffe">
<h2>Zentrale Begriffe</h2>
<ld-story>
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Klartext (<span class="eng">Plaintext</span>)</span></p><p>Die Originalnachricht, die verschlüsselt werden soll.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Geheimtext oder Chiffretext (<span class="eng">Ciphertext</span>)</span></p><p>Die kodierte/verschlüsselte Nachricht.</p>
<p><span class="peripheral">(Im Deutschen gelegentlich auch Kryptogramm genannt.)</span></p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Verschlüsselung (<span class="eng">Encryption</span>)</span></p><p>Der Prozess der Umwandlung von Klartext in Geheimtext.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Entschlüsselung (<span class="eng">Decryption</span>)</span></p><p>Der Prozess der Wiederherstellung des Klartextes aus dem Geheimtext.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Kryptographie (<span class="eng">Cryptography</span>)</span></p><p>Das Studiengebiet der Verschlüsselungsschemata.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Kryptoanalyse (<span class="eng">Cryptanalysis</span>)</span></p><p>Methoden und Techniken, die zur Gewinnung von Informationen aus einer verschlüsselten Nachricht dienen.</p>
<p>Analyse von kryptographischen Verfahren.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Kryptologie (<span class="eng">Cryptology</span>)</span></p><p>Die Bereiche Kryptographie und Kryptoanalyse.</p>
</aside></ld-story></ld-topic>
<ld-topic class="repetition" id="symmetrisches-verschlusselungsmodell">
<h2>Symmetrisches Verschlüsselungsmodell</h2>
<p>Es gibt zwei Voraussetzungen für die sichere Verwendung der herkömmlichen Verschlüsselung:</p>
<ol class="arabic simple incremental-list">
<li><p>Ein starker Verschlüsselungsalgorithmus.</p></li>
<li><p>Effektive Schlüsselverwaltung:</p>
<ol class="loweralpha simple incremental-list">
<li><p>Sender und Empfänger müssen Kopien des geheimen Schlüssels auf sichere Weise erhalten haben und</p></li>
<li><p>den Schlüssel sicher aufbewahren.</p></li>
</ol>
</li>
</ol>
</ld-topic>
<ld-topic class="repetition" id="kryptografische-systeme-konnen-entlang-dreier-unabhangiger-dimensionen-charakterisiert-werden">
<h2>Kryptografische Systeme können entlang dreier unabhängiger Dimensionen charakterisiert werden</h2>
<aside class="admonition width-30" data-theme="note"><p class="admonition-title" data-theme="note-header">Bemerkung</p>
<p>Eine Permutation ist eine Folge von Vertauschungen.</p>
</aside>
<ol class="arabic simple incremental-list">
<li><p>Die Art der Operation, die zur Umwandlung von Klartext in Chiffretext verwendet wird:</p>
<ul class="incremental-list simple">
<li><p>Substitution</p></li>
<li><p>Transposition (Vertauschungen)</p></li>
</ul>
</li>
<li><p>Die Anzahl der verwendeten Schlüssel.</p>
<dl class="incremental-list field-list simple">
<dt>Symmetrisch<span class="colon">:</span></dt>
<dd><p>Ein-Schlüssel bzw. <strong>Secret-Key</strong>- (<em>konventionelle Verschlüsselung</em>)</p>
</dd>
<dt>Asymmetrisch<span class="colon">:</span></dt>
<dd><p>Zwei-Schlüssel bzw. <strong>Public-Key</strong>-Verschlüsselung</p>
</dd>
</dl>
</li>
<li><p>Die Art und Weise, in der der Klartext verarbeitet wird:</p>
<ul class="incremental-list simple">
<li><p>Blockchiffre</p></li>
<li><p>Stromchiffre</p></li>
</ul>
</li>
</ol>
</ld-topic>
<ld-topic id="klassifizierung-von-angriffen">
<h2>Klassifizierung von Angriffen</h2>
<ld-story>
<table class="accentuated-header zebra borderless incremental-table-rows sticky-header" style="width: 100%;">
<colgroup>
<col style="width: 20.0%" />
<col style="width: 80.0%" />
</colgroup>
<thead>
<tr><th class="head stub"><p>Art des Angriffs</p></th>
<th class="head"><p>dem Kryptoanalytiker bekannt</p></th>
</tr>
</thead>
<tbody>
<tr><th class="stub"><p>Ciphertext Only</p></th>
<td><ul class="simple">
<li><p>Verschlüsselungsalgorithmus und Chiffretext</p></li>
</ul>
</td>
</tr>
<tr><th class="stub"><p>Known Plaintext</p></th>
<td><ul class="simple">
<li><p>Verschlüsselungsalgorithmus und Chiffretext</p></li>
<li><p><em>ein oder mehrere Klartext-Chiffretext-Paare, die mit dem geheimen Schlüssel verschlüsselt wurden</em></p></li>
</ul>
</td>
</tr>
<tr><th class="stub"><p>Chosen Plaintext</p></th>
<td><ul class="simple">
<li><p>Verschlüsselungsalgorithmus und Chiffretext</p></li>
<li><p><em>Klartextnachricht, die vom Kryptoanalytiker gewählt wurde, zusammen mit dem zugehörigen Chiffretext, der mit dem geheimen Schlüssel verschlüsselt wurde.</em></p></li>
</ul>
</td>
</tr>
<tr><th class="stub"><p>Chosen Ciphertext</p></th>
<td><ul class="simple">
<li><p>Verschlüsselungsalgorithmus und Chiffretext</p></li>
<li><p><em>Chiffretext, der vom Kryptoanalytiker gewählt wurde, zusammen mit dem zugehörigen entschlüsselten Klartext, der mit dem geheimen Schlüssel entschlüsselt wurde.</em></p></li>
</ul>
</td>
</tr>
<tr><th class="stub"><p>Chosen Text</p></th>
<td><ul class="simple">
<li><p>Verschlüsselungsalgorithmus und Chiffretext</p></li>
<li><p><em>vom Kryptoanalytiker gewählte Klartextnachricht, zusammen mit dem zugehörigen Chiffretext, der mit dem geheimen Schlüssel verschlüsselt wurde.</em></p></li>
<li><p><em>vom Kryptoanalytiker gewählter Chiffretext zusammen mit dem entsprechenden entschlüsselten Klartext, der mit dem geheimen Schlüssel erzeugt wurde.</em></p></li>
</ul>
</td>
</tr>
</tbody>
</table>
</ld-story><ld-supplemental><p>Das Ziel ist es immer den Schlüssel zu ermitteln, damit man weitere Kommunikation effektiv entschlüsseln kann.</p>
</ld-supplemental></ld-topic>
<ld-topic id="sicherheit-von-verschlusselungsschemata">
<h2>Sicherheit von Verschlüsselungsschemata</h2>
<div class="docutils container">
<p class="rubric">Bedingungslos Sicher (<span class="eng">Unconditionally Secure</span>)</p>
<ul class="simple">
<li><p>Unabhängig davon wie viel Zeit ein Gegner hat, ist es ihm unmöglich, den Geheimtext zu entschlüsseln, weil die erforderlichen Informationen nicht vorhanden sind.</p></li>
</ul>
</div>
<div class="incremental docutils container">
<p class="rubric">Rechnerisch Sicher (<span class="eng">Computationally Secure</span>)</p>
<ul class="simple">
<li><p>Die Kosten für das Brechen der Chiffre übersteigen den Wert der verschlüsselten Informationen.</p></li>
<li><p>Die zum Knacken der Chiffre benötigte Zeit übersteigt die Lebensdauer der Informationen.</p></li>
</ul>
</div>
</ld-topic>
<ld-topic id="kryptoanalyse">
<h2>Kryptoanalyse</h2>
<div class="docutils container">
<p><strong>Kryptoanalyse</strong></p>
<ul class="simple">
<li><p>Der Angriff beruht auf den Eigenschaften des Algorithmus und einer gewissen Kenntnis der allgemeinen Merkmale des Klartextes.</p></li>
<li><p>Der Angriff nutzt die Eigenschaften des Algorithmus aus, um zu versuchen, einen bestimmten Klartext zu entschlüsseln oder den verwendeten Schlüssel zu ermitteln.</p></li>
</ul>
</div>
</ld-topic>
<ld-topic id="brute-force-angriff">
<h2>Brute-Force Angriff</h2>
<ul class="incremental-list">
<li><p>Es werden alle möglichen Schlüssel ausprobiert, bis eine verständliche Übersetzung des Chiffriertextes in Klartext erreicht wird.</p></li>
<li><p>Im Durchschnitt muss die Hälfte aller möglichen Schlüssel ausprobiert werden, um Erfolg zu haben.</p></li>
<li><p>Zur Durchführung des Brute-Force-Ansatzes ist ein gewisses Maß an Wissen über den zu erwartenden Klartext erforderlich. Es werden Mittel zur automatischen Unterscheidung von Klartext und „Müll“ benötigt.</p>
<aside class="admonition" data-theme="question"><p class="admonition-title" data-theme="question-header"><span>Frage</span></p><p>Was bedeuted somit <em>bis eine verständliche Übersetzung des Chiffriertextes in Klartext erreicht wird</em>?</p>
<p><span class="incremental">Wie können Sie feststellen ob Sie erfolgreich entschlüsselt haben, wenn der Klartext zum Beispiel ein Bild, ein Video oder ein Computerprogramm ist?</span></p>
<p><span class="incremental">Wie können Sie feststellen, ob Sie erfolgreich entschlüsselt haben, wenn die Datei zweifach (d. h. mit zwei verschiedenen Schlüsseln) verschlüsselt wurde?</span></p>
</aside></li>
</ul>
</ld-topic>
<ld-topic class="new-subsection transition-fade" id="substitutions-chiffren">
<h2>Substitutions-Chiffren</h2>
</ld-topic>
<ld-topic id="substitutionsverfahren-allgemeine-vorgehensweise">
<h2>Substitutionsverfahren - Allgemeine Vorgehensweise</h2>
<ul class="simple">
<li><p>Bei der Substitution werden die Buchstaben des Klartextes durch andere Buchstaben oder durch Zahlen oder Symbole ersetzt.</p></li>
<li><p>Wenn der Klartext als eine Folge von Bits betrachtet wird, beinhaltet die Substitution das Ersetzen von Bitmustern des Klartextes durch Bitmuster des Geheimtextes.</p></li>
</ul>
</ld-topic>

<ld-topic id="verallgemeinerter-casar-chiffre-algorithmus">
<h2>Verallgemeinerter Cäsar-Chiffre-Algorithmus</h2>
<p>Eine Verschiebung (k) kann beliebig groß sein, so dass der allgemeine Cäsar-Algorithmus lautet:</p>
<blockquote>
<p>Y = E(k,p) = (p + k) mod 26</p>
</blockquote>
<p>Wobei k einen Wert im Bereich von 1 bis 25 annimmt; der Entschlüsselungsalgorithmus ist einfach:</p>
<blockquote>
<p>p = D(k,Y) = (Y - k) mod 26</p>
</blockquote>
</ld-topic>

<ul class="incremental simple">
<li><p>Wenn die „Chiffre“-Zeile (siehe Cäsar-Chiffre) eine beliebige Permutation der 26 alphabetischen Zeichen sein kann, dann gibt es 26! (<em>26 Fakultät</em>) oder mehr als 4 · 10²⁶ mögliche Schlüssel.</p>
<ul>
<li><p>Dies ist um 10 Größenordnungen größer als der Schlüsselraum des Verschlüsselungsalgorithmus DES!</p></li>
<li><p>Der Ansatz wird als monoalphabetische Substitutions-Chiffre bezeichnet, da pro Nachricht ein einziges Chiffre-Alphabet verwendet wird.</p></li>
</ul>
</li>
</ul>

<ld-topic id="angriffe-auf-monoalphabetische-chiffren">
<h2>Angriffe auf Monoalphabetische Chiffren</h2>
<p>Sie sind leicht zu knacken, da sie die Häufigkeitsdaten des ursprünglichen Alphabets wiederspiegeln.</p>
<div class="incremental docutils container">
<p>Die Gegenmaßnahme besteht darin, mehrere Substitute (Homophone) für einen einzigen Buchstaben anzubieten.</p>
</div>
</ld-topic>
<ld-topic id="playfair-cipher">
<h2><em>Playfair Cipher</em></h2>
<p>Erfunden vom britischen Wissenschaftler Sir Charles Wheatstone im Jahr 1854.</p>
<aside class="admonition width-30" data-theme="note"><p class="admonition-title" data-theme="note-header">Bemerkung</p>
<p><em>Digram</em></p>
<ul class="simple">
<li><p>Zwei-Buchstaben-Kombination</p></li>
<li><p>am häufigsten im Englischen: &quot;<em>th</em>&quot;</p></li>
</ul>
<p><em>Trigram</em></p>
<ul class="simple">
<li><p>Drei-Buchstaben-Kombination</p></li>
<li><p>am häufigsten im Englischen: &quot;<em>the</em>&quot;</p></li>
</ul>
</aside>
<ul class="incremental-list simple">
<li><p>Bekannteste Chiffrierung mit mehreren Buchstaben.</p></li>
<li><p>Behandelt Digramme im Klartext als einzelne Einheiten und übersetzt diese Einheiten in Digramme des Geheimtextes.</p></li>
<li><p>Basiert auf der Verwendung einer 5 x 5 Buchstabenmatrix, die mit Hilfe eines Schlüsselworts konstruiert wird.</p></li>
<li><p>Wurde von der britischen Armee im Ersten Weltkrieg und von der US-Armee und anderen alliierten Streitkräften im zweiten Weltkrieg als Standardfeldsystem verwendet.</p></li>
</ul>
</ld-topic>

<ld-topic id="playfair-verschlusselung">
<h2>Playfair Verschlüsselung</h2>
<p>Die Verschlüsselung wird für jedes Buchstabenpaar des Klartextes durchgeführt.</p>
<div class="width-25 float-right compound">
<table class="align-center highlight-cell-on-hover">
<tbody>
<tr><td><p>M</p></td>
<td><p>O</p></td>

<td><p>R</p></td>
</tr>
<tr><td><p>C</p></td>
<td><p>H</p></td>
<td><p>Y</p></td>
<td><p>B</p></td>
<td><p>D</p></td>
</tr>
<tr><td><p>E</p></td>
<td><p>F</p></td>
<td><p>G</p></td>
<td><p>I/J</p></td>
<td><p>K</p></td>
</tr>
<tr><td><p>L</p></td>
<td><p>P</p></td>
<td><p>Q</p></td>
<td><p>S</p></td>
<td><p>T</p></td>
</tr>
<tr><td><p>U</p></td>
<td><p>V</p></td>
<td><p>W</p></td>
<td><p>X</p></td>
<td><p>Z</p></td>
</tr>
</tbody>
</table>
</div>
<ol class="arabic simple incremental-list">
<li><p>Wenn beide Buchstaben gleich sind (oder nur ein Buchstabe übrig ist), fügen Sie ein <span class="docutils literal">X</span> hinter dem ersten Buchstaben ein. Verschlüsseln Sie das neue Paar und fahren Sie fort (z. B. würde <span class="docutils literal">ballon</span> als <span class="docutils literal">ba lX lo nX</span> verschlüsselt werden).</p></li>
<li><p>Wenn die Buchstaben in der gleichen Zeile stehen, ersetzen Sie sie durch die Buchstaben unmittelbar rechts davon (ggf. umbrechen) (z. B. wird <span class="docutils literal">ar</span> als <span class="docutils literal">RM</span> verschlüsselt).</p></li>
<li><p>Tauchen die Buchstaben in derselben Spalte auf, so sind sie durch die unmittelbar darunter liegenden Buchstaben zu ersetzen (ggf. umbrechen) (z. B. wird <span class="docutils literal">mu</span> als <span class="docutils literal">CM</span> verschlüsselt).</p></li>
<li><p>Befinden sich die Buchstaben nicht in derselben Zeile oder Spalte, so werden sie durch die Buchstaben in derselben Zeile bzw. in dem anderen Paar von Ecken des durch das ursprüngliche Paar definierten Rechtecks ersetzt (z. B. <span class="docutils literal">hs</span> → <span class="docutils literal">BP</span>; <span class="docutils literal">ea</span> → <span class="docutils literal">IM</span>).</p></li>
</ol>
</ld-topic>
<ld-topic id="polyalphabetische-chiffren">
<h2>Polyalphabetische Chiffren</h2>
<aside class="admonition width-40" data-theme="note"><p class="admonition-title" data-theme="note-header">Bemerkung</p>
<p><strong>Alle diese Techniken haben die folgenden Merkmale gemeinsam:</strong></p>
<ul class="simple">
<li><p>Es wird ein Satz verwandter monoalphabetischer Substitutionsregeln verwendet.</p></li>
<li><p>Ein Schlüssel bestimmt, welche bestimmte Regel für eine bestimmte Umwandlung gewählt wird.</p></li>
</ul>
</aside>
<p>Polyalphabetische Substitutions-Chiffren verbessern einfache monoalphabetische Chiffren, indem sie verschiedene monoalphabetische Substitutionen verwenden, während man die Klartextnachricht verschlüsselt.</p>
</ld-topic>
<ld-topic id="vigenere-chiffre">
<h2>Vigenère Chiffre</h2>
<ul class="simple">
<li><p>Die bekannteste und eine der einfachsten polyalphabetischen Substitutions-Chiffren.</p></li>
<li><p>In diesem Schema besteht die Menge der verwandten monoalphabetischen Substitutionsregeln aus den 26 Cäsar-Chiffren mit Verschiebungen von 0 bis 25.</p></li>
<li><p>Jede Chiffre wird durch einen Schlüsselbuchstaben identifiziert, der den Klartextbuchstaben durch den Chiffretextbuchstaben ersetzt.</p></li>
</ul>
</ld-topic>

<ld-topic id="beispiel-einer-vigenere-verschusselung">
<h2>Beispiel einer Vigenère-Verschüsselung</h2>
<ul class="simple">
<li><p>Um eine Nachricht zu verschlüsseln, wird ein Schlüssel benötigt, der so lang ist wie die Nachricht.</p></li>
<li><p>In der Regel ist der Schlüssel ein sich wiederholendes Schlüsselwort.</p></li>
</ul>
<aside class="admonition incremental" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>Wenn das Schlüsselwort <span class="docutils literal">deceptive</span> ist, wird die Nachricht: <span class="docutils literal">We are discovered save yourself</span>, wie folgt verschlüsselt:</p>
<dl class="field-list simple">
<dt>Schlüssel<span class="colon">:</span></dt>
<dd><p><span class="docutils literal">DECEPTIVEDECEPTIVEDECEPTIVE</span></p>
</dd>
<dt>Klartext<span class="colon">:</span></dt>
<dd><p><span class="docutils literal">wearediscoveredsaveyourself</span></p>
</dd>
<dt>Geheimtext<span class="colon">:</span></dt>
<dd><p><span class="docutils literal">ZICVTWQNGRZGVTWAVZHCQYGLMGJ</span></p>
</dd>
</dl>
</aside></ld-topic>
<ld-topic id="vigenere-autokey-system">
<h2>Vigenère <em>Autokey System</em></h2>
<p>Ein Schlüsselwort wird mit dem Klartext selbst verkettet, um einen laufenden Schlüssel zu erhalten.</p>
<aside class="admonition incremental" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><dl class="field-list simple">
<dt>Schlüssel<span class="colon">:</span></dt>
<dd><p><span class="docutils literal">DECEPTIVEwearediscoveredsav</span></p>
</dd>
<dt>Klartext<span class="colon">:</span></dt>
<dd><p><span class="docutils literal">wearediscoveredsaveyourself</span></p>
</dd>
<dt>Geheimtext<span class="colon">:</span></dt>
<dd><p><span class="docutils literal">ZICVTWQNGKZEIIGASXSTSLVVWLA</span></p>
</dd>
</dl>
</aside><div class="incremental docutils container">
<p>Auch dieses Verfahren ist anfällig für eine Kryptoanalyse, da der Schlüssel und der Klartext die gleiche Häufigkeitsverteilung der Buchstaben aufweisen und eine statistische Technik angewendet werden kann.</p>
</div>
</ld-topic>
<ld-topic id="vernam-chiffre">
<h2>Vernam Chiffre</h2>
<object aria-label="Vernam Cipher" class="light-image align-center" data="images/verschluesselung/vernam_cipher.svg" role="img" type="image/svg+xml">
</object></ld-topic>
<ld-topic id="one-time-pad">
<h2>One-Time Pad</h2>
<ul class="incremental-list simple">
<li><p>Verbesserung der Vernam-Chiffre, vorgeschlagen von dem Offizier Joseph Mauborgne des Army Signal Corp.</p></li>
<li><p>Verwendung eines Zufallsschlüssels, der so lang wie die Nachricht ist, so dass der Schlüssel nicht wiederholt werden muss.</p></li>
<li><p>Der Schlüssel wird zum Ver- und Entschlüsseln einer einzigen Nachricht verwendet und dann verworfen.</p></li>
<li><p>Jede neue Nachricht erfordert einen neuen Schlüssel mit der gleichen Länge wie die neue Nachricht.</p></li>
<li><p>Das Schema ist nachweislich nicht zu knacken.</p>
<ul class="incremental-list">
<li><p>Erzeugt eine zufällige Ausgabe, die in keinem statistischen Zusammenhang mit dem Klartext steht.</p></li>
<li><p>Da der Chiffriertext keinerlei Informationen über den Klartext enthält, gibt es keine Möglichkeit, den Code zu knacken.</p></li>
</ul>
</li>
</ul>
</ld-topic>
<ld-topic id="schwierigkeiten-von-one-time-pads">
<h2>Schwierigkeiten von One-Time-Pads</h2>
<ul class="incremental-list">
<li><p>Das One-Time-Pad bietet vollständige Sicherheit, hat aber in der Praxis zwei grundlegende Schwierigkeiten:</p>
<ol class="arabic incremental-list list-with-explanations">
<li><p>Es gibt das praktische Problem der Herstellung großer Mengen von Zufallsschlüsseln.</p>
<p>Jedes stark genutzte System würde regelmäßig Millionen von zufälligen Zeichen benötigen.</p>
</li>
<li><p>Ein „gigantisches“ Schlüsselverteilungsproblem</p>
<p>Für jede zu übermittelnde Nachricht benötigen Sender und Empfänger einen gleich langen Schlüssel.</p>
</li>
</ol>
</li>
<li><p>Aufgrund dieser Schwierigkeiten ist das One-Time-Pad nur von begrenztem Nutzen; es eignet sich vor allem für Kanäle mit geringer Bandbreite, die eine sehr hohe Sicherheit erfordern.</p></li>
<li><p>Das One-Time-Pad ist das einzige Kryptosystem, das eine perfekte Geheimhaltung bietet.</p></li>
</ul>
</ld-topic>

<ld-topic id="auswahl-anderer-steganographie-techniken">
<h2>Auswahl anderer Steganographie-Techniken</h2>
<dl class="incremental-list field-list simple">
<dt>Zeichenmarkierung<span class="colon">:</span></dt>
<dd><p>Ausgewählte Buchstaben eines gedruckten oder maschinengeschriebenen Textes werden mit Bleistift überstrichen. Die Markierungen sind nur sichtbar, wenn das Papier schräg in helles Licht gehalten wird.</p>
</dd>
<dt>Unsichtbare Tinte<span class="colon">:</span></dt>
<dd><p>Es gibt eine Reihe von Substanzen, die zum Schreiben verwendet werden können, aber keine sichtbaren Spuren hinterlassen, solange das Papier nicht erhitzt oder mit einer chemischen Substanz behandelt wird.</p>
</dd>
<dt>Nadelstiche<span class="colon">:</span></dt>
<dd><p>Kleine Nadelstiche auf ausgewählten Buchstaben sind normalerweise nicht sichtbar, es sei denn, das Papier wird vor ein Licht gehalten.</p>
</dd>
<dt>Sehr helle Tinte<span class="colon">:</span></dt>
<dd><p>Druckerhersteller drucken winzige Punktmuster in sehr hellen Farben auf die Seiten. Dies erlaubt es Dokumente zu dem Drucker zurückzuverfolgen, auf dem sie gedruckt wurden.</p>
</dd>
</dl>
</ld-topic>
<ld-topic id="steganographie-vs-verschlusselung">
<h2>Steganographie vs. Verschlüsselung</h2>
<ul class="simple">
<li><p>Steganografie hat eine Reihe von <em>Nachteilen</em> im Vergleich zur Verschlüsselung:</p>
<ul class="incremental-list negative-list">
<li><p>Es erfordert einen hohen Overhead, um relativ wenige Bits an Informationen zu verbergen.</p></li>
<li><p>Sobald das System entdeckt wird, wird es praktisch wertlos.</p></li>
</ul>
</li>
</ul>
<ul class="incremental simple">
<li><p>Der <em>Vorteil</em> der Steganografie:</p>
<ul class="incremental-list positive-list">
<li><p>Sie kann von Parteien eingesetzt werden, die etwas zu verlieren haben, wenn allein die Tatsache ihrer geheimen Kommunikation (unabhängig vom Inhalt) entdeckt wird.</p></li>
<li><p>Verschlüsselung kennzeichnet den Verkehr als wichtig oder geheim oder kann den Sender oder Empfänger als jemanden identifizieren, der etwas zu verbergen hat.</p></li>
</ul>
</li>
</ul>
</ld-topic>
<ld-topic class="new-subsection transition-zoom" id="block-chiffre">
<h2>Block Chiffre</h2>
</ld-topic>
<ld-topic id="stromchiffre-vs-blockchiffre">
<h2>Stromchiffre vs. Blockchiffre</h2>
<ld-grid class="default-layout">
<ld-cell class="width-30" style="align-self:auto;">
<div class="scale-up-on-hover transform-origin-top-left backdrop-blur docutils container">
<object class="light-image" data="images/verschluesselung/stromchiffre.svg" role="img" type="image/svg+xml">
</object></div>
</ld-cell><ld-cell class="width-70" style="align-self:auto;">
<object class="light-image" data="images/verschluesselung/blockchiffre.svg" role="img" type="image/svg+xml">
</object></ld-cell></ld-grid></ld-topic>
<ld-topic id="blockchiffre">
<h2>Blockchiffre</h2>
<ul class="incremental-list simple">
<li><p>Ein Klartextblock wird als Ganzes behandelt und verwendet, um einen gleich langen Chiffretextblock zu erzeugen.</p></li>
<li><p>In der Regel wird eine Blockgröße von 64 (8 Byte) oder 128 Bit (16 Byte) verwendet.</p></li>
<li><p>Wie bei einer Stromchiffre <em>teilen sich die beiden Benutzer einen symmetrischen Chiffrierschlüssel</em>.</p></li>
<li><p>Viele netzbasierte als auch klassische Anwendungen (z. B. Verschlüsselung von Dateien oder ganzen Partitionen), die auf symmetrische Verschlüsselung setzen, verwenden Blockchiffren.</p></li>
</ul>
<ld-supplemental><aside class="admonition" data-theme="important"><p class="admonition-title" data-theme="important-header">Wichtig</p>
<p>Im Rahmen der Verschlüsselung von Daten, die über ein Netzwerk übertragen werden, kommt es häufig sowohl zum Einsatz von asymmetrischer Verschlüsselung als auch von symmetrischer Verschlüsselung, wobei die symmetrische Verschlüsselung für die eigentliche Kommunikation verwendet wird und die asymmetrische Verschlüsselung nur während des Verbindungsaufbaus – zum Aushandeln eines gemeinsamen Schlüssels für die symmetrische Verschlüsselung – zum Einsatz kommt.</p>
</aside>
</ld-supplemental></ld-topic>
<ld-topic id="feistel-chiffre">
<h2>Feistel-Chiffre</h2>
<p>Feistel schlug die Verwendung einer Chiffre vor, bei der sich Substitutionen und Permutationen abwechseln.</p>
<aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Substitutionen</span></p><p>Jedes Klartextelement oder jede Gruppe von Elementen wird eindeutig durch ein entsprechendes Chiffretextelement oder eine entsprechende Gruppe von Elementen ersetzt.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Permutation</span></p><p>Bei einer Permutation werden keine Elemente hinzugefügt, gelöscht oder ersetzt, sondern die Reihenfolge, in der die Elemente in einer Folge erscheinen, wird geändert.</p>
</aside></ld-topic>
<ld-topic id="feistel-chiffre-hintergrund">
<h2>Feistel-Chiffre - Hintergrund</h2>
<ul>
<li><p>Hierbei handelt es sich um eine praktische Anwendung eines Vorschlags von Claude Shannon zur Entwicklung einer Chiffre, bei der sich <em>Konfusions- und Diffusionsfunktionen</em> abwechseln.</p></li>
<li><p>Dieser Aufbau wird von vielen bedeutenden (Twofish, Blowfish, Mars) symmetrischen Blockchiffren – die in spezifischen Anwendungsfällen noch anzutreffen sind – verwendet.</p></li>
<li><p>Mars und Twofish wurden Finalisten für die Auswahl des Advanced Encryption Standard (AES) ausgewählt und vom NIST als hoch-sicher eingestuft.</p>
<ld-supplemental><p>Der ausgewählte Algorithmus für AES ist jedoch Rijndael. Dieser wurde „nur“ als hinreichend sicher eingestuft.</p>
</ld-supplemental></li>
</ul>
<div class="incremental docutils container">
<p><strong>Diffusion und Konfusion</strong></p>
<ul class="simple">
<li><p>Begriffe, die von Claude Shannon eingeführt wurden, um die beiden grundlegenden Bausteine für jedes kryptografische System zu erfassen.</p></li>
<li><p>Shannons Anliegen war es, die auf statistischer Analyse beruhende Kryptoanalyse zu vereiteln.</p></li>
</ul>
</div>
<ld-supplemental><p>Blowfish ist zum Beispiel die Basis für das Hashingverfahren <span class="docutils literal">bcrypt</span>, welches für Passworthashing verwendet wird.</p>
</ld-supplemental></ld-topic>
<ld-topic id="diffusion">
<h2>Diffusion</h2>
<ul class="simple">
<li><p>Die statistische Struktur des Klartextes wird in weitreichende Statistiken des Chiffretextes überführt, d. h. die <strong>statistische Beziehung zwischen Klartext und Chiffretext wird so komplex wie möglich</strong>.</p></li>
</ul>
<ul class="incremental list-with-explanations">
<li><p>Dies wird dadurch erreicht, dass jede Klartextziffer(bzw. -zeichen) den Wert vieler Chiffretextziffern (bzw. -zeichen) beeinflusst.</p>
<p>(„Lawineneffekt“)</p>
</li>
<li><p>Die Diffusion kann z. B. durch <em>Permutationen</em> erreicht werden.</p></li>
</ul>
</ld-topic>
<ld-topic id="konfusion">
<h2>Konfusion</h2>
<ul class="simple">
<li><p>Versucht, <strong>die Beziehung zwischen den Statistiken des Chiffriertextes und dem Wert des Chiffrierschlüssels so komplex wie möglich zu gestalten</strong>, d. h. eine einzige Änderung des Chiffrierschlüssels sollte viele Bits des Chiffriertextes beeinflussen.</p></li>
</ul>
<ul class="incremental simple">
<li><p>Selbst wenn der Angreifer die Statistik des Chiffretextes einigermaßen in den Griff bekommt, ist die Art und Weise, wie der Schlüssel verwendet wurde, um diesen Chiffretext zu erzeugen, so komplex, dass es schwierig ist, den Schlüssel abzuleiten.</p></li>
<li><p>Die Verwirrung kann z. B. durch <em>Substitutionen</em> realisiert werden.</p></li>
</ul>
</ld-topic>
<ld-topic class="no-title" id="feistel-chiffre-verschlusselung-und-entschlusselung">
<h2>Feistel-Chiffre - Verschlüsselung und Entschlüsselung</h2>
<ld-grid class="default-layout">
<ld-cell class="width-40" style="align-self:auto;">
<p class="rubric">Feistel-Chiffre</p>
<p>Verschlüsselung und Entschlüsselung</p>
<aside class="admonition width-100" data-theme="legend"><p class="admonition-title" data-theme="legend-header"><span>Legende</span></p><p>K<sub>x</sub> - Schlüssel der x-ten Runde</p>
<p>L<sub>x-1</sub> - linke Hälfte des Eingabeblocks der x-ten Runde</p>
<p>R<sub>x-1</sub> - rechte Hälfte des Eingabeblocks der x-ten Runde</p>
<p>F - Rundenfunktion</p>
<p>⨁ - XOR-Operation</p>
</aside></ld-cell><ld-cell class="width-60" style="align-self:auto;">
<object class="light-image align-center" data="images/verschluesselung/feistel/design.svg" role="img" type="image/svg+xml">
</object></ld-cell></ld-grid><ld-supplemental><p class="rubric">Notwendigkeit der <em>Swap</em> Operation</p>
<p>Die Verwendung des <em>Swap</em>s am Ende ist notwendig, damit die Verschlüsselung und Entschlüsselung identisch sind; d. h. derselbe Algorithmus verwendet werden kann.</p>
<p>Zum besseren Verständnis gehen wir im Folgenden davon aus, dass wir nur eine Runde hätten:</p>
<object class="light-image align-center" data="images/verschluesselung/feistel/one_round_and_swap.svg" role="img" type="image/svg+xml">
</object><p>Wird der Swap am Ende nicht durchgeführt, würde die Entschlüsselung nicht funktionieren, wie am folgenden Beispiel mit nur einer Runde zu sehen ist:</p>
<object class="light-image align-center" data="images/verschluesselung/feistel/one_round_no_swap.svg" role="img" type="image/svg+xml">
</object><p>Ein alternatives Design wäre es, beim Verschlüsseln auf den finalen Tausch zu verzichten und stattdessen beim Entschlüsseln initial einen Tausch durchzuführen — zusätzlich zum finalen Tausch. Dieses Design wird jedoch nicht verwendet, da es die Implementierung komplizierter macht.</p>
</ld-supplemental></ld-topic>
<ld-topic id="feistel-chiffre-beispiel">
<h2>Feistel Chiffre - Beispiel</h2>
<object class="light-image align-center" data="images/verschluesselung/feistel/example.svg" role="img" type="image/svg+xml">
</object><aside class="admonition" data-theme="remember"><p class="admonition-title" data-theme="remember-header"><span>Zur Erinnerung</span></p><pre class="literal-block">[F(03A6,12DE52) ⊕ DE7F] ⊕ F(03A6,12DE52) =

<ld-topic id="feistel-chiffre-eigenschaften">
<h2>Feistel Chiffre - Eigenschaften</h2>
<ld-story>
<dl class="incremental-list dd-margin-left-2em field-list simple">
<dt><strong>Rundenfunktion F</strong><span class="colon">:</span></dt>
<dd><p>Größere Komplexität bedeutet in der Regel größere Resistenz gegen Kryptoanalyse.</p>
</dd>
<dt><strong>Schnelle Ver-/Entschlüsselung in Software</strong><span class="colon">:</span></dt>
<dd><p>Wenn die Verschlüsselung so in Anwendungen oder Dienstprogramme eingebettet ist, dass eine Hardwareimplementierung nicht möglich ist, dann ist die Geschwindigkeit des Algorithmus relevant.</p>
</dd>
<dt><strong>Einfachheit der Analyse</strong><span class="colon">:</span></dt>
<dd><p>Wenn der Algorithmus kurz und klar erklärt werden kann, ist es einfacher den Algorithmus auf kryptoanalytische Schwachstellen hin zu analysieren und somit ein höheres Maß an Sicherheit in Bezug auf seine Stärke zu entwickeln.</p>
</dd>
<dt><strong>Algorithmus für die Ableitung der (Unter-)Schlüssel</strong><span class="colon">:</span></dt>
<dd><p>Eine höhere Komplexität dieses Algorithmus sollte zu einer größeren Schwierigkeit der Kryptoanalyse führen.</p>
</dd>
<dt><strong>Blockgröße</strong><span class="colon">:</span></dt>
<dd><p>Größere Blockgrößen bedeuten mehr Sicherheit, aber eine geringere Verschlüsselungs-/Entschlüsselungsgeschwindigkeit für einen bestimmten Algorithmus.</p>
</dd>
<dt><strong>Schlüsselgröße</strong><span class="colon">:</span></dt>
<dd><p>Ein größerer Schlüssel bedeutet mehr Sicherheit, kann aber die Verschlüsselungs-/Entschlüsselungsgeschwindigkeit verringern.</p>
</dd>
<dt><strong>Anzahl der Runden</strong><span class="colon">:</span></dt>
<dd><p>Das Wesen der Feistel-Chiffre besteht darin, dass eine einzige Runde unzureichende Sicherheit bietet, während mehrere Runden zunehmende Sicherheit bieten.</p>
</dd>
</dl>
</ld-story></ld-topic>
<ld-topic id="doppelte-verschlusselung">
<h2>Doppelte Verschlüsselung</h2>
<object class="light-image align-center" data="images/verschluesselung/double_encryption.svg" role="img" type="image/svg+xml">
</object></ld-topic>
<ld-topic id="meet-in-the-middle-angriff">
<h2><em>Meet-in-the-Middle</em>-Angriff</h2>
<ld-deck>
<ld-card>
<aside class="admonition" data-theme="observation"><p class="admonition-title" data-theme="observation-header"><span>Beobachtung</span></p><p><span class="math">\(E(K_2,E(K_1,P)) = E(K_3,P)\)</span> ist nicht gültig.</p>
<p>D. h. die zweifache Anwendung von DES führt zu einer Abbildung, die im Allgemeinen nicht äquivalent zu einer einfachen DES-Verschlüsselung ist.</p>
<ld-supplemental embed-in-document-flow><p>D. h. für ein Paar <span class="math">\(K_1, K_2\)</span> existiert nicht notwendigerweise ein <span class="math">\(K\)</span>, sodass <span class="math">\(DES_{K} = DES_{K_1} \circ DES_{K_2}\)</span> gilt. Die Teilmenge der durch DES erzeugbaren Permutationen ist verschwindend klein (aufgrund der Schlüsselgröße nur <span class="math">\(2^{56}\)</span> von <span class="math">\(64!\)</span> möglichen) und nicht abgeschlossen unter Komposition.</p>
<aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><p>Die Beobachtung gilt auch für AES.</p>
</aside></ld-supplemental></aside></ld-card><ld-card class="incremental">
<p>Der Meet-in-the-Middle-Algorithmus greift dieses Verfahren an. Er hängt nicht von einer bestimmten Eigenschaft von DES ab, sondern funktioniert gegen jede Blockchiffre.</p>
<ul class="incremental">
<li><p>Möglicher Known-Plaintext-Angriff:</p>
<ol class="arabic simple incremental-list">
<li><p>Man berechnet <em>für alle Schlüssel</em> <span class="math">\(K_1\)</span> die Chiffretexte <span class="math">\(E(K_1,P)\)</span> und speichert diese.</p></li>
<li><p>Man berechnet <em>für alle Schlüssel</em> <span class="math">\(K_2\)</span> die Klartexte <span class="math">\(D(K_2,C)\)</span> .</p></li>
<li><p>Man vergleicht die beiden Ergebnisse und prüft, ob es Übereinstimmungen gibt.</p></li>
</ol>
<div class="incremental docutils container">
<p>Dieser Aufwand ist lediglich doppelt so hoch wie der Aufwand bei einer einfachen Verschlüsselung.</p>
</div>
</li>
</ul>
</ld-card><ld-card class="incremental">
<aside class="admonition" data-theme="warning"><p class="admonition-title" data-theme="warning-header">Warnung</p>
<p>Die zweifache Anwendung einer Blockchiffre ist nicht sinnvoll!</p>
<p>Das Ergebnis ist, dass ein bekannter Klartextangriff gegen Doppel-DES mit einem Aufwand in der Größenordnung von 2⁵⁶ <em>im Durchschnitt</em> erfolgreich ist, verglichen mit <em>durchschnittlich</em> 2⁵⁵ für einen einfachen DES.</p>
</aside>
</ld-card></ld-deck></ld-topic>
<ld-topic class="new-subsection transition-fade" id="grundlegende-betriebsmodi">
<h2>Grundlegende Betriebsmodi</h2>
</ld-topic>
<ld-topic id="betriebsmodi">
<h2>Betriebsmodi</h2>
<ul class="simple">
<li><p>Techniken zur Verbesserung der Wirkung eines kryptografischen Algorithmus oder zur Anpassung des Algorithmus an ein Anwendungsszenario. Insbesondere in Abhängigkeit von der Länge des Klartexts.</p></li>
</ul>
<ul class="incremental simple">
<li><p>Um eine Blockchiffre in einer Vielzahl von Anwendungen einsetzen zu können, hat das NIST fünf Betriebsmodi definiert.</p>
<ul>
<li><p>Die fünf Modi decken eine breite Palette von Verschlüsselungsanwendungen ab, für die eine Blockchiffre verwendet werden kann.</p></li>
<li><p>Diese Modi sind für die Verwendung mit jeder symmetrischen Blockchiffre vorgesehen, einschließlich 3DES und AES.</p></li>
</ul>
</li>
</ul>
</ld-topic>
<ld-topic id="electronic-codebook">
<h2>Electronic Codebook<a class="brackets" href="#footnote-1" id="footnote-reference-1" role="doc-noteref"><span class="fn-bracket">[</span>1<span class="fn-bracket">]</span></a></h2>
<object class="light-image align-center" data="images/verschluesselung/ecb_encryption.svg" role="img" type="image/svg+xml">
</object><object class="light-image align-center" data="images/verschluesselung/ecb_decryption.svg" role="img" type="image/svg+xml">
</object><aside class="footnote-list brackets">

<ld-topic id="padding-modi-in-blockchiffren">
<h2>Padding-Modi in Blockchiffren</h2>
<ld-deck>
<ld-card>
<aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><p>Bei Blockchiffren (z. B. AES mit 128 Bit = 16 Byte Blockgröße) muss die zu verschlüsselnde Nachricht eine exakte Vielfache der Blockgröße sein. Ist das nicht der Fall, wird Padding verwendet, um die Nachricht auf ein vielfaches der Blockgröße zu bringen.</p>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">PKCS#7</p>
<p>Füllt den restlichen Block mit Bytes, deren Wert gleich der Anzahl hinzugefügter Bytes ist.</p>
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><ul class="simple">
<li><p>Nachricht mit 13 Byte → 3 Bytes Padding → <span class="docutils literal">03 03 03</span></p></li>
<li><p>Nachricht mit Blocklänge (z. B. 16 Byte) → ein kompletter zusätzlicher Block mit 16 × <span class="docutils literal">0x10</span></p></li>
</ul>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">ANSI X.923</p>
<p>Auffüllen mit <span class="docutils literal">0x00</span>, außer dem letzten Byte, das die Anzahl Padding-Bytes angibt.</p>
</ld-card><ld-card class="incremental">
<p class="rubric">ISO/IEC 7816-4</p>
<p>Beginnt mit <span class="docutils literal">0x80</span>, gefolgt von Nullen.</p>
</ld-card><ld-card class="incremental">
<p class="rubric">Zero Padding</p>
<p>Füllt mit Nullen (<span class="docutils literal">0x00</span>) auf.</p>
<aside class="admonition incremental" data-theme="attention"><p class="admonition-title" data-theme="attention-header">Achtung!</p>
<p>Funktioniert <em>nur</em>, wenn die Nachricht nie mit <span class="docutils literal">0x00</span> endet, sonst ist Entschlüsselung mehrdeutig!</p>
</aside>
</ld-card><ld-card class="incremental">
<p class="rubric">Verhalten bei voller Blockgröße - Zusammenfassung</p>
<p>Angenommen, die Nachricht ist exakt 16 Byte lang (z. B. <cite>&quot;1234567890ABCDEF&quot;</cite>), so ergibt sich:</p>
<table class="table-data-monospaced font-size-90">
<thead>
<tr><th class="head"><p><strong>Padding-Modus</strong></p></th>
<th class="head"><p><strong>Erweiterte Nachricht (hex)</strong></p></th>
</tr>
</thead>
<tbody>
<tr><td><p>PKCS#7</p></td>
<td><p>... 10 10 10 10 10 10 10 10 10 10 10 10 10 10 10 10</p></td>
</tr>
<tr><td><p>ANSI X.923</p></td>
<td><p>... 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 10</p></td>
</tr>
<tr><td><p>ISO/IEC 7816-4</p></td>
<td><p>... 80 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00</p></td>
</tr>
<tr><td><p>Zero Padding</p></td>
<td><p>... 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00</p></td>
</tr>
</tbody>
</table>
<aside class="admonition incremental" data-theme="hint"><p class="admonition-title" data-theme="hint-header">Hinweis</p>
<p>Bei allen Modi wird bei Nachrichten mit dem x-fachen der Blocklänge ein <strong>zusätzlicher</strong> Padding-Block hinzugefügt, um bei der Entschlüsselung korrekt erkennen zu können, ob Padding entfernt werden muss.</p>
</aside>
</ld-card></ld-deck></ld-topic>

<ld-topic id="konvertierung-von-blockchiffren-in-stromchiffre">
<h2>Konvertierung von Blockchiffren in Stromchiffre</h2>
<aside class="admonition float-right width-40 incremental" data-theme="hint"><p class="admonition-title" data-theme="hint-header">Hinweis</p>
<p>Es gibt drei Modi, die es ermöglichen, eine Blockchiffre in eine zeichenorientierte Stromchiffre umzuwandeln:</p>
<ul class="simple">
<li><p>Cipher Feedback Mode (CFB)</p></li>
<li><p>Output Feedback Mode (OFB)</p></li>
<li><p>Counter Mode (CTR)</p></li>
</ul>
<p>D. h., es ist kein Auffüllen (<span class="eng">Padding</span>) erforderlich, wenn die Nachricht nicht ein Vielfaches der Blockgröße ist.</p>
</aside>
<p>Bei AES (<strong>die</strong> aktuelle Blockchiffre) erfolgt die Verschlüsselung  mit Blockgrößen von 128 Bits.</p>
</ld-topic>

<ld-topic id="counter-mode-vorteile">
<h2><em>Counter Mode</em> - Vorteile</h2>
<dl class="incremental-list field-list simple">
<dt>Hardware-Effizienz<span class="colon">:</span></dt>
<dd><p>kann von der Parallelisierung der Hardware profitieren</p>
</dd>
<dt>Software-Effizienz<span class="colon">:</span></dt>
<dd><p>leicht parallelisierbar in Software</p>
</dd>
<dt>Vorverarbeitung<span class="colon">:</span></dt>
<dd><p>die Verschlüsselung der Zähler</p>
</dd>
<dt>Zufälliger Zugriff<span class="colon">:</span></dt>
<dd><p>der i-te Block des Klartextes/des Chiffretextes kann im Zufallszugriff verarbeitet werden</p>
</dd>
<dt>Nachweisbare Sicherheit<span class="colon">:</span></dt>
<dd><p>genauso sicher wie die anderen Verfahren</p>
</dd>
<dt>Einfachheit<span class="colon">:</span></dt>
<dd><p>es wird nur der Verschlüsselungsalgorithmus benötigt</p>
</dd>
</dl>
</ld-topic>
<ld-topic id="xts-aes-modus-fur-block-orientierte-speichergerate">
<h2>XTS-AES Modus für block-orientierte Speichergeräte</h2>
<p>2010 vom NIST als zusätzlicher Blockchiffre-Betriebsmodus genehmigt.</p>
<p>Modus ist auch ein IEEE-Standard, IEEE Std 1619-2007</p>
<aside class="admonition" data-theme="note"><p class="admonition-title" data-theme="note-header">Frage</p>
<p>Welche potenziellen Bedrohungen sind relevant?</p>
</aside>
<ul class="simple">
<li><p>Die Norm beschreibt eine Verschlüsselungsmethode für Daten, die in sektor-basierten Geräten gespeichert sind, wobei das Bedrohungsmodell einen möglichen Zugriff des Gegners auf die gespeicherten Daten beinhaltet.</p></li>
<li><p>Hat breite Unterstützung der Industrie erhalten.</p></li>
</ul>
</ld-topic>
<ld-topic id="anforderungen-an-die-speicherverschlusselung">
<h2>Anforderungen an die Speicherverschlüsselung</h2>
<p>Die Anforderungen an die Verschlüsselung gespeicherter Daten, die auch als <em>data at rest</em> bezeichnet werden, unterscheiden sich von denen für übertragene Daten.</p>
<p>Die IEEE Norm P1619 wurde in Hinblick auf folgende Eigenschaften entwickelt:</p>
<ld-story>
<ul class="incremental-list simple">
<li><p>Der Chiffretext ist für einen Angreifer frei verfügbar.</p></li>
<li><p>Das Datenlayout wird auf dem Speichermedium und beim Transport nicht verändert.</p></li>
<li><p>Der Zugriff auf die Daten erfolgt in Blöcken fester Größe und unabhängig voneinander.</p></li>
<li><p>Die Verschlüsselung erfolgt in 16-Byte-Blöcken, die unabhängig voneinander sind.</p></li>
<li><p>Es werden keine weiteren Metadaten verwendet, außer der Position der Datenblöcke innerhalb des gesamten Datensatzes.</p></li>
<li><p>Derselbe Klartext wird an verschiedenen Stellen in verschiedene Chiffretexte verschlüsselt, aber immer in denselben Chiffretext, wenn er wieder an dieselbe Stelle geschrieben wird.</p></li>
<li><p>Ein standardkonformes Gerät kann für die Entschlüsselung von Daten konstruiert werden, die von einem anderen standardkonformen Gerät verschlüsselt wurden.</p></li>
</ul>
</ld-story></ld-topic>
<ld-topic id="xts-aes-operation-auf-einem-block">
<h2>XTS-AES Operation auf einem Block</h2>
<object class="light-image align-center" data="images/verschluesselung/xts_aes.svg" role="img" type="image/svg+xml">
</object><ld-supplemental embed-in-document-flow><dl class="dd-margin-left-2em field-list simple">
<dt>Schlüssel<span class="colon">:</span></dt>
<dd><p>es gilt: Schlüssel = Schlüssel<sub>1</sub> || Schlüssel<sub>2</sub></p>
</dd>
<dt>P<sub>j</sub><span class="colon">:</span></dt>
<dd><p>Der j-te Block des Klartexts. Alle Blöcke haben eine Länge von 128 bits. Eine (Klartext)dateneinheit – in der Regel ein Festplattensektor – besteht aus einer Folge von Klartextblöcken.</p>
</dd>
<dt>C<sub>j</sub><span class="colon">:</span></dt>
<dd><p>Der j-te Block des Chiffretextes.</p>
</dd>
<dt>j<span class="colon">:</span></dt>
<dd><p>Die fortlaufende Nummer des 128-Bit-Blocks innerhalb der Dateneinheit.</p>
</dd>
<dt>i<span class="colon">:</span></dt>
<dd><p>Der Wert des 128-Bit-Tweaks.</p>
</dd>
<dt>⍺<span class="colon">:</span></dt>
<dd><p>Ein primitives Element des GF(2¹²⁸) welches dem Polynom x (d. h. 0000...0010<sub>b</sub>) entspricht.</p>
</dd>
<dt>⍺<sub>j</sub><span class="colon">:</span></dt>
<dd><p>⍺ j mal mit sich selbst multipliziert im Körper GF(2¹²⁸)</p>
</dd>
<dt>⊕<span class="colon">:</span></dt>
<dd><p>Bitwise XOR</p>
</dd>
<dt>⊗<span class="colon">:</span></dt>
<dd><p>Modulare Multiplikation mit Binärkoeffizienten modulo x¹²⁸+x⁷+x²+x+1.</p>
</dd>
</dl>
<aside class="admonition" data-theme="hint"><p class="admonition-title" data-theme="hint-header">Hinweis</p>
<p>Dargestellt ist der Fall, dass alle zu verschlüsselnden (Klartext-)Blöcke eine Größe von 128 Bit haben. Sollt der letzte Block nicht eine Größe von 128 Bit haben, dann kommt „Cipher Text Stealing“ zum Einsatz.</p>
</aside>
</ld-supplemental></ld-topic>

<ld-topic id="zufallszahlen-verwendung-und-anforderungen">
<h2>Zufallszahlen - Verwendung und Anforderungen</h2>
<ul class="simple">
<li><p>Eine Reihe von Sicherheitsalgorithmen und -protokollen, die auf Kryptographie basieren, verwenden binäre Zufallszahlen:</p>
<ul>
<li><p>Schlüsselverteilung und reziproke (<span class="ger">wechselseitige</span>) Authentifizierungsverfahren</p></li>
<li><p>Erzeugung von Sitzungsschlüsseln</p></li>
<li><p>Generierung von Schlüsseln für den RSA Public-Key-Verschlüsselungsalgorithmus</p></li>
<li><p>Generierung eines Bitstroms für die symmetrische Stromverschlüsselung</p></li>
</ul>
</li>
</ul>
<div class="incremental docutils container">
<p>Es gibt zwei unterschiedliche Anforderungen an eine Folge von Zufallszahlen:</p>
<ol class="arabic simple incremental-list">
<li><p>Zufälligkeit</p></li>
<li><p>Unvorhersehbarkeit</p></li>
</ol>
</div>
</ld-topic>
<ld-topic id="zufalligkeit">
<h2>Zufälligkeit</h2>
<ul class="simple">
<li><p>Die Erzeugung einer Folge von angeblich zufälligen Zahlen, die in einem genau definierten statistischen Sinne zufällig sind, war ein Problem.</p></li>
</ul>
<ul class="incremental simple">
<li><p>Zwei Kriterien werden verwendet, um zu prüfen, ob eine Zahlenfolge zufällig ist:</p>
<dl class="dd-margin-left-4em field-list simple">
<dt>Gleichmäßige Verteilung<span class="colon">:</span></dt>
<dd><p>Die Häufigkeit des Auftretens von Einsen und Nullen sollte ungefähr gleich sein.</p>
</dd>
<dt>Unabhängigkeit<span class="colon">:</span></dt>
<dd><p>Keine Teilsequenz der Folge kann von den anderen abgeleitet werden.</p>
</dd>
</dl>
</li>
</ul>
</ld-topic>
<ld-topic id="unvorhersehbarkeit">
<h2>Unvorhersehbarkeit</h2>
<ul class="simple">
<li><p>Die Anforderung ist nicht nur, dass die Zahlenfolge statistisch zufällig ist, sondern auch, dass die <em>aufeinanderfolgenden Glieder der Folge unvorhersehbar</em> sind.</p></li>
</ul>
<ul class="incremental simple">
<li><p>Bei <em>echten</em> Zufallsfolgen ist jede Zahl statistisch unabhängig von den anderen Zahlen in der Folge und daher unvorhersehbar.</p>
<ul>
<li><p>Echte Zufallszahlen(-generatoren) haben Grenzen; insbesondere die Ineffizienz selbiger ist eine Herausforderung, so dass oft Algorithmen implementiert werden, die scheinbar zufällige Zahlenfolgen erzeugen.</p></li>
<li><p>Es muss darauf geachtet werden, dass ein Gegner nicht in der Lage ist, zukünftige Elemente der Folge auf der Grundlage früherer Elemente vorherzusagen.</p></li>
</ul>
</li>
</ul>
<ld-supplemental><p>Einfache Zufallszahlengeneratoren erfüllen die Eigenschaft der Unvorhersehbarkeit oft nicht.</p>
</ld-supplemental></ld-topic>
<ld-topic id="visualisierung-von-zufallszahlengeneratoren">
<h2>Visualisierung von Zufallszahlengeneratoren<a class="brackets" href="#footnote-3" id="footnote-reference-3" role="doc-noteref"><span class="fn-bracket">[</span>3<span class="fn-bracket">]</span></a></h2>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-4" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-4">4</a><span class="fn-bracket">]</span></span>
<p>Zufallszahlengenerator ≘ <span class="eng">Random Number Generator (RNG)</span></p>
</aside>
</aside>
<ld-grid class="default-layout">
<ld-cell class="width-50" style="align-self:auto;">
<p>Erwartete Verteilung von Zufallswerten im 3D-Raum.</p>
<object aria-label="Erwartete Verteilung der Werte im 3D-Raum" class="light-image align-center" data="images/verschluesselung/rng-distribution_3d_expected.svg" role="img" type="image/svg+xml">
</object></ld-cell><ld-cell class="width-50 incremental" style="align-self:auto;">
<p>Verteilung von „zufälligen“ Werten eines schlechten RNGs im 3D-Raum.</p>
<object aria-label="Schlechte Verteilung der Werte im 3D-Raum" class="light-image align-center" data="images/verschluesselung/rng-distribution_3d_bad_lcg.svg" role="img" type="image/svg+xml">
</object></ld-cell></ld-grid><ld-supplemental embed-in-document-flow><p>Bei diesem Experiment werden immer drei nacheinander auftretende Werte als Koordinate im 3D-Raum interpretiert. Die erwartete Verteilung ist eine gleichmäßige Verteilung im Raum. Die Verteilung der Werte eines schlechten RNGs ist nicht gleichmäßig und zeigt eine klare Struktur.</p>
</ld-supplemental></ld-topic>
<ld-topic id="pseudozufallszahlen">
<h2>Pseudozufallszahlen</h2>
<p>Bei kryptografischen Anwendungen werden in der Regel algorithmische Verfahren zur Erzeugung von Zufallszahlen verwendet.</p>
<ul class="incremental-list simple">
<li><p>Diese Algorithmen sind deterministisch und erzeugen daher Zahlenfolgen, die nicht statistisch zufällig sind.</p></li>
<li><p>Wenn der Algorithmus gut ist, bestehen die resultierenden Sequenzen (viele) Tests auf Zufälligkeit und werden als Pseudozufallszahlen bezeichnet.</p></li>
</ul>
</ld-topic>
<ld-topic id="zufalls-und-pseudozufallszahlengeneratoren">
<h2>Zufalls- und Pseudozufallszahlengeneratoren</h2>
<object aria-label="RNGs" class="light-image align-center" data="images/verschluesselung/rng_and_prng.svg" role="img" type="image/svg+xml">
</object><dl class="field-list simple">
<dt>TRNG<span class="colon">:</span></dt>
<dd><p>Echter Zufallszahlengenerator (<span class="eng">True Random Number Generator</span>)</p>
</dd>
<dt>PRNG<span class="colon">:</span></dt>
<dd><p>Pseudozufallszahlengenerator (<span class="eng">Pseudorandom Number Generator</span>)</p>
</dd>
<dt>PRF<span class="colon">:</span></dt>
<dd><p>Pseudozufällige Funktion (<span class="eng">Pseudorandom Function</span>)</p>
</dd>
</dl>
</ld-topic>
<ld-topic id="zufalligkeit-1">
<h2>Zufälligkeit</h2>
<p>Der erzeugte Bitstrom muss zufällig erscheinen, obwohl er deterministisch ist:</p>
<aside class="admonition incremental" data-theme="attention"><p class="admonition-title" data-theme="attention-header">Achtung!</p>
<p>Es gibt keinen einzigen Test, mit dem „abschließend“ festgestellt werden kann, ob eine PRF/ein PRNG Zahlen erzeugt, die die Eigenschaft der Zufälligkeit aufweisen.</p>
</aside>
<div class="incremental docutils container">
<p>Wenn der PRNG auf der Grundlage mehrerer Tests Zufälligkeit aufweist, kann davon ausgegangen werden, dass er die Anforderung der Zufälligkeit erfüllt.</p>
<div class="accentuate docutils container">
<p><a class="reference external" href="https://nvlpubs.nist.gov/nistpubs/Legacy/SP/nistspecialpublication800-22r1a.pdf">NIST SP 800-22 Rev. 1a</a> legt fest, dass die Tests auf drei Merkmale ausgerichtet sein sollten:</p>
<ol class="arabic simple">
<li><p>gleichmäßige Verteilung,</p></li>
<li><p>Skalierbarkeit,</p></li>
<li><p>Konsistenz</p></li>
</ol>
<ld-supplemental><p>Skalierbarkeit bedeutet hier, dass ein Test, der auf eine Folge angewandt werden kann, auch auf eine beliebige Teilfolgen anwendar ist.</p>
</ld-supplemental></div>
</div>
</ld-topic>
<ld-topic id="tests-auf-zufalligkeit">
<h2>Tests auf Zufälligkeit</h2>
<p>SP 800-22 listet 15 verschiedene Zufallstests auf (Auszug):</p>
<ld-story>
<dl class="incremental-list field-list simple">
<dt>Häufigkeitstest<span class="colon">:</span></dt>
<dd><ul class="simple">
<li><p>Der grundlegendste Test, der in jeder Testreihe enthalten sein muss.</p></li>
<li><p>Es soll festgestellt werden, ob die Anzahl der Einsen und Nullen in einer Sequenz annähernd derjenigen entspricht, die bei einer echten Zufallssequenz zu erwarten wäre.</p></li>
</ul>
</dd>
<dt>Lauflängentest<span class="colon">:</span></dt>
<dd><ul class="simple">
<li><p>Schwerpunkt dieses Tests ist die Zahl der Läufe (<span class="eng">runs</span>) in der Folge, wobei ein Lauf (<span class="eng">run</span>) eine ununterbrochene Folge identischer Bits ist, die vorher und nachher durch ein Bit des entgegengesetzten Werts begrenzt wird.</p></li>
<li><p>Es soll festgestellt werden, ob die Anzahl der Läufe von Einsen und Nullen verschiedener Länge den Erwartungen für eine Zufallsfolge entspricht.</p></li>
</ul>
</dd>
<dt>Maurers universeller statistischer Test<span class="colon">:</span></dt>
<dd><ul class="simple">
<li><p>Fokus ist die Anzahl der Bits zwischen übereinstimmenden Mustern.</p></li>
<li><p>Ziel ist es, festzustellen, ob die Sequenz ohne Informationsverlust erheblich komprimiert werden kann oder nicht. Eine signifikant komprimierbare Sequenz wird als nicht zufällig betrachtet.</p></li>
</ul>
</dd>
</dl>
</ld-story></ld-topic>
<ld-topic class="new-subsection" id="stromchiffre">
<h2>Stromchiffre</h2>
</ld-topic>
<ld-topic id="allgemeine-struktur-einer-typischen-stromchiffre">
<h2>Allgemeine Struktur einer typischen Stromchiffre</h2>
<object aria-label="Typical Stream Cipher" class="light-image align-center" data="images/verschluesselung/typical_stream_cipher.svg" role="img" type="image/svg+xml">
</object><ld-grid class="default-layout">
<ld-cell class="width-20" style="align-self:auto;">
<p>Klartext: p<sub>i</sub></p>
<p>Chiffretext: c<sub>i</sub></p>
<p>Schlüsselstrom: z<sub>i</sub></p>
</ld-cell><ld-cell class="width-20" style="align-self:auto;">
<p>Schlüssel: K</p>
<p>Initialisierungswert: IV</p>
</ld-cell><ld-cell class="width-50" style="align-self:auto;">
<p>Zustand: σ<sub>i</sub></p>
<p>Funktion zur Berechnung des nächsten Zustands: f</p>
<p>Schlüsselstromfunktion: g</p>
</ld-cell></ld-grid><ld-supplemental><p>Die Schlüsselstromfunktion g projeziert den internen Zustand (welcher sehr groß sein kann) auf den nächsten Block/das nächste Byte, das zur Verschlüsselung verwendet wird.</p>
</ld-supplemental></ld-topic>
<ld-topic id="uberlegungen-zum-entwurf-von-stromchiffren">
<h2>Überlegungen zum Entwurf von Stromchiffren</h2>
<ld-story>
<dl class="incremental-list dd-margin-left-4em field-list">
<dt>Die Verschlüsselungssequenz sollte eine große Periode haben<span class="colon">:</span></dt>
<dd><p>Ein Pseudozufallszahlengenerator verwendet eine Funktion, die einen deterministischen Strom von Bits erzeugt, der sich schließlich wiederholt; je länger die Wiederholungsperiode, desto schwieriger wird die Kryptoanalyse.</p>
</dd>
<dt>Der Schlüsselstrom sollte die Eigenschaften eines echten Zufallszahlenstroms so gut wie möglich nachbilden<span class="colon">:</span></dt>
<dd><p>Es sollte eine ungefähr gleiche Anzahl von 1en und 0en geben.</p>
<p>Wenn der Schlüsselstrom als ein Strom von Bytes behandelt wird, sollten alle 256 möglichen Byte-Werte ungefähr gleich oft vorkommen.</p>
</dd>
<dt>Eine Schlüssellänge von mindestens 128 Bit ist wünschenswert<span class="colon">:</span></dt>
<dd><p>Die Ausgabe des Pseudo-Zufallszahlengenerators ist vom Wert des Eingabeschlüssels abhängig.</p>
<p>Es gelten die gleichen Überlegungen wie für Blockchiffren.</p>
</dd>
<dt>Mit einem richtig konzipierten Pseudozufallszahlengenerator kann eine Stromchiffre genauso sicher sein wie eine Blockchiffre mit vergleichbarer Schlüssellänge<span class="colon">:</span></dt>
<dd><p>Ein potenzieller Vorteil ist, dass Stromchiffren, die keine Blockchiffren als Baustein verwenden, in der Regel schneller sind und weit weniger Code benötigen als Blockchiffren.</p>
</dd>
</dl>
</ld-story></ld-topic>
<ld-topic id="chacha20">
<h2>ChaCha20</h2>
<ul class="incremental-list list-with-explanations">
<li><p>ChaCha20 ist eine Stromchiffre, die von Daniel J. Bernstein entwickelt wurde.</p></li>
<li><p>ChaCha20 ist ein schneller Verschlüsselungsalgorithmus (ohne besondere Hardwareanforderungen).</p>
<p>Reine Softwareimplementierungen von ChaCha20 sind reinen Softwareimplementierungen von AES in Bezug auf die Geschwindigkeit überlegen.</p>
</li>
<li><p>ChaCha20 ist im <a class="reference external" href="https://datatracker.ietf.org/doc/html/rfc8439">RFC 8439</a> spezifiziert.</p></li>
<li><p>ChaCha20 ist eine spezielle Form von ChaCha, die 20 Runden durchläuft.</p></li>
</ul>
</ld-topic>
<ld-topic id="die-chacha20-blockfunktion">
<h2>Die ChaCha20 Blockfunktion</h2>
<ld-deck>
<ld-card>
<p>Eingaben:</p>
<ul class="simple">
<li><p>Ein 256-Bit-Schlüssel (8 × 32-Bit-Werte in <em>little-endian</em>)</p></li>
<li><p>Ein 32-Bit-Blockzähler</p></li>
<li><p>Eine 96-Bit-Nonce (3 × 32-Bit-Werte in <em>little-endian</em>)</p></li>
</ul>
<p>∑ 384 Bit.</p>
<p>Ausgabe:</p>
<ul class="simple">
<li><p>64 Byte (512 Bit) des Schlüsselstroms</p></li>
</ul>
<ld-supplemental embed-in-document-flow><aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><p>Es gibt auch eine Variante von ChaCha20, die einen 64-Bit-Blockzähler und eine 64-Bit Nonce verwendet. Hier wird jedoch die IETF Variante diskutiert.</p>
</aside></ld-supplemental></ld-card><ld-card class="incremental">

<ld-topic class="new-subsection" id="public-key-kryptographie">
<h2>Public-Key-Kryptographie</h2>
</ld-topic>
<ld-topic id="prinzipien-von-public-key-kryptosystemen">
<h2>Prinzipien von Public-Key-Kryptosystemen</h2>
<p>Das Konzept der <em>Public-Key-Kryptographie</em> (d. h. der Kryptografie mit öffentlichen Schlüsseln) entstand aus dem Versuch, zwei der schwierigsten Probleme im Zusammenhang mit der symmetrischen Verschlüsselung zu lösen:</p>
<aside class="admonition incremental"><p class="admonition-title">Schlüsselverteilung</p>
<p>Wie kann man generell sicher kommunizieren, ohne einem „Key Distribution Center“ (KDC) seinen Schlüssel anvertrauen zu müssen?</p>
</aside>
<aside class="admonition incremental"><p class="admonition-title">Digitale Signaturen</p>
<p>Wie kann man überprüfen, ob eine Nachricht unversehrt vom angegebenen Absender stammt?</p>
</aside>
<div class="exclamation-mark incremental docutils container">
<p><strong>Whitfield Diffie</strong> und <strong>Martin Hellman</strong> von der Stanford University erzielten 1976 einen Durchbruch, indem sie eine Methode entwickelten, die beide Probleme löste und sich radikal von allen bisherigen Ansätzen der Kryptografie unterschied.</p>
</div>
</ld-topic>
<ld-topic id="bestandteile-von-public-key-kryptosystemen">
<h2>Bestandteile von Public-Key-Kryptosystemen</h2>
<dl class="incremental-list field-list simple">
<dt><em>Klartext</em> (<span class="eng">Plaintext</span>)<span class="colon">:</span></dt>
<dd><p>Die lesbare Nachricht oder Daten, die dem Algorithmus als Eingabe dienen.</p>
</dd>
<dt><em>Verschlüsselungsalgorithmus</em><span class="colon">:</span></dt>
<dd><p>Führt verschiedene Umwandlungen des Klartextes durch.</p>
</dd>
<dt><em>Öffentlicher Schlüssel</em><span class="colon">:</span></dt>
<dd><p>Wird für <em>Verschlüsselung</em> oder <em>Entschlüsselung</em> verwendet.</p>
</dd>
<dt><em>Privater Schlüssel</em><span class="colon">:</span></dt>
<dd><p>Verwendet für <em>Verschlüsselung</em> oder <em>Entschlüsselung</em>.</p>
</dd>
<dt><em>Chiffretext</em> (<span class="eng">Ciphertext</span>)<span class="colon">:</span></dt>
<dd><p>Die verschlüsselte Nachricht, die als Ausgabe produziert wird.</p>
</dd>
<dt><em>Entschlüsselungsalgorithmus</em><span class="colon">:</span></dt>
<dd><p>Nimmt den Geheimtext und den passenden Schlüssel entgegen und erzeugt den ursprünglichen Klartext.</p>
</dd>
</dl>
</ld-topic>
<ld-topic id="verschlusselung-mit-offentlichem-schlussel">
<h2>Verschlüsselung mit öffentlichem Schlüssel</h2>
<object aria-label="Verschlüsselung mit öffentlichem Schlüssel" class="light-image align-center" data="images/verschluesselung/enc_with_pub_key.svg" role="img" type="image/svg+xml">
</object></ld-topic>
<ld-topic id="verschlusselung-mit-privatem-schlussel">
<h2>Verschlüsselung mit privatem Schlüssel</h2>
<object aria-label="Verschlüsselung mit privatem Schlüssel" class="light-image align-center" data="images/verschluesselung/enc_with_priv_key.svg" role="img" type="image/svg+xml">
</object></ld-topic>
<ld-topic id="konventionelle-und-public-key-verschlusselung">
<h2>Konventionelle und Public-Key-Verschlüsselung</h2>
<ld-story>
<ld-grid class="default-layout">
<ld-cell style="align-self:auto;">
<p class="rubric">Konventionelle Verschlüsselung</p>
<p><strong>Benötigt zur Anwendung</strong></p>
<ol class="arabic simple">
<li><p>Es wird derselbe Algorithmus mit demselben Schlüssel für die Ver- und Entschlüsselung verwendet.</p></li>
<li><p>Der Sender und der Empfänger müssen den Algorithmus und den Schlüssel kennen bzw. besitzen.</p></li>
</ol>
<div class="incremental-1 compound">
<p><strong>Notwendig für die Sicherheit</strong></p>
<ol class="arabic simple">
<li><p>Der Schlüssel muss geheim gehalten werden.</p></li>
<li><p>Es muss „<em>unmöglich</em>“ sein, eine Nachricht zu entschlüsseln, wenn der Schlüssel geheim gehalten wird.</p></li>
<li><p>Die Kenntnis des Algorithmus und von (ggf. vielen) Geheimtexten ist nicht ausreichend, um den Schlüssel zu ermitteln.</p></li>
</ol>
</div>
</ld-cell><ld-cell style="align-self:auto;">
<p class="rubric">Public-Key Verschlüsselung</p>
<p><strong>Benötigt zur Anwendung</strong></p>
<ol class="arabic simple">
<li><p>Zwei Algorithmen: je einer für die Ver-/Entschlüsselung. Weiterhin ein Paar von Schlüsseln; je einer für die Ver-/Entschlüsselung.</p></li>
<li><p>Der Absender und der Empfänger müssen jeweils einen der passenden Schlüssel besitzen (nicht den gleichen).</p></li>
</ol>
<div class="incremental-1 compound">
<p><strong>Notwendig für die Sicherheit</strong></p>
<ol class="arabic simple">
<li><p>Einer der  Schlüssel muss geheim bleiben.</p></li>
<li><p>Es muss „<em>unmöglich</em>“ sein, eine Nachricht zu entschlüsseln, wenn ein Schlüssel geheim gehalten wird.</p></li>
<li><p>Die Kenntnis des Algorithmus und eines Schlüssels sowie von  Geheimtexten ist nicht ausreichend, um den anderen Schlüssel zu ermitteln.</p></li>
</ol>
</div>
</ld-cell></ld-grid></ld-story></ld-topic>
<ld-topic id="anwendungen-fur-public-key-kryptosysteme">
<h2>Anwendungen für Public-Key-Kryptosysteme</h2>
<ld-deck>
<ld-card>
<p>Kryptosysteme mit öffentlichen Schlüsseln lassen sich in drei Kategorien einteilen:</p>
<ol class="arabic simple incremental-list">
<li><p><em>Ver-/Entschlüsselung</em>: Der Absender verschlüsselt eine Nachricht mit dem öffentlichen Schlüssel des Empfängers.</p></li>
<li><p><em>Digitale Unterschriften</em>: Der Absender „unterschreibt“ eine Nachricht mit seinem privaten Schlüssel.</p></li>
<li><p><em>Schlüsselaustausch</em>: Zwei Seiten arbeiten zusammen, um einen Sitzungsschlüssel (d. h. einen symmetrischen Schlüssel) auszutauschen.</p></li>
</ol>
</ld-card><ld-card class="incremental">
<p>Einige Algorithmen eignen sich für alle drei Anwendungen, während andere nur für eine oder zwei verwendet werden können:</p>

</tr>

</aside>

</ld-card></ld-deck></ld-topic>
<ld-topic id="anforderungen-an-public-key-algorithmen">
<h2>Anforderungen an Public-Key-Algorithmen</h2>
<ld-deck>
<ld-card>
<ul class="incremental-list positive-list simple">
<li><p>Für eine Partei <span class="math">\(B\)</span> ist es <em>rechnerisch einfach</em>, ein Schlüsselpaar (bestehend aus öffentlicher Schlüssel <span class="math">\(PU_b\)</span> und privater Schlüssel <span class="math">\(PR_b\)</span>) zu erzeugen.</p></li>
<li><p>Für einen Absender <span class="math">\(A\)</span> ist es <em>rechnerisch einfach</em>, bei Kenntnis des öffentlichen Schlüssels von <span class="math">\(B\)</span> und der zu verschlüsselnden Nachricht den entsprechenden Chiffretext zu erzeugen.</p></li>
<li><p>Für den Empfänger <span class="math">\(B\)</span> ist es <em>rechnerisch einfach</em>, den resultierenden Chiffretext mit Hilfe des privaten Schlüssels zu entschlüsseln, um die ursprüngliche Nachricht wiederherzustellen.</p></li>
<li><p>Die beiden Schlüssel können in beliebiger Reihenfolge verwendet werden.</p></li>
</ul>
<ul class="negative-list incremental-list simple">
<li><p>Für einen Angreifer, der den öffentlichen Schlüssel kennt, ist es <em>rechnerisch unmöglich</em>, den privaten Schlüssel zu ermitteln.</p></li>
<li><p>Für einen Angreifer, der den öffentlichen Schlüssel und einen Chiffretext kennt, ist es <em>rechnerisch unmöglich</em>, die ursprüngliche Nachricht wiederherzustellen.</p></li>
</ul>
</ld-card><ld-card class="incremental">
<aside class="admonition" data-theme="repetition"><p class="admonition-title" data-theme="repetition-header"><span>Wiederholung</span></p><p>Eine <em>Einwegfunktion</em> ist eine Funktion <span class="math">\(f\)</span>, die <em>leicht zu berechnen</em>,
aber <em>praktisch nicht zu invertieren</em> ist:</p>
<ul class="simple">
<li><p><span class="math">\(X \mapsto Y = f(X)\)</span> — leicht (effizient für jedes <span class="math">\(X\)</span>)</p></li>
<li><p><span class="math">\(Y \mapsto X'\)</span> mit <span class="math">\(f(X') = Y\)</span> — praktisch undurchführbar</p></li>
</ul>
<p>D. h. zu einem gegebenen <span class="math">\(Y\)</span> ist es berechnungstechnisch nicht praktikabel,
<em>irgendein</em> Urbild <span class="math">\(X'\)</span> mit <span class="math">\(f(X') = Y\)</span> zu bestimmen.</p>
</aside></ld-card><ld-card class="incremental">
<ul class="simple">
<li><p>Benötigt wird jedoch eine Falltürfunktion (<span class="eng">Trapdoor one-way function</span>); d. h. eine Einwegfunktion die effizient umkehrbar ist, <strong>wenn ein Geheimnis bekannt ist</strong>.</p></li>
</ul>
<ul class="incremental-list">
<li><p>Eine Einwegfunktion mit Falltür ist eine Familie invertierbarer Funktionen <span class="math">\(f_k\)</span>, für die gilt:</p>
<blockquote>
<ul class="simple">
<li><p><span class="math">\(Y = f_k(X)\)</span> einfach, wenn <span class="math-i">k</span> und <span class="math-i">X</span> bekannt sind.</p></li>
<li><p><span class="math">\(X = f_k^{–1}(Y)\)</span> einfach,  wenn <span class="math-i">k</span> und <span class="math-i">Y</span> bekannt sind.</p></li>
<li><p><span class="math">\(X = f_k^{–1}(Y)\)</span> unmöglich, wenn <span class="math-i">Y</span> bekannt ist, aber <span class="math-i">k</span> nicht.</p></li>
</ul>
</blockquote>
</li>
<li><p>Ein praktisches Public-Key-Verfahren hängt von einer geeigneten Falltür(einweg)funktion ab.</p></li>
</ul>
</ld-card></ld-deck><ld-supplemental><p>Ein Falltürfunktion lässt sich nicht trivial umkehren; bzw. die Umkehrung erfordert spezielle (weitergehende) Informationen; d. h. die Falltür.</p>
</ld-supplemental></ld-topic>
<ld-topic id="missverstandnisse-bei-der-verwendung-von-public-key-kryptosystemen">
<h2>Missverständnisse bei der Verwendung von Public-Key-Kryptosystemen</h2>
<ul class="incremental-list simple">
<li><p>Public-Key-Verschlüsselung ist sicherer vor Kryptoanalyse als die symmetrische Verschlüsselung.</p></li>
<li><p>Public-Key-Kryptografie (d. h. die Verschlüsselung mit öffentlichen Schlüsseln) ist eine Allzwecktechnik, die die symmetrische Verschlüsselung überflüssig gemacht hat.</p></li>
<li><p>Man hat das Gefühl, dass die Schlüsselverteilung bei der Verschlüsselung mit öffentlichen Schlüsseln trivial ist, verglichen mit dem mühsamen Handshaking, das bei der symmetrischen Verschlüsselung mit Schlüsselverteilungszentren verbunden ist.</p></li>
</ul>
</ld-topic>
<ld-topic id="diffie-hellmann-merkle-schlusseltausch">
<h2>Diffie-Hellmann(-Merkle)-Schlüsseltausch</h2>
<ld-story>
<ul class="incremental-list simple">
<li><p>ermöglich es zwei Kommunikationspartnern, über eine öffentliche (abhörbare) Leitung einen gemeinsamen (Sitzungs-)Schlüssel zu vereinbaren</p></li>
<li><p>der Sitzungsschlüssel wird dann für ein symmetrisches Verschlüsselungsverfahren verwendet</p></li>
<li><p>veröffentlicht im Jahr 1976</p></li>
<li><p>Ablauf:</p>
<ol class="arabic simple">
<li><p>Gegeben sein eine Primzahl <span class="math-i">p</span> und ein Erzeuger (Generator) <span class="math">\(s \in \mathbb{Z}_p^*\)</span></p></li>
<li><p>Beide Kommunikationspartner wählen eine Zahl <span class="math-i">a</span> bzw. <span class="math-i">b</span> für die gilt  <span class="math">\(a,b \in \mathbb{Z}_{p-1}\)</span></p></li>
<li><p>A berechnet <span class="math">\(\alpha = s^a \bmod p\)</span> und B berechnet <span class="math">\(\beta = s^b \bmod p\)</span></p></li>
<li><p>A und B senden sich gegenseitig ihre Ergebnisse zu</p></li>
<li><p>Der Schlüssel wird dann wie folgt berechnet: <span class="math">\(K = \alpha^b \bmod p = \beta^a \bmod p\)</span></p></li>
</ol>
</li>
<li><p>Die Sicherheit des Diffie-Hellman-Protokolls beruht auf der Schwierigkeit des diskreten Logarithmusproblems. Das Problem aus <span class="math">\(g^x \equiv y \mod p\)</span> den Exponenten <span class="math-i">x</span> zu finden, ist in großen Gruppen praktisch schwer lösbar.</p></li>
</ul>
<aside class="admonition incremental" data-theme="warning"><p class="admonition-title" data-theme="warning-header">Warnung</p>
<p>Klassisches Diffie-Hellmann kann von zukünftigen leistungsstarken Quantenrechnern unter Einsatz des Shor Algorithmus potentiell gebrochen werden.</p>
<p>„Nachfolger“ ist zum Beispiel CRYSTALS-Kyber.</p>
</aside>
</ld-story><ld-supplemental><p><span class="math">\(\mathbb{Z}_p^*\)</span> ist die multiplikative Gruppe modulo <span class="math">\(p\)</span>; ist <span class="math">\(p\)</span> eine Primzahl, dann ist die Gruppe zyklisch. Damit der gemeinsam berechnete Schlüssel den gesamten Wertebereich von <span class="math">\(\mathbb{Z}_p^*\)</span> abdecken kann, muss <span class="math">\(s\)</span> ein Erzeuger dieser Gruppe sein; d. h. <span class="math">\(s^x \bmod p\)</span> mit <span class="math">\(x \in \mathbb{Z}_{p-1}\)</span> erzeugt alle Element der Gruppe. Ist <span class="math">\(s\)</span> kein Erzeuger, so ist der Schlüsselraum auf eine echte Untergruppe eingeschränkt, was die kryptografische Sicherheit verringert. Die Anzahl der Erzeuger einer Gruppe <span class="math">\(\mathbb{Z}_p^*\)</span> (auch primitive Wurzeln genannt)  ist gegeben durch: <span class="math">\(\varphi(p - 1)\)</span> wobei <span class="math">\(\varphi\)</span> die Eulersche Totientenfunktion ist.</p>
</ld-supplemental></ld-topic>
<ld-topic id="rivest-shamir-adleman-rsa-algorithm">
<h2>Rivest-Shamir-Adleman (RSA) Algorithm</h2>
<ul class="incremental-list list-with-explanations">
<li><p>Entwickelt 1977 am MIT von Ron Rivest, Adi Shamir und Len Adleman.</p></li>
<li><p>Universeller Ansatz zur Verschlüsselung mit öffentlichen Schlüsseln.</p></li>
<li><p>Ist eine Chiffre, bei der Klartext und Chiffretext ganze Zahlen zwischen <span class="math">\(0\)</span> und <span class="math">\(n - 1\)</span> für ein bestimmtes <span class="math">\(n\)</span> sind.</p></li>
<li><p>Eine typische Größe für <span class="math">\(n\)</span> waren 1024 Bits oder 309 Dezimalziffern.</p>
<p>Solch kleine Zahlen werden heute als äußerst unsicher angesehen, insbesondere angesichts der bevorstehenden Quantencomputer und der Entwicklung von Quantenalgorithmen (vgl. <a class="reference external" href="https://en.wikipedia.org/wiki/Shor%27s_algorithm">Shors Algorithmus (1994)</a>), die Zahlen effizient faktorisieren können, wenn genügend QBits in hinreichender Qualität<a class="brackets" href="#footnote-5" id="footnote-reference-5" role="doc-noteref"><span class="fn-bracket">[</span>5<span class="fn-bracket">]</span></a> zur Verfügung stehen.</p>
</li>
</ul>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-6" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-6">6</a><span class="fn-bracket">]</span></span>
<p>Aktuell sind Quantencomputer nicht in der Lage, die für RSA verwendeten Schlüssel zu brechen und es ist auch (noch) nicht geklärt, ob die aktuellen Technologien entsprechend skaliert werden können. Es besteht aber die Möglichkeit!</p>
</aside>
</aside>
</ld-topic>
<ld-topic id="rsa-algorithmus">
<h2>RSA Algorithmus</h2>
<ul class="incremental-list">
<li><p>RSA verwendet einen Ausdruck mit Exponentialen</p></li>
<li><p>Der Klartext wird in Blöcken verschlüsselt, wobei jeder Block einen Binärwert hat, der kleiner als eine bestimmte Zahl <span class="math">\(n\)</span> ist<a class="brackets" href="#footnote-6" id="footnote-reference-6" role="doc-noteref"><span class="fn-bracket">[</span>6<span class="fn-bracket">]</span></a>.</p></li>
<li><p>Die Ver- und Entschlüsselung erfolgt für einen Klartextblock <span class="math">\(M\)</span> und einen Chiffretextblock <span class="math">\(C\)</span> in der folgenden Form:</p>
<blockquote>
<p><span class="math">\(C = M^e\; mod\; n \qquad M = C^d\; mod\; n  \qquad (M^e)^d\; mod\; n = M^{ed}\; mod\; n\)</span></p>
</blockquote>
</li>
<li><p>Sowohl der Sender als auch der Empfänger müssen den Wert von <span class="math">\(n\)</span> kennen.</p></li>
<li><p>Der Absender kennt den Wert von <span class="math">\(e\)</span>, und nur der Empfänger kennt den Wert von <span class="math">\(d\)</span></p></li>
<li><p>Dies ist ein Public-Key-Verschlüsselungsalgorithmus mit dem öffentlichen Schlüssel <span class="math">\(PU=\lbrace e,n \rbrace\)</span> und dem privaten Schlüssel <span class="math">\(PR=\lbrace d,n \rbrace\)</span>.</p></li>
</ul>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-7" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-7">7</a><span class="fn-bracket">]</span></span>
<p>Basierend auf der Zahl n ergibt sich die maximale Größe des Blocks in Bit. Sei, hypothetisch, <span class="math">\(n = 4.294.967.296+1\)</span>, dann kann der Block maximal 32 Bit groß sein (<span class="math">\(2^{32} = 4.294.967.296\)</span>).</p>
</aside>
</aside>
<ld-supplemental><p><span class="math">\(M = C^d\; mod\; n  \Rightarrow M = (M^e\; mod\; n)^d\; mod\; n = (M^e)^d\; mod\; n\)</span></p>
</ld-supplemental></ld-topic>
<ld-topic class="new-subsection transition-fade" id="kryptografische-hash-funktionen">
<h2>Kryptografische Hash Funktionen</h2>
</ld-topic>
<ld-topic id="hashfunktionen">
<h2>Hashfunktionen</h2>
<ul class="incremental-list simple">
<li><p>Eine Hashfunktion H akzeptiert eine beliebig lange Nachricht M als Eingabe und gibt einen Wert fixer Größe zurück: h = H(M).</p></li>
<li><p>Wird oft zur Gewährleistung der Datenintegrität verwendet. Eine Änderung eines beliebigen Bits in M sollte mit hoher Wahrscheinlichkeit zu einer Änderung des Hashwerts h führen.</p></li>
<li><p>Kryptographische Hashfunktionen werden für Sicherheitsanwendungen benötigt. Mögliche Anwendungen:</p>
<ul>
<li><p>Authentifizierung von Nachrichten</p></li>
<li><p>Digitale Signaturen</p></li>
<li><p>Speicherung von Passwörtern</p></li>
</ul>
</li>
</ul>
</ld-topic>
<ld-topic id="beispiel-berechnung-von-hashwerten-mittels-md5">
<h2>Beispiel: Berechnung von Hashwerten mittels MD5</h2>
<div class="monospaced line-block">
<div class="line">md5(&quot;Hello0&quot;) = 5ed715782191ee6041cb4d66f29b1121</div>

</div>

<div class="line">md5(&quot;Dieses Passwort ist wirklich total sicher</div>
<div class="line-block">
<div class="line">und falls Du es mir nicht glaubst, dann</div>
<div class="line">tippe es zweimal hintereinander blind</div>
<div class="line">fehlerfrei ein.&quot;)</div>

</div>

<p>Die Verwendung von MD5 dient hier lediglich der Illustration. In realen Anwendung sollte MD5 nicht mehr verwendet werden, da es nachgewiesene Schwachstellen aufweist.</p>
</aside>
</ld-topic>
<ld-topic id="sicherheitsanforderungen-an-kryptografische-hashfunktion">
<h2>Sicherheitsanforderungen an kryptografische Hashfunktion</h2>
<ld-story>
<dl class="incremental-list field-list">
<dt>Variable Eingabegröße<span class="colon">:</span></dt>
<dd><p>H kann auf einen Block beliebiger Größe angewendet werden.</p>
</dd>
<dt>Pseudozufälligkeit<span class="colon">:</span></dt>
<dd><p>Die Ausgabe von H erfüllt die Standardtests für Pseudozufälligkeit.</p>
</dd>
<dt>Einwegeigenschaft<span class="colon">:</span></dt>
<dd><p>Es ist rechnerisch/praktisch nicht machbar für einen gegeben Hashwert h ein N zu finden so dass gilt: H(N) = h</p>
<p>(<span class="eng">preimage resistant; one-way property</span>)</p>
<ld-presenter-note encrypted="">
MTAwMDAw:jm3HQrgNpVqZ5u//VOmUcqbvnK8oley5c27aFxjN1bY=:5oVCgoht3XPPRnuM:YyvlF64CGOLJgClV6GXpl6ffpidub/FnAH9US++nTKH2HiT5WMadtyxEfeRA8+37DNr7a0CUj8Tc7f9IBpqgS3+TXpzETYI+pfTdmAbAm9/GJNXDiNGoJcQUFa4HEGJ0+FrTB3hgR7itgXoyaDHvaGNwFF2DsC2dTunY3HO3i2IsbqWfrFv0mR3xtcO2DIn6xcOh3ojWzZiVm+nDe1ghsiXLT3bsPeuDoBizW3++4g/+cw==</ld-presenter-note>
</dd>
<dt>Schwache Kollisionsresistenz<span class="colon">:</span></dt>
<dd><p>Es ist rechnerisch nicht machbar für eine gegebene Nachricht M eine Nachricht N zu finden so dass gilt: M ≠ N mit H(M) = H(N)</p>
<p>(<span class="eng">second preimage resistant; weak collision resistant</span>)</p>
<ld-presenter-note encrypted="">
MTAwMDAw:rH2FsqEoFvvkHHv+TdDRSAEg/FkWhvwpNxLN6lbwj1c=:yhmUQ/ru2G58nPyL:3B+9glUnU9EjkROE3bRxXzT6uy/r6yMCWfKELLAuil47Bklvr1da2bDjWvACOUfzu9PyyTguQI8L1Ih1UhWA82KV0It6FsQydfkpynXqv1L0jFRAgZCUhUoqESgLNg6SFgvkqQL33+Qk8MogoUTZJfebS8xd/q1Jqq40B9XOUCU+sNmj8pBoRBbwp64qRhNX2296LwevS/sJReUck7yWgwbOFP9pjg==</ld-presenter-note>
</dd>
<dt>Starke Kollisionsresistenz<span class="colon">:</span></dt>
<dd><p>Es ist rechnerisch unmöglich ein paar (N,M) zu finden so dass gilt: H(M) = H(N).</p>
<p>(<span class="eng">collision resistant; strong collision resistant</span>)</p>
<ld-presenter-note encrypted="">
MTAwMDAw:omCBNdSoplM3cnMJPY8mgkv5NgddNZSgPdt15Eq7zo0=:Wz91bPkiiQmjm33/:H9QjObhPjasab/r4Pu2CUE+g9WotIozu6ZyAeGK4nE44kh3LC5LvM52WjnDfQqGZ8Hb1/bZMMQbw5ZehZQYlVVk1gLD4oxDYmV6G5QfaLI+80lwKtRtTGGpRt9vfUZRCf219vPZB0PNC/ym/CP9EiQIQavszerJS+lmw/Q+tQjkPgo6W/4Ruwe7mEN58Noi3P2KJ27hEdEAzoNAfI460qz6qIV+BpZzJ2/7Ojk4rVSTIHDUopUww3pYrggD/7lHrpd/giTwsrnheuw/JLXWa7+KcXFy6CXhRD0YMd1lO4p/0SCtheFpNTMk+wL3y3t9gLDZxhbJCi8pedXOlk5mf6tGl7JJbVrA8ZYLtYjlvRPtsG5MyuDeblHkfcKMvXDwJP69HTNCUOPR+8FfgiyFmGYU5GwXOmnnifCCcqcXymFgWiojNZfm/CXqdbeetzPo8dJhmBpvapMDteRAT91+CJhak9jI3</ld-presenter-note>
</dd>
</dl>
</ld-story><ld-supplemental embed-in-document-flow><aside class="admonition" data-theme="background"><p class="admonition-title" data-theme="background-header"><span>Hintergrund</span></p><p>Im Deutschen wird auch von Urbildangriffen gesprochen. In dem Fall ist <em>preimage resistance</em> (d. h. die Einwegeigenschaft) gleichbedeutend damit, dass man nicht effektiv einen „Erstes-Urbild-Angriff“ durchführen kann. Hierbei ist das Urbild die ursprüngliche Nachricht M, die <em>gehasht</em> wurde.</p>
<p><em>Second preimage resistance</em> ist dann gleichbedeutend damit, dass man nicht effektiv einen „Zweites-Urbild-Angriff“ durchführen kann. Es ist nicht möglich, zu einer Nachricht M eine zweite Nachricht N (d. h. ein zweites Urbild) zu finden, die für eine gegebene Hashfunktion den gleichen Hash aufweist.</p>
</aside></ld-supplemental></ld-topic>
