<ld-supplemental><p class="rubric">Einbruchserkennung und Viruserkennung - Hintergrund</p>
<p>Bei der Einbruchserkennung und Viruserkennung ist <em>second preimage</em> Resistenz erforderlich. Andernfalls könnte ein Angreifer seine Malware so schreiben, dass diese einen Hash wie eine vorhandene gutartige Software hat und so verhindern, dass die Malware auf eine schwarze Liste gesetzt werden kann, ohne den Kollateralschaden, dass auch die gutartige Software fälschlicherweise als Malware erkannt wird.</p>
<p class="rubric">Aufwand eines Kollisionsangriffs</p>
<p>Ein Kollisionsangriff erfordert weniger Aufwand als ein <em>preimage</em> oder ein <em>second preimage</em> Angriff.</p>
<p>Dies wird durch das Geburtstagsparadoxon erklärt. Wählt man Zufallsvariablen aus einer Gleichverteilung im Bereich von <span class="math-r">0</span> bis <span class="math">\(N-1\)</span>, so übersteigt die Wahrscheinlichkeit, dass ein sich wiederholendes Element gefunden wird, nach <span class="math">\(\sqrt{N}\)</span> (für große <span class="math-i">N</span>) Auswahlen <span class="math-r">0,5</span>. Wenn wir also für einen m-Bit-Hashwert Datenblöcke zufällig auswählen, können wir erwarten, zwei Datenblöcke innerhalb von <span class="math">\(\sqrt{2^m} = 2^{m/2}\)</span> Versuchen zu finden.</p>
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>Es ist relativ einfach, ähnliche Meldungen zu erstellen. Wenn ein Text 8 Stellen hat, an denen ein Wort mit einem anderen ausgetauscht werden kann, dann hat man bereits 2⁸ verschiedene Texte.</p>
<p>Es ist relativ trivial(1), vergleichbare(2) Nachrichten(3) zu schreiben(4). Wenn ein Text 8 Stellen hat, an denen ein Ausdruck(5) mit einem vergleichbaren (6) ausgetauscht werden kann, dann erhält(7) man bereits 2⁸ verschiedene Dokumente(8).</p>
</aside></ld-supplemental></ld-topic>
<ld-topic id="struktur-eines-sicheren-hash-codes">
<h2>Struktur eines sicheren Hash-Codes</h2>
<p>(Vorgeschlagen von Merkle.)</p>
<object class="light-image align-center" data="images/verschluesselung/structure_of_secure_hash_codes.svg" role="img" type="image/svg+xml">
</object><ul class="columns left-aligned dd-margin-left-3em simple">
<li><dl class="field-list simple">
<dt>IV<span class="colon">:</span></dt>
<dd><p>Initialer Wert (Algorithmus-abhängig)</p>
</dd>
<dt>CV<sub>i</sub><span class="colon">:</span></dt>
<dd><p>Verkettungsvariable</p>
</dd>
<dt>Y<sub>i</sub><span class="colon">:</span></dt>
<dd><p>i-er Eingabeblock</p>
</dd>
<dt>f<span class="colon">:</span></dt>
<dd><p>Kompressionsfunktion</p>
</dd>
</dl>
</li>
<li><dl class="field-list simple">
<dt>n<span class="colon">:</span></dt>
<dd><p>Länge des Blocks</p>
</dd>
<dt>L<span class="colon">:</span></dt>
<dd><p>Anzahl der Eingabeblöcke</p>
</dd>
<dt>b<span class="colon">:</span></dt>
<dd><p>Länge des Eingabeblocks</p>
</dd>
</dl>
</li>
</ul>
<ld-supplemental><p>Diese Struktur liegt insbesondere den Hashfunktionen der SHA-2 Familie zugrunde.</p>
</ld-supplemental></ld-topic>
<ld-topic id="die-sha-familie-secure-hash-algorithms">
<h2>Die SHA-Familie (Secure Hash Algorithms)</h2>
<ld-story>
<ul class="incremental-list simple">
<li><p>eine Gruppe kryptographischer Hashfunktionen, die von der US-amerikanischen NIST standardisiert wurden.</p></li>
<li><p>Anwendungsziele:</p>
<ul>
<li><p>Prüfsummenbildung (Integrität)</p></li>
<li><p>Digitale Signaturen</p></li>
<li><p>Basis für weitere kryptographische Konstrukte (z. B. HMAC)</p></li>
</ul>
</li>
<li><p>Mitglieder:</p>
<ul>
<li><p>SHA-1 hat 160 Bit und wird seit 2004 nicht mehr als sicher betrachtet; praktikable Angriffe gibt es seit 2009</p></li>
<li><p>SHA-2 entwickelt im Jahr 2000 und umfasst 224, 256, 384 und 512 Bit Varianten</p></li>
<li><p>SHA-3 2015 spezifiziert und basiert auf Keccak</p></li>
</ul>
</li>
</ul>
<aside class="admonition incremental" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><pre class="literal-block">SHA-256(&quot;Hallo&quot;) →
    753692ec36adb4c794c973945eb2a99c1649703ea6f76bf259abb4fb838e013e</pre>
<ld-supplemental><p><strong>Berechnung des SHA-256</strong></p>
<p><em>Python</em></p>
<pre class="code python copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="keyword namespace">from</span><span class="whitespace"> </span><span class="name namespace">hashlib</span><span class="whitespace"> </span><span class="keyword namespace">import</span> <span class="name">sha256</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="keyword namespace">from</span><span class="whitespace"> </span><span class="name namespace">binascii</span><span class="whitespace"> </span><span class="keyword namespace">import</span> <span class="name">hexlify</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace"></span><span class="name">hexlify</span><span class="punctuation">(</span><span class="name">sha256</span><span class="punctuation">(</span><span class="name builtin">bytes</span><span class="punctuation">(</span><span class="literal string double">&quot;Hallo&quot;</span><span class="punctuation">,</span><span class="literal string double">&quot;UTF-8&quot;</span><span class="punctuation">))</span><span class="operator">.</span><span class="name">digest</span><span class="punctuation">())</span></code></pre>
<p><em>Shell/Console</em></p>
<pre class="code console copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="generic output">echo -n &quot;Hallo&quot; |sha256sum</span></code></pre>
</ld-supplemental></aside><aside class="admonition incremental" data-theme="attention"><p class="admonition-title" data-theme="attention-header">Achtung!</p>
<p>Passwort-Hashing ist kein direktes Anwendungsziel!</p>
</aside>
</ld-story><ld-supplemental><p>SHA-2 ist momentan weit verbreitet und gilt als sicher, aber SHA-3 bietet ein alternatives Sicherheitsdesign mit dem Keccak-Ansatz.</p>
</ld-supplemental></ld-topic>
<ld-topic class="new-subsection transition-move-left" id="message-authentication-codes-macs">
<h2><em>Message Authentication Codes</em> (MACs)</h2>
<ld-supplemental><aside class="admonition" data-theme="hint"><p class="admonition-title" data-theme="hint-header">Hinweis</p>
<p><em>Message Authentication Codes</em> könnte ins Deutsche mit
Nachrichtenauthentifizierungscodes übersetzt werden, dies ist aber nicht üblich.</p>
<p>Im allgemeinen (IT-)Sprachgebrauch wird von <em>MAC</em>s gesprochen.</p>
</aside>
</ld-supplemental></ld-topic>
<ld-topic id="hmac-hash-based-message-authentication-code">
<h2>HMAC (Hash-based Message Authentication Code)</h2>
<ul class="incremental-list">
<li><p>Auch als <em>keyed-hash message authentication code</em> bezeichnet.</p></li>
<li><p>Konstruktion:</p>
<div class="accentuate docutils container">
<div class="math">
\begin{align*}
\begin{array}{rcl}
HMAC(K,m) &amp; = &amp; H( (K' \oplus opad) || H( ( K' \oplus ipad) || m) ) \\
K' &amp; = &amp;\begin{cases}
        H(K) &amp; \text{falls K größer als die Blockgröße ist}\\
        K &amp; \text{andernfalls}
        \end{cases}
\end{array}
\end{align*}
</div>
</div>
</li>
<li><p>Standardisiert - sicher gegen Längenerweiterungsangriffe.</p></li>
</ul>
<ld-supplemental><aside class="admonition" data-theme="legend"><p class="admonition-title" data-theme="legend-header"><span>Legende</span></p><p><span class="math-i">H</span> is eine kryptografische Hashfunktion.</p>
<p><span class="math-i">m</span> ist die Nachricht.</p>
<p><span class="math-i">K</span> ist der geheime Schlüssel (<em>Secret Key</em>).</p>
<p><span class="math-i">K'</span> ist vom Schlüssel K abgeleiteter Schlüssel mit Blockgröße (ggf. <em>padded</em> oder <em>gehasht</em>).</p>
<p><span class="math">\(||\)</span> ist die Konkatenation.</p>
<p><span class="math">\(\oplus\)</span> ist die XOR Operation.</p>
<p><span class="math-i">opad</span> ist das äußere Padding bestehend aus Wiederholungen von 0x5c in Blockgröße.</p>
<p><span class="math-i">ipad</span> ist das innere Padding bestehend aus Wiederholungen von 0x36 in Blockgröße.</p>
</aside></ld-supplemental></ld-topic>
<ld-topic class="no-title" id="hmac-berechnung-visualisiert">
<h2>HMAC Berechnung visualisiert</h2>
<object aria-label="Schlüsselableitung für den inneren und äußeren Schlüssel K'" class="light-image align-left" data="images/verschluesselung/hmac_i_o_key_derivation.svg" role="img" type="image/svg+xml">
</object><object aria-label="Schlüsselableitung für den inneren und äußeren Schlüssel K'" class="light-image incremental align-right" data="images/verschluesselung/hmac_message_hashing.svg" role="img" type="image/svg+xml">
</object><ld-supplemental><p><strong>Padding und Hashing</strong></p>
<p>Im Rahmen der Speicherung von Passwörtern und <em>Secret Keys</em> ist die Verwendung von Padding Operationen bzw. das Hashing von Passwörtern, um Eingaben in einer wohl-definierten Länge zu bekommen, üblich. Neben dem hier gesehenen Padding, bei dem 0x00 Werte angefügt werden, ist zum Beispiel auch das einfache Wiederholen des ursprünglichen Wertes, bis man auf die notwendige Länge kommt, ein Ansatz.</p>
<p>Diese Art Padding darf jedoch nicht verwechselt werden mit dem Padding, dass ggf. im Rahmen der Verschlüsselung von Nachrichten notwendig ist, um diese ggf. auf eine bestimmte Blockgröße zu bringen (zum Beispiel bei ECB bzw. CBC Block Mode Operations.)</p>
</ld-supplemental></ld-topic>
<ld-topic class="summary" id="zusammenfassung">
<h2>Zusammenfassung</h2>
<ul class="incremental-list">
<li><p>Ein Hashwert dient der Integritätssicherung von Nachrichten.</p></li>
<li><p>Ein Mac dient der Authentifizierung von Nachrichten.</p></li>
<li><p>Ein Mac sichert auch immer die Integrität der Nachricht.</p>
<p><span class="peripheral">Es ist somit möglich die Integrität einer Nachricht zu sichern ohne Authentizität zu gewährleisten, aber nicht umgekehrt.</span></p>
</li>
<li><p>Ein Mac erlaubt es dem Empfänger eine gefälschte Nachricht zu erkennen aber ggf. auch zu erstellen (<span class="eng">to forge a message</span>).</p></li>
<li><p>Eine Signatur basiert auf einem Hashwert und einem <em>privaten</em> Schlüssel.</p>
<ul class="simple">
<li><p>Der Empfänger kann bei einer signierten Nachricht, diese nicht verändern und als eine Nachricht des Senders ausgeben.</p></li>
<li><p>Nur für Nachrichten, die signiert sind, gilt somit die Nichtabstreitbarkeit (<span class="eng">non-repudation</span>).</p></li>
</ul>
</li>
</ul>
</ld-topic>
<ld-topic class="new-section transition-move-to-top" id="netzwerksicherheit">
<h2>Netzwerksicherheit</h2>
</ld-topic>
<ld-topic class="new-subsection" id="transmission-control-protocol-tcp-grundlagen">
<h2>Transmission Control Protocol (TCP) - Grundlagen</h2>
</ld-topic>
<ld-topic id="tcp">
<h2>TCP</h2>
<ul class="incremental-list simple">
<li><p>Protokoll der Schicht 4 (Transport Layer) basiert auf IP</p></li>
<li><p>verbindungsorientierte Kommunikation zweier Rechner im Internet zuverlässig und geordnet:</p>
<ul class="incremental-list">
<li><p>Verwerfen von Duplikaten und fehlerhaft übertragener Pakete</p></li>
<li><p>automatisches Wiederversenden fehlender Pakete</p></li>
<li><p>Nachrichtenpuffer: Daten werden in korrekter Reihenfolge an Applikation zugestellt</p></li>
</ul>
</li>
<li><p>Verbindungsaufbau immer zwischen zwei Sockets (Socket-Adresse: IP Adresse und 16 Bit-Port-Nummer)</p></li>
</ul>
<ld-supplemental><aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung: TCP/IP Referenzmodell nach Tannenbaum</span></p><table class="borderless zebra" style="width: 100%;">
<thead>
<tr><th class="head"><p>Schicht</p></th>
<th class="head"><p>Name/Aufgabe</p></th>
</tr>
</thead>
<tbody>
<tr><td><p>5</p></td>
<td><p><em>Application Layer</em> (Anwendungsschicht - z. B. Email)</p></td>
</tr>
<tr><td><p>4</p></td>
<td><p><em>Transport Layer</em> (TCP)</p></td>
</tr>
<tr><td><p>3</p></td>
<td><p><em>Network Layer</em> (IP Layer)</p></td>
</tr>
<tr><td><p>2</p></td>

<p><em>Data Link Layer</em> (Fehler-/Flußkontrolle)</p>
</td>
</tr>

</tr>

</aside></ld-supplemental></ld-topic>
<ld-topic id="aufbau-einer-tcp-verbindung">
<h2>Aufbau einer TCP Verbindung</h2>
<p>Dreifacher Handshake:</p>
<ld-supplemental><p><strong>Terminologie</strong>:</p>
<dl class="field-list simple">
<dt>SYN<span class="colon">:</span></dt>
<dd><p><span class="eng">synchronize (session establishment)</span></p>
</dd>
<dt>ACK<span class="colon">:</span></dt>
<dd><p><span class="eng">acknowledge</span></p>
</dd>
<dt>RST<span class="colon">:</span></dt>
<dd><p><span class="eng">reset</span></p>
</dd>
</dl>
<p><strong>Verbindungsaufbau - Ablauf</strong>:</p>
<ol class="arabic simple">
<li><p>Client sendet SYN Paket mit initialer Sequenznummer (hier) 1000 an den Server.</p></li>
<li><p>Server sendet ein SYN-ACK Paket mit seiner initialen Sequenznummer (hier) 2000 und ein ACK mit der Sequenznummer 1001 (initiale Sequenznummer des Clients +1) an den Client</p></li>
<li><p>Client sendet ein ACK Paket mit Sequenznummer 2001 (initiale Sequenznummer des Servers +1) an den Server; danach ist die Verbindung aufgebaut.</p></li>
</ol>
<p>Das Betriebssystem sollte die initialen Sequenznummern zufällig wählen, so dass ein Angreifer diese nicht leicht vorhersagen kann. Beide Seiten haben eigene Sequenznummern, die unabhängig voneinander sind.</p>
<p>Bei einer laufenden Verbindung werden die Sequenznummern inkrementiert und es ist nicht (mehr) erkennbar wer die Verbindung aufgebaut hat.</p>
</ld-supplemental><div class="center-child-elements"><div style="width: 76ch; height: 40ch"; container-type:size;">
<svg viewBox="100 0 1140 600" font-size="36" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="currentColor">

    <text x="925" y="75" style="font-weight: bolder">Server</text>
    <line x1="1000" y1="100" x2="1000" y2="400" stroke="currentColor" style="stroke-width:3" />
    <line x1="200" y1="400" x2="200" y2="550" stroke="currentColor" stroke-dasharray="5,5" style="stroke-width:3" />
    <line x1="1000" y1="400" x2="1000" y2="550" stroke-dasharray="5,5" stroke="currentColor" style="stroke-width:3" />

    <text x="500" y="65" transform="rotate(6.6)">SYN(1000)</text>
    <line x1="200" y1="110" x2="1000" y2="190" stroke="currentColor" style="stroke-width:3" marker-end="url(#arrow)"/>

    <g class="incremental">
        <text x="270" y="300" transform="rotate(-6.6)">SYN(2000), ACK(1001)</text>
        <line x1="1000" y1="200" x2="200" y2="290" stroke="currentColor" style="stroke-width:3" marker-end="url(#arrow)"/>

    </g>
</svg>
</div></div></ld-topic>
<ld-topic id="ports-bei-tcp">
<h2>Ports bei TCP</h2>
<ul class="incremental-list simple">
<li><p>Port-Nummern werden für die Kommunikation zwischen zwei Diensten/Prozessen verwendet</p></li>
<li><p>Ports sind 16 Bit Zahlen (0-65535)</p></li>
<li><p>(Unix) Ports &lt; 1024 sind privilegiert (nur root kann diese öffnen)</p></li>
<li><p>einige Port-Nummern sind Standarddiensten zugeordnet</p></li>
</ul>
</ld-topic>

<ld-topic class="new-subsection" id="transmission-control-protocol-tcp-angriffe">
<h2>Transmission Control Protocol (TCP) - Angriffe</h2>
</ld-topic>
<ld-topic id="angriffe-auf-tcp-motivation">
<h2>Angriffe auf TCP - Motivation</h2>
<ul class="incremental-list list-with-explanations">
<li><p>Netzwerkprogrammierung mit TCP ist relativ komfortabel.</p></li>
<li><p>Viele Dienste sind mit TCP implementiert.</p>
<p>Insbesondere in der Anfangszeit hatten viele TCP Dienste sowohl technische als auch konzeptionelle Schwachstellen. Einige dieser Schwachstellen sind bis heute nicht behoben.</p>
</li>
<li><p>Das Auffinden von angreifbaren Diensten kann mit Hilfe von Port Scans systematisch erfolgen.</p>
<p>Server haben heutzutage im Allgemeinen alle nicht verwendeten Dienste geschlossen.</p>
</li>
</ul>
</ld-topic>
<ld-topic id="port-scans-tcp-connect-scan">
<h2>Port Scans: TCP Connect Scan</h2>
<ld-grid class="incremental default-layout">
<ld-cell class="width-40" style="align-self:auto;">
<p class="rubric">Vorgehen</p>
<p>Aufbau vollständiger Verbindungen zu allen bzw. zu ausgewählten Ports.</p>
</ld-cell><ld-cell class="width-60 center-content" style="align-self:auto;">
<div style="width:42ch; height:25.2ch; container-type:size;">
<svg viewBox="100 0 1000 600" font-size="48" fill="currentColor" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <text x="200" text-anchor="middle" y="75" style="font-weight: bolder">Scanner</text>
    <line x1="200" y1="100" x2="200" y2="450" stroke="currentColor" style="stroke-width:3" />
    <text x="1000" y="75" text-anchor="middle" style="font-weight: bolder">Server</text>
    <line x1="1000" y1="100" x2="1000" y2="450" stroke="currentColor" style="stroke-width:3" />
    <line x1="200" y1="450" x2="200" y2="550" stroke-dasharray="5,5" stroke="currentColor" style="stroke-width:3" />
    <line x1="1000" y1="450" x2="1000" y2="550" stroke-dasharray="5,5" stroke="currentColor" style="stroke-width:3" />

    <text x="500" y="65" transform="rotate(6.6)">SYN</text>
    <line x1="200" y1="110" x2="1000" y2="190" stroke="currentColor" style="stroke-width:3" marker-end="url(#arrow)"/>

    <text x="390" y="300" transform="rotate(-6.6)">SYN / ACK</text>
    <line x1="1000" y1="200" x2="200" y2="290" stroke="currentColor" style="stroke-width:3" marker-end="url(#arrow)"/>

    <text x="555" y="315" transform="rotate(6.6)">ACK</text>
    <line x1="200" y1="300" x2="1000" y2="390" stroke="currentColor" style="stroke-width:3" marker-end="url(#arrow)"/>
</svg>
</div></ld-cell></ld-grid><aside class="admonition incremental" data-theme="assessment"><p class="admonition-title" data-theme="assessment-header"><span>Bewertung</span></p><ul class="simple">
<li><p>simpelster Port Scan</p></li>
<li><p>große Entdeckungsgefahr (Scan selbst ist kein Angriff)</p></li>
<li><p>mögliche Verbesserung: zwischen dem Scannen mehrerer Ports Pausen einstreuen (Wie lange?)</p></li>
</ul>
</aside></ld-topic>
<ld-topic id="port-scans-tcp-syn-scan">
<h2>Port Scans: TCP SYN Scan</h2>
<ld-grid class="default-layout">
<ld-cell class="width-40 incremental" style="align-self:auto;">
<p class="rubric">Vorgehen</p>
<ol class="arabic simple">
<li><p>Senden eines TCP-Segments mit gesetztem SYN-Flag an einen Port</p></li>
<li><p>falls der <em>Port offen</em> ist, kommt SYN/ACK zurück danach RST senden</p></li>
<li><p>falls der <em>Port nicht offen</em> ist, kommt RST (oder nichts) zurück</p></li>
</ol>
</ld-cell><ld-cell class="widh-60" style="align-self:auto;">
<div style="width:42ch; height:25.2ch; container-type:size;">
<svg viewBox="100 0 1000 600" font-size="48" fill="currentColor" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <text x="200" text-anchor="middle" y="75" style="font-weight: bolder">Scanner</text>
    <line x1="200" y1="100" x2="200" y2="300" stroke="currentColor" style="stroke-width:3" />
    <text x="1000" text-anchor="middle" y="75" style="font-weight: bolder">Server</text>
    <line x1="1000" y1="100" x2="1000" y2="400" stroke="currentColor" style="stroke-width:3" />

    <line x1="200" y1="300" x2="200" y2="550" stroke-dasharray="5,5" stroke="currentColor" style="stroke-width:3" />
    <line x1="1000" y1="300" x2="1000" y2="550" stroke-dasharray="5,5" stroke="currentColor" style="stroke-width:3" />

    <text x="500" y="65" transform="rotate(6.6)">SYN</text>
    <line x1="200" y1="110" x2="1000" y2="190" stroke="currentColor" style="stroke-width:3" marker-end="url(#arrow)"/>

    <text x="390" y="300" transform="rotate(-6.6)">SYN / ACK</text>
    <line x1="1000" y1="200" x2="200" y2="290" stroke="currentColor" style="stroke-width:3" marker-end="url(#arrow)"/>

    <text x="555" y="315" transform="rotate(6.6)">RST</text>
    <line x1="200" y1="300" x2="1000" y2="390" stroke="currentColor" style="stroke-width:3" marker-end="url(#arrow)"/>
</svg>
</div></ld-cell></ld-grid><aside class="admonition incremental" data-theme="assessment"><p class="admonition-title" data-theme="assessment-header"><span>Bewertung</span></p><ul class="simple">
<li><p>kein vollständiger Verbindungsaufbau</p></li>
<li><p>meist nicht protokolliert</p></li>
<li><p>geringe(re) Entdeckungsgefahr</p></li>
</ul>
</aside></ld-topic>
<ld-topic id="port-scans-mit-nmap">
<h2>Port Scans mit nmap</h2>
<ul class="incremental-list list-with-explanations">
<li><p>alle Arten von Port-Scans möglich</p>
<p>(Es gibt weitere Varianten von Port-Scans, die wir hier nicht besprochen haben.)</p>
</li>
<li><p>auch OS fingerprinting</p></li>
<li><p>u. U. sogar Ermittlung der Versionsnummern von Diensten</p></li>
</ul>
<pre class="code bash incremental literal-block"><code>$<span class="whitespace"> </span>nmap<span class="whitespace"> </span><span class="literal number">192</span>.168.178.121<span class="whitespace"> </span>-Pn<span class="whitespace">
</span>Starting<span class="whitespace"> </span>Nmap<span class="whitespace"> </span><span class="literal number">7</span>.94<span class="whitespace"> </span><span class="operator">(</span><span class="whitespace"> </span>https://nmap.org<span class="whitespace"> </span><span class="operator">)</span><span class="whitespace"> </span>at<span class="whitespace"> </span><span class="literal number">2023</span>-12-14<span class="whitespace"> </span><span class="literal number">13</span>:16<span class="whitespace"> </span>PST<span class="whitespace">
</span>Nmap<span class="whitespace"> </span>scan<span class="whitespace"> </span>report<span class="whitespace"> </span><span class="keyword">for</span><span class="whitespace"> </span>Michaels-MacBook-Pro<span class="whitespace"> </span><span class="operator">(</span><span class="literal number">192</span>.168.178.121<span class="operator">)</span><span class="whitespace">
</span>Host<span class="whitespace"> </span>is<span class="whitespace"> </span>up<span class="whitespace"> </span><span class="operator">(</span><span class="literal number">0</span>.0056s<span class="whitespace"> </span>latency<span class="operator">)</span>.<span class="whitespace">
</span>Not<span class="whitespace"> </span>shown:<span class="whitespace"> </span><span class="literal number">995</span><span class="whitespace"> </span>filtered<span class="whitespace"> </span>tcp<span class="whitespace"> </span>ports<span class="whitespace"> </span><span class="operator">(</span>no-response<span class="operator">)</span><span class="whitespace">
</span>PORT<span class="whitespace">     </span>STATE<span class="whitespace"> </span>SERVICE<span class="whitespace">
</span><span class="literal number">53</span>/tcp<span class="whitespace">   </span>open<span class="whitespace">  </span>domain<span class="whitespace">
</span><span class="literal number">88</span>/tcp<span class="whitespace">   </span>open<span class="whitespace">  </span>kerberos-sec<span class="whitespace">
</span><span class="literal number">445</span>/tcp<span class="whitespace">  </span>open<span class="whitespace">  </span>microsoft-ds<span class="whitespace">
</span><span class="literal number">5000</span>/tcp<span class="whitespace"> </span>open<span class="whitespace">  </span>upnp<span class="whitespace">
</span><span class="literal number">7000</span>/tcp<span class="whitespace"> </span>open<span class="whitespace">  </span>afs3-fileserver</code></pre>
<ld-supplemental><p><strong>OS-Fingerprinting</strong></p>
<p>Beim OS-Fingerprinting werden Datenpakete analysiert, die aus einem Netzwerk stammen, um Informationen für spätere Angriffe zu gewinnen. Durch die Erkennung des Betriebssystems, mit dem ein Netzwerk arbeitet, haben Hacker es leichter, Schwachstellen zu finden und auszunutzen. OS-Fingerprinting kann auch Konfigurationsattribute von entfernten Geräten sammeln. Diese Art von Aufklärungsangriff ist in der Regel (einer) der erste(n) Schritt(e).</p>
<p>Es gibt zwei Arten von OS-Fingerprinting: (1) Aktiv und (2) passiv.</p>
<blockquote>
<ol class="arabic simple">
<li><p>Bei einem aktiven OS-Fingerprinting-Versuch senden die Angreifer ein Paket an das Zielsystem und warten auf eine Antwort, um den Inhalt des TCP-Pakets zu analysieren.</p></li>
<li><p>Bei einem passiven Versuch agieren die Angreifer eher als &quot;Schnüffler&quot;, der keine absichtlichen Änderungen oder Aktionen im Netzwerk vornimmt. Passives OS-Fingerprinting ist ein unauffälligerer, aber wesentlich langsamerer Prozess.</p></li>
</ol>
</blockquote>
</ld-supplemental></ld-topic>
<ld-topic id="port-knocking">
<h2>Port Knocking</h2>
<ul class="incremental-list list-with-explanations">
<li><p>Ein Knock-Daemon versteckt offene Ports auf dem Server.</p></li>
<li><p>Zugriffe auf alle Ports werden im Log-File protokolliert.</p></li>
<li><p>Knock-Daemon beobachtet das Log-File.</p></li>
<li><p>Erst nach Erkennen einer vordefinierten (Einmal-)Klopfsequenz öffnet der Knock-Daemon den gewünschten Port für diesen Client.</p></li>
<li><p>Client kann nun die Verbindung aufbauen.</p></li>
<li><p>Weiterentwicklung: TCP Stealth</p>
<p>In diesem Fall werden offene Ports dadurch versteckt, dass sie nur auf spezielle SYN-Pakete mit bestimmten Sequenznummern reagieren. Die Sequenznummern sind ggf. kryptografisch abgesichert und basieren auf vorher ausgetauschten Schlüsseln.</p>
</li>
</ul>
<ld-supplemental><p><strong>Weiterführend</strong></p>
<p>Alternativen zu einer Knock-Sequenz ist zum Beispiel, dass der Port nur dann als offen gilt, wenn die IP ID eine bestimmte Sequenznummer aufweist.</p>
<p>M.Krzywinski: Port Knocking: Network Authentication Across Closed Ports in SysAdmin Magazine 12: 12-17. (2003)</p>
</ld-supplemental></ld-topic>
<ld-topic id="denial-of-service-dos-angriffe">
<h2>Denial-of-Service (DoS) Angriffe</h2>
<p>Ziel des Angreifers: Lahmlegen eines Dienstes oder des ganzen Systems ...</p>
<ul class="simple">
<li><p>durch Ausnutzen von Schwachstellen (<span class="eng">vulnerabilities</span>) wie z. B. Buffer Overflows</p></li>
<li><p>durch Generierung von Überlast (Ausschöpfen von RAM, CPU, Netzwerkbandbreite, ...)</p></li>
</ul>
<aside class="admonition incremental" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p class="rubric">Ping-of-Death</p>
<p>(Historisch: aus dem Jahr 1997)</p>
<p>Ein <span class="docutils literal">ping</span> (vgl. Internet Control Message Protocol (ICMP)) verwendet üblicherweise kleine Nachrichten, aber die verwendete Länge ist einstellbar.</p>
<p>Falls die Länge zu groß ist ⇒ Buffer Overflow ⇒ Systemabsturz!</p>
<p>Variante: mittels Fragmentierung ließen sich generell übergroße IP-Pakete (&gt;65,536 Byte) erstellen.</p>
</aside></ld-topic>
<ld-topic id="denial-of-service-syn-flooding-angriff">
<h2>Denial-of-Service: SYN-flooding Angriff</h2>
<ul class="incremental-list">
<li><p>Angriff auf Design</p></li>
<li><p>Angreifer sendet eine Verbindungsaufbauanforderung (gesetztes SYN-Flag) an Zielmaschine</p></li>
<li><p>Server generiert eine halboffene TCP-Verbindung</p></li>
<li><p>Angreifer wiederholt in schneller Folge dieses erste Paket zum Verbindungsaufbau</p>
<p>⇒ vollständiges Füllen der internen Systemtabelle</p>
<p>⇒ Anfragen normaler Benutzer werden zurückgewiesen</p>
</li>
<li><p>Angreifer verwendet i. Allg. IP-Spoofing weswegen Firewalls wirkungslos sind.</p></li>
<li><p>Abwehr: SYN-Cookies</p></li>
</ul>
</ld-topic>
<ld-topic id="syn-cookies-d-j-bernstein">
<h2><a class="reference external" href="https://cr.yp.to/syncookies.html">SYN-Cookies - D J. Bernstein</a></h2>

<ld-topic id="distributed-denial-of-service-ddos-angriff">
<h2>Distributed Denial-of-Service (DDoS) Angriff</h2>
<p>Opfer wird von sehr vielen Angreifern mit Nachrichten überflutet.</p>
<div class="incremental docutils container">
<p>Ein Beispiel: Smurf-Angriff:</p>
<object aria-label="Smurf Angriff" class="light-image align-center" data="images/netzsicherheit/smurf-angriff.svg" role="img" type="image/svg+xml">
</object></div>
</ld-topic>
<ld-topic id="distributed-denial-of-service-ddos-angriff-1">
<h2>Distributed Denial-of-Service (DDoS) Angriff</h2>
<ul class="incremental-list simple">
<li><p>Bot-Netze (Botnetze) werden verwendet, um DDoS-Angriffe durchzuführen.</p></li>
<li><p>Bot-Netze können viele 10.000 Rechner umfassen.</p></li>
<li><p>IoT Geräte sind besonders beliebt (z. B. IP-Kameras, Smart-TVs, Smart-Home Geräte, ...), da diese oft nicht ausreichend geschützt sind und trotzdem permanent mit dem Internet verbunden sind.</p></li>
<li><p>Beliebte Ziele:</p>
<ul>
<li><p>Onlinespieleserver</p></li>
<li><p>Banking-Portale</p></li>
<li><p>politische Webseiten</p></li>
</ul>
</li>
<li><p>Firewalls und Intrusion Detection Systeme sind meist wirkungslos, da die Angriffe von vielen verschiedenen IP-Adressen kommen.</p></li>
</ul>
</ld-topic>
<ld-topic id="distributed-reflected-denial-of-service-angriff">
<h2>Distributed-Reflected-Denial-of-Service Angriff</h2>
<ld-deck>
<ld-card>
<ld-grid class="default-layout">
<ld-cell class="width-50" style="align-self:auto;">
<p>Idee eines (DRDoS) Angriffs</p>
<ul class="incremental-list list-with-explanations">
<li><p>Es wird eine Anfrage an einen Server gesendet, die eine große Antwort auslöst.</p>
<ld-supplemental><p>Z. B. hat(te) der NTP Monlist Befehl eine Antwort, die ca. 200 Fach größer ist als die Anfrage!</p>
</ld-supplemental></li>
<li><p>Mittels IP-Spoofing wird die IP-Adresse des Opfers als Absenderadresse verwendet.</p></li>
<li><p>Es werden insbesondere Dienste basierend auf UDP verwendet, da hier keine Verbindung aufgebaut werden muss.</p></li>
</ul>
</ld-cell><ld-cell class="width-50" style="align-self:auto;">
<object aria-label="DRDoS Angriff" class="light-image align-center" data="images/netzsicherheit/drdos.svg" role="img" type="image/svg+xml">
</object></ld-cell></ld-grid></ld-card><ld-card class="incremental">
<ul class="simple">
<li><p>Nehmen einen signifikanten Teil aller DDoS-Angriffe ein.</p></li>
<li><p>Die Tatsache, dass die Sender legitime Server sind, erschwert die Abwehr.</p></li>
<li><p><span class="eng">Egress Filtering</span> kann helfen, die Verwendung von IP-Spoofing zu verhindern.</p></li>
</ul>
</ld-card></ld-deck><ld-supplemental><p>Bereits im Jahr 2018 wurde ein Angriff mit einer Bandbreite von 1,7 TBit/s beobachtet.</p>
<dl class="field-list simple">
<dt>Egress Filtering<span class="colon">:</span></dt>
<dd><p>Der Router verwirft alle Pakete, die eine Absenderadresse verwenden, die nicht aus dem eigenen Netzwerk stammt.</p>
</dd>
</dl>
</ld-supplemental></ld-topic>
<ld-topic id="distributed-denial-of-service-angriffe-ddos">
<h2>Distributed-Denial-of-Service-Angriffe (DDoS)</h2>
<ld-deck>
<ld-card>
<blockquote class="epigraph">
<p>[...] Google's DDoS Response Team has observed the trend that distributed denial-of-service (DDoS) attacks are <strong>increasing exponentially in size</strong>. Last year, we blocked the largest DDoS attack recorded at the time. This August [2023], we stopped an even larger DDoS attack — 7½ times larger — that also used new techniques to try to disrupt websites and Internet services.</p>
<p>This new series of DDoS attacks reached <strong>a peak of 398 million requests per second (rps)</strong>, and relied on a novel HTTP/2 “Rapid Reset” technique based on stream multiplexing that has affected multiple Internet infrastructure companies. By contrast, last year's largest-recorded DDoS attack peaked at 46 million rps.</p>
<p class="attribution">—<a class="reference external" href="https://cloud.google.com/blog/products/identity-security/google-cloud-mitigated-largest-ddos-attack-peaking-above-398-million-rps">Okt. 2023 - DDoS Attack with 398 Million RPS</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p>Cloudflare hat Mitte Mai den &quot;größten jemals registrierten&quot; Denial-of-Service-Angriff (DDoS) mit [...] 7,3 Terabit pro Sekunde (TBit/s) blockiert. [...] Diese Attacke war demnach rund 12 Prozent größer als der vorherige Rekord und lieferte ein massives Datenvolumen von 37,4 Terabyte in nur 45 Sekunden. [...]</p>
<p>Stellen Sie sich vor, Sie könnten mit Ihrem Smartphone 12,5 Millionen hochauflösende Fotos schießen und hätten nie einen vollen Speicherplatz.&quot; Und das alles in 45 Sekunden.</p>
<p>[...] Mitgewirkt hätten über 122.145 Quell-IP-Adressen, die sich über 5433 autonome Netzwerksysteme in 161 Ländern erstreckten.</p>
<p class="attribution">—<a class="reference external" href="https://www.heise.de/news/Junk-Traffic-Flut-Rekord-DDoS-Angriff-auf-Provider-mit-7-3-TBit-s-10455216.html">22.06.2025 Heise.de - Rekord DDoS Angriff</a></p>

<p>[...] Der letzte rekordverdächtige Überlastungsangriff ist noch gar nicht so lange her, da vermeldet Cloudflare schon den nächsten beobachteten Spitzenwert. Am Montag erreichte ein Distributed-Denial-of-Service-Angriff (DDoS) in der Spitze eine Last von 11,5 Terabit pro Sekunde. Das entspricht umgerechnet mehr als 1,4 Terabyte je Sekunde oder dem Inhalt von 184 randvollen DVDs.</p>
<p>[...] Dabei sendeten die Angreifer 5,1 Milliarden Pakete pro Sekunde (Bpps). Bei letzterer handelte es sich demnach um eine UDP-Flood-Attacke, die ihren Ausgangspunkt hauptsächlich in der Google-Cloud hatte. Die Zeitspanne, die der Höchstlast-Angriff einnahm, war etwa 35 Sekunden lang, schreibt Cloudflare weiter.</p>

<p>Microsoft on Monday disclosed that it automatically detected and neutralized a distributed denial-of-service (DDoS) attack targeting a single endpoint in Australia that measured 15.72 terabits per second (Tbps) and nearly 3.64 billion packets per second (pps).</p>

<ld-topic id="distributed-denial-of-service-angriffe-beispiele">
<h2>Distributed Denial-of-Service Angriffe - Beispiele</h2>
<ul class="simple">
<li><p><strong>TCP Stack Attacks</strong> SYN, FIN, RST, ACK, SYN-ACK, URG-PSH, other combinations of TCP Flags, slow TCP attacks</p></li>
<li><p><strong>Application Attacks</strong>:HTTP GET/POST Floods, slow HTTP Attacks, SIP Invite Floods, DNS Attacks, HTTPS Protocol Attacks</p></li>
<li><p><strong>SSL/TLS Attacks</strong>: Malformed SSL Floods, SSL Renegotiation, SSL Session Floods</p></li>
<li><p><strong>DNS Cache Poisoning</strong></p></li>
<li><p><strong>Reflection Amplification Flood Attacks</strong>: TCP, UDP, ICMP, DNS, mDNS, SSDP, NTP, NetBIOS, RIPv1, rpcbind, SNMP, SQL RS, Chargen, L2TP, Microsoft SQL Resolution Service</p></li>
<li><p><strong>Fragmentation Attacks</strong>: Teardrop, Targa3, Jolt2, Nestea</p></li>
<li><p><strong>Vulnerability Attacks</strong></p></li>
<li><p><strong>Resource Exhaustion Attacks</strong>: Slowloris, Pyloris, LOIC, etc.</p></li>
<li><p><strong>Flash Crowd Protection</strong></p></li>
<li><p><strong>Attacks on Gaming Protocols</strong></p></li>
</ul>
</ld-topic>
<ld-topic id="schutz-vor-ddos-angriffen-on-site-masznahmen">
<h2>Schutz vor DDoS-Angriffen: On-Site Maßnahmen</h2>
<ul class="incremental-list list-with-sublists simple">
<li><p>Aufrüsten der Ressourcen (z. B. Bandbreite, CPU, RAM, ...)</p></li>
<li><p>Exemplarische Sofortmaßnahmen bei aktivem Angriff:</p>
<ul class="incremental-list">
<li><p>Whitelisting von IP-Adressen von besonders wichtigen Clients</p></li>
<li><p>Blacklisting von IP-Adressen aus bestimmten Bereichen</p></li>
<li><p>Captchas</p></li>
<li><p>Überprüfung der Browser-Echtheit</p></li>
</ul>
</li>
<li><p>Anti-DDos Appliances</p></li>
</ul>
<aside class="admonition incremental" data-theme="attention"><p class="admonition-title" data-theme="attention-header">Achtung!</p>
<p>Diese Maßnahmen sind häufig teuer und ggf. begrenzt effektiv; wenn der Angriff die verfügbare Bandbreite übersteigt, sind diese Maßnahmen darüber hinaus wirkungslos.</p>
</aside>
</ld-topic>
<ld-topic id="schutz-vor-ddos-angriffen-off-site-masznahmen">
<h2>Schutz vor DDoS-Angriffen: Off-Site Maßnahmen</h2>
<ul class="incremental-list list-with-explanations">
<li><p>Einbinden des ISP</p></li>
<li><p>Einbinden spezialisierter Dienstleister</p>
<p>(Im Angriffsfall wird mittels BGP-Rerouting der Traffic an den Dienstleister umgeleitet, der dann die DDos Attacke filtert.)</p>
</li>
<li><p>Content-Delivery-Networks (CDNs) für statische Inhalte (z. B. Cloudflare, Akamai, ...)</p></li>
<li><p>Distributed Clouds</p></li>
</ul>
</ld-topic>

<ld-topic class="new-subsection" id="firewalls">
<h2>Firewalls</h2>
</ld-topic>
<ld-topic id="unabhangiges-netz-ideale-situation">
<h2>Unabhängiges Netz - „Ideale Situation“</h2>
<object aria-label="Ideale Situation" class="light-image align-center" data="images/netzsicherheit/all-save.svg" role="img" type="image/svg+xml">
</object><dl class="incremental-list field-list simple">
<dt>Vorteile<span class="colon">:</span></dt>
<dd><ul class="simple">
<li><p>keinerlei Angriffsmöglichkeiten von außen</p></li>
</ul>
</dd>
<dt>Nachteile<span class="colon">:</span></dt>
<dd><ul class="simple">
<li><p>kein Schutz gegen Insider</p></li>
<li><p>kein Zugang zum Internet</p></li>
</ul>
</dd>
</dl>
<ld-supplemental><p>Wie bereits diskutiert gibt es auch Angriffsmuster gegen Air-Gapped-Systeme. Ein Beispiel ist der Stuxnet-Wurm, der sich initial über USB-Sticks verbreitet.</p>
<p>Wenn man kein Zugang zum Internet hat, dann hat man zum Beispiel kein Zugriff auf externe Dienste wie NTP und das Einspielen von Updates ist nur über Umwege möglich.</p>
</ld-supplemental></ld-topic>
<ld-topic id="von-der-notwendigkeit-des-schutzes-von-rechnern">
<h2>Von der Notwendigkeit des Schutzes von Rechnern</h2>
<blockquote class="epigraph">
<p>[...] Züger und sein Team hätten [...] erst kürzlich ein Experiment durchgeführt, [...]. Sie hätten einen Computer &quot;ohne jeglichen Schutz&quot; mit dem Internet verbunden, um zu sehen, wie lange es dauere, bis er befallen sei. Konkrete Details zur Konfiguration dieses Systems werden zwar nicht genannt, angeblich war der Rechner aber schon nach 20 Minuten infiltriert.</p>
<p class="attribution">—<a class="reference external" href="https://www.golem.de/news/iot-hacker-missbrauchen-zahnbuersten-fuer-ddos-angriffe-2402-181921.html">Golem.de 6.2.2024</a></p>
</blockquote>
</ld-topic>
<ld-topic id="schutzschicht-zwischen-internem-und-externem-netz">
<h2>Schutzschicht zwischen internem und externem Netz</h2>
<object aria-label="Schutzschicht zwischen internem und externem Netz" class="light-image align-center" data="images/netzsicherheit/firewall.svg" role="img" type="image/svg+xml">
</object><ul class="simple">
<li><p>Kontrolle des Nachrichtenverkehrs durch Filterung</p></li>
<li><p>begrenzte Isolation mit begrenztem Schutz</p></li>
</ul>
<ld-supplemental><p>Eine Firewall schafft zwischen verbundenen Netzen Sicherheitsdomänen mit unterschiedlichem Schutzbedarf. Eine wichtige Teilaufgabe ist das Ausarbeiten von Sicherheitsrichtlinien.</p>
</ld-supplemental></ld-topic>
<ld-topic id="realisierung-von-virtual-private-networks-vpn">
<h2>Realisierung von Virtual Private Networks (VPN)</h2>
<object aria-label="Realisierung von Virtual Private Networks (VPN)" class="light-image align-center" data="images/netzsicherheit/vpn.svg" role="img" type="image/svg+xml">
</object><ul class="simple">
<li><p>Aufbau einer scheinbar privaten Verbindung von Firmenteilnetzen über das (öffentliche) Internet.</p></li>
<li><p>Zusätzliche Verbindungsverschlüsselung zwischen den Firewalls.</p></li>
</ul>
<ld-supplemental><p>Ziel ist es aktive und passive Angriffe zu unterbinden.
Selbst bei verschlüsselten Verbindungen kann die Verkehrsflussanalyse noch Informationen liefern über die Verbindungen liefern.</p>
</ld-supplemental></ld-topic>
<ld-topic id="kommerzielle-vpns-fur-endnutzer">
<h2>Kommerzielle VPNs für Endnutzer</h2>
<object aria-label="Einsatz von Virtual Private Networks (VPN) für Privatnutzer" class="light-image align-center" data="images/netzsicherheit/vpn-commercial.svg" role="img" type="image/svg+xml">
</object><ld-supplemental><p><strong>Motivation</strong></p>
<ul class="simple">
<li><p>Schutz der Privatsphäre; der ISP kennt nicht mehr die Webseiten, die man aufruft.</p></li>
<li><p>Die IP-Adresse des Nutzers ist den aufgerufenen Webseiten nicht mehr bekannt und kann deswegen der Umgehung von Geo-Blocking dienen.</p></li>
</ul>
<p><strong>Nachteile?</strong></p>
<ul class="simple">
<li><p>Vertrauen in den VPN-Anbieter muss vorhanden sein. Insbesondere, beim Einsatz zum Stärken der Privatsphäre, muss der VPN-Anbieter vertrauenswürdig sein und sollte ein so genannter „no-log“ Anbieter sein.</p></li>
<li><p>Es gibt auch (scheinbar kostenlose) VPN-Anbieter, die die Daten der Nutzer dann aber verkaufen (ehemals: <a class="reference external" href="https://techcrunch.com/2019/02/21/facebook-removes-onavo/?guccounter=1&amp;guce_referrer=aHR0cHM6Ly93d3cuZ29vZ2xlLmNvbS8&amp;guce_referrer_sig=AQAAAGVIppEgEOd9Z0FoMbmk2TCleRmD9wCMWDmIzGYEjIo1c7Cmz8NpiSoibthFG5IZQzmZ-kiJq-5Wj1bj21byh7YUrC_aSJJk1Bapwz80GSgzLFS-LHCF2OOetUYLSKwEG7W75znuqJJBJcNTTbtJ1UGB95Yu90saK9aIIkEywcRq">Facebook Onavo</a>).</p></li>
</ul>
</ld-supplemental></ld-topic>
<ld-topic id="schutz-auf-den-schichten-des-tcp-ip-stacks">
<h2>Schutz auf den Schichten des TCP/IP Stacks</h2>
<p>Zentraler Schutz des gesamten internen Netzwerks durch:</p>
<ul class="incremental-list">
<li><p>Paket Filter (<span class="eng">Packet Filtering</span>)</p>
<ul class="list-with-explanations">
<li><p>Blockieren bestimmter IP-Empfänger-Adressen (extern / intern)</p></li>
<li><p>Blockieren bestimmter IP-Absender-Adressen (extern / intern)</p>
<p>(z. B. aus dem Internet mit internen IP-Absender-Adressen)</p>
</li>
<li><p>Blockieren bestimmter Dienste; ggf. nur für bestimmte IP-Adressen</p></li>
</ul>
</li>
<li><p>Filter auf Anwendungsebene (<span class="eng">Application-level Filtering</span>)</p>
<ul class="list-with-explanations">
<li><p>inhaltsbezogene Filterung der Verkehrsdaten eines Dienstes</p>
<p>(z. B. Virenfilter oder Spamfilter)</p>
</li>
<li><p>wirkungslos bei verschlüsselten Verkehrsdaten</p></li>
</ul>
</li>
<li><p>Protokollierungsmöglichkeit der Kommunikation von / nach extern</p></li>
</ul>
<ld-supplemental><p>Firewalls (alleine) können die Struktur des Netzwerks nicht verbergen.</p>
</ld-supplemental></ld-topic>
<ld-topic id="realisierungsmoglichkeiten-von-firewalls">
<h2>Realisierungsmöglichkeiten von Firewalls</h2>
<ul class="incremental-list simple">
<li><p>Hardware-Firewall</p>
<ul>
<li><p>Screening Router</p></li>
<li><p>Application Gateway (auch Bastion Host)</p>
<ul>
<li><p>(Reverse-)Proxy-Server für bestimmte Dienste</p></li>
<li><p>Endpunkt aus Sicht von Client-Software (HTTP-Browser, EMail, ...)</p></li>
<li><p>spezialisierte Server-Software</p></li>
</ul>
</li>
</ul>
</li>
<li><p>Software-Firewall (<em>Personal Firewall</em>)</p></li>
</ul>
<ld-supplemental><p>Im Falle eines <span class="eng">Bastion Host</span>, ist dies der einzige unmittelbar aus dem Internet erreichbare Rechner.</p>
</ld-supplemental></ld-topic>
<ld-topic id="screening-router">
<h2>Screening Router</h2>
<ld-grid class="default-layout">
<ld-cell class="width-60" style="align-self:auto;">
<p><strong>Aufbau</strong></p>
<p>Programmierbarer Hardwarerouter mit simplen Filterfunktionen:</p>
<ul class="simple">
<li><p>nur Paket-Header prüfen</p></li>
<li><p>schnelle Auswertung ermöglicht hohen Durchsatz</p></li>
<li><p>Realisierung eines Packet Filters</p></li>
</ul>
<aside class="admonition incremental" data-theme="assessment"><p class="admonition-title" data-theme="assessment-header"><span>Bewertung</span></p><ul class="columns simple">
<li><ul class="positive-list incremental">
<li><p>einfach und billig</p></li>
<li><p>flexibel</p></li>
</ul>
</li>
<li><ul class="negative-list incremental">
<li><p>schwer zu testen</p></li>
<li><p>Protokollierung</p></li>
<li><p>Fernwartung</p></li>
<li><p>keine Inhaltsfilterung</p></li>
</ul>
</li>
</ul>
</aside></ld-cell><ld-cell class="width-40" style="align-self:auto;">
<object aria-label="Screening Router" class="light-image align-center" data="images/netzsicherheit/screening-router.svg" role="img" type="image/svg+xml">
</object></ld-cell></ld-grid></ld-topic>
<ld-topic id="intrusion-detection-systeme-ids">
<h2>Intrusion Detection Systeme (IDS)</h2>
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition</span></p><p>Ein IDS ist ein Gerät (meist ein speziell konfigurierter Rechner), das vielfältige Techniken zur Erkennung von Angriffen anwendet und Angriffe meldet und ggf. abwehrt, in dem (z. B.) die Firewall automatisch umkonfiguriert wird.</p>
</aside><div class="incremental compound">
<p><strong>Motivation</strong></p>
<ul class="incremental-list simple">
<li><p>Firewalls alleine sind zu statisch und deswegen häufig nicht ausreichend</p></li>
<li><p>bessere Aufzeichnung und flexiblere Erkennung notwendig</p></li>
<li><p>angepasste Reaktion notwendig</p></li>
</ul>
</div>
<div class="incremental compound">
<p><strong>Umsetzung</strong></p>
<p>An verschiedenen, neuralgischen Stellen werden spezielle Sensoren platziert, die (hier) den Netzwerkverkehr überwachen und verdächtige Aktivitäten melden.</p>
</div>
<ld-supplemental><p>Miteinander verwandt bzw. typischerweise in einem Produkt zu finden:</p>
<ul class="simple">
<li><p>Intrusion Detection (IDS)</p></li>
<li><p>Intrusion Response (IRS)</p></li>
<li><p>Intrusion Prevention (IPS)</p></li>
</ul>
</ld-supplemental></ld-topic>
<ld-topic class="new-section" id="tor-the-onion-router">
<h2>TOR - The Onion Router</h2>
</ld-topic>
<ld-topic id="tor-grundlagen">
<h2>Tor - Grundlagen</h2>
<p>Anwendungsunabhängiger <strong>low-latency Anonymisierungsdienst für TCP-Verbindungen</strong>, der den Standort und die IP des Nutzers verschleiert.</p>
<ul class="incremental-list simple">
<li><p>Typische Anwendung: anonymes Surfen im Internet und Instant Messaging (z. B. Briar)</p></li>
<li><p>Frei und Open Source</p></li>
<li><p>gegründet 2002, öffentlich nutzbar seit 2003, Code seit 2004 frei verfügbar</p></li>
<li><p>Baut ein <em>Overlay-Netzwerk</em> auf</p></li>
<li><p>Grundlegendes Prinzip: Onion Routing</p></li>
</ul>
<ld-supplemental><dl class="field-list simple">
<dt>low-latency<span class="colon">:</span></dt>
<dd><p>Die Verzögerung durch die Anonymisierung ist so gering, dass Tor für Instant Messaging und das Surfen im Internet verwendet werden kann.</p>
</dd>
<dt>Overlay-Netzwerk<span class="colon">:</span></dt>
<dd><p>Tor baut ein eigenes Netzwerk auf, welches auf dem Internet aufsetzt. Die Verbindungen zwischen den Tor-Knoten werden von Tor zusätzlich verschlüsselt.</p>
</dd>
</dl>
</ld-supplemental></ld-topic>
<ld-topic id="tor-verwendung">
<h2>Tor - Verwendung</h2>
<ul class="incremental-list list-with-explanations">
<li><p>legale/intendierte Nutzungen: Nutzer mit allg. Datenschutzbedürfnissen, <em>Whistleblowers</em>, Dissidenten, Journalisten, ...</p></li>
<li><p>illegale Zwecke (<strong>Darknet</strong>)</p>
<div class="incremental docutils container">
<p>Marktplatz für illegale Waren und Dienstleistungen, z. B. Drogen, Waffen, gefälschte Dokumente, ... (z. B. <a class="reference external" href="https://en.wikipedia.org/wiki/Silk_Road_(marketplace)">Silk Road</a>, oder <a class="reference external" href="https://en.wikipedia.org/wiki/CyberBunker">CyberBunker</a> als Hosting-Provider für illegale Dienst)</p>
</div>
<div class="incremental docutils container">
<p>Es wird geschätzt, dass etwa 80% des Datenverkehrs im Zusammenhang mit dem Zugriff auf Kinderpornografie steht. Solche Schätzungen sind allerdings mit Vorsicht zu genießen!</p>
</div>
</li>
</ul>
<ld-supplemental><p>Wir können unterscheiden zwischen:</p>
<dl class="field-list simple">
<dt><em>Surface Web</em><span class="colon">:</span></dt>
<dd><p>Das frei-verfügbare Internet. (Auch als <em>Clear Web</em> bezeichnet.)</p>
</dd>
<dt><em>Deep Web</em><span class="colon">:</span></dt>
<dd><p>Das Internet, das durch Zugriffsbeschränkungen nicht öffentlich zugänglich ist.</p>
</dd>
<dt><em>Dark Web</em><span class="colon">:</span></dt>
<dd><p>Das Internet, das nicht indiziert ist und nur über spezielle Software (z. B. Tor) erreichbar ist. Häufig - aber nicht ausschließlich - wird das Dark Web für illegale Aktivitäten genutzt und ist meist zusätzlich durch Zugriffsbeschränkungen geschützt.</p>
</dd>
</dl>
</ld-supplemental></ld-topic>
<ld-topic class="new-subsection" id="sicherheit-angriffe">
<h2>Sicherheit - Angriffe</h2>
</ld-topic>
<ld-topic id="tor-bedrohungsmodel">
<h2>Tor - Bedrohungsmodel</h2>
<p>Tor bietet Schutz for folgenden Angreifern: Einem Angreifer dem es gelingt ...</p>
<ul class="simple">
<li><p>einen Teil der Kommunikation zu beobachten und</p></li>
<li><p>nur einen Teil der Tor-Knoten zu kontrollieren, indem er entweder einen eigenen Tor-Knoten (<em>Relay</em>; früher <em>Onion-Router</em>) betreibt oder einen bereits laufenden Knoten kompromittiert.</p></li>
</ul>
<aside class="admonition incremental" data-theme="danger"><p class="admonition-title" data-theme="danger-header">!GEFAHR!</p>
<p>Folgendes Szenario ist nicht abgedeckt: Ein Angreifer, der beide Enden der Kommunikation, den <span class="docutils literal">Entry Guard</span> und den <span class="docutils literal">Exit Node</span> überwachen kann.</p>
<p>Gegen solche Angreifer bietet Tor keine Anonymität.</p>
</aside>
</ld-topic>
<ld-topic id="tor-potentielle-sicherheitslucken">
<h2>Tor - potentielle Sicherheitslücken</h2>
<ul class="simple">
<li><p><span class="peripheral">DoS Attacken</span></p></li>
</ul>
<div class="incremental docutils container">
<ul class="simple">
<li><p>Identifikation von <em>Onion Services</em> (aka <em>Hidden Services</em>)</p></li>
</ul>
</div>
<div class="incremental docutils container">
<ul class="simple">
<li><p>Deanonymisierungsattacken</p></li>
</ul>
</div>
<div class="incremental docutils container">
<p><a class="reference external" href="https://github.com/Attacks-on-Tor/Attacks-on-Tor#correlation-attacks">Aufstellung von Angriffen auf Tor</a>.</p>
</div>
</ld-topic>
<ld-topic id="tor-deanonymisierungsattacke-2013">
<h2>Tor - Deanonymisierungsattacke 2013</h2>
<blockquote class="epigraph">
<p>Wenn ein einzelner Nutzer Tor über einen längeren Zeitraum [3 bis 6-Monate, abhängig von einigen Faktoren] regelmäßig nutzt, ist es fast sicher, dass er <em>de-anonymisiert</em> werden kann.</p>
<p>[Übersetzt mit DeepL.]</p>
<p class="attribution">—2013 - <a class="reference external" href="https://www.infosecurity-magazine.com/news/tor-is-not-as-safe-as-you-may-think/">Tor is not as safe as you may think</a></p>
</blockquote>
</ld-topic>
<ld-topic id="tor-deanonymisierungsattacke-2024">
<h2>Tor - Deanonymisierungsattacke 2024</h2>
<blockquote class="epigraph">
<p>Strafverfolgungsbehörden haben offenbar einen Weg gefunden, Nutzer des Tor-Netzwerkes gezielt zu deanonymisieren. Möglich sein soll dies [...] durch sogenannte Timing-Analysen, die bisher als praktisch nicht umsetzbar galten. Dadurch sei es aufgrund der verschlüsselten Datenpakete zwar nicht möglich zu sehen, was Nutzer verschickten, dass sie überhaupt kommunizierten, sei aber sichtbar.</p>
<div class="incremental docutils container">
<p>[...] ist dafür allerdings eine teils jahrelange Überwachung einzelner Tor-Nodes erforderlich. [...]</p>
</div>
<p class="attribution">—2024 - <a class="reference external" href="https://www.golem.de/news/deanonymisierung-von-nutzern-behoerden-unterwandern-tor-netzwerk-2409-189076.html">Behörden unterwandern Tor</a></p>
</blockquote>
</ld-topic>
<ld-topic class="new-subsection" id="architektur">
<h2>Architektur</h2>
</ld-topic>
<ld-topic id="tor-hintergrund">
<h2>Tor - Hintergrund</h2>
<ul class="incremental-list simple">
<li><p>Die grundlegende Idee ist es eine Trennung zwischen der Quelle und dem Ziel des Datenverkehrs zu schaffen.</p></li>
<li><p>Der Datenverkehr wird über <em>mehrere Knoten</em> (<em>Relays</em>) umgeleitet, die jeweils nur den vorherigen und den nächsten Knoten kennen. Der Weg den ein Datenpaket nimmt, wird als <em>Circuit</em> oder <em>Path</em> bezeichnet.</p></li>
<li><p>Der Pfad wird dazu vorher ausgewählt und der gesamte Datenverkehr entsprechend des Pfades verschlüsselt.</p></li>
<li><p>Tor bietet Anonymität auch für die Serverseite durch <em>Onion Services</em> (auch <em>Hidden Services</em>), die nur über eine von Tor vergebene Onion-Adresse erreicht werden können.</p></li>
</ul>
</ld-topic>
<ld-topic id="tor-aufbau">
<h2>Tor - Aufbau</h2>
<ld-deck class="light-image" data-theme="light">
<ld-card>
<object aria-label="Tor - Network" class="align-center" data="images/tor/base-network.svg" role="img" type="image/svg+xml">
</object></ld-card><ld-card class="overlay incremental">
<object aria-label="Tor - Directory Authority" class="align-center" data="images/tor/directory-authority.svg" role="img" type="image/svg+xml">
</object></ld-card><ld-card class="overlay incremental">
<object aria-label="TOR - Bridges and Bridge Nodes" class="align-center" data="images/tor/bridge-nodes.svg" role="img" type="image/svg+xml">
</object></ld-card><ld-card class="overlay incremental">
<object aria-label="TOR - Onion Routing" class="align-center" data="images/tor/msg.svg" role="img" type="image/svg+xml">
</object></ld-card></ld-deck><ld-supplemental><p><a class="reference external" href="https://spec.torproject.org">Spezifikation</a></p>
<dl class="field-list">
<dt>Tor-Knoten<span class="colon">:</span></dt>
<dd><p>Rechner, die das Tor-Netzwerk bilden. Es gibt drei Arten von Tor-Knoten:</p>
<ul class="simple">
<li><p><em>Entry Nodes</em> (auch <em>Guard Nodes</em>): Diese Knoten sind die ersten Knoten in der Kette. Sie kennen die IP-Adresse des Clients. Sie können den Datenverkehr nicht entschlüsseln. Sie können aber sehen, dass der Datenverkehr von einem bestimmten Client kommt.</p></li>
<li><p><em>Middle Nodes</em>: Diese Knoten sind die mittleren Knoten in der Kette. Sie kennen weder die IP-Adresse des Clients noch die IP-Adresse des Ziels. Sie können den Datenverkehr nicht entschlüsseln. Sie können aber sehen, dass der Datenverkehr von einem bestimmten Entry Node kommt und an einen bestimmten Exit Node geht.</p></li>
<li><p><em>Exit Nodes</em>: Diese Knoten sind die letzten Knoten in der Kette. Sie kennen die IP-Adresse des Ziels. Sie können den Datenverkehr entschlüsseln. Sie können aber nicht sehen, von welchem Entry Node der Datenverkehr kommt.</p></li>
<li><p><em>Bridge Nodes</em>: Diese Knoten sind <em>Entry Nodes</em>, die nicht bzw. nicht vollständig öffentlich bekannt. Diese dienen ggf. dazu in Ländern, in denen Tor blockiert wird, den Zugang zu Tor zu ermöglichen. Sollte eine Verbindung zu einer Bridge nicht hergestellt werden können, aufgrund der Struktur der Nachrichten - zum Beispiel aufgrund der Verwendung von <em>Deep Packet Inspection</em> - dann ist es möglich diese mit Hilfe von <em>Pluggable Transports</em> zu verschleiern.</p></li>
</ul>
</dd>
<dt>Tor-Netzwerk<span class="colon">:</span></dt>
<dd><p>besteht aus mehreren tausend Tor-Knoten. Viele Knoten sind freiwillig betriebene Knoten.</p>
</dd>
<dt>Circuit/Path<span class="colon">:</span></dt>
<dd><p>Ein Circuit besteht typischerweise aus drei Knoten: <em>Entry Node</em>, <em>Middle Node</em> und <em>Exit Node</em>. Mehr Knoten sind möglich, haben jedoch nur einen geringen Einfluss auf die Sicherheit. Die Übertragung der Daten zwischen diesen Knoten erfolgt verschlüsselt. In welcher Form die Daten vom <em>Exit Node</em> zum Ziel übertragen werden, ist nicht Teil von Tor. Hat der Client eine verschlüsselte Verbindung initiiert (HTTPS), dann ist auch der Datenverkehr zwischen dem Exit Node und dem Ziel (noch) verschlüsselt ansonsten nicht und der Exit Node kann den Datenverkehr lesen.</p>
</dd>
<dt>Directory Authority<span class="colon">:</span></dt>
<dd><p>Knoten, die die Liste der aktiven Tor-Knoten verwalten. Diese Liste wird von allen Tor-Knoten regelmäßig in Hinblick auf das <em>Consensus Document</em> bzgl. der Knoten und deren Eigenschaften sowie Zustand abgefragt. Das <em>Consensus Document</em> wird von den <em>Directory Authorities</em> einmal pro Stunde gemeinsam erstellt und beschreibt die relevanten Eigenschaften jedes Tor-Knotens. Die Authentizität des <em>Consensus Document</em> wird durch die Signaturen der <em>Directory Authorities</em> nachgewiesen.</p>
<p>Es gibt (Stand 2023) 9 <em>Directory Authorities</em>.</p>
</dd>
<dt><span class="eng">Onion Routing</span><span class="colon">:</span></dt>
<dd><p>bedeutet, dass die Datenpakete mehrfach verschlüsselt werden. Jeder Tor-Knoten kann nur die Verschlüsselungsschicht entfernen, für die er den Schlüssel hat. Die Schlüssel werden mit dem Client während des Aufbaus des Circuits ausgehandelt. Es gibt für jeden Tor-Knoten einen eigenen Schlüssel und die Nachrichten werden in umgekehrter Reihenfolge der Tor-Knoten entlang des Pfades verschlüsselt. d. h. die Verschlüsselung für den Entry Node wird als letztes angewendet, da diese als erstes entfernt wird.</p>
</dd>
<dt>Cells<span class="colon">:</span></dt>
<dd><p>sind die Datenpakete, die zwischen den Tor-Knoten ausgetauscht werden. Cells sind immer 512Byte groß, um es unmöglich zu machen anhand der Größe der Datenpakete Rückschlüsse auf die Daten zu ziehen.</p>
</dd>
</dl>
<aside class="admonition admonition-hinweis"><p class="admonition-title">Hinweis</p>
<p>In älteren Dokumenten wird der <em>Client</em> auch als <em>Onion Proxy (OP)</em> bezeichnet und die Tor-Knoten als <em>Onion Router (OR)</em>. Die Tor-Knoten (<span class="eng">Nodes</span>) werden auch als <em>Onion Relay</em> bezeichnet.</p>
</aside>
</ld-supplemental></ld-topic>
<ld-topic class="s-vertical-title" id="initiierung-eines-circuits-konzeptionell">
<h2>Initiierung eines Circuits (konzeptionell)</h2>
<object aria-label="Initiierung eines Circuits" class="light-image align-center" data="images/tor/circuit-creation.svg" role="img" type="image/svg+xml">
</object><ld-supplemental><p>Jeder Tor-Knoten verfügt über mehrere Keys. Für den Aufbau der Verbindung werden die <em>Onion Keys</em> verwendet. Mit Hilfe dieser werden die initialen Datenpakete mittels Public-Key Kryptografie verschlüsselt. Dies wird benötigt, um den AES Key - einer pro Knoten - der für den eigentlichen Versand benötigt wird, auszuhandeln und sicher zu übertragen.</p>
<p>In der Grafik wird der Aufbau eines Circuits mit zwei Tor-Knoten dargestellt. Der Client kennt die Onion Keys der Tor-Knoten (<span class="docutils literal">OR1</span> und <span class="docutils literal">OR2</span>). Die Onion Keys werden verwendet, um die <em>Create</em> Zelle zu verschlüsseln. Der Entry Node verwendet diese Onion Keys um die <em>Create</em> Zelle zu entschlüsseln und den gemeinsamen Schlüssel zu erzeugen. Um einen längeren Pfad aufzubauen, muss der Client ggf. einfach mehrere <span class="docutils literal">Extend</span> Nachrichten versenden. Erhält ein Knoten eine Relay Nachricht, dann kann der Knoten diese mit dem mit ihm ausgehandelten AES Key entschlüsseln und die Nachricht weiterleiten. Er kann den Inhalt (zum Beispiel eine weitere Relay Nachricht oder eine Extend Nachricht) nicht lesen.</p>
</ld-supplemental></ld-topic>
<ld-topic id="informationen-uber-tor-relays">
<h2>Informationen über Tor Relays</h2>
<img alt="Tor Relay Snorlax" class="screenshot align-right" src="images/tor/relay-snorlax.webp" />
<div class="incremental width-40 float-left docutils container">
<ld-deck>
<ld-card>
<ul class="simple">
<li><p>Viele Tor Relays werden von Freiwilligen betrieben</p></li>
<li><p>In Deutschland gibt es viele Relays</p></li>
<li><p>Hetzner ist diesbezüglich beliebt...</p></li>
</ul>
<div class="incremental docutils container">
<p>... und deswegen steht Hetzner auf der Liste der zu <a class="reference external" href="https://community.torproject.org/relay/community-resources/good-bad-isps/">vermeidenden Hoster</a> (Stand Jan. 2024).</p>
</div>
</ld-card><ld-card class="incremental">
<p>Ein Tor-Knoten wird as <span class="docutils literal">schnell</span> (<em>fast</em>) eingestuft, wenn er aktiv ist und eine Bandbreite von mindestens 100KB/s hat oder unter den Top 7/8tel aller bekannten aktiven Router ist.</p>
<p>Zum Vergleich: Die durchschnittliche Bandbreite in Deutschland ist 80Mbit/s (cf. <a class="reference external" href="https://www.statista.com/statistics/1338657/average-internet-speed-germany/">Statista</a>).</p>
<p>(Stand Jan. 2024)</p>
</ld-card></ld-deck></div>
<ld-supplemental><p>Pfade, die über die ganze Welt gehen verhindern, dass der <span class="docutils literal">Entry-</span> und <span class="docutils literal"><span class="pre">Exit-node</span></span> beim gleichen Anbieter liegen.</p>

<ld-topic id="tor-exit-nodes">
<h2>Tor Exit Nodes</h2>
<p>Die Anzahl der <em>Exit Nodes</em> ist deutlich kleiner (2. Jan. 2024 - 1314 Einträge) als die Anzahl der Knoten. Dies liegt daran, dass die technischen Anforderungen höher sind (z. B. stabile IP Adressen) und insbesondere daran, dass die Betreiber der <em>Exit nodes</em> darauf vorbereitet sein müssen ggf. (zahlreiche) Anfragen von den Behörden zu bekommen. <a class="brackets" href="#footnote-8" id="footnote-reference-8" role="doc-noteref"><span class="fn-bracket">[</span>8<span class="fn-bracket">]</span></a></p>
<img alt="Deutscher Tor Exit Node von der TU Berlin" class="screenshot align-center" src="images/tor/german-exit-node.webp" />
<ld-supplemental><p>Reverse IP Lookup für 130.149.80.199 durchgeführt mit <a class="reference external" href="https://www.iplocation.net/ip-lookup">IP Location Service</a>.</p>
<p>Die (aktuell) geringe Anzahl an Exit Nodes ist ein (steigendes?) Problem, da es dadurch ggf. einfach(er) ist den Datenverkehr zu überwachen.</p>
</ld-supplemental><aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-9" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-9">9</a><span class="fn-bracket">]</span></span>
<p><a class="reference external" href="https://community.torproject.org/relay/community-resources/tor-exit-guidelines/">Tor Exit Node Guidelines</a></p>
</aside>
</aside>
</ld-topic>
<ld-topic id="tor-relays-exit-policy">
<h2>Tor Relays: <em>Exit Policy</em></h2>
<p>Jeder <em>Node</em> legt in seiner <em>Exit Policy</em> genau fest welchen Datenverkehr weiterleiten möchte:</p>
<ul class="simple">
<li><p>Es gibt offene Exit Nodes, die alle Anfragen weiterleiten.</p></li>
<li><p>Es gibt Knoten, die die Daten nur an weitere Tor-Knoten weiterleiten.</p></li>
<li><p>Es gibt Knoten, die nur bestimmte Dienste (z. B. HTTPs) weiterleiten.</p></li>
<li><p>Es gibt „<em>private Exit Nodes</em>“, die nur zu einem bestimmten Netz Verbindungen aufbauen.</p></li>
</ul>
</ld-topic>
<ld-topic id="onion-services-hidden-services">
<h2>Onion Services/Hidden Services<a class="brackets" href="#footnote-9" id="footnote-reference-9" role="doc-noteref"><span class="fn-bracket">[</span>9<span class="fn-bracket">]</span></a></h2>
<ld-deck>
<ld-card>
<ul class="incremental-list list-with-explanations">
<li><p>Server, die Anfragen nur aus dem Tor-Netzwerk annehmen, werden als <em>Onion Services</em> (bzw. <em>Hidden Services</em>) bezeichnet.</p></li>
<li><p><span class="docutils literal">.onion</span> ist eine <em>Pseudo</em>-Top-Level-Domain, die für Onion Services verwendet wird.</p></li>
<li><p>Die Adresse eines Onion Services basiert auf dem öffentlichen Schlüssel des Servers.</p>
<p>Beispiel: Die Onion-Adresse <span class="docutils literal"><span class="pre">https://duckduckgogg42xjoc72x3sjasowoarfbgcmvfimaftt6twagswzczad.onion/</span></span> gehört zu DuckDuckGo. Der öffentliche Schlüssel ist somit: <span class="docutils literal">duckduckgogg42xjoc72x3sjasowoarfbgcmvfimaftt6twagswzczad</span>.</p>
</li>
<li><p>Onion Services können nur über das Tor-Netzwerk erreicht werden.</p></li>
<li><p>Liste von öffentlichen Onion-Adressen: <a class="reference external" href="https://community.torproject.org/onion-services/#featured-onions">https://community.torproject.org/onion-services/#featured-onions</a></p>
<ld-supplemental><p>Onion-Adresse der EFF im Tor Netzwerk (Tor-Browser notwendig): <a class="reference external" href="https://www.iykpqm7jiradoeezzkhj7c4b33g4hbgfwelht2evxxeicbpjy44c7ead.onion/">https://www.iykpqm7jiradoeezzkhj7c4b33g4hbgfwelht2evxxeicbpjy44c7ead.onion</a></p>
</ld-supplemental></li>
<li><p>Sicher vor Person-in-the-Middle-Angriffen zwischen Client und Onion Service</p>
<ld-supplemental><p>Normalerweise sind Person-in-the-Middle-Angriffe gegen HTTPS abgesicherte Verbindungen nicht möglich; so genannte State-sponsored Actors können jedoch in bestimmten Szenarien die Infrastruktur (<em>Certificate Authorities</em> (CAs)) zur Zertifikatsausstellung und Validierung kompromittieren und damit solche Angriffe durchführen. Bei Onion Services ist dies nicht in gleicher Weise möglich, da die Adresse des Onion Services auf dem öffentlichen Schlüssel basiert.</p>
</ld-supplemental></li>
</ul>
</ld-card><ld-card class="incremental">
<p><strong>Funktionsweise von Onion Services (Registrierung von Onion Services)</strong></p>
<ol class="arabic incremental-list list-with-explanations">
<li><p>Der Onion Service generiert ein Schlüsselpaar (privat/öffentlich) und erstellt daraus seine Onion-Adresse.</p></li>
<li><p>Der Onion Service veröffentlicht seinen öffentlichen Schlüssel und einige <em>Introduction Points</em> (3 Stück) im Tor-Netzwerk.</p>
<p><em>Introduction Points</em> sind Tor-Knoten, die als Vermittler für Verbindungsanfragen dienen. Die Verbindungen zwischen dem Onion Service und den <em>Introduction Points</em> sind langlebig und werden im Directory des Tor-Netzwerks veröffentlicht.</p>
<ld-supplemental><p>Die Verbindungen zwischen Onion Service und <em>Introduction Point</em> gehen über das Tor-Netzwerk (drei Hops) und sind deshalb anonymisiert.</p>
</ld-supplemental></li>
</ol>
</ld-card><ld-card class="incremental">
<p><strong>Funktionsweise von Onion Services (Verbindung zu Onion Services)</strong></p>
<ol class="arabic simple incremental-list list-with-explanations" start="3">
<li><p>Ein Client, der eine Verbindung zum Onion Service herstellen möchte, nutzt den öffentlichen Schlüssel des Onion Services und schlägt im Directory die Introduction Points nach und wählt einen <em>Rendezvous Point</em> aus (einen Tor-Knoten).</p></li>
<li><p>Der Client sendet eine Nachricht an den Onion Service über einen <em>Introduction Point</em>, in der er den ausgewählten <em>Rendezvous Point</em> angibt.</p></li>
<li><p>Der Onion Service sendet eine Nachricht an den <em>Rendezvous Point</em>, um die Verbindung mit dem Client herzustellen.</p></li>
<li><p>Der Client und der Onion Service kommunizieren.</p></li>
</ol>
</ld-card><ld-card class="incremental">
<p><strong>Sicherheit von Onion Services</strong></p>
<ul class="simple">
<li><p>Die Trennung von Introduction Points und Rendezvous Points sorgt dafür, dass  der <em>Introduction Point</em> keine langlaufende Traffic-Analyse durchführen kann, um den Onion Service zu identifizieren.</p></li>
</ul>
</ld-card></ld-deck><aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-10" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span>10<span class="fn-bracket">]</span></span>
<p><a class="reference external" href="https://community.torproject.org/onion-services/overview/">How Onion Services Work</a></p>
</aside>
</aside>
</ld-topic>
<ld-topic id="tor-browser">
<h2>Tor-Browser</h2>
<p>Standardanwendung für den Zugriff auf das Tor-Netzwerk.</p>
<ld-deck>
<ld-card>
<img alt="Tor-Browser mit New-York-Times - 01.01.2024" class="align-left" src="images/tor/onion-service-nyt.webp" />
</ld-card><ld-card class="incremental">
<p class="rubric">Sicherheitseinstellungen des Tor-Browsers</p>
<dl class="field-list simple">
<dt>Standard<span class="colon">:</span></dt>
<dd><p>alle Browserfunktionen sind aktiviert.</p>
</dd>
<dt>Sicherer<span class="colon">:</span></dt>
<dd><p>JavaScript ist auf Nicht-HTTPS-Seiten deaktiviert. Wenn JavaScript aktiviert ist, dann sind die Leistungsoptimierungen deaktiviert. Audio und Video (HTML5-Medien) sowie WebGL werden nur nach Mausklick abgespielt.</p>
</dd>
<dt>Sicher<span class="colon">:</span></dt>
<dd><p>(zusätzlich) JavaScript ist immer deaktiviert. Einige Schriftarten, Symbole, mathematische Symbole und Bilder sind deaktiviert.</p>
</dd>
</dl>
</ld-card></ld-deck><ld-supplemental><p>Das Tor-Netzwerk erlaubt ggf. das Setzen des <em>Exit Nodes</em>, um zum Beispiel geografische Sperren zu umgehen. Entsprechende Dienstanbieter können dies jedoch leicht erkennen, da die Knoten des Tor Netzwerkes bekannt sind (<a class="reference external" href="https://check.torproject.org/torbulkexitlist">https://check.torproject.org/torbulkexitlist</a>) und verweigern dann den Zugriff.</p>
</ld-supplemental></ld-topic>
<ld-topic id="tor">
<h2>Tor</h2>
<ul class="positive-list incremental list-with-explanations">
<li><p>Schützt vor der Analyse des Datenverkehrs.</p>
<p>Von <a class="reference external" href="https://securedrop.org/">SecureDrop</a> wird zum Beispiel für Whistleblower empfohlen sich mit dem SecureDrop Service über Tor zu verbinden und erst dann Dokumente hochzuladen.</p>
</li>
<li><p>Der Tor-Browser schützt relativ effektiv vor Website-Fingerprinting.</p></li>
</ul>
<ul class="attention-list incremental simple">
<li><p>Ende-zu-Ende Korrelation von Datenverkehr ist möglich.</p></li>
<li><p>Die Anonymität hängt auch von der Anzahl der Nutzer ab.</p></li>
</ul>
<ul class="negative-list incremental simple">
<li><p>Teilweise sehr langsam (insbesondere bei Onion Services).</p></li>
<li><p>Monitoring des Netzwerks ist an den Grenzen möglich.</p></li>
</ul>
<ld-supplemental><p><em>Website Fingerprinting</em></p>
<p>Website Fingerprinting ermöglicht es die besuchten Websites anhand des Datenverkehrs zu identifizieren. Dabei wird nicht der Inhalt der Datenpakete analysiert, sondern die statistischen Eigenschaften des Datenverkehrs. Wie groß sind die Datenpakete (d. h. die ausgelieferten Dateien)? Wie viele Datenpakete werden wann verschickt? Wie lange dauert es bis ein Datenpaket verschickt wird (d. h. Geschwindigkeit der Webseite)? Wie lange dauert es bis ein Datenpaket ankommt?</p>
<p><em>(Cross-)Browser Fingerprinting</em></p>
<p>Durch das Sammeln vieler (auch kleiner) Informationen über den/die Browser und das Betriebssystem kann ein für praktische Zwecke hinreichend eindeutiger Fingerabdruck erstellt werden. Dieser kann dann zur Identifikation des Nutzers verwendet werden.</p>
<p>Kleiner Auszug aus den möglichen Informationen:</p>
<ul class="simple">
<li><p>System Fonts</p></li>
<li><p>Werden Cookies unterstützt?</p></li>
<li><p>Betriebssystem</p></li>
<li><p>Betriebssystem Sprache</p></li>
<li><p>Keyboard layout</p></li>
<li><p>Art/Version des Browsers</p></li>
<li><p>verfügbare Sensoren: Beschleunigungssensor, Näherungssensor, Gyroskop</p></li>
<li><p>verfügbare Browser Plugins</p></li>
<li><p>HTTP-Header Eigenschaften</p></li>
<li><p>CPU Klasse</p></li>
<li><p>HTML 5 Canvas Fingerprinting</p></li>
<li><p>Unterstützung von Multitouch</p></li>
</ul>
<p><em>Monitoring des Netzwerks an den Grenzen</em></p>
<p>Hat in der Vergangenheit dazu geführt, dass Nutzer von Tor-Netzwerken identifiziert werden konnten.</p>
<p><em>Ende-zu-Ende Korrelation von Datenverkehr</em></p>
<p>Auch als <em>Traffic Confirmation</em> bekannt. Diese Art von Attacke ist möglich, wenn <em>Relays</em> am Anfang und am Ende der Verbindung kontrolliert werden. Die Angreifer können dann den Datenverkehr an beiden Enden beobachten und die Datenpakete korrelieren z. B. basierend auf statistischen Informationen über die Zeitpunkte und Volumen von Datenflüssen.</p>
</ld-supplemental></ld-topic>

<div class="ld-exercise" data-exercise-id="6" data-exercise-title="6 - Tor über VPN oder VPN über TOR?" id="ld-exercise-6">
<p class="ld-exercise-title rubric"><span>Tor über VPN oder VPN über TOR?</span></p>
