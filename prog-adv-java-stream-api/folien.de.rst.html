<ld-topic id="streams-fortgeschrittenere-konzepte">
<h2>Streams - fortgeschrittenere Konzepte</h2>
<ld-deck>
<ld-card>
<p class="rubric">Ausgewählte Eigenschaften des <em>Basisinterface</em> aller Streams</p>
<p>Parallele und sequentielle Streams.</p>
<pre class="code java literal-block"><small class="ln"> 1</small><code data-lineno=" 1"><span class="keyword namespace">package</span><span class="whitespace"> </span><span class="name namespace">java.util.stream</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 2</small><code data-lineno=" 2"><span class="whitespace">
</span></code><small class="ln"> 3</small><code data-lineno=" 3"><span class="whitespace"></span><span class="keyword declaration">public</span><span class="whitespace"> </span><span class="keyword declaration">interface</span> <span class="name class">BaseStream</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">S</span><span class="whitespace"> </span><span class="keyword declaration">extends</span><span class="whitespace"> </span><span class="name">BaseStream</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="name">S</span><span class="operator">&gt;&gt;</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln"> 4</small><code data-lineno=" 4"><span class="whitespace">    </span><span class="comment multiline">/** Closes the stream, releasing any resources associated with it. */</span><span class="whitespace">
</span></code><small class="ln"> 5</small><code data-lineno=" 5"><span class="whitespace">    </span><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">close</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln"> 6</small><code data-lineno=" 6"><span class="whitespace">
</span></code><small class="ln"> 7</small><code data-lineno=" 7"><span class="whitespace">    </span><span class="comment multiline">/** Returns an equivalent stream that is parallel. */</span><span class="whitespace">
</span></code><small class="ln"> 8</small><code data-lineno=" 8"><span class="whitespace">    </span><span class="name">S</span><span class="whitespace"> </span><span class="name function">parallel</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln"> 9</small><code data-lineno=" 9"><span class="whitespace">    </span><span class="comment multiline">/** Returns an equivalent stream that is sequential. */</span><span class="whitespace">
</span></code><small class="ln">10</small><code data-lineno="10"><span class="whitespace">    </span><span class="name">S</span><span class="whitespace"> </span><span class="name function">sequential</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln">11</small><code data-lineno="11"><span class="whitespace"></span><span class="punctuation">}</span></code></pre>
<pre class="code java incremental literal-block"><small class="ln">13</small><code data-lineno="13"><span class="keyword declaration">public</span><span class="whitespace"> </span><span class="keyword declaration">interface</span> <span class="name class">Stream</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="keyword declaration">extends</span><span class="whitespace"> </span><span class="name">BaseStream</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;&gt;</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln">14</small><code data-lineno="14"><span class="whitespace">    </span><span class="comment single">// ...</span><span class="whitespace">
</span></code><small class="ln">15</small><code data-lineno="15"><span class="whitespace"></span><span class="punctuation">}</span></code></pre>
<ld-supplemental><p>Die Interfacedefintion (<code class="java"><span class="name">BaseStream</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">S</span><span class="whitespace"> </span><span class="keyword declaration">extends</span><span class="whitespace"> </span><span class="name">BaseStream</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="name">S</span><span class="operator">&gt;&gt;</span></code>) ist eine Anwendung des  des <em>Curiously Recurring Template Pattern</em>s (<em>CRTP</em>). Bei diesem Idiom haben wir eine Klasse <code class="java"><span class="name">X</span></code>, die von einer  generischen Klasse oder einem generischen Interface <code class="java"><span class="name">S</span></code> abgeleitet wird, wobei die ableitende Klasse <code class="java"><span class="name">X</span></code> sich selber als Typparameter verwendet. Dies erlaubt die Definition einer Fluent-API, bei der Methoden, die in der Basisklasse definiert sind, den abgeleiteten Typ zurückgeben.</p>
</ld-supplemental></ld-card><ld-card class="incremental">
<p class="rubric">Erzeugen von eigenen Streams mittels <a class="reference external" href="https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/util/stream/StreamSupport.html">StreamSupport</a></p>
<p>Die Implementierung des Interfaces <code class="java"><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code> ist ggf. sehr aufwändig. Alternativ kann die Klasse <code class="java"><span class="name">StreamSupport</span></code> verwendet werden, um auf einem <code class="java"><span class="name">Spliterator</span></code> basierende Streams zu erzeugen.</p>
<pre class="code java literal-block"><small class="ln">1</small><code data-lineno="1"><span class="keyword namespace">package</span><span class="whitespace"> </span><span class="name namespace">java.util.stream</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln">2</small><code data-lineno="2"><span class="whitespace">
</span></code><small class="ln">3</small><code data-lineno="3"><span class="whitespace"></span><span class="keyword declaration">public</span><span class="whitespace"> </span><span class="keyword declaration">final</span><span class="whitespace"> </span><span class="keyword declaration">class</span> <span class="name class">StreamSupport</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln">4</small><code data-lineno="4"><span class="whitespace">
</span></code><small class="ln">5</small><code data-lineno="5"><span class="whitespace">    </span><span class="comment multiline">/** Creates a new sequential or parallel Stream from a Spliterator. */</span><span class="whitespace">

<ld-topic class="exercises" id="ubung-streams-erste-schritte">
<h2>Übung - Streams - erste Schritte</h2>
<div class="ld-exercise" data-exercise-id="1" data-exercise-title="1 - Streams und Lambda Ausdrücke" id="ld-exercise-1">
<p class="ld-exercise-title rubric">Streams und Lambda Ausdrücke</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name">List</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">punkte</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">asList</span><span class="punctuation">(</span><span class="literal number integer">85</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">42</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">91</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">67</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">55</span><span class="punctuation">);</span></code></pre>
<ol class="arabic list-with-explanations">
<li><p>Filtere mit einem Lambda die Liste <code class="java"><span class="name">punkte</span></code>, sodass nur Noten &gt;= 60 übrig bleiben, und gib die bestandenen Noten aus.</p>
<p>Hinweis: Verwende <code class="java"><span class="name">stream</span><span class="punctuation">()</span></code>, <code class="java"><span class="name">filter</span><span class="punctuation">()</span></code> und <code class="java"><span class="name">forEach</span><span class="punctuation">()</span></code>.</p>
</li>
<li><p>Erstelle ein <code class="java"><span class="name">Predicate</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span></code>-Lambda namens <code class="java"><span class="name">isExcellent</span></code>, das <code class="java"><span class="keyword constant">true</span></code> zurückgibt bei 90 oder mehr Punkten. Gib dann alle ausgezeichneten Noten aus.</p></li>
<li><p>Erstelle ein <code class="java"><span class="name">Function</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">String</span><span class="operator">&gt;</span></code>-Lambda namens <code class="java"><span class="name">toLetterGrade</span></code>, das die Punkte in einen Buchstaben umwandelt: 90+ → &quot;A&quot;; 80-89 → &quot;B&quot;; 70-79 → &quot;C&quot;; 60-69 → &quot;D&quot;; unter 60 → &quot;F&quot;; gib dann die Punkte zusammen mit der Note aus.</p></li>
<li><p>Berechne den Durchschnitt aller Noten und gib diese aus.</p>
<p>Hinweis: Verwende <code class="java"><span class="name">stream</span><span class="punctuation">()</span></code> und <code class="java"><span class="name">mapToInt</span><span class="punctuation">()</span></code> und schaue Dir die <a class="reference external" href="https://docs.oracle.com/en/java/javase/26/docs/api/java.base/java/util/stream/IntStream.html">API</a> von <code class="java"><span class="name">IntStream</span></code> an.</p>
</li>
</ol>

<ld-topic class="exercises" id="ubung-streams">
<h2>Übung - Streams</h2>
<div class="ld-exercise" data-exercise-id="2" data-exercise-title="2 - Java Streams" id="ld-exercise-2">
<p class="ld-exercise-title rubric">Java Streams</p>
<ol class="arabic">
<li><p>Schreiben Sie eine Methode <code class="java"><span class="keyword type">int</span><span class="whitespace"> </span><span class="name function">sumOfSquares</span><span class="punctuation">(</span><span class="keyword type">int</span><span class="operator">[]</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">)</span></code> die die Elemente des Arrays quadriert und dann die Summe berechnet.</p></li>
<li><p>Schreiben Sie eine Methode <code class="java"><span class="keyword type">int</span><span class="whitespace"> </span><span class="name function">sumOfSquaresEven</span><span class="punctuation">(</span><span class="keyword type">int</span><span class="operator">[]</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">)</span></code> die die Summe der quadrierten Elemente bildet, für die das Ergebnis der Quadrierung gerade ist.</p></li>
<li><p>Schreiben Sie eine Methode, die eine Liste von Strings (<code class="java"><span class="name">List</span><span class="operator">&lt;</span><span class="name">String</span><span class="operator">&gt;</span></code>) in eine flache Liste von Zeichen-Codepoints (<code class="java"><span class="name">List</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span></code>) umwandelt.</p>
<aside class="admonition remark">
<p class="admonition-title">Bemerkung</p>
<p><code class="java"><span class="name">String</span><span class="punctuation">.</span><span class="name attribute">chars</span><span class="punctuation">()</span></code> liefert einen <code class="java"><span class="name">IntStream</span></code> von Codepoints.</p>
</aside>
</li>
</ol>
<aside class="admonition important">
<p class="admonition-title">Wichtig</p>
<p>Verwenden Sie ausschließlich Streams und Lambda-Ausdrücke.</p>

<ld-topic class="new-section transition-move-to-top" id="bewertung-der-fahigkeiten-der-standardoperationen-von-java-streams">
<h2>Bewertung der Fähigkeiten der Standardoperationen von Java Streams</h2>
</ld-topic>
<ld-topic id="herausforderung-low-representational-gap-gelost">
<h2>Herausforderung <em>Low-representational Gap</em> gelöst?</h2>
<p class="rubric">Lösung mit standard <em>Stream</em> Operationen (Java 8 - 26)</p>
<ld-supplemental class="d-only" embed-in-document-flow><p><em>Benötigte Imports</em></p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1</small><code data-lineno="1"><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">java.util.Comparator.comparingDouble</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln">2</small><code data-lineno="2"><span class="whitespace"></span><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">java.util.function.Predicate.not</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln">3</small><code data-lineno="3"><span class="whitespace"></span><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.Collectors.groupingBy</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln">4</small><code data-lineno="4"><span class="whitespace"></span><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.Collectors.minBy</span><span class="punctuation">;</span></code></pre>
</ld-supplemental><p><em>Geschäftslogik</em></p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1</small><code data-lineno="1"><span class="name">List</span><span class="operator">&lt;</span><span class="name">Student</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">empfehlungenS</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace">
</span></code><small class="ln">2</small><code data-lineno="2"><span class="whitespace">    </span><span class="name">alleStudierenden</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">()</span><span class="whitespace">
</span></code><small class="ln">3</small><code data-lineno="3"><span class="whitespace">        </span><span class="punctuation">.</span><span class="name attribute">filter</span><span class="punctuation">(</span><span class="name">not</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">hatStipendium</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln">4</small><code data-lineno="4"><span class="whitespace">        </span><span class="punctuation">.</span><span class="name attribute">collect</span><span class="punctuation">(</span><span class="name">groupingBy</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">studiengang</span><span class="punctuation">,</span><span class="whitespace">
</span></code><small class="ln">5</small><code data-lineno="5"><span class="whitespace">                            </span><span class="name">minBy</span><span class="punctuation">(</span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">schnitt</span><span class="punctuation">))))</span><span class="whitespace">
</span></code><small class="ln">6</small><code data-lineno="6"><span class="whitespace">        </span><span class="punctuation">.</span><span class="name attribute">values</span><span class="punctuation">().</span><span class="name attribute">stream</span><span class="punctuation">().</span><span class="name attribute">flatMap</span><span class="punctuation">(</span><span class="name">Optional</span><span class="punctuation">::</span><span class="name">stream</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln">7</small><code data-lineno="7"><span class="whitespace">        </span><span class="punctuation">.</span><span class="name attribute">sorted</span><span class="punctuation">(</span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">schnitt</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln">8</small><code data-lineno="8"><span class="whitespace">        </span><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">();</span></code></pre>
<ld-supplemental embed-in-document-flow><aside class="admonition assessment">
<p class="admonition-title">Bewertung</p>
<p>Wir sind näher an der Geschäftslogik, aber technische Artefakte scheinen noch durch!</p>
<ul class="simple">
<li><p>Um die gewünschte Gruppierung zu erhalten, werden die besten Studierenden in einer Zwischendatenstruktur (<em>Map</em>) aufgesammelt (<code class="java"><span class="name">collect</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">)</span></code>). Diese muss - um eine Stream-orientierte Weiterverarbeitung zu ermöglichen - wieder in einen Stream verwandelt werden, der über den <em>Values</em> der <em>Map</em> operiert (<code class="java"><span class="name">values</span><span class="punctuation">().</span><span class="name attribute">stream</span><span class="punctuation">()</span></code>).</p></li>
<li><p>Da wir in eine <em>Map</em> aufgesammelt hatten, haben wir einen <em>Stream of Optionals</em>;  <code class="java"><span class="name">minBy</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">)</span></code> liefert ein <code class="java"><span class="name">Optional</span></code>. Somit müssen wir die <code class="java"><span class="name">Optional</span></code>s im <code class="java"><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Optional</span><span class="operator">&lt;</span><span class="name">Student</span><span class="operator">&gt;&gt;</span></code> über <code class="java"><span class="name">flatMap</span><span class="punctuation">(</span><span class="name">Optional</span><span class="punctuation">::</span><span class="name">stream</span><span class="punctuation">)</span></code> entpacken.</p></li>
</ul>
</aside>
</ld-supplemental></ld-topic>
<ld-topic class="new-section transition-fade" id="benutzerdefinierte-intermediate-operations-stream-gatherers">
<h2>Benutzerdefinierte Intermediate Operations: Stream Gatherers</h2>
<ld-supplemental><p>Im Folgenden verwenden wir die Begriffe <em>Custom Intermediate Operations</em> und <em>Stream Gatherers</em> faktisch synonym.</p>
</ld-supplemental></ld-topic>
<ld-topic id="welches-problem-wollen-wir-losen">
<h2>Welches Problem wollen wir lösen?</h2>
<pre class="code java head fade-out-strong no-margin literal-block"><small class="ln">1</small><code data-lineno="1"><span class="name">List</span><span class="operator">&lt;</span><span class="name">Student</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">empfehlungenS</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">alleStudierenden</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">()</span><span class="whitespace">
</span></code><small class="ln">2</small><code data-lineno="2"><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">filter</span><span class="punctuation">(</span><span class="name">not</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">hatStipendium</span><span class="punctuation">))</span></code></pre>
<pre class="code java snippet no-margin literal-block"><small class="ln">3</small><code data-lineno="3"><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">collect</span><span class="punctuation">(</span><span class="name">groupingBy</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">studiengang</span><span class="punctuation">,</span><span class="whitespace">
</span></code><small class="ln">4</small><code data-lineno="4"><span class="whitespace">                        </span><span class="name">minBy</span><span class="punctuation">(</span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">schnitt</span><span class="punctuation">))))</span><span class="whitespace">
</span></code><small class="ln">5</small><code data-lineno="5"><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">values</span><span class="punctuation">().</span><span class="name attribute">stream</span><span class="punctuation">().</span><span class="name attribute">flatMap</span><span class="punctuation">(</span><span class="name">Optional</span><span class="punctuation">::</span><span class="name">stream</span><span class="punctuation">)</span></code></pre>
<pre class="code java tail fade-out-strong literal-block"><small class="ln">6</small><code data-lineno="6"><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">sorted</span><span class="punctuation">(</span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">schnitt</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln">7</small><code data-lineno="7"><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">();</span></code></pre>
<div class="accentuate incremental compound">
<p>Um (hier) den Bruch in der Pipeline (Stream → List → Stream) zu vermeiden, benötigen wir eine passende <em>Intermediate Operation</em>, die von der Standardbibliothek nicht zur Verfügung gestellt wird.</p>
</div>
</ld-topic>
<ld-topic id="stream-gatherers-jdk-24">
<h2><a class="reference external" href="https://docs.oracle.com/en/java/javase/26/core/stream-gatherers.html">Stream Gatherers (JDK 24+)</a></h2>
<p>Gatherers erlauben die Definition von benutzerdefinierten <em>Intermediate Operations</em>.</p>
<p><code class="java"><span class="name">Gatherer</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">A</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">R</span><span class="operator">&gt;</span></code> bestehen aus vier Komponenten:</p>
<dl class="incremental-list field-list simple">
<dt><code class="java"><span class="name">initializer</span></code><span class="colon">:</span></dt>
<dd><p>Erzeugt den privaten, Gatherer-internen, ggf. veränderlichen Zustand (Typ <code class="java"><span class="name">A</span></code>).</p>
</dd>
<dt><code class="java"><span class="name">integrator</span></code><span class="colon">:</span></dt>
<dd><p>Verarbeitet jedes Eingabeelement (<code class="java"><span class="name">T</span></code>) und kann beliebig viele Ausgabeelemente (<code class="java"><span class="name">R</span></code>) <em>downstream</em> senden.</p>
</dd>
<dt><code class="java"><span class="name">combiner</span></code><span class="colon">:</span></dt>
<dd><p>Vereinigt Zustände bei paralleler Ausführung <em>(optional)</em>.</p>
</dd>
<dt><code class="java"><span class="name">finisher</span></code><span class="colon">:</span></dt>
<dd><p>Wird nach dem letzten Element aufgerufen; kann finale Elemente <em>downstream</em> senden <em>(optional)</em>.</p>
</dd>
</dl>
<ul class="incremental-list simple">

</ul>

<ld-topic id="ausgewahlte-standard-stream-gatherers">
<h2>Ausgewählte Standard Stream Gatherers</h2>
<ld-deck>
<ld-card>
<p class="rubric"><code class="java"><span class="name">Gatherers</span><span class="punctuation">.</span><span class="name attribute">scan</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">)</span></code></p>
<p>Der aktuelle Zustand wird basierend auf dem aktuellen Element aktualisiert. Der initiale Zustand kann explizit angegeben werden.</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1</small><code data-lineno="1"><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">numbers</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">4</span><span class="punctuation">);</span><span class="whitespace">
</span></code><small class="ln">2</small><code data-lineno="2"><span class="whitespace"></span><span class="name">List</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">resultList</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace">
</span></code><small class="ln">3</small><code data-lineno="3"><span class="whitespace">        </span><span class="name">numbers</span><span class="punctuation">.</span><span class="name attribute">gather</span><span class="punctuation">(</span><span class="name">Gatherers</span><span class="punctuation">.</span><span class="name attribute">scan</span><span class="punctuation">(()</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">Integer</span><span class="punctuation">::</span><span class="name">sum</span><span class="punctuation">)).</span><span class="name attribute">toList</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln">4</small><code data-lineno="4"><span class="whitespace"></span><span class="comment single">// resultList =&gt; List.of(1, 3, 6, 10)</span></code></pre>
</ld-card><ld-card class="incremental">
<p class="rubric"><code class="java"><span class="name">Gatherers</span><span class="punctuation">.</span><span class="name attribute">windowFixed</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">)</span></code></p>
<p>Der Stream wird in Blöcke fester Größe aufgeteilt und diese werden dann <em>downstream</em> weitergereicht.</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1</small><code data-lineno="1"><span class="name">Map</span><span class="operator">&lt;</span><span class="name">String</span><span class="punctuation">,</span><span class="name">String</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">nameToPoints</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace">
</span></code><small class="ln">2</small><code data-lineno="2"><span class="whitespace">    </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal string">&quot;A&quot;</span><span class="punctuation">,</span><span class="literal string">&quot;90+&quot;</span><span class="punctuation">,</span><span class="literal string">&quot;B&quot;</span><span class="punctuation">,</span><span class="literal string">&quot;80+&quot;</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln">3</small><code data-lineno="3"><span class="whitespace">        </span><span class="punctuation">.</span><span class="name attribute">gather</span><span class="punctuation">(</span><span class="name">Gatherers</span><span class="punctuation">.</span><span class="name attribute">windowFixed</span><span class="punctuation">(</span><span class="literal number integer">2</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln">4</small><code data-lineno="4"><span class="whitespace">        </span><span class="punctuation">.</span><span class="name attribute">collect</span><span class="punctuation">(</span><span class="name">Collectors</span><span class="punctuation">.</span><span class="name attribute">toMap</span><span class="punctuation">((</span><span class="name">l</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">l</span><span class="punctuation">.</span><span class="name attribute">get</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">),(</span><span class="name">l</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">l</span><span class="punctuation">.</span><span class="name attribute">get</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">)));</span><span class="whitespace">
</span></code><small class="ln">5</small><code data-lineno="5"><span class="whitespace"></span><span class="comment single">// nameToPoints =&gt; {A=90+, B=80+}</span></code></pre>

<p class="admonition-title">Bewertung</p>
<p>Obwohl es sich um einen spezialisierten <em>Custom Gatherer</em> handelt, der die Gruppierung nur intern durchführt und diese nicht explizit downstream verfügbar macht, ist es dennoch sehr gut vorstellbar, dass dieser wiederverwendet werden kann.</p>
</aside>

<div class="ld-exercise" data-exercise-id="4" data-exercise-title="4 - Fakultät mit BigInteger" id="ld-exercise-4">
<p class="ld-exercise-title rubric">Fakultät mit <code class="java"><span class="name">BigInteger</span></code></p>

<ld-topic id="effizienz-von-parallelisierung">
<h2>Effizienz von Parallelisierung</h2>
<blockquote class="epigraph">
<p>Als allgemeine Faustregel gilt, dass Geschwindigkeitssteigerungen in der Regel dann spürbar sind, wenn die Sammlung groß ist, typischerweise mehrere tausend Elemente umfasst.<a class="brackets" href="#footnote-2" id="footnote-reference-2" role="doc-noteref"><span class="fn-bracket">[</span>2<span class="fn-bracket">]</span></a></p>
<p class="attribution">—<a class="reference external" href="https://docs.scala-lang.org/overviews/parallel-collections/overview.html">Aleksandar Prokopec, Heather Miller - Parallel Collections</a></p>
</blockquote>

<ld-topic id="korrektheit-bei-parallelisierung">
<h2>Korrektheit bei Parallelisierung</h2>
<ld-deck>
<ld-card>
<aside class="admonition question">
<p class="admonition-title">Frage</p>
<p>Welches Ergebnis erwarten wir:</p>
<pre class="code java copy-to-clipboard literal-block"><code><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">(</span><span class="keyword">new</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="operator">[]</span><span class="punctuation">{</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">}).</span><span class="name attribute">reduce</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,(</span><span class="name">x</span><span class="punctuation">,</span><span class="name">y</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">y</span><span class="operator">*</span><span class="name">y</span><span class="punctuation">);</span><span class="whitespace">
                                         </span><span class="comment single">// x ist das aktuelle Zwischenergebnis und</span><span class="whitespace">
                                         </span><span class="comment single">// y ist der nächste Wert aus der Liste</span></code></pre>
</aside>
<aside class="admonition incremental answer">
<p class="admonition-title">Antwort</p>
<p>14</p>
</aside>
</ld-card><ld-card class="incremental">
<aside class="admonition question">
<p class="admonition-title">Frage</p>
<p>Welches Ergebnis erwarten wir:</p>
<pre class="code java copy-to-clipboard literal-block"><code><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">(</span><span class="keyword">new</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="operator">[]</span><span class="punctuation">{</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">}).</span><span class="name attribute">parallel</span><span class="punctuation">().</span><span class="name attribute">reduce</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,(</span><span class="name">x</span><span class="punctuation">,</span><span class="name">y</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">y</span><span class="operator">*</span><span class="name">y</span><span class="punctuation">);</span></code></pre>
</aside>
<aside class="admonition incremental answer">
<p class="admonition-title">Antwort</p>
<p>7226?<a class="brackets" href="#footnote-3" id="footnote-reference-3" role="doc-noteref"><span class="fn-bracket">[</span>3<span class="fn-bracket">]</span></a></p>
</aside>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-3" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-3">3</a><span class="fn-bracket">]</span></span>
<p>Das Ergebnis hängt von einigen Faktoren hab und kann variieren, ist aber wahrscheinlich nicht 14.</p>
</aside>
</aside>
</ld-card><ld-card class="incremental">
<p class="rubric">Ausgangscode</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1</small><code data-lineno="1"><span class="name">IntBinaryOperator</span><span class="whitespace"> </span><span class="name">f</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="name">x</span><span class="punctuation">,</span><span class="name">y</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">y</span><span class="operator">*</span><span class="name">y</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln">2</small><code data-lineno="2"><span class="whitespace"></span><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">(</span><span class="keyword">new</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="operator">[]</span><span class="punctuation">{</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">}).</span><span class="name attribute">parallel</span><span class="punctuation">().</span><span class="name attribute">reduce</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="name">f</span><span class="punctuation">);</span></code></pre>
<ld-deck>
<ld-card>
<p class="rubric">Erklärung</p>
<ol class="arabic simple incremental-list">
<li><p>Die Parallelisierung<a class="brackets" href="#footnote-4" id="footnote-reference-4" role="doc-noteref"><span class="fn-bracket">[</span>4<span class="fn-bracket">]</span></a> hat (hier) dazu geführt, dass die Liste in drei Teillisten aufgespalten wurde, um die Berechnung dafür zu parallelisieren. Danach für jeden Wert der Teillisten zuerst eine Reduktion mit dem Basiswert <code class="java"><span class="literal number integer">0</span></code> durchgeführt; d. h. es wurde erst: <code class="java"><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="literal number integer">1</span><span class="punctuation">)</span><span class="operator">=</span><span class="literal number integer">1</span></code>, <code class="java"><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">)</span><span class="operator">=</span><span class="literal number integer">4</span></code> und <code class="java"><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">)</span><span class="operator">=</span><span class="literal number integer">9</span></code> berechnet.</p></li>
<li><p>Danach wurden die Zwischenergebnisse verrechnet. D. h. es wurde (hier) <code class="java"><span class="name">f</span><span class="punctuation">(</span><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">),</span><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">))</span><span class="operator">=</span><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="literal number integer">9</span><span class="punctuation">)</span><span class="operator">=</span><span class="literal number integer">85</span></code> berechnet und dann das Zwischenergebnis mit dem Zwischenergebnis von <code class="java"><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="literal number integer">1</span><span class="punctuation">)</span></code> verrechnet: <code class="java"><span class="name">f</span><span class="punctuation">(</span><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="literal number integer">1</span><span class="punctuation">),</span><span class="name">f</span><span class="punctuation">(</span><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">),</span><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">)))</span><span class="operator">=</span><span class="name">f</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="literal number integer">85</span><span class="punctuation">)</span><span class="operator">=</span><span class="literal number integer">7226</span></code></p></li>
</ol>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-4" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-4">4</a><span class="fn-bracket">]</span></span>
<p>Im ersten Schritt wurde der Stream aufgeteilt, um die Berechnungen für jeden Teilstream parallel ausführen zu können.</p>
</aside>
</aside>
</ld-card><ld-card class="overlay center-content backdrop-blur incremental">
<aside class="admonition warning">
<p class="admonition-title">Warnung</p>
<p>Die übergebene reduktionsfunktion <span class="docutils literal">f</span> verletzt die von der Stream API gestellten Bedingungen (Assoziativität).</p>
</aside>
</ld-card><ld-card class="incremental">
<p><strong>1. Lösung</strong> <em>mit Mutable Reduction</em> (<code class="java"><span class="name">collect</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">)</span></code>)</p>
<pre class="code java copy-to-clipboard literal-block"><code><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">(</span><span class="keyword">new</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="operator">[]</span><span class="punctuation">{</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">})</span><span class="whitespace">
        </span><span class="punctuation">.</span><span class="name attribute">parallel</span><span class="punctuation">()</span><span class="whitespace">
        </span><span class="punctuation">.</span><span class="name attribute">collect</span><span class="punctuation">(</span><span class="whitespace">
                </span><span class="punctuation">()</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="keyword">new</span><span class="whitespace"> </span><span class="name">AtomicInteger</span><span class="punctuation">(),</span><span class="whitespace">
                </span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="name">y</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">.</span><span class="name attribute">addAndGet</span><span class="punctuation">(</span><span class="name">y</span><span class="operator">*</span><span class="name">y</span><span class="punctuation">),</span><span class="whitespace">
                </span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="name">v</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">.</span><span class="name attribute">addAndGet</span><span class="punctuation">(</span><span class="name">v</span><span class="punctuation">.</span><span class="name attribute">get</span><span class="punctuation">()));</span></code></pre>
</ld-card><ld-card class="incremental">
<p><strong>2. Lösung</strong> effizienter mit <code class="java"><span class="name">map</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">)</span></code> und Reduktion über <code class="java"><span class="name">sum</span><span class="punctuation">()</span></code></p>
<pre class="code java copy-to-clipboard literal-block"><code><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">(</span><span class="keyword">new</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="operator">[]</span><span class="punctuation">{</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">})</span><span class="whitespace">
        </span><span class="punctuation">.</span><span class="name attribute">parallel</span><span class="punctuation">()</span><span class="whitespace">
        </span><span class="punctuation">.</span><span class="name attribute">map</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">x</span><span class="punctuation">)</span><span class="whitespace">

<ld-topic class="exercises" id="ubung-streams-parallelisierung">
<h2>Übung - Streams - Parallelisierung</h2>
<div class="ld-exercise" data-exercise-id="5" data-exercise-title="5 - Java Streams" id="ld-exercise-5">
<p class="ld-exercise-title rubric">Java Streams</p>
<aside class="admonition remark">
<p class="admonition-title">Bemerkung</p>
<p>Verwenden Sie ausschließlich Streams und Lambda-Ausdrücke.</p>
</aside>
<p>Schreiben Sie eine Methode, die die Zahlen von <code class="java"><span class="literal number integer">1</span></code> bis <code class="java"><span class="name">Integer</span><span class="punctuation">.</span><span class="name attribute">MAX_VALUE</span></code> addiert. Nutzen Sie <code class="java"><span class="name">IntStream</span><span class="punctuation">.</span><span class="name attribute">range</span><span class="punctuation">()</span></code>, um die Zahlen zu iterieren. Messen Sie die Ausführungsdauer für die <em>sequentielle</em> und <em>parallele</em> Ausführung (siehe Anhang für eine entsprechende Methode zur Zeitmessung.)</p>
<ld-supplemental><p>Um die Ausführungsdauer Ihrer Methode zu messen, können Sie folgenden Methode verwenden:</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">time</span><span class="punctuation">(</span><span class="name">Runnable</span><span class="whitespace"> </span><span class="name">r</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace">    </span><span class="keyword declaration">final</span><span class="whitespace"> </span><span class="keyword declaration">var</span><span class="whitespace"> </span><span class="name">startTime</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">nanoTime</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace">    </span><span class="name">r</span><span class="punctuation">.</span><span class="name attribute">run</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace">    </span><span class="keyword declaration">final</span><span class="whitespace"> </span><span class="keyword declaration">var</span><span class="whitespace"> </span><span class="name">endTime</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">nanoTime</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln">5 </small><code data-lineno="5 "><span class="whitespace">    </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">out</span><span class="punctuation">.</span><span class="name attribute">println</span><span class="punctuation">(</span><span class="literal string">&quot;elapsed time: &quot;</span><span class="operator">+</span><span class="punctuation">(</span><span class="name">endTime</span><span class="whitespace"> </span><span class="operator">-</span><span class="whitespace"> </span><span class="name">startTime</span><span class="punctuation">));</span><span class="whitespace">
</span></code><small class="ln">6 </small><code data-lineno="6 "><span class="whitespace"></span><span class="punctuation">}</span></code></pre>

<ld-topic id="grundlegender-aufbau-und-bewertung">
<h2>Grundlegender Aufbau und Bewertung</h2>
<div class="accentuate compound">
<pre class="center-content literal-block">Stream pipeline = Spliterator + Gatherer? + Collector</pre>
</div>
<ul class="simple">
<li><p>(Java) Streams unterstützen die Verarbeitung von (Massen-)Daten durch die Anwendung von funktionalen und deklarativen Konzepten.</p></li>
<li><p>Dies ermöglicht eine Umsetzung von fachlichen Konzepten in Java Code mit einer geringeren Repräsentationslücke (<span class="eng">Low representational gap</span>).</p></li>
<li><p>Eine effiziente - weitgehend - transparente Parallelisierung ist möglich.</p></li>
</ul>
</ld-topic>

<dl class="field-list simple">
<dt>Syntaktisches Rauschen<span class="colon">:</span></dt>
<dd><p>Java erfordert <code class="java"><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">()</span></code> / <code class="java"><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">()</span></code> als Rahmen, Typnamen in Method References (<code class="java"><span class="name label">Student</span><span class="punctuation">::</span><span class="name">schnitt</span></code>) und Wrapper wie <span class="docutils literal">comparingDouble</span>. Scalas <span class="docutils literal">_</span>-Platzhalter und die direkte Arbeit auf Collections eliminieren diesen Overhead.</p>
</dd>
<dt>Gruppierung<span class="colon">:</span></dt>
<dd><p>In Scala ist <code class="scala"><span class="name">groupBy</span></code> eine normale Collection-Methode. Allerdings erzeugt <code class="scala"><span class="name">groupBy</span></code> eine Map, die anschließend über <code class="scala"><span class="punctuation">.</span><span class="name">values</span></code> wieder zu einem Iterable heruntergebrochen werden muss — ein milderer Bruch als Javas traditioneller <code class="java"><span class="name">collect</span><span class="punctuation">().</span><span class="name attribute">values</span><span class="punctuation">().</span><span class="name attribute">stream</span><span class="punctuation">()</span></code>-Ansatz über einen Collector, aber strukturell verwandt. Seit Java 24 kann die Gatherer-API verwendet werden, wodurch in Java dieser Bruch ganz vermieden werden kann.</p>
</dd>
<dt>Vergleich und Reduktion<span class="colon">:</span></dt>
<dd><p><code class="scala"><span class="name">_</span><span class="punctuation">.</span><span class="name">minBy</span><span class="punctuation">(</span><span class="name">_</span><span class="punctuation">.</span><span class="name">schnitt</span><span class="punctuation">)</span></code> in Scala vs. <code class="java"><span class="name">minBy</span><span class="punctuation">(</span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">schnitt</span><span class="punctuation">))</span></code> in Java — die explizite Typmaschinerie des Java-Typsystems ist hier deutlich sichtbar.</p>
</dd>
<dt>Lazy vs. Eager<span class="colon">:</span></dt>
<dd><p>Scalas Code wird sofort ausgewertet — <code class="scala"><span class="name">groupBy</span></code> erzeugt <em>sofort</em> eine <code class="scala"><span class="name class">Map</span></code>. Javas Pipeline hingegen ist vollständig lazy; erst <code class="java"><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">()</span></code> löst die Berechnung aus. Für große Datenmengen kann das ein relevanter Unterschied sein.</p>
</dd>
</dl>

<ld-topic id="java-streams-vs-scala-collections-konzeptioneller-vergleich">
<h2>Java Streams vs. Scala Collections — Konzeptioneller Vergleich</h2>
<table class="dhbw incremental-table-rows sticky-header">
<colgroup>
<col style="width: 23.1%" />
<col style="width: 38.5%" />
<col style="width: 38.5%" />
</colgroup>
<thead>
<tr><th class="head stub"></th>
<th class="head"><p>Java Streams</p></th>
<th class="head"><p>Scala Collections</p></th>
</tr>
</thead>
<tbody>
<tr><th class="stub"><p>Pipeline-Modell</p></th>
<td><p>deklarativ, verkettet</p></td>
<td><p>deklarativ, verkettet</p></td>
</tr>
<tr><th class="stub"><p>Funktionen als Parameter</p></th>
<td><p>Lambdas, Method References</p></td>
<td><p>Funktionsliterale, Platzhalter <span class="docutils literal">_</span></p></td>
</tr>
<tr><th class="stub"><p>Quelle unverändert</p></th>
<td><p>Ja</p></td>
<td><p>Ja</p></td>
</tr>
<tr><th class="stub"><p>Streams = Collections?</p></th>
<td><p>Nein — separates Konzept, explizites <code class="java"><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">()</span></code>/<code class="java"><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">()</span></code></p></td>
<td><p>Ja — Operationen direkt auf Collections</p></td>
</tr>
<tr><th class="stub"><p>Auswertung</p></th>
<td><p>Lazy (erst bei Terminal Op)</p></td>
<td><p>Eager (sofort); <code class="scala"><span class="name class">LazyList</span></code> als Opt-in</p></td>
</tr>
<tr><th class="stub"><p>Erweiterbarkeit</p></th>
<td><p>via Collectors und Gatherers</p></td>
<td><p>umfangreiche Standardbibliothek; ggf. <em>Extension Methods</em> (Scala 3)</p></td>
</tr>
<tr><th class="stub"><p>Parallelisierung</p></th>
<td><p>Tief integriert (<code class="java"><span class="punctuation">.</span><span class="name attribute">parallelStream</span><span class="punctuation">()</span></code>)</p></td>
<td><p>Separate Bibliothek (<code class="scala"><span class="punctuation">.</span><span class="name">par</span></code>) seit Scala 2.13/3</p></td>
</tr>
</tbody>
</table>
<ld-supplemental><p>Scala verfolgt einen anderen Designansatz: Collections <em>sind</em> die Pipeline. Es gibt keine Trennung zwischen Datenstruktur und Transformations-API. Das macht den Einstieg einfacher und den Code kürzer, bedeutet aber auch, dass <em>Laziness</em> explizit gewählt werden muss (<code class="scala"><span class="name">to</span><span class="punctuation">(</span><span class="name class">LazyList</span><span class="punctuation">)</span></code>).</p>
<p>Für Scala gibt es auch noch weitere 3rd Party Stream APIs wie <a class="reference external" href="https://doc.akka.io/docs/akka/current/stream/index.html">Akka Streams</a> oder <a class="reference external" href="https://fs2.io/">fs2</a>, die verschiedene Trade-offs zwischen Einfachheit, Leistungsfähigkeit und Funktionalität bieten. Hier haben wir jedoch „nur“ solche APIs betrachtet, die direkt in der Standardbibliothek enthalten sind.</p>
<p>Javas Trennung in eine Collection API und eine Stream API führt zu syntaktisch komplexerem Code (<span class="eng">verbose</span>), ermöglicht dafür aber <em>Lazy Evaluation</em> als Standard und eine tief integrierte Parallelisierung.</p>
</ld-supplemental></ld-topic>

<p class="admonition-title">Bewertung</p>
<dl class="field-list simple">
<dt><em>Pipeline-Bruch</em> durch <code class="js javascript"><span class="name builtin">Object</span><span class="punctuation">.</span><span class="name other">groupBy</span></code><span class="colon">:</span></dt>
<dd><p>Die Gruppierung ist in JavaScript eine statische Funktion, keine Methode auf Arrays. Der Datenfluss muss <em>um</em> das Array herumgeschrieben werden statt linear verkettet zu bleiben. In Java vor Gatherers bestand dasselbe Problem; seit Java 24 ist die Pipeline durchgängig.</p>
</dd>
<dt>JavaScript hat kein <span class="docutils literal">minBy</span><span class="colon">:</span></dt>
<dd><p>Die Vergleichslogik muss manuell im Reducer formuliert werden (<code class="js javascript"><span class="name other">a</span><span class="punctuation">.</span><span class="name other">schnitt</span><span class="whitespace"> </span><span class="operator">&lt;</span><span class="whitespace"> </span><span class="name other">b</span><span class="punctuation">.</span><span class="name other">schnitt</span><span class="whitespace"> </span><span class="operator">?</span><span class="whitespace"> </span><span class="name other">a</span><span class="whitespace"> </span><span class="operator">:</span><span class="whitespace"> </span><span class="name other">b</span></code>). Das ist weniger deklarativ als Javas <code class="java"><span class="name">minBy</span><span class="punctuation">(</span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">))</span></code>.</p>
</dd>
<dt>Arrow Functions vs. Method References<span class="colon">:</span></dt>
<dd><p><code class="js javascript"><span class="name other">s</span><span class="whitespace"> </span><span class="punctuation">=&gt;</span><span class="whitespace"> </span><span class="operator">!</span><span class="name other">s</span><span class="punctuation">.</span><span class="name other">hatStipendium</span></code> vs. <code class="java"><span class="name">not</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">hatStipendium</span><span class="punctuation">)</span></code> — JavaScript kürzer, aber ohne Typsicherheit.</p>
</dd>
<dt>Eager Evaluation<span class="colon">:</span></dt>
<dd><p>Jede JavaScript-Operation erzeugt ein vollständiges Zwischenarray. <code class="js javascript"><span class="name other">filter</span></code> kopiert alle passenden Elemente in ein neues Array, bevor <code class="js javascript"><span class="name builtin">Object</span><span class="punctuation">.</span><span class="name other">groupBy</span></code> überhaupt beginnt. Javas Pipeline verarbeitet jedes Element einmal durch alle Stufen — ohne Zwischenspeicherung.</p>
</dd>
</dl>
</aside>

<table class="dhbw sticky-header incremental-table-rows">
<colgroup>
<col style="width: 23.1%" />
<col style="width: 38.5%" />
<col style="width: 38.5%" />
</colgroup>
<thead>
<tr><th class="head stub"></th>
<th class="head"><p>Java Streams</p></th>
<th class="head"><p>JavaScript Arrays</p></th>
</tr>
</thead>
<tbody>
<tr><th class="stub"><p>Pipeline-Modell</p></th>
<td><p>deklarativ, verkettet</p></td>
<td><p>deklarativ, verkettet</p></td>
</tr>
<tr><th class="stub"><p>Funktionen als Parameter</p></th>
<td><p>Lambdas, Method References</p></td>
<td><p>Arrow Functions</p></td>
</tr>
<tr><th class="stub"><p>Quelle unverändert</p></th>
<td><p>Ja</p></td>
<td><p>Ja (Achtung: <code class="js javascript"><span class="name other">sort</span><span class="punctuation">()</span></code> mutiert!)</p></td>
</tr>
<tr><th class="stub"><p>Streams = Collections?</p></th>
<td><p>Nein — separates Konzept</p></td>
<td><p>Ja — Operationen direkt auf <code class="js javascript"><span class="name builtin">Array</span></code></p></td>
</tr>
<tr><th class="stub"><p>Auswertung</p></th>
<td><p>Lazy (erst bei Terminal Op)</p></td>
<td><p>Eager (Zwischenarrays bei jedem Schritt)</p></td>
</tr>
<tr><th class="stub"><p>Erweiterbarkeit</p></th>
<td><p>via Collectors und Gatherers</p></td>
<td><p><em>„Keine“</em><a class="brackets" href="#footnote-5" id="footnote-reference-5" role="doc-noteref"><span class="fn-bracket">[</span>5<span class="fn-bracket">]</span></a> — fester API-Satz</p></td>
</tr>
<tr><th class="stub"><p>Parallelisierung</p></th>
<td><p>integriert (<code class="java"><span class="punctuation">.</span><span class="name attribute">parallelStream</span><span class="punctuation">()</span></code>)</p></td>
<td><p>Nein -  Single-threaded</p></td>
</tr>
<tr><th class="stub"><p>Unendliche Sequenzen</p></th>
<td><p>Ja (z. B. <code class="java"><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">iterate</span></code>)</p></td>
<td><p>Nein - Generatoren nicht in Array-API integriert</p></td>
</tr>
<tr><th class="stub"><p>Typsicherheit</p></th>
<td><p>Compile-time</p></td>
<td><p>Keine — Fehler erst zur Laufzeit</p></td>

</ld-story><ld-supplemental><p>JavaScripts Array-Methoden wie <code class="js javascript"><span class="name other">filter</span></code>, <code class="js javascript"><span class="name other">map</span></code> und <code class="js javascript"><span class="name other">reduce</span></code> sind dem Stream-Modell oberflächlich sehr ähnlich. Der entscheidende Unterschied liegt in der Auswertungsstrategie: jede Array-Operation erzeugt sofort ein vollständiges Zwischenarray. Bei <code class="js javascript"><span class="name other">array</span><span class="punctuation">.</span><span class="name other">filter</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">).</span><span class="name other">map</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">)</span></code> werden während der Auswertung <em>zwei</em> neue Arrays erzeugt. Javas Lazy-Pipeline <em>fusioniert</em> die Schritte und erzeugt keine Zwischenergebnisse.</p>
<p>Ein weiterer fundamentaler Unterschied: <code class="js javascript"><span class="name builtin">Array</span><span class="punctuation">.</span><span class="name other">prototype</span><span class="punctuation">.</span><span class="name other">sort</span><span class="punctuation">()</span></code> mutiert das Array in-place — ein Bruch mit dem ansonsten funktionalen Charakter der Array-API. Erst seit ES2023 gibt es mit <code class="js javascript"><span class="name other">toSorted</span><span class="punctuation">()</span></code> eine nicht-mutierende Alternative.</p>
</ld-supplemental><aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-5" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-5">5</a><span class="fn-bracket">]</span></span>
<p>Eine Erweiterung über <code class="js javascript"><span class="name builtin">Array</span><span class="punctuation">.</span><span class="name other">prototyp</span></code> ist möglich aber nicht empfehlenswert.</p>
</aside>
</aside>

</ld-supplemental></ld-cell></ld-grid><ld-supplemental embed-in-document-flow><aside class="admonition dd-margin-left-3em assessment">
<p class="admonition-title">Bewertung</p>
<dl class="field-list simple">
<dt>Zero-Costs<span class="colon">:</span></dt>
<dd><p>Rusts Pipeline kompiliert zu praktisch dem selben Maschinencode wie eine handgeschriebene <code class="rust"><span class="keyword">for</span></code>-Schleife — keine Heap-Allokationen, keine virtuellen Dispatches. Javas Pipeline erzeugt Overhead, der vom JIT-Compiler erst zur Laufzeit <em>teilweise</em> optimiert wird.</p>
</dd>
<dt>Expliziter Float-Vergleich<span class="colon">:</span></dt>
<dd><p>Rust erzwingt <code class="rust"><span class="name">total_cmp</span></code> statt eines einfachen <code class="rust"><span class="operator">&lt;</span></code>-Vergleichs, weil Gleitkommazahlen <code class="rust"><span class="name">NaN</span></code> enthalten können. Java's <code class="java"><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="error">…</span><span class="punctuation">)</span></code> behandelt <code class="java"><span class="name">NaN</span></code> stillschweigend; ein potenziell versteckter Bug.</p>
</dd>
<dt>Ownership vs. Runtime-Schutz<span class="colon">:</span></dt>
<dd><p><code class="rust"><span class="name">into_iter</span><span class="punctuation">()</span></code> in Rust <em>konsumiert</em> die Gruppe — ein erneuter Zugriff ist ein Compile-Fehler. Javas Stream wirft erst zur Laufzeit eine <code class="java"><span class="name">IllegalStateException</span></code> bei Mehrfachnutzung.</p>
</dd>
<dt>Erweiterbarkeit<span class="colon">:</span></dt>
<dd><p>Rust benötigt kein Gatherer-Konzept. Einen neuen Iterator zu bauen erfordert nur die Implementierung von <code class="rust"><span class="name">next</span><span class="punctuation">()</span></code> — alle ~75 Adapter-Methoden (<code class="rust"><span class="name">filter</span></code>, <code class="rust"><span class="name">map</span></code>, <code class="rust"><span class="name">take_while</span></code>, …) stehen dann automatisch zur Verfügung. Das <span class="docutils literal">itertools</span>-Crate erweitert dies nahtlos über Rusts Trait-System.</p>
</dd>
<dt>Parallelisierung<span class="colon">:</span></dt>
<dd><p>In Java genügt <code class="java"><span class="punctuation">.</span><span class="name attribute">parallelStream</span><span class="punctuation">()</span></code>; in Rust ersetzt man <code class="rust"><span class="name">iter</span><span class="punctuation">()</span></code> durch <code class="rust"><span class="name">par_iter</span><span class="punctuation">()</span></code> (via <span class="docutils literal">rayon</span>-Crate). Der entscheidende Unterschied: Rusts Ownership-System garantiert <em>zur Compile-Zeit</em>, dass keine Data Races entstehen. Javas Fork/Join-Pool kann das nicht. Aber der beobachtete Fehler im Java Beispiel - wenn eine Operation den Kontrakt nicht einhält - könnte so auch in Rust auftreten, da dies auf einen logischen Fehler zurückzuführen war und nicht auf eine Race Condition.</p>
</dd>
</dl>
</aside>

<ld-topic id="java-streams-vs-rust-iteratoren-konzeptioneller-vergleich">
<h2>Java Streams vs. Rust Iteratoren — Konzeptioneller Vergleich</h2>
<ld-story>
<table class="dhbw sticky-header incremental-table-rows">
<colgroup>
<col style="width: 23.1%" />
<col style="width: 38.5%" />
<col style="width: 38.5%" />
</colgroup>
<thead>
<tr><th class="head stub"></th>
<th class="head"><p>Java Streams</p></th>
<th class="head"><p>Rust Iteratoren</p></th>
</tr>
</thead>
<tbody>
<tr><th class="stub"><p>Pipeline-Modell</p></th>
<td><p>deklarativ, verkettet</p></td>
<td><p>deklarativ, verkettet</p></td>
</tr>
<tr><th class="stub"><p>Funktionen als Parameter</p></th>
<td><p>Lambdas, Method References</p></td>
<td><p>Closures (<span class="docutils literal">|x| …</span>)</p></td>
</tr>
<tr><th class="stub"><p>Quelle unverändert</p></th>
<td><p>Ja</p></td>
<td><p>Ja</p></td>
</tr>
<tr><th class="stub"><p>Verhalten bei Stream Mehrfachnutzung</p></th>
<td><p><code class="java"><span class="name">IllegalStateException</span></code> zur Laufzeit</p></td>
<td><p>Compile-Fehler bei Mehrfachnutzung (Ownership)</p></td>
</tr>
<tr><th class="stub"><p>Streams = Collections?</p></th>
<td><p>Nein — separates Konzept</p></td>
<td><p>Nein — <span class="docutils literal">iter()</span> erzeugt Iterator über Collection</p></td>
</tr>
<tr><th class="stub"><p>Auswertung</p></th>
<td><p>Lazy (erst bei Terminal Op)</p></td>
<td><p>Lazy (erst bei <span class="docutils literal">collect</span>, <span class="docutils literal">sum</span>, <span class="docutils literal">for_each</span>, …)</p></td>
</tr>
<tr><th class="stub"><p>Performance-Overhead</p></th>
<td><p>JVM + GC + JIT (zur Laufzeit)</p></td>
<td><p>Null — Zero-Cost Abstractions (zur Compile-Zeit)</p></td>
</tr>
<tr><th class="stub"><p>Erweiterbarkeit</p></th>
<td><p>Collectors und Gatherers</p></td>
<td><p>Nur <span class="docutils literal">next()</span> implementieren — ~75 Methoden gratis</p></td>
</tr>
<tr><th class="stub"><p>Parallelisierung</p></th>
<td><p>Tief integriert (<span class="docutils literal">.parallelStream()</span>)</p></td>
<td><p>Über <span class="docutils literal">rayon</span>-Crate (<span class="docutils literal">.par_iter()</span>)</p></td>
</tr>
<tr><th class="stub"><p>Fehlerbehandlung</p></th>
<td><p><span class="docutils literal">Optional</span> (umgehbar via <span class="docutils literal">get()</span>)</p></td>
<td><p><span class="docutils literal">Option</span> / <span class="docutils literal">Result</span> (vom Compiler erzwungen)</p></td>
</tr>
<tr><th class="stub"><p>Typsicherheit</p></th>
<td><p>Compile-time (Generics mit Type Erasure)</p></td>
<td><p>Compile-time (Generics, Monomorphisierung)</p></td>
</tr>
</tbody>
</table>
</ld-story><ld-supplemental><p>Rusts Iterator-Modell ist Javas Streams oberflächlich sehr ähnlich: beide sind lazy, beide unterscheiden zwischen Intermediate- und Terminal-Operationen, beide unterstützen <span class="docutils literal">filter</span>, <span class="docutils literal">map</span>, <span class="docutils literal">flat_map</span>, <span class="docutils literal">collect</span> etc. Der fundamentale Unterschied liegt tiefer:</p>
<dl class="field-list simple">
<dt>Zero-Cost Abstractions<span class="colon">:</span></dt>
<dd><p>Rusts Compiler (via LLVM) optimiert Iterator-Pipelines zu exakt demselben Maschinencode wie handgeschriebene <span class="docutils literal">for</span>-Schleifen — keine Zwischenstrukturen, keine Heap-Allokationen, keine virtuellen Methodenaufrufe. In Java erzeugt die Stream-Pipeline dagegen Overhead durch Objekt-Allokationen, virtuelle Dispatches und GC-Zyklen, der erst durch den JIT-Compiler <em>teilweise</em> kompensiert wird.</p>
</dd>
<dt>Ownership<span class="colon">:</span></dt>
<dd><p>Javas Schutz gegen Mehrfachnutzung eines Streams greift erst zur Laufzeit (<span class="docutils literal">IllegalStateException</span>). Rusts Ownership-System verhindert denselben Fehler bereits zur Compile-Zeit — der Code kompiliert schlicht nicht.</p>
</dd>
<dt>Parallelisierung<span class="colon">:</span></dt>
<dd><p>Java bietet mit <span class="docutils literal">.parallelStream()</span> / <span class="docutils literal">.parallel()</span> eine in die Standardbibliothek integrierte Lösung. Rust lagert dies in das <span class="docutils literal">rayon</span>-Crate aus — dort genügt es, <span class="docutils literal">iter()</span> durch <span class="docutils literal">par_iter()</span> zu ersetzen. Beide Ansätze sind ergonomisch ähnlich, aber Rusts Ownership-System garantiert zur Compile-Zeit, dass keine Data Races entstehen können. Javas Fork/Join-Pool bietet diese Garantie nicht.</p>
</dd>
</dl>
</ld-supplemental></ld-topic>
