<ld-topic class="exercises" id="lambda-ausdrucke">
<h2>Lambda-Ausdrücke</h2>
<div class="ld-exercise" data-exercise-id="7" data-exercise-title="7 - Typkompatibilität von Lambda-Ausdrücken" id="ld-exercise-7">
<p class="ld-exercise-title rubric">Typkompatibilität von Lambda-Ausdrücken</p>
<p>Die Methode <code class="java"><span class="name">forEach</span></code> hat die folgende Signatur:</p>
<pre class="code java copy-to-clipboard literal-block"><code><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">forEach</span><span class="punctuation">(</span><span class="name">Consumer</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">super</span><span class="whitespace"> </span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">action</span><span class="punctuation">);</span></code></pre>
<p>Weiterhin sei gegeben:</p>
