<!doctype html>

<html lang="en">
    <head>
        <style>
            @layer fine, components; /* This defines the order of the cascade; later have higher priority. */

            @layer components {
                p {
                    color: red; /* the highest-priority layer */
                }
            }

            @layer fine {
                p {
                    color: blue; /* Higher priority than the sublayer. */
                }

                @layer finer-first {
                    p {
                        color: green; /* the lowest/least important layer */
                    }
                }

                @layer finer-second {
                    p {
                        color: yellow; /* overwrites finer-first */
                    }
                }
            }
        </style>
    </head>

    <body>
        <p>This is a paragraph</p>
    </body>
</html>
