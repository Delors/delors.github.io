<ld-topic id="offenlegung-von-sicherheitslucken-nach-cisa">
<h2>Offenlegung von Sicherheitslücken nach <a class="reference external" href="https://www.cisa.gov/coordinated-vulnerability-disclosure-process">CISA</a> <a class="brackets" href="#footnote-8" id="footnote-reference-8" role="doc-noteref"><span class="fn-bracket">[</span>8<span class="fn-bracket">]</span></a></h2>
<p><span class="eng">Coordinated Vulnerability Disclosure (CVD)</span></p>
<ol class="arabic simple incremental-list">
<li><p>Sammlung von Schwachstellenmeldungen</p></li>
<li><p>Analyse der Schwachstellenmeldungen zusammen mit den Herstellern, um die Sicherheitsauswirkungen zu verstehen.</p></li>
<li><p>Entwicklung von Strategien zur Eindämmung der Schwachstellen; insbesondere Entwicklung von notwendigen Patches.</p></li>
<li><p>Anwendung der Strategien zur Eindämmung der Schwachstellen in Zusammenarbeit mit dem Hersteller und ggf. betroffenen Nutzern.</p></li>
<li><p>Veröffentlichung der Schwachstellenmeldung in Abstimmung mit der Quelle des Schwachstellenberichts und dem Hersteller.</p></li>
</ol>
<ld-supplemental><p><strong>CISA</strong> (America's Cybersecurity and Infrastructure Security Agency/Cyber Defense Agency).</p>
<p class="rubric">Quellen für Schwachstellen</p>
<ul class="simple">
<li><p>Eigene Schwachstellenanalysen</p></li>
<li><p>Überwachung öffentlicher Quellen</p></li>
<li><p>Direkte Meldungen von Herstellern, Forschern und Nutzern</p></li>
</ul>
</ld-supplemental><aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-8" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-8">8</a><span class="fn-bracket">]</span></span>
<p>Das BSI verfährt ähnlich; <a class="reference external" href="https://www.heise.de/news/Trojaner-Wie-die-Ampel-beim-Schwachstellenmanagement-die-Kurve-kriegen-will-9670572.html">tut sich aber sehr schwer</a>.</p>
</aside>
</aside>
</ld-topic>
<ld-topic id="zeitlicher-rahmen-fur-die-offenlegung-von-sicherheitslucken">
<h2>Zeitlicher Rahmen für die Offenlegung von Sicherheitslücken</h2>
<p>Der Zeitrahmen für die Offenlegung von Sicherheitslücken wird durch folgende Faktoren bestimmt:</p>
<ul class="incremental-list simple">
<li><p>Aktive Ausnutzung der Schwachstelle</p></li>
<li><p>besonders kritische Schwachstellen</p></li>
<li><p>Auswirkungen auf Standards</p></li>
<li><p>bereits öffentlich bekannt (zum Beispiel durch einen „naïven“` Forscher)</p></li>
<li><p>Auswirkungen auf die kritische Infrastruktur, öffentliche Gesundheit und Sicherheit</p></li>
<li><p>die Verfügbarkeit von effektiven Eindämmungsmaßnahmen</p></li>
<li><p>das Verhalten des Herstellers und die Möglichkeit der Entwicklung eines Patches</p></li>
<li><p>Schätzung des Herstellers wie lange es dauert einen Patch zu entwickeln, zu testen und auszurollen.</p></li>
</ul>
</ld-topic>
<ld-topic id="welche-neuen-schwachstellen-werden-in-absehbarer-zeit-ausgenutzt">
<h2>Welche neuen Schwachstellen werden in absehbarer Zeit ausgenutzt?</h2>
<aside class="admonition" data-theme="observation"><p class="admonition-title" data-theme="observation-header"><span>Beobachtung</span></p><p>Am 1. Oktober 2023 hat die NVD 139.473 CVEs veröffentlicht. In den folgenden 30 Tagen wurden 3.852 CVEs beobachtet, die ausgenutzt (<span class="eng">exploited</span>) wurden.</p>
<p>Ca. 5-6% aller Schwachstellen werden „irgendwann“ ausgenutzt. <a class="brackets" href="#footnote-9" id="footnote-reference-9" role="doc-noteref"><span class="fn-bracket">[</span>9<span class="fn-bracket">]</span></a></p>
</aside><aside class="admonition incremental" data-theme="question"><p class="admonition-title" data-theme="question-header"><span>Frage</span></p><p>Wie stelle ich sicher, dass ich meine Bemühungen zum Beseitigen der Schwachstellen auf diejenigen konzentriere, die am wahrscheinlichsten zeitnahe ausgenutzt werden?</p>
</aside><aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-9" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-9">9</a><span class="fn-bracket">]</span></span>
<p>Fortinet, <a class="reference external" href="https://www.fortinet.com/content/dam/fortinet/assets/threat-reports/q2-2018-threat-landscape-report.pdf">Threat Landscape Report Q2 2018</a></p>
</aside>
</aside>
</ld-topic>
<ld-topic id="nutzung-des-cvss-als-grundlage-fur-die-schatzung">
<h2>Nutzung des CVSS als Grundlage für die Schätzung?</h2>
<p>Annahme: Schwachstellen mit einem CVSS Score ≤ 7 (d. h. mit einer Bewertung von Hoch oder kritisch) werden ausgenutzt.</p>
<ul class="incremental-list">
<li><p>80.024 Schwachstellen haben einen CVSS Score ≤ 7</p>
<p><strong>Ausgenutzt wurden: 3.166</strong></p>
</li>
<li><p>59.449 Schwachstellen haben eine CVSS &lt;` 7</p>
<p><strong>Ausgenutzt wurden: 686</strong></p>
</li>
</ul>
<aside class="admonition incremental" data-theme="summary"><p class="admonition-title" data-theme="summary-header"><span>Zusammenfassung</span></p><p>Die Strategie „Priorisierung von Schwachstellen mit einem bestimmten CVSS Score“ (hier ≤ 7) ist keine geeignete Strategie, da sie nicht alle relevanten  Schwachstellen erfasst (686 <em>False Negatives</em>) und - ganz insbesondere - zu viele Schwachstellen (76.858 <em>False Positives</em>) erfasst, die nicht ausgenutzt werden.</p>
</aside></ld-topic>
<ld-topic id="exploit-prediction-scoring-system-epss">
<h2><a class="reference external" href="https://www.first.org/epss/">Exploit Prediction Scoring System (EPSS)</a></h2>
<ul class="incremental simple">
<li><p>EPSS ist eine Methode zur <em>Bewertung der Wahrscheinlichkeit</em>, dass eine Schwachstelle in den nächsten 30 Tagen ausgenutzt wird.</p></li>
<li><p>EPSS basiert auf der Analyse von Schwachstellen, die in den letzten 12 Monaten ausgenutzt wurden.</p></li>
<li><p>EPSS nutzt KI basierend auf folgenden Informationen (Stand Jan. 2024):</p>
<ul class="incremental-list">
<li><p>Hersteller</p></li>
<li><p>Alter der Schwachstelle (Tage seit der Veröffentlichung des CVEs)</p></li>
<li><p>die Beschreibung der Schwachstelle</p></li>
<li><p>betroffene CWEs</p></li>
<li><p>CVSS Bewertungen der Schwachstellen</p></li>
<li><p>Wird der CVE auf bekannten Listen diskutiert bzw. aufgelistet?</p></li>
<li><p>Gibt es öffentliche verfügbare Exploits?</p></li>
</ul>
</li>
</ul>
</ld-topic>
<ld-topic id="nutzung-des-epss-fur-die-schatzung">
<h2>Nutzung des EPSS für die Schätzung? <a class="brackets" href="#footnote-10" id="footnote-reference-10" role="doc-noteref"><span class="fn-bracket">[</span>10<span class="fn-bracket">]</span></a></h2>
<p>Annahme: Schwachstellen mit EPSS 10% und größer sind werden ausgenutzt werden.</p>
<ul class="incremental-list">
<li><p>3.735 Schwachstellen haben ein Wahrscheinlichkeit von EPSS 10% und größer</p>
<p><strong>Ausgenutzt wurden: 2.435</strong></p>
</li>
<li><p>135.738 Schwachstellen haben ein EPSS &lt; 10%</p>
<p><strong>Ausgenutzt wurden: 1.417</strong></p>
</li>
</ul>
<aside class="admonition incremental" data-theme="summary"><p class="admonition-title" data-theme="summary-header"><span>Zusammenfassung</span></p><p>Die Strategie „Priorisierung von Schwachstellen mit einem EPSS von 10% und höher“ ist eine geeignete<em>re</em> Strategie, da sehr viele relevante Schwachstellen erfasst werden und - ganz insbesondere - die Anzahl der zu beachtenden Schwachstellen ganz massiv reduziert wird ohne die Gesamtqualität <em>zu stark</em> zu beeinflussen.</p>
</aside><aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-10" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-10">10</a><span class="fn-bracket">]</span></span>
<p><a class="reference external" href="https://arxiv.org/abs/2302.14172">Enhancing Vulnerability Prioritization: Data-Driven Exploit Predictions with Community-Driven Insights</a></p>
</aside>
</aside>
</ld-topic>
<ld-topic class="new-subsection transition-fade" id="schwachstellenmanagement">
<h2>Schwachstellenmanagement</h2>
</ld-topic>
<ld-topic id="vulnerabilities-equities-process-vep-usa">
<h2><a class="reference external" href="https://trumpwhitehouse.archives.gov/sites/whitehouse.gov/files/images/External%20-%20Unclassified%20VEP%20Charter%20FINAL.PDF">Vulnerabilities Equities Process (VEP) (USA)</a> <a class="brackets" href="#footnote-11" id="footnote-reference-11" role="doc-noteref"><span class="fn-bracket">[</span>11<span class="fn-bracket">]</span></a></h2>
<blockquote class="epigraph">
<p>[...] Der <em>Vulnerability-Equity-Process (VEP)</em> wägt ab, ob Informationen über Schwachstellen an den Hersteller/Lieferanten weitergegeben werden sollen, in der Erwartung, dass sie gepatcht werden, oder ob die Kenntnis der Schwachstelle vorübergehend auf die US-Regierung und möglicherweise andere Partner beschränkt werden soll, damit sie für Zwecke der nationalen Sicherheit und der Strafverfolgung, wie z. B. nachrichtendienstliche Erfassung, militärische Operationen und/oder Spionageabwehr, genutzt werden können. [...]</p>
<p class="attribution">—Übersetzung: DeepL</p>
</blockquote>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-11" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-11">11</a><span class="fn-bracket">]</span></span>
<p>Die rechtlichen Rahmenbedingungen bzgl. eines effektiven Schwachstellenmanagement sind in Deutschland gerade in der Diskussion. (Stand Jul. 2024); Schwachstellen, die direkt an das BSI gemeldet werden, unterliegen dem vorher diskutierten CVD.</p>
</aside>
</aside>
<ld-supplemental><p>Insbesondere durch die föderale Struktur in Deutschland kann es ggf. dazu kommen, dass bezüglich der Handhabung von Schwachstellen unterschiedliche rechtliche Regelungen gelten werden - je nachdem ob die Behörde eine Bundes- oder Landesbehörde ist.</p>
</ld-supplemental></ld-topic>
<ld-topic id="vulnerabilities-equities-process-vep-usa-1">
<h2><a class="reference external" href="https://trumpwhitehouse.archives.gov/sites/whitehouse.gov/files/images/External%20-%20Unclassified%20VEP%20Charter%20FINAL.PDF">Vulnerabilities Equities Process (VEP) (USA)</a></h2>
<blockquote class="epigraph">
<p>[...] Die Entscheidung der US-Regierung, ob eine Schwachstelle veröffentlicht oder eingeschränkt werden soll, ist nur ein Element des Prozesses zur Bewertung der Schwachstellen und ist nicht immer eine binäre Entscheidung. Andere Optionen, die in Betracht gezogen werden können, sind die Verbreitung von Informationen zur Schadensbegrenzung an bestimmte Stellen, ohne die jeweilige Schwachstelle offenzulegen, die Einschränkung der Nutzung der Schwachstelle durch die US-Regierung in irgendeiner Weise, die Information von Regierungsstellen der USA und verbündeter Staaten über die Schwachstelle [...].</p>
<p class="attribution">—Übersetzung: DeepL</p>
</blockquote>
</ld-topic>
<ld-topic id="vulnerabilities-equities-process-vep-usa-2">
<h2><a class="reference external" href="https://trumpwhitehouse.archives.gov/sites/whitehouse.gov/files/images/External%20-%20Unclassified%20VEP%20Charter%20FINAL.PDF">Vulnerabilities Equities Process (VEP) (USA)</a></h2>
<blockquote class="epigraph">
<p>[...] Alle diese Entscheidungen müssen auf der Grundlage des Verständnisses der Risiken einer Verbreitung, des potenziellen Nutzens von Schwachstellen durch die Regierung sowie der Risiken und Vorteile aller dazwischen liegenden Optionen getroffen werden. [...]</p>
<p class="attribution">—Übersetzung: DeepL</p>
</blockquote>
</ld-topic>
<ld-topic class="new-section transition-scale" id="verschlusselung">
<h2>Verschlüsselung</h2>
</ld-topic>
<ld-topic id="zentrale-begriffe">
<h2>Zentrale Begriffe</h2>
<ld-story>
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Klartext (<span class="eng">Plaintext</span>)</span></p><p>Die Originalnachricht, die verschlüsselt werden soll.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Geheimtext oder Chiffretext (<span class="eng">Ciphertext</span>)</span></p><p>Die kodierte/verschlüsselte Nachricht.</p>
<p><span class="peripheral">(Im Deutschen gelegentlich auch Kryptogramm genannt.)</span></p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Verschlüsselung (<span class="eng">Encryption</span>)</span></p><p>Der Prozess der Umwandlung von Klartext in Geheimtext.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Entschlüsselung (<span class="eng">Decryption</span>)</span></p><p>Der Prozess der Wiederherstellung des Klartextes aus dem Geheimtext.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Kryptographie (<span class="eng">Cryptography</span>)</span></p><p>Das Studiengebiet der Verschlüsselungsschemata.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Kryptoanalyse (<span class="eng">Cryptanalysis</span>)</span></p><p>Methoden und Techniken, die zur Gewinnung von Informationen aus einer verschlüsselten Nachricht dienen.</p>
<p>Analyse von kryptographischen Verfahren.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Kryptologie (<span class="eng">Cryptology</span>)</span></p><p>Die Bereiche Kryptographie und Kryptoanalyse.</p>
</aside></ld-story></ld-topic>
<ld-topic id="kryptografische-systeme-konnen-entlang-dreier-unabhangiger-dimensionen-charakterisiert-werden">
<h2>Kryptografische Systeme können entlang dreier unabhängiger Dimensionen charakterisiert werden</h2>
<aside class="admonition width-30" data-theme="note"><p class="admonition-title" data-theme="note-header">Bemerkung</p>
<p>Eine Permutation ist eine Folge von Vertauschungen.</p>
</aside>
<ol class="arabic simple incremental-list">
<li><p>Die Art der Operation, die zur Umwandlung von Klartext in Chiffretext verwendet wird:</p>
<ul class="incremental-list simple">
<li><p>Substitution</p></li>
<li><p>Transposition (Vertauschungen)</p></li>
</ul>
</li>
<li><p>Die Anzahl der verwendeten Schlüssel.</p>
<dl class="incremental-list field-list simple">
<dt>Symmetrisch<span class="colon">:</span></dt>
<dd><p>Ein-Schlüssel bzw. <strong>Secret-Key</strong>- (<em>konventionelle Verschlüsselung</em>)</p>
</dd>
<dt>Asymmetrisch<span class="colon">:</span></dt>
<dd><p>Zwei-Schlüssel bzw. <strong>Public-Key</strong>-Verschlüsselung</p>
</dd>
</dl>
</li>
<li><p>Die Art und Weise, in der der Klartext verarbeitet wird:</p>
<ul class="incremental-list simple">
<li><p>Blockchiffre</p></li>
<li><p>Stromchiffre</p></li>
</ul>
</li>
</ol>
</ld-topic>
<ld-topic id="vereinfachtes-modell-der-symmetrischen-verschlusselung">
<h2>Vereinfachtes Modell der symmetrischen Verschlüsselung</h2>
<object aria-label="Vereinfachtes Modell der symmetrischen Verschlüsselung" class="light-image align-center" data="images/simplified_model.svg" role="img" type="image/svg+xml">
</object></ld-topic>
<ld-topic id="symmetrisches-verschlusselungsmodell">
<h2>Symmetrisches Verschlüsselungsmodell</h2>
<p>Es gibt zwei Voraussetzungen für die sichere Verwendung der herkömmlichen Verschlüsselung:</p>
<ol class="arabic simple incremental-list">
<li><p>Ein starker Verschlüsselungsalgorithmus.</p></li>
<li><p>Effektive Schlüsselverwaltung:</p>
<ol class="loweralpha simple incremental-list">
<li><p>Sender und Empfänger müssen Kopien des geheimen Schlüssels auf sichere Weise erhalten haben und</p></li>
<li><p>den Schlüssel sicher aufbewahren.</p></li>
</ol>
</li>
</ol>
</ld-topic>
<ld-topic id="sicherheit-von-verschlusselungsschemata">
<h2>Sicherheit von Verschlüsselungsschemata</h2>
<div class="docutils container">
<p class="rubric">Bedingungslos Sicher (<span class="eng">Unconditionally Secure</span>)</p>
<ul class="simple">
<li><p>Unabhängig davon wie viel Zeit ein Gegner hat, ist es ihm unmöglich, den Geheimtext zu entschlüsseln, weil die erforderlichen Informationen nicht vorhanden sind.</p></li>
</ul>
</div>
<div class="incremental docutils container">
<p class="rubric">Rechnerisch Sicher (<span class="eng">Computationally Secure</span>)</p>
<ul class="simple">
<li><p>Die Kosten für das Brechen der Chiffre übersteigen den Wert der verschlüsselten Informationen.</p></li>
<li><p>Die zum Knacken der Chiffre benötigte Zeit übersteigt die Lebensdauer der Informationen.</p></li>
</ul>
</div>
<aside class="admonition incremental" data-theme="question"><p class="admonition-title" data-theme="question-header"><span>Frage</span></p><p>Wie lange könnte der Nutzen einer bestimmten Information andauern?</p>
</aside></ld-topic>
<ld-topic id="angriffe-auf-verschlusselungsschemata">
<h2>Angriffe auf Verschlüsselungsschemata</h2>
<aside class="admonition admonition-kryptoanalyse"><p class="admonition-title"><strong>Kryptoanalyse</strong></p>
<ul class="simple">
<li><p>Der Angriff beruht auf der Art des Algorithmus und einer gewissen Kenntnis der allgemeinen Merkmale des Klartextes.</p></li>
<li><p>Der Angriff nutzt die Eigenschaften des Algorithmus aus, um zu versuchen, einen bestimmten Klartext zu entschlüsseln oder den verwendeten Schlüssel zu ermitteln.</p></li>
</ul>
</aside>
<aside class="admonition incremental"><p class="admonition-title"><strong>Brute-force Angriff</strong> (<span class="ger">brachiale Gewalt</span>)</p>
<ul class="simple">
<li><p>Der Angreifer probiert jeden möglichen Schlüssel an einem Stück Chiffretext aus, bis er eine verständliche Übersetzung in Klartext erhält.</p></li>
<li><p>Im Durchschnitt muss die Hälfte aller möglichen Schlüssel ausprobiert werden, um Erfolg zu haben.</p></li>
</ul>
</aside>
</ld-topic>
<ld-topic class="new-subsection transition-fade" id="substitutionschiffre">
<h2>Substitutionschiffre</h2>
</ld-topic>
<ld-topic id="substitutionsverfahren-allgemeine-vorgehensweise">
<h2>Substitutionsverfahren - Allgemeine Vorgehensweise</h2>
<ul class="simple">
<li><p>Bei der Substitution werden die Buchstaben des Klartextes durch andere Buchstaben oder durch Zahlen oder Symbole ersetzt.</p></li>
<li><p>Wenn der Klartext als eine Folge von Bits betrachtet wird, beinhaltet die Substitution das Ersetzen von Bitmustern des Klartextes durch Bitmuster des Geheimtextes.</p></li>
</ul>
</ld-topic>
<ld-topic id="casar-chiffre">
<h2>Cäsar-Chiffre</h2>
<ul class="simple">
<li><p>Einfachste und früheste bekannte Verwendung einer Substitutions-Chiffre; verwendet von Julius Cäsar.</p></li>
</ul>
<div class="incremental docutils container">
<ul>
<li><p>Dabei wird jeder Buchstabe des Alphabets durch einen Buchstaben ersetzt, der drei Stellen weiter hinten im Alphabet steht.</p></li>
<li><p>Am Ende des Alphabets wird wieder am Anfang begonnen. Somit folgt auf den Buchstabe Z der Buchstabe A.</p>
<dl class="field-list simple">
<dt>unverschlüsselt<span class="colon">:</span></dt>
<dd><p><span class="docutils literal">meet me after the toga party</span></p>
</dd>
</dl>
<dl class="incremental field-list simple">
<dt>verschlüsselt<span class="colon">:</span></dt>
<dd><p><span class="docutils literal">PHHW PH DIWHU WKH WRJD SDUWB</span></p>
</dd>
</dl>
</li>
</ul>
</div>
</ld-topic>

<ld-topic class="new-subsection transition-fade" id="transpositionschiffre">
<h2>Transpositionschiffre</h2>
</ld-topic>
<ld-topic id="rail-fence-chiffre">
<h2>Rail Fence Chiffre</h2>
<ul class="simple">
<li><p>Einfachste Transpositions-Chiffre (d. h. Chiffre basierend auf <cite>Vertauschung</cite>).</p></li>
<li><p>Der Klartext wird als eine Folge von Diagonalen aufgeschrieben und dann als eine Folge von Zeilen abgelesen.</p></li>
</ul>
<aside class="admonition incremental" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>Um die Nachricht: „Meet me after the Toga-Party“ mit einer Rail Fence Chiffre der Tiefe 2 (Schlüssel) zu verschlüsseln, würden wir schreiben:</p>
<pre class="literal-block">m e m a t r h t g p r y
 e t e f e t e o a a t</pre>
<p>Die verschlüsselte Nachricht ist: MEMATRHTGPRYETEFETEOAAT</p>
</aside></ld-topic>
<ld-topic class="new-subsection transition-fade" id="public-key-kryptographie">
<h2>Public-Key Kryptographie</h2>
</ld-topic>
<ld-topic id="schlusselbegriffe-von-public-key-kryptosystemen">
<h2>Schlüsselbegriffe von Public-Key-Kryptosystemen</h2>
<dl class="fade-out incremental-list field-list simple">
<dt><em>Klartext</em> (<span class="eng">Plaintext</span>)<span class="colon">:</span></dt>
<dd><p>Die lesbare Nachricht oder Daten, die dem Algorithmus als Eingabe dienen.</p>
</dd>
<dt><em>Verschlüsselungsalgorithmus</em><span class="colon">:</span></dt>
<dd><p>Führt verschiedene Umwandlungen des Klartextes durch.</p>
</dd>
</dl>
<dl class="incremental-list field-list simple">
<dt><em>Öffentlicher Schlüssel</em><span class="colon">:</span></dt>
<dd><p>Wird für <em>Verschlüsselung</em> oder <em>Entschlüsselung</em> verwendet.</p>
</dd>
<dt><em>Privater Schlüssel</em><span class="colon">:</span></dt>
<dd><p>Verwendet für <em>Verschlüsselung</em> oder <em>Entschlüsselung</em>.</p>
</dd>
</dl>
<dl class="fade-out incremental-list field-list simple">
<dt><em>Chiffretext</em> (<span class="eng">Ciphertext</span>)<span class="colon">:</span></dt>
<dd><p>Die verschlüsselte Nachricht, die als Ausgabe produziert wird.</p>
</dd>
<dt><em>Entschlüsselungsalgorithmus</em><span class="colon">:</span></dt>
<dd><p>Nimmt den Geheimtext und den passenden Schlüssel entgegen und erzeugt den ursprünglichen Klartext.</p>
</dd>
</dl>
</ld-topic>
<ld-topic id="verschlusselung-mit-offentlichem-schlussel">
<h2>Verschlüsselung mit öffentlichem Schlüssel</h2>
<object aria-label="Verschlüsselung mit öffentlichem Schlüssel" class="light-image align-center" data="images/enc_with_pub_key.svg" role="img" type="image/svg+xml">
</object></ld-topic>
<ld-topic id="verschlusselung-mit-privatem-schlussel">
<h2>Verschlüsselung mit privatem Schlüssel</h2>
<object aria-label="Verschlüsselung mit privatem Schlüssel" class="light-image align-center" data="images/enc_with_priv_key.svg" role="img" type="image/svg+xml">
</object></ld-topic>
<ld-topic id="terminologie-bzgl-asymmetrischer-verschlusselung">
<h2>Terminologie bzgl. asymmetrischer Verschlüsselung</h2>
<ul class="incremental-list">
<li><p>Asymmetrische Schlüssel</p>
<ld-supplemental embed-in-document-flow><p>Man spricht von asymmetrischen Schlüsseln, wenn man zwei zusammengehörige Schlüssel hat: ein öffentlicher und ein privater Schlüssel. Zusammen werden diese zur Durchführung komplementärer Operationen verwendet werden, z. B. Ver- und Entschlüsselung oder Signaturerstellung und Signaturprüfung.</p>
</ld-supplemental></li>
<li><p>Public-Key-Zertifikat</p>
<ld-supplemental embed-in-document-flow><p>Ein Public-Key-Zertifikat ist ein digitales Dokument, das mit dem privaten Schlüssel einer Zertifizierungsstelle (<span class="eng">Certification Authority</span>) ausgestellt und digital signiert wird und den Namen eines Teilnehmers an einen öffentlichen Schlüssel bindet. Das Zertifikat gibt an, dass der im Zertifikat genannte Teilnehmer die alleinige Kontrolle und den Zugriff auf den entsprechenden privaten Schlüssel hat.</p>
</ld-supplemental></li>
<li><p>Public-Key (asymmetrischer) kryptografischer Algorithmus</p>
<ld-supplemental embed-in-document-flow><p>Ein Public-Key (asymmetrischer) kryptografischer Algorithmus ist ein Algorithmus, der zwei zusammengehörige Schlüssel verwendet: Einen öffentlichen und einen privaten Schlüssel. Die beiden Schlüssel haben die Eigenschaft, dass die Ableitung des privaten Schlüssels aus dem öffentlichen Schlüssel rechnerisch nicht machbar ist bzw. sein sollte (vgl. Quantenkryptografie).</p>
</ld-supplemental></li>
<li><p>Public-Key-Infrastruktur (PKI)</p>
<ld-supplemental embed-in-document-flow><p>Public-Key-Infrastruktur umfasst eine Reihe von Richtlinien, Prozessen, Serverplattformen, Software und Workstations, die für die Verwaltung von Zertifikaten und öffentlich-privaten Schlüsselpaaren verwendet werden, einschließlich der Möglichkeit, Public-Key-Zertifikate auszustellen, zu pflegen und zu widerrufen.</p>
</ld-supplemental></li>
</ul>
</ld-topic>

<ld-topic class="new-subsection transition-fade" id="kryptographisches-hashing">
<h2>(Kryptographisches) Hashing</h2>
</ld-topic>
<ld-topic id="hashfunktionen">
<h2>Hashfunktionen</h2>
<ul class="incremental-list">
<li><p>Eine Hashfunktion H akzeptiert eine beliebig lange Nachricht M als Eingabe und gibt einen Wert fixer Größe zurück: h = H(M).</p></li>
<li><p>Wird oft zur Gewährleistung der Datenintegrität verwendet. Eine Änderung eines beliebigen Bits in M sollte mit hoher Wahrscheinlichkeit zu einer Änderung des Hashwerts h führen.</p>
<div class="peripheral docutils container">
<p>(Jedes Bit in H(M<sub>ein Bit geändert</sub>) sollte mit der Wahrscheinlichkeit ½ gekippt sein.)</p>
</div>
</li>
<li><p>Kryptographische Hashfunktionen werden für Sicherheitsanwendungen benötigt. Mögliche Anwendungen:</p>
<ul class="simple">
<li><p>Authentifizierung von Nachrichten</p></li>
<li><p>Digitale Signaturen</p></li>
<li><p>Speicherung von Passwörtern</p></li>
</ul>
</li>
</ul>
</ld-topic>
<ld-topic id="beispiel-berechnung-von-hashwerten-mittels-md5">
<h2>Beispiel: Berechnung von Hashwerten mittels MD5</h2>
<div class="monospaced line-block">
<div class="line">md5(&quot;Hello0&quot;) = 5ed715782191ee6041cb4d66f29b1121</div>
<div class="line">md5(&quot;hello1&quot;) = 5<strong>ac</strong>7<strong>8c81d</strong>1<strong>b3c28c8db48f57dd2</strong>b<strong>90b3</strong></div>
</div>
<div class="incremental monospaced line-block">
<div class="line">md5(&quot;Dieses Passwort ist wirklich total sicher</div>
<div class="line-block">
<div class="line">und falls Du es mir nicht glaubst, dann</div>
<div class="line">tippe es zweimal hintereinander blind</div>
<div class="line">fehlerfrei ein.&quot;)</div>
<div class="line-block">
<div class="line">= 8fcf22b1f8327e3a005f0cba48dd44c8</div>
</div>
</div>
</div>
<aside class="admonition incremental" data-theme="warning"><p class="admonition-title" data-theme="warning-header">Warnung</p>
<p>Die Verwendung von MD5 dient hier lediglich der Illustration. In realen Anwendung sollte MD5 nicht mehr verwendet werden, da es nachgewiesene Schwachstellen aufweist.</p>
</aside>
</ld-topic>

<ld-topic id="signieren-von-nachrichten">
<h2>Signieren von Nachrichten</h2>
<p>Alice signiert eine Nachricht X mit ihrem privaten Schlüssel.</p>
<blockquote>
<p>Alice: [E(PR<sub>Alice</sub>,H=Digest(X)),X]</p>
</blockquote>
<div class="incremental compound">
<p>Bob prüft die Nachricht X auf Authentizität:</p>
<blockquote>
<p>Bob: D(PU<sub>Alice</sub>,H) ≟ Digest(X)</p>
</blockquote>
</div>
</ld-topic>

<ld-topic id="verwendung-von-passwortern">

<aside class="admonition" data-theme="observation"><p class="admonition-title" data-theme="observation-header"><span>Beobachtung</span></p><p>Klassische Passwörter werden (noch immer) in zahlreichen Bereichen verwendet.</p>
<div class="incremental compound">
<p>Beispiele sind Smartphones, Cryptosticks, Logins für Computer oder verschlüsselte Dateien und Datenträger.</p>

<ld-topic id="passwort-leaks">
<h2>Passwort Leaks</h2>
<blockquote class="epigraph">
<p><strong>Check Your Accounts: 10 Billion Passwords Exposed in Largest Leak Ever</strong></p>
<p>The &quot;RockYou2024&quot; database includes almost 10 billion passwords pulled from <span class="info">a mix of old and new data breaches</span>. Here's how to check if yours are at risk.</p>
<p>[...]Researchers at Cybernews have uncovered a massive trove of nearly 10 billion passwords on a popular hacking forum in what they're calling &quot;largest password compilation&quot; ever.</p>
<p>The file, titled <span class="docutils literal">rockyou2024.txt</span>, was posted on July 4 by someone going by the name ObamaCare and contains a mind-boggling 9,948,575,739 unique plaintext passwords. The user only joined the forum in late May, but they've posted data from other breaches, too. [...]</p>
<p class="attribution">—6. Juli 2024: <a class="reference external" href="https://uk.pcmag.com/security/153138/check-your-accounts-10-billion-passwords-exposed-in-largest-leak-ever">PCMag</a></p>
</blockquote>
</ld-topic>
<ld-topic id="raum-der-passwortkandidaten">
<h2>Raum der Passwortkandidaten</h2>
<dl class="incremental-list field-list">
<dt>vierstellige PIN<span class="colon">:</span></dt>
<dd><div class="incremental docutils container">
<p>10.000 Kombinationen</p>
</div>
<ld-supplemental embed-in-document-flow><aside class="admonition" data-theme="warning"><p class="admonition-title" data-theme="warning-header">Warnung</p>
<p>Eine vierstellige PIN kann niemals als sicher angesehen werden. Selbst wenn ein Bruteforce nur auf 4 oder 5 Versuche pro Stunde kommt, so ist es dennoch in wenigen Monaten möglich die PIN zu ermitteln.</p>
</aside>
</ld-supplemental></dd>
<dt>Passwort mit 8 Zeichen und 70 Zeichen im Zeichensatz (a-z, A-Z, 0-9 und ausgewählte Sonderzeichen)<span class="colon">:</span></dt>
<dd><div class="incremental docutils container">
<p>70⁸ = 576.480.100.000.000 ≈ 5,7 × 10¹⁴ Kombinationen</p>
</div>
</dd>
<dt>Passphrase mit 6 Wörtern aus einem Wörterbuch mit 2.000 Wörtern<span class="colon">:</span></dt>
<dd><div class="incremental docutils container">
<p>2.000⁶ = 6,4 × 10¹⁹ Kombinationen</p>
</div>
</dd>
<dt>Passphrase mit 4 Wörtern aus einem Wörterbuch mit 100.000 Wörtern<span class="colon">:</span></dt>
<dd><div class="incremental docutils container">
<p>100.000⁴ = 1 × 10²⁰ Kombinationen</p>
</div>
</dd>
<dt>Passwort mit 16 Zeichen und 84 Zeichen im Zeichensatz (a-z, A-Z, 0-9 und die meisten Sonderzeichen)<span class="colon">:</span></dt>
<dd><div class="incremental docutils container">
<p>84¹⁶ = 6,14 × 10³⁰ Kombinationen</p>
</div>
</dd>
</dl>

<ld-topic class="exercises transition-move-left" id="diskussion">
<h2>Diskussion</h2>
<ld-story>
<div class="ld-exercise" data-exercise-id="4" data-exercise-title="4 - Schwachstellenbewertung" id="ld-exercise-4">
<p class="ld-exercise-title rubric"><span>Schwachstellenbewertung</span></p>
<p>Ihnen liegt eine externer Festplatte/SSD mit USB Anschluss vor, die die folgenden Eigenschaften hat:</p>
<ul class="incremental-list simple">
<li><p>Die Daten auf der SSD/FP sind hardwareverschlüsselt.</p></li>
<li><p>Die Verschlüsselung erfolgt mit XTS-AES 256.</p></li>
<li><p>Es gibt eine spezielle Software, die der Kunde installieren muss, um das Passwort zu setzen. Erst danach wird die Festplatte „freigeschaltet“ und kann in das Betriebssystem eingebunden werden. Davor erscheint die SSD/FP wie ein CD Laufwerk auf dem die Software liegt.</p></li>
<li><p>Die SSD/FP ist FIPS zertifiziert und gegen Hardwaremanipulation geschützt; zum Beispiel eingegossen mit Epoxidharz.</p></li>
<li><p>Das Passwort wird von der Software gehasht und dann als Hash an den Controller der externen FP/SSD übertragen.</p></li>
<li><p>Im Controller wird der übermittelte Hash direkt zur Autorisierung des Nutzers verwendet. Dazu wird der Hash mit dem im EPROM hinterlegten verglichen.</p></li>
</ul>
<p class="incremental">Diskutieren Sie die Sicherheit der Passwortvalidierung und wie diese ggf. zu verbessern wäre.</p>

<ld-topic id="sichere-passworter">
<h2>Sichere Passwörter</h2>
<ul class="simple">
<li><p>Nehmen Sie kein Passwort, dass 1:1 in einem Wörterbuch, Verzeichnis oder Leak (vgl. <a class="reference external" href="https://haveibeenpwned.com">https://haveibeenpwned.com</a>) vorkommt.</p></li>
<li><p>Nehmen Sie keine Szenepasswörter (zum Beispiel: admin, root, acab, 1312, 88, ...).</p></li>
<li><p>Je länger desto besser, aber keine trivialen Sätze.</p></li>
<li><p>Wählen Sie ein Passwort, dass Sie sich merken können. Kombinieren Sie z. B. Dinge aus Ihrem privaten Umfeld, die aber niemand direkt mit Ihnen in Verbindung bringen kann. (D. h. die Namen Ihrer Kinder, Haustiere, etc. sind keine gute Wahl, aber ggf. das Modell Ihres Fernsehers in Kombination mit einer Pin und dem Namen Ihres ersten Smartphones getrennt durch ein paar Sonderzeichen).</p></li>
<li><p>Verwenden Sie sichere Passwortmanager.</p></li>
</ul>
</ld-topic>
