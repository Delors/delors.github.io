<ld-topic id="was-ist-cybersecurity">
<h2>Was ist Cybersecurity?</h2>
<ld-deck>
<ld-card>
<blockquote class="epigraph">
<p><strong>VERORDNUNG (EU) 2019/881 DES EUROPÄISCHEN PARLAMENTS UND DES RATES vom 17. April 2019 über die ENISA (Agentur der Europäischen Union für Cybersicherheit</strong></p>
<p><em>Artikel 2 Nummer 1</em></p>
<p>„Cybersicherheit“ bezeichnet alle Tätigkeiten, die notwendig sind, um Netz- und Informationssysteme, die Nutzer solcher Systeme und andere von Cyberbedrohungen betroffene Personen zu schützen [...]</p>
<p class="attribution">—<a class="reference external" href="https://eur-lex.europa.eu/legal-content/DE/TXT/PDF/?uri=CELEX:32019R0881">Verordnung (EU) 2019/881</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<p>Das Ziel der IT-Sicherheit ist der Schutz von Systemen vor:</p>
<ul class="incremental-list">
<li><p>Ausfall</p>
<ld-supplemental embed-in-document-flow><p>Ein einfacher Überlastungsangriff (Denial of Service) hat normalerweise das Ziel für einen <strong>Ausfall</strong> zu sorgen.</p>
</ld-supplemental></li>
<li><p>Missbrauch</p>
<ld-supplemental embed-in-document-flow><p>Ein Beispiel für <strong>Missbrauch</strong> ist ein Bankangestellter, der Kundendaten verwendet, um sich selbst zu bereichern.</p>
</ld-supplemental></li>
<li><p>Sabotage</p>
<ld-supplemental embed-in-document-flow><p>Bei <strong>Sabotage</strong> kann man zum Beispiel an Stuxnet denken, das iranische Atomanlagen angegriffen hat, um diese physisch zu beschädigen.</p>
</ld-supplemental></li>
<li><p>Spionage</p>
<ld-supplemental embed-in-document-flow><p><strong>Spionage</strong> umfasst das unbefugte Auslesen von Informationen. Dies kann durch die Ausnutzung von Kameras oder Mikrofonen erfolgen, aber auch durch die Ausspähung von Daten in Datenbanken oder das Mitschneiden von (unverschlüsselten) Netzwerkverbindungen.</p>
</ld-supplemental></li>
<li><p>Manipulation</p>
<ld-supplemental embed-in-document-flow><p><strong>Manipulation</strong> umfasst zum Beispiel das Verändern von Daten in Datenbanken oder auf Speichermedien oder das Abfangen und Verändern von Netzwerkverkehr. Zum Beispiel wenn ein Student in ein Prüfungsverwaltungssystem eingreift, um seine Noten zu ändern.</p>
</ld-supplemental></li>
<li><p>Diebstahl</p>
<ld-supplemental embed-in-document-flow><p>Im Rahmen von Wirtschaftsspionage werden häufig <strong>Diebstähle</strong> von geistigem Eigentum (z. B. Quellcode, Designs, Patente) durchgeführt.</p>
</ld-supplemental></li>
</ul>
</ld-card></ld-deck></ld-topic>

<ld-topic id="it-security-vorfalle-ransomware">
<h2>IT-Security Vorfälle - Ransomware</h2>
<ld-deck class="height-100">
<ld-card>
<blockquote class="epigraph">
<p><strong>Indonesia won’t pay an $8 million ransom after a cyberattack compromised its national data center</strong></p>
<p>[...] The attackers have held data hostage and offered a key for access in return for the $8 million ransom, said PT Telkom Indonesia’s director of network &amp; IT solutions, Herlan Wijanarko, without giving further details. Wijanarko said the company, in collaboration with authorities at home and abroad, is investigating and trying to break the encryption that made data inaccessible. [...]</p>
<p class="attribution">—<a class="reference external" href="https://apnews.com/article/indonesia-ransomware-attack-national-data-center-213c14c6cc69d7b66815e58478f64cee">June 25th, 2024; AP News</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>UK government to ban public bodies from paying ransoms to hackers</strong></p>
<p>The UK government is planning to ban public bodies from paying ransoms to computer hackers, and private companies will be required to inform authorities if they plan to cave into cash demands.</p>
<p>[…] The government could then provide those businesses with advice and support, including notifying them if any such payment would risk breaking the law by sending money to sanctioned cybercriminal groups, many of whom are based in Russia. […]</p>
<p class="attribution">—<a class="reference external" href="https://www.theguardian.com/technology/2025/jul/22/uk-government-to-ban-public-bodies-from-paying-ransoms-to-hackers">July 22nd, 2025; The Guardian</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>Total Ransomware Payments Stagnate for Second Consecutive Year, While Attacks Escalate</strong></p>
<p>[...] Ransomware payments stagnated despite record attacks claimed. Total on-chain ransomware payments fell by approximately 8% to $820 million in 2025, even as claimed attacks rose 50%. [...]</p>
<p class="attribution">—<a class="reference external" href="TotalRansomwarePaymentsStagnateforSecondConsecutiveYear,WhileAttacksEscalate">Feb. 26, 2026; Chainanalysis</a></p>
</blockquote>
</ld-card></ld-deck></ld-topic>

<ld-topic id="it-security-vorfalle-sonstige">
<h2>IT-Security Vorfälle - Sonstige</h2>
<ld-deck>
<ld-card>
<blockquote class="epigraph">
<p><strong>Hackers shut down heating in Ukrainian city with malware</strong></p>
<p>For two days in mid-January, some Ukrainians in the city of Lviv had to live without central heating and suffer freezing temperatures because of a cyberattack against a municipal energy company [...]</p>
<p>[...], the cybersecurity company Dragos published a report with details about a new malware dubbed FrostyGoop, which the company says is designed to target industrial control systems [...]</p>
<p class="attribution">—<a class="reference external" href="https://techcrunch.com/2024/07/23/hackers-shut-down-heating-in-ukrainian-city-with-malware-researchers-say/?guccounter=1">July 23rd, 2024; Techcrunch</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<ld-deck>
<ld-card>
<blockquote class="epigraph">
<p><strong>US government tells officials, politicians to ditch regular calls and texts</strong></p>
<p>The U.S. government [CISA] is urging senior government officials and politicians to ditch phone calls and text messages following intrusions at major American telecommunications companies blamed on Chinese hackers. [...]</p>
<p>The first recommendation: &quot;Use only end-to-end encrypted communications.&quot; [...]</p>
<p class="attribution">—<a class="reference external" href="https://www.reuters.com/world/us/us-cyber-watchdog-tells-senior-officials-immediately-adopt-end-to-end-encryption-2024-12-18/">Dec. 18th, 2024; Reuters</a></p>
</blockquote>
</ld-card></ld-deck></ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>Trump administration to spend $1 billion on offensive hacking operations</strong></p>
<p>[...] Offensive cyber operations can describe a wide range of targeted hacks against U.S. adversaries, which include the use of zero-day exploits [...] — or the deployment of spyware, which can be used to steal data from a person. [...]</p>
<p class="attribution">—<a class="reference external" href="https://techcrunch.com/2025/07/14/trump-administration-to-spend-1-billion-on-offensive-hacking-operations/">July 14th, 2025; TechCrunch</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>Hacker sneaks infostealer malware into early access Steam game</strong></p>
<p>A threat actor called EncryptHub has compromised a game on Steam to distribute info-stealing malware to unsuspecting users downloading the title.</p>
<p>A few days ago, the hacker (also tracked as Larva-208), injected malicious binaries into the Chemia game files hosted on Steam.</p>
<p>[...] According to threat intelligence company Prodaft, the initial compromise occurred on July 22, when EncryptHub added to the game files the HijackLoader malware (CVKRUTNP.exe), which establishes persistence on the victim device and downloads the Vidar infostealer (v9d9d.exe). [...] It is unclear how EncryptHub managed to add the malicious files to the game project but one explanation could be an insider helping out.</p>
<p><span class="warning">[...] This is the third case of malware slipping into Steam this year. [...]</span></p>
<p class="attribution">—<a class="reference external" href="https://www.bleepingcomputer.com/news/security/hacker-sneaks-infostealer-malware-into-early-access-steam-game/">July 24th, 2025; BleepingComputer</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>GlassWorm: First Self-Propagating Worm Using Invisible Code Hits OpenVSX Marketplace</strong></p>
<p>A month after Shai Hulud became the first self-propagating worm in the npm ecosystem, we just discovered the world's first worm targeting VS Code extensions on OpenVSX marketplace [<em>and also VS Code Marketplace later on</em>].</p>
<p>But GlassWorm isn't just another <strong>supply chain attack</strong>. It's using <span class="muted">stealth techniques</span> we've never seen before in the wild - invisible Unicode characters that make malicious code literally disappear from code editors. [...]</p>
<p class="attribution">—<a class="reference external" href="https://www.koi.ai/blog/glassworm-first-self-propagating-worm-using-invisible-code-hits-openvsx-marketplace">October 18th, 2025; Koi Research</a></p>
</blockquote>
<aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><p>Glassworm ist - Stand Dez. 2025 - bereits in mind. <a class="reference external" href="https://www.techzine.eu/news/security/136912/glassworm-malware-reappears-within-vs-code-ecosystem/">3 Wellen</a> aufgetaucht.</p>
</aside><ld-supplemental><p>Bei GlassWorm handelt es sich um einen klassischen         <strong>Supply-Chain-Angriff</strong>.</p>
</ld-supplemental></ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>Cybercrime has skyrocketed 245% since the start of the Iran war</strong></p>
<p>Cybercrime has skyrocketed since the start of the Iran war, according to Akamai, which reports a 245 percent increase in everything from credential harvesting attempts to automated reconnaissance traffic aimed at banks and other critical businesses. [...] As Akamai notes, &quot;geopolitically motivated hacktivists are using proxy services in countries like Russia and China as a source for billions of designed-for-abuse connection attempts.&quot; [...]</p>
<p class="attribution">—<a class="reference external" href="https://www.theregister.com/2026/03/16/cybercrime_iran_war_245_percent_rise/">Jessica Lyons; March 16, 2026 - The Register</a></p>
</blockquote>
</ld-card></ld-deck></ld-topic>
<ld-topic id="it-security-vorfalle-local-privelege-escalation-cve-2026-31431">
<h2>IT-Security Vorfälle - Local Privelege Escalation (CVE-2026-31431)</h2>
<blockquote class="epigraph">
<p>Microsoft Defender is investigating a <strong>high-severity local privilege escalation vulnerability</strong> [...] affecting multiple major Linux distributions [...]. This vulnerability allows unauthorized <strong>escalation of privileges to root[...]</strong>.</p>
<p>Given the availability of a <strong>fully working exploit proof-of-concept (PoC)</strong> and the race to patch systems, Microsoft Defender is seeing preliminary testing activity that might result most likely in increased <strong>threat actor exploitation</strong> over the next few days, as also confirmed by the recent addition of this vulnerability to the <strong>Cybersecurity and Infrastructure Security Agency (CISA)</strong> <strong>Known Exploited Vulnerability (KEV) catalog</strong>. [...]</p>
<p><span class="incremental">The vulnerability affects virtually all Linux distributions running kernels released from 2017 until patched versions are applied. [...]</span></p>
<p><span class="incremental">The attack vector is local (AV:L) and requires low privileges with no user interaction[...].</span></p>
<p><span class="incremental">[...] the flaw originates from an in-place optimization introduced in 2017, where the kernel reuses source memory as the destination during cryptographic operations.[...]</span></p>
<p class="attribution">—<a class="reference external" href="https://nvd.nist.gov/vuln/detail/CVE-2026-31431">NIST: CVE-2026-31431</a> &amp; <a class="reference external" href="https://www.microsoft.com/en-us/security/blog/2026/05/01/cve-2026-31431-copy-fail-vulnerability-enables-linux-root-privilege-escalation/">Microsoft Security: CVE-2026-31431</a></p>
</blockquote>
<ld-supplemental><p>Die Lücke hat auch den Namen <a class="reference external" href="https://copy.fail">Copy Fail</a> bekommen und ist frei auf GitHub verfügbar.</p>
</ld-supplemental></ld-topic>
<ld-topic id="it-security-forschung">
<h2>IT-Security Forschung</h2>
<ld-deck>
<ld-card>
<blockquote class="epigraph">
<p><strong>Internet-wide Vulnerability Enables Giant DDoS Attacks</strong></p>
<p>Researchers have uncovered a distributed denial-of-service (DDoS) vulnerability in the HTTP/2 protocol that is more serious than anything seen in two years.</p>
<aside class="admonition s-font-size-90" data-theme="background"><p class="admonition-title" data-theme="background-header"><span>Hintergrund</span></p><p>In August 2023, unknown threat actors carried out the largest DDoS attack [...]. It worked thanks to a then-novel technique called &quot;Rapid Reset,&quot; which took advantage of a fundamental flaw in implementations of HTTP/2.</p>
</aside><p>Now, researchers from Tel Aviv University have identified a way around the Rapid Reset fix. They named the technique &quot;MadeYouReset,&quot; and it's once again raising the possibility that attackers could enact colossal cyberattacks [...].</p>
<p>[...] but a large number of the vendors that were potentially exposed to this were informed about it, and they did whatever they believed they should do. [...]</p>
<p class="attribution">—<a class="reference external" href="https://www.darkreading.com/vulnerabilities-threats/internet-wide-vulnerability-giant-ddos-attacks">August 18th, 2025; Dark Reading</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>Want to Win a Bike Race? Hack Your Rival’s Wireless Shifters</strong></p>
<p>Relatively inexpensive hardware can be used to hack the Shimano Di2 wireless gear-shifting systems used by cyclists [...]. They tested the eavesdrop-and-replay attack with a $1,500 USRP software-defined radio, an antenna, and a laptop but said the setup could be miniaturized. Attackers could spoof signals from up to 30 feet away, causing the target bike to shift gears unexpectedly or lock into the wrong gear.</p>
<p class="attribution">—<a class="reference external" href="https://technews.acm.org/archives.cfm?fo=2024-08-aug/aug-16-2024.html">August 16th, 2024; summary provided by ACM</a>; <a class="reference external" href="https://www.wired.com/story/shimano-wireless-bicycle-shifter-jamming-replay-attacks/">August 14th, 2024; full article: Wired</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>Nvidia warns its GPUs – even Blackwells [Released in 2024] – need protection against Rowhammer attacks</strong></p>
<p>Nvidia last week advised customers to ensure they employ mitigations against Rowhammer attacks, after researchers found one of its workstation-grade GPUs is susceptible to the exploit.</p>
<p>Rowhammer is a method of attempting to corrupt memory by repeatedly &quot;hammering&quot; rows of memory cells with a burst of read or write operations. The repeat operations can create electrical interference between rows of memory cells, potentially disrupting operations.[...]</p>
<p class="attribution">—<a class="reference external" href="https://www.theregister.com/2025/07/13/infosec_in_brief/">July 13th, 2025; The Register</a></p>
</blockquote>
</ld-card></ld-deck></ld-topic>
<ld-topic id="missbrauch-von-vertrauen-in-it-systeme">
<h2>Missbrauch von Vertrauen in IT-Systeme</h2>
<blockquote class="epigraph">
<p><strong>Big Help or Big Brother? UC Davis Study Reveals Alarming Browser Tracking</strong></p>
<p>[...] GenAI browser assistants use large language models to make browsing easier and more personalized, and act as your ride-along as you surf the web. [...] these assistants can pose a significant threat to user privacy. [They] often collect personal and sensitive information and share that information with both first-party servers and third-party trackers [...] one GenAI browser extension,  collected form inputs as well. While filling out a form on the IRS website, [the extension] exfiltrated the social security number that was provided in the form field.</p>
<p class="attribution">—<a class="reference external" href="https://engineering.ucdavis.edu/news/big-help-or-big-brother-uc-davis-study-reveals-alarming-browser-tracking">August 13th, 2025; UC Davis</a></p>
</blockquote>
</ld-topic>
<ld-topic id="kampf-gegen-cyberkriminalitat">
<h2>Kampf gegen Cyberkriminalität</h2>
<ld-deck>
<ld-card>
<blockquote class="epigraph">
<p>Der Hersteller soll insgesamt 240.000 Geräte mit der DDoS-Funktion ausgestattet haben – teils ab Werk, teils erst nachträglich per Firmwareupdate.</p>
<p>[...] In Südkorea sind fünf Mitarbeiter sowie der CEO eines Unternehmens verhaftet worden. Dieses soll Satellitenreceiver hergestellt und Hunderttausende davon auf Wunsch eines Kunden mit einer DDoS-Funktion ausgestattet haben. Wie [...] unter Verweis auf Angaben der südkoreanischen Polizei berichtet, lieferte der Hersteller 98.000 Geräte ab Werk mit dieser Funktion aus. [...]</p>
<p>Dass Geräte ab Werk mit Schadsoftware ausgeliefert werden, ist gerade im unteren Preissegment keine Seltenheit. Sicherheitsforscher deckten erst im vergangenen Jahr eine Malware-Kampagne auf, bei der vor allem billige Android-Geräte wie Smartphones, Tablets und TV-Boxen aus China vor ihrer Auslieferung an Endkunden mit einer Schadsoftware ausgestattet worden waren.</p>
<p class="attribution">—<a class="reference external" href="https://www.golem.de/news/ceo-verhaftet-satellitenreceiver-jahrelang-mit-ddos-funktion-ausgeliefert-2412-191354.html">3.12.2024; Golem.de: CEO verhaftet</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>VMware Hacked As $150,000 Zero-Day Exploit Dropped</strong></p>
<p>[...] Nguyen Hoang Thach of STARLabs SG used a single integer overflow to exploit #VMware ESXi - a first in Pwn2Own history. He earns $150,000 [...]</p>
<p class="attribution">—<a class="reference external" href="https://www.forbes.com/sites/daveywinder/2025/05/17/vmware-hacked-as-150000-zero-day-exploit-dropped/">May 17th, 2025; Davey Winder</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p>[...] we wrote that <strong>“Opus 4.6 is currently far better at identifying and fixing vulnerabilities than at exploiting them.”</strong> Our internal evaluations showed that Opus 4.6 generally had a near-0% success rate at autonomous exploit development. But Mythos Preview is in a different league. For example, Opus 4.6 turned the vulnerabilities it had found in Mozilla’s Firefox 147 JavaScript engine—all patched in Firefox 148—into JavaScript shell exploits only two times out of several hundred attempts. We re-ran this experiment as a benchmark for <strong>Mythos Preview, which developed working exploits 181 times</strong>, and achieved register control on 29 more. [...]</p>
<p class="attribution">—<a class="reference external" href="https://red.anthropic.com/2026/mythos-preview/">Assessing Claude Mythos Preview’s cybersecurity capabilities</a></p>
</blockquote>
</ld-card><ld-card class="s-overlay incremental">
<div class="height-70 center-content backdrop-blur docutils container">
<div class="accentuate docutils container">
<p>Having a model that is able to automatically develop complex exploit (chains) is a double-edged sword. In the hands of attackers it may provide havoc. However, it also helps to make developers and managers aware of the fact that software is full of exploitable vulnerabilities - far beyond those reported typically.</p>
</div>
</div>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p>Mozilla hat vor allem dank des neuen KI-Modells Claude Mythos Preview von Anthropic im April genau 423 Sicherheitslücken geschlossen, so viele sind bis vor wenigen Monaten erst in etwa zwei Jahren zusammengekommen [...] einige waren demnach mehr als 15 Jahre alt. [...]  <span class="incremental">hat sich Mozilla überzeugt gegeben, dass man mit KI-Hilfe tatsächlich alle Sicherheitslücken in einer Software finden und diese damit vollständig absichern kann. [...]</span></p>
<p class="attribution">—<a class="reference external" href="https://www.heise.de/news/Dank-KI-Im-April-so-viele-Firefox-Luecken-geschlossen-wie-vorher-in-zwei-Jahren-11287023.html">8.5.2026 - Firefox Lücken geschlossen - Heise.de</a></p>
</blockquote>
</ld-card></ld-deck></ld-topic>
<ld-topic class="new-section" id="cybersicherheitsvorfalle">
<h2>Cybersicherheitsvorfälle</h2>
</ld-topic>
<ld-topic id="cybersicherheit-ist-das-geschaftsrisiko-nr-1">
<h2>Cybersicherheit ist das Geschäftsrisiko Nr. 1</h2>
<ld-deck>
<ld-card>
<blockquote class="epigraph">
<p><strong>Cybervorfälle wie Ransomware-Angriffe, Datenschutzverletzungen und IT-Unterbrechungen sind laut dem Allianz Risk Barometer im Jahr 2024 die größte Sorge für Unternehmen weltweit.</strong> An zweiter Stelle steht die eng miteinander verknüpfte Gefahr der Betriebsunterbrechung. [...]</p>
<p>Cybervorfälle (36% der Gesamteinsätze) sind zum dritten Mal in Folge das weltweit gefürchtetste Risiko [...]. Eine Datenschutzverletzung wird von den Befragten des Allianz Risk Barometers (59%) als die besorgniserregendste Cyberbedrohung angesehen, gefolgt von Angriffen auf kritische Infrastrukturen und physische Vermögenswerte (53%). [...]</p>
<p>Cyberkriminelle suchen vermehrt nach Möglichkeiten, neue Technologien wie generative künstliche Intelligenz (KI) zu nutzen, um Angriffe zu automatisieren und zu beschleunigen und so effektivere Malware und Phishing zu schaffen. [...]</p>
<p class="attribution">—<a class="reference external" href="https://www.allianz-trade.de/wissen/wirtschafts-news/allianz-risk-barometer-2024-geschaeftsrisiken.html?utm_source=google&amp;utm_medium=cpc&amp;utm_campaign=[generic][mm][de][de][leadgen][trade_credit_insurance][e][p][b][p-max]-eh_wkv_p-max&amp;_bt=&amp;_bk=&amp;_bm=&amp;_bn=x&amp;_bg=&amp;gad_source=1&amp;gbraid=0AAAAAC_uaZo7sk9ZvZrwUYEuUPFQbJoY1&amp;gclid=Cj0KCQiAvP-6BhDyARIsAJ3uv7aL2d0IlFz61--XDPzi50sJUl5JjeneJlk3ehYu3pTYgkyDz0C0_cMaAtzKEALw_wcB">24.01.2024; Allianz Risk Barometer 2024</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p>More Than 25% of U.K. Businesses Hit by Cyberattack in Last Year</p>
<p>A survey by the U.K.’s Royal Institution of Chartered Surveyors found an increase in the share of U.K. businesses experiencing a cyberattack in the last year from 16% in 2024 to around 27%. Nearly three-quarters (73%) of respondents to the survey expect a cybersecurity incident to impact their operations in the next one to two years. Risk areas identified by the survey include building management systems, CCTV networks, Internet of Things devices, access control systems, and other operational technologies.</p>
<p class="attribution">—<a class="reference external" href="https://www.theguardian.com/business/2025/jun/30/uk-businesses-hit-by-cyber-attack-last-year-report">July 2nd, 2025; Summary provided by ACM; Full article: Guardian</a></p>
</blockquote>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>Experten: Cyberangriff auf Jaguar ist teuerster in britischer Geschichte</strong></p>
<p>Wochenlang stand die Produktion von Jaguar Land Rover still. Das hatte nicht nur auf den britischen Autobauer erhebliche Auswirkungen.</p>
<p>Die Einbußen durch den wochenlangen erzwungenen Produktionsstopp belaufen sich demnach auf geschätzte 1,9 Milliarden Pfund (knapp 2,2 Milliarden Euro). Die Schätzung schließe den Schaden für Zulieferer und Händler mit ein, hieß es in einer Mitteilung des Cyber Monitoring Centre, einer unabhängigen Expertengruppe. Demnach waren mehr als 5000 Organisationen von dem Cyberangriff betroffen.</p>
<p class="attribution">—<a class="reference external" href="https://www.heise.de/news/Experten-Cyberangriff-auf-Jaguar-ist-teuerster-in-britischer-Geschichte-10811032.html">23.10.2025 - Heise Security</a></p>
</blockquote>
</ld-card></ld-deck></ld-topic>
<ld-topic id="wichtige-kennzahlen-bzgl-cybersecurity-vorfallen">
<h2>Wichtige Kennzahlen bzgl. Cybersecurity-Vorfällen<a class="brackets" href="#footnote-1" id="footnote-reference-1" role="doc-noteref"><span class="fn-bracket">[</span>1<span class="fn-bracket">]</span></a></h2>
<ld-supplemental><aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-1" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-1">1</a><span class="fn-bracket">]</span></span>
<p>Die Begriffe (MTTI, etc.) sind nicht einheitlich definiert und ggf. ist es sinnvoll zu klären welcher Zeitraum genau gemeint ist.</p>
</aside>
</aside>
</ld-supplemental><ld-story>
<dl class="incremental-list field-list">
<dt>Mean Time to Detection (MTTD)<span class="colon">:</span></dt>
<dd><p>Die mittlere Zeit, die benötigt wird, um einen Cyberangriff zu entdecken.</p>
</dd>
<dt>Mean Time to Identify (MTTI)<span class="colon">:</span></dt>
<dd><p>Die mittlere Zeit, die benötigt wird, um einen Cyberangriff zu identifizieren in der Hinsicht, dass die Schwachstelle erkannt wird bzw. die Art des Vorfalls erkannt wird und eine erste Idee entwickelt wird, wie gegen den Angriff vorgegangen werden kann.</p>
</dd>
<dt>Mean Time to Respond (MTTR)<span class="colon">:</span></dt>
<dd><p>Die mittlere Zeit, die benötigt wird, um auf einen Cyberangriff so zu reagieren, dass kein weiterer Schaden entsteht und der Weg zur Wiederherstellung der normalen Operationen eingeleitet werden kann.</p>
</dd>
<dt>Mean Time to Contain (MTTC)<span class="colon">:</span></dt>
<dd><p>Die mittlere Zeit, die benötigt wird, um einen Cyberangriff einzudämmen. D. h. die Zeit, die benötigt wird, um zu verhindern, dass sich der Angriff weiter ausbreitet.</p>
<p>MTTC = MTTD + MTTI + MTTR</p>
</dd>
<dt>Mean Time to Normal (MTTN) bzw. Mean Time to Recover/Restore/Resolve (MTTR)<span class="colon">:</span></dt>
<dd><p>Die mittlere Zeit, die benötigt wird, um die normalen Operationen wiederherzustellen.</p>
<p>Dies kann zum Beispiel auch die Zeit umfassen, die benötigt wird um etwaige Backups einzuspielen oder ggf. Firmware Patches einzuspielen.</p>
</dd>
</dl>
</ld-story><ld-supplemental><p>Die MTTD kann häufig nur im Nachgang genau ermittelt werden, sollte aber natürlich nachgefasst werden, um die eigenen Prozesse zu kontrollieren und ggf. zu verbessern. Insbesondere im Zusammenhang mit APTs können vergleichsweise lange Zeiträume bis zur Entdeckung vergehen. Zum Beispiel kann es sein, dass man als erstes feststellt, dass es unerwartete Verbindungen zu einem externen Server gibt. Zu diesem Zeitpunkt ist aber noch unklar wie der Angreifer vorgegangen ist, welche Daten ggf. schon abgeflossen sind und was genau zu tun ist, um den Angreifer zu stoppen. Es ist insbesondere auch noch nicht klar auf welche Systeme er bereits Zugriff hat.</p>
<p>Die Zeit bis zum Beispiel erkannt wurde, dass ein bestimmter Account ausgenutzt wurde und dieser dann gesperrt wurde, oder zum Beispiel bestimmte Netzwerkverbindungen effektiv blockiert werden und begonnen werden kann mit der Wiederherstellung der Systeme, wird als MTTR bezeichnet.</p>
<p>Die MTTC misst somit nicht wie lange es dauert bis alle Auswirkungen des Angriffs beseitigt sind/die normale Operation wiederhergestellt ist, sondern „nur“ wie lange es dauert die weitere Verbreitung zu stoppen.</p>
<aside class="admonition dd-margin-left-2em"><p class="admonition-title">Beispielszenario</p>
<dl class="field-list simple">
<dt>MTTD<span class="colon">:</span></dt>
<dd><p>Es kommt zu einer starken Häufung von gesperrten (z.B. Exchange-) Accounts aufgrund von zu vielen fehlschlagenden Anmeldeversuchen durch die vermeintlichen Nutzer. Aufgrund der hohen Zahl muss jedoch von einem Cyberangriff ausgegangen werden. <em>Durch eine Analyse der Log-Dateien kann festgestellt werden wann der Angriff begonnen hat und die MTTD ermittelt werden.</em></p>
</dd>
<dt>MTTI<span class="colon">:</span></dt>
<dd><p>Nach einer Analyse des Netzwerkverkehrs wird festgestellt, dass alle Anfragen von externen Rechnern aus einem definierten IP-Addressbereich erfolgen. (Eine Alternative wäre, dass die Anfragen von einem oder mehreren  internen Rechner ausgehen.) Dies ist die MTTI.</p>
</dd>
<dt>MTTR<span class="colon">:</span></dt>
<dd><p>Durch eine Rekonfiguration der Firewallregeln können die Anfragen blockiert werden und somit der Angriff eingedämmt werden. Dies ist die MTTR.</p>
</dd>
<dt>MTTN<span class="colon">:</span></dt>
<dd><p>Als letzter Schritt muss untersucht werden welche Credentials ggf. erfolgreich gestohlen wurden und ob diese bereits genutzt wurden/werden. Nach dem Abschluss dieser Schritte kann ggf. die MTTN ermittelt werden.</p>
</dd>
</dl>
</aside>
</ld-supplemental></ld-topic>
<ld-topic class="new-section transition-fade" id="angriffe-auf-die-schutzziele-der-it-sicherheit">
<h2>Angriffe auf die Schutzziele der IT-Sicherheit</h2>
</ld-topic>
<ld-topic id="ausgewahlte-angriffe-angriffsmethoden-und-bedrohungsszenarien">
<h2>Ausgewählte Angriffe, Angriffsmethoden und Bedrohungsszenarien</h2>
<ld-grid class="default-layout">
<ld-cell class="width-50" style="align-self:auto;">
<ul class="incremental-list list-with-explanations">
<li><p>Backdoors (<span class="ger">Hintertüren</span>)</p></li>
<li><p>(Distributed-)Denial-of-service Angriffe</p></li>
<li><p>Direct-access Angriffe</p>
<p>Physischer Angriff auf das System.</p>
</li>
<li><p>Eavesdropping (<span class="ger">Abhören</span>)</p></li>
<li><p><a class="reference internal" href="#malware">Malware</a></p></li>
<li><p>Person-in-the-middle Angriffe</p></li>
<li><p><a class="reference internal" href="#social-engineering-angriffe">Social-Engineering Angriffe</a></p></li>
</ul>
</ld-cell><ld-cell class="width-50" style="align-self:auto;">
<ul class="incremental-list list-with-explanations">
<li><p>Privilege escalation</p>
<p>Unterschieden wird: horizontal bzw. vertikal.</p>
</li>
<li><p>Side-channel attacks (<span class="ger">Seitenkanalangriffe</span>)</p></li>
<li><p>Spoofing (z. B. IP-Spoofing) (<span class="ger">Vortäuschen</span>)</p></li>
<li><p>Advanced Persistent Threats (APT)</p></li>
<li><p>Store-now, Decrypt-later (<span class="ger">Speichere jetzt, Entschlüssele später</span>)</p></li>
</ul>
</ld-cell></ld-grid><ld-supplemental><dl class="field-list simple">
<dt>Vertikale Privilege Escalation<span class="colon">:</span></dt>
<dd><p>Der Angreifer erhält Zugriff auf höhere Rechte, die er vorher nicht hatte.</p>
</dd>
<dt>Horizontale Privilege Escalation<span class="colon">:</span></dt>
<dd><p>Der Angreifer erhält Zugriff auf die Rechte einer anderen Person, die er vorher nicht hatte.</p>
</dd>
<dt>APT<span class="colon">:</span></dt>
<dd><p>Der Begriff <em>Advanced Persistent Threat</em> (≘ „fortgeschrittene, andauernde Bedrohung“) bezeichnet gezielte Cyberangriffe durch professionelle Gruppen (häufig <em>state sponsored</em>). Es werden in der Regel langfristige Ziele verfolgt. Diese dienen zum Beispiel der Spionage oder der Vorbereitung auf einen Cyberkrieg. Häufige Ziele sind Regierungen und Unternehmen sowie Organisationen, die über kritische Daten verfügen. Insbesondere in der Anfangsphase gehen die Angreifer sehr vorsichtig vor, um nicht entdeckt zu werden. Danach unterscheidet sich das Vorgehen je nach Zielsetzung. Häufig wird versucht den Zugriff auf das Zielsystem langfristig zu erhalten, um so an weitere Informationen zu gelangen.</p>
</dd>
</dl>
</ld-supplemental></ld-topic>

<ld-topic id="erweiterte-schutzziele">
<h2>Erweiterte Schutzziele</h2>
<p>Neben den primären Schutzzielen, gibt es eine Reihe weiterer kontextabhängiger Schutzziele:</p>
<dl class="incremental-list field-list simple">
<dt>Verbindlichkeit/Nichtabstreitbarkeit (<span class="eng">Accountability/Non-repudiation</span>)<span class="colon">:</span></dt>
<dd><p>Ein Akteur kann seine Handlungen nicht abstreiten.</p>
</dd>
<dt>Pseudo-/Anonymisierung<span class="colon">:</span></dt>
<dd><p>Eine Person kann nicht (mehr) identifiziert werden.</p>
</dd>
<dt>Authentizität (<span class="eng">Authenticity</span>)<span class="colon">:</span></dt>
<dd><p>Ist eine Information echt bzw. vertrauenswürdig?</p>
</dd>
</dl>
</ld-topic>
<ld-topic id="malware">
<h2>Malware</h2>
<p>Malware (<span class="eng">Malicious Software</span>) wird nach Verbreitungsweise und Verhalten klassifiziert:</p>
<ul class="incremental-list s-only simple">
<li><p>Viren (<span class="eng">Viruses</span></p></li>
<li><p>Würmer (<span class="eng">Worms</span>)</p></li>
<li><p>Trojaner (<span class="eng">Trojan Horses</span>)</p></li>
<li><p>Rootkits</p></li>
<li><p>Spyware</p></li>
<li><p><a class="reference internal" href="#ransomware">Ransomware</a></p></li>
<li><p>Wipers</p></li>
<li><p><span class="meta">Adware</span></p></li>
</ul>
<ld-supplemental><ul class="list-with-explanations">
<li><p><strong>Viren</strong> (<span class="eng">Viruses</span>)</p>
<p>Schadcode, der sich an bestehende Dateien anhängt und sich durch Benutzeraktionen verbreitet. Benötigt ein Wirtsprogramm und wird beim Ausführen der infizierten Datei aktiv.</p>
</li>
<li><p><strong>Würmer</strong> (<span class="eng">Worms</span>)</p>
<p>Eigenständige Programme, die sich selbstständig über Netzwerke verbreiten, ohne Benutzerinteraktion. Nutzen Sicherheitslücken zur automatischen Replikation.</p>
</li>
<li><p><strong>Trojaner</strong> (<span class="eng">Trojan Horses</span>)</p>
<p>Schadsoftware, die als nützliches oder harmloses Programm getarnt ist und vom Nutzer installiert wird. Öffnet oft Hintertüren (<span class="eng">Backdoors</span>) für weitere Angriffe.</p>
</li>
<li><p><strong>Rootkits</strong></p>
<p>Malware, die sich tief im System versteckt (oft auf Kernel-Ebene), mit dem Ziel nicht erkannt zu werden und dauerhaften, versteckten Zugriff zu ermöglichen.</p>
</li>
<li><p><strong>Spyware</strong></p>
<p>Malware, die heimlich Informationen sammelt und an Angreifer sendet (z. B. Tastatureingaben, Browserdaten, Anmeldeinformationen, persönliche Daten).</p>
</li>
<li><p><strong>Wipers</strong></p>
<p>Destruktive Malware, die Daten unwiederbringlich löscht oder zerstört - manchmal getarnt als Ransomware, aber ohne Wiederherstellungsmöglichkeit.</p>
</li>
</ul>
<aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><ul class="simple">
<li><p><em>Adware</em> - keine Malware im engeren Sinne obwohl in der Regel (auch) nicht erwünscht. Da Adware in der Regel keine (zu) schädlichen Funktionen ausführt und bewusst installiert wird, ist diese nicht illegal und wird nicht als Malware klassifiziert.</p></li>
</ul>
</aside></ld-supplemental></ld-topic>
<ld-topic id="ransomware">
<h2>Ransomware</h2>
<p>Es können verschiedene Arten bzw. Angriffstypen unterschieden werden:</p>
<ul class="incremental-list s-only simple">
<li><p>Locker/Screen Locker</p></li>
<li><p>Krypto</p></li>
<li><p>Scareware</p></li>
<li><p>Doxware/Leakware</p></li>
<li><p>Doppelte Erpressung (<span class="eng">Double Extortion Ransomware</span>)</p></li>
<li><p>Dreifache Erpressung (<span class="eng">Triple Extortion Ransomware</span>)</p></li>
<li><p><em>Ransomware as a Service (RaaS)</em></p></li>
</ul>
<ld-supplemental><ul class="list-with-explanations">
<li><p>Locker/Screen Locker</p>
<p>Die Nutzer werden aus dem System ausgesperrt.</p>
</li>
<li><p>Krypto</p>
<p>Verschlüsselung der Daten auf dem System.</p>
</li>
<li><p>Scareware</p>
<p>Fake Software - zeigt zum Beispiel Warnungen vor einem Virus - die den Nutzer dazu bringen sollen Geld zu zahlen.</p>
</li>
<li><p>Doxware/Leakware</p>
<p>Drohung zur Veröffentlichung sensibler Daten, wenn kein Lösegeld gezahlt wird.</p>
</li>
<li><p>Doppelte Erpressung (<span class="eng">Double Extortion Ransomware</span>)</p>
<p>Es werden nicht nur Daten verschlüsselt, sondern auch gestohlen und mit Veröffentlichung gedroht. (Kombination aus Krypto- und Doxware.)</p>
</li>
<li><p>Dreifache Erpressung (<span class="eng">Triple Extortion Ransomware</span>)</p>
<p>Zusätzlich zur doppelten Erpressung werden weitere Systeme des Opfers angegriffen (z. B. mittels DDoS), oder auch den Angestellten gedroht oder gedroht Geschäftspartner anzugreifen/zu informieren.)</p>
</li>
<li><p><em>Ransomware as a Service (RaaS)</em></p>
<p>Kriminelle können Ransomware mieten ohne eigene technische Expertise.</p>
</li>
</ul>
</ld-supplemental></ld-topic>

<ld-topic id="eigenschaften-von-social-engineering-angriffe">
<h2>Eigenschaften von Social-Engineering Angriffe</h2>
<ul class="incremental-list list-with-explanations">
<li><p><strong>sind häufig die Ursache für erfolgreiche Angriffe</strong></p>
<p>(Der Hacker Kevin Mitnick war praktisch immer aufgrund von Social-Engineering erfolgreich.)</p>
</li>
<li><p>stellen die größte Bedrohung für die Sicherheit von IT-Systemen dar</p></li>
<li><p>es wird angenommen, dass die betroffenen Personen es in vielen Fällen nicht merken</p>
<p><span class="incremental">(Beispiel: Fake Bewerbungsgespräch)</span></p>
</li>
<li><p>mittels OSINT kann die Vorbereitung von Social-Engineering Angriffen vereinfacht werden</p></li>
<li><p>neue technische Möglichkeiten (z. B. KI generierte Stimmen) erweitern die Angriffsmöglichkeiten</p></li>
</ul>
<ld-supplemental><p class="rubric">Beispiel eines fortgeschrittenen Social-Engineering Angriffs</p>
<p>Ein vom Angreifer bewusst eingefädeltes Bewerbungsgespräch für eine Position als Administrator könnte zum Beispiel dazu genutzt werden, um Informationen über das Zielsystem zu erhalten, die für einen Angriff nützlich sind (z. B. welche Software wird eingesetzt, wie sieht die Architektur aus, ...). In diesem Fall ist davon auszugehen, dass ein Bewerber zum Beispiel durch ein Headhunter eine gutes Angebot gemacht wird und er dann im Rahmen des Gesprächs gebeten wird eine Sicherheitsarchitektur darzustellen, die er einführen würde. Es ist dann davon auszugehen, dass er auf seine bisherige Erfahrung zurückgreift und diese darstellt und er somit die Architektur des Zielsystems offenlegt.</p>
<blockquote class="epigraph">
<p><strong>Fake job recruiters hide malware in developer coding challenges</strong></p>
<p>[Summary provided by <a class="reference external" href="https://technews.acm.org/archives.cfm?fo=2026-02-feb/feb-18-2026.html">ACM TechNews Feb. 18, 2026</a>:] Researchers at software supply-chain security firm ReversingLabs said North Korean hacking group <em>Lazarus</em> has rolled out a new version of its fake recruiter campaign, developing fake blockchain and crypto-trading companies and posting job offers on LinkedIn, Facebook, Reddit, and other platforms. The job offers target Python and JavaScript developers, who are asked to run, debug, and improve a given project to showcase their skills. The goal is to make them run the code, which installs and executes a remote access trojan on their computers.</p>
<p class="attribution">—<a class="reference external" href="https://www.bleepingcomputer.com/news/security/fake-job-recruiters-hide-malware-in-developer-coding-challenges/">Feb. 13, 2026 - Bleepingcomuter</a></p>
</blockquote>
<p class="rubric">Neue Gefahren</p>
<p>Durch KI generierte Stimmen kann es Angreifern gelingen, z. B. durch das Vortäuschen einer Notlage einer nahestehenden Person, an Informationen zu gelangen.</p>
</ld-supplemental></ld-topic>
<ld-topic id="one-question-saved-ferrari-from-a-deepfake-scam">
<h2><strong>One Question Saved Ferrari from a Deepfake Scam</strong></h2>
<blockquote class="epigraph">
<p>With one question, an executive at Ferrari stopped an effort to use deepfake technology to scam the company. CEO Benedetto Vigna (pictured) was impersonated on a call by deepfake software that, using a convincing imitation of Vigna's southern Italian accent, said he needed to discuss something confidential that required an unspecified currency-hedge transaction to be carried out. The executive started to have suspicions and asked, for identification purposes, the title of the book Vigna had recently recommended to him. With that, the call ended.</p>
<p class="attribution">—<a class="reference external" href="https://technews.acm.org/archives.cfm?fo=2024-07-jul/jul-29-2024.html">July 29th, 2024; Summary provided by ACM</a>; <a class="reference external" href="https://www.bloomberg.com/news/articles/2024-07-26/ferrari-narrowly-dodges-deepfake-scam-simulating-deal-hungry-ceo">July 26th, 2024; Original: ‘I Need to Identify You': How One Question Saved Ferrari From a Deepfake Scam - Bloomberg</a></p>
</blockquote>
</ld-topic>
<ld-topic id="social-engineering-angriffe-mit-direktem-it-security-bezug">
<h2>Social-Engineering Angriffe mit direktem IT-Security Bezug</h2>
<ld-story>
<dl class="incremental-list field-list">
<dt>Phishing and Spear Phishing<span class="colon">:</span></dt>
<dd><p><em>Phishing</em> nutzt elektr. Kommunikationswege um an Informationen zu gelangen (z. B. E-Mail oder SMS).</p>
<p><em>Spear phishing</em> ist Phishing, bei der der Angreifer auf eine bestimmte Zielgruppe oder sogar eine einzelne Person abzielt.</p>
<ld-supplemental><img alt="Typische „FedEx“ Phishing Email" class="align-center" src="images/phishing-mail-fake-fedex.webp" style="width: 900px;" />
</ld-supplemental></dd>
<dt>Smishing<span class="colon">:</span></dt>
<dd><p>Phishing mit Hilfe von SMS.</p>
</dd>
<dt>Vishing<span class="colon">:</span></dt>
<dd><p>Phishing mit Hilfe von Telefonanrufen.</p>
<p>(<a class="reference external" href="https://www.heise.de/hintergrund/Vishing-So-gelingt-der-Angriff-per-Telefon-selbst-auf-Grossunternehmen-10625451.html">August 2025; heise.de - Vishing: So gelingt der Angriff per Telefon selbst auf Großunternehmen</a>)</p>
<p>(Z. B. <a class="reference external" href="https://www.europol.europa.eu/publications-events/publications/vishing-calls">Anrufe von Europol</a>)</p>
</dd>
<dt>Quishing/QR phishing<span class="colon">:</span></dt>
<dd><p>Phishing mit Hilfe von QR Codes.</p>
<ld-supplemental><p>Beim Quishing/QR Phishing erstellt der Angreifer einen QR Code, der auf eine gefälschte Webseite führt. Der QR Code wird dann z. B. auf einem Plakat angebracht oder zum Beispiel an einer Säule zum Kaufen von Fahrkarten, um möglichst viele Personen glaubhaft zu erreichen.</p>
</ld-supplemental></dd>
<dt>Whaling<span class="colon">:</span></dt>
<dd><p>Spezialisierte Variante des <em>Spear-Phishing</em>, dass sich gegen hochrangige und sehr ausgewählte Personen richtet (z. B. den CEO eines Unternehmens).</p>
</dd>
<dt>Pharming<span class="colon">:</span></dt>
<dd><p>Manipulation des DNS-Servers, um den Nutzer auf eine gefälschte Webseite zu leiten, um dann sensitive Informationen zu erlangen.</p>
</dd>
<dt>Spam / Spam over Internet messaging (SPIM)<span class="colon">:</span></dt>
<dd><p>Unerwünschte und nicht angeforderte E-Mail-Nachrichten oder Nachrichten in sozialen Medien bzw. Instant Messaging-Diensten.</p>
</dd>
<dt>Dumpster Diving<span class="colon">:</span></dt>
<dd><p>Durchsuchen von „Müllcontainern“ nach Informationen, die für einen Angriff nützlich sein könnten.</p>
</dd>
<dt>Shoulder Surfing<span class="colon">:</span></dt>
<dd><p>Beobachten von Personen, die sich an einem Computer anmelden, um das Passwort zu erfahren oder die sensitive Informationen auf dem Schreibtisch liegen haben.</p>
</dd>
<dt>Identity Fraud<span class="colon">:</span></dt>
<dd><p>Identitätsdiebstahl. Der Angreifer gibt sich als jemand anderes aus, um an Informationen zu gelangen oder um eine Straftat zu begehen.</p>
</dd>
<dt>Invoice Scams<span class="colon">:</span></dt>
<dd><p>Versenden von Rechnungen, für Dienstleistungen und Produkte die man nicht gekauft hat (z. B. Rechnungen für Postzustellung.)</p>
</dd>
<dt>Credential Harvesting<span class="colon">:</span></dt>
<dd><p>Sammlung von Zugangsdaten, die durch Sicherheitslücken in Systemen oder durch Phishing erlangt wurden.</p>
<ld-supplemental><p>Credential Harvesting war insbesondere in der Anfangszeit von Github und Bitbucket verbreitet. Es wurden häufig Zugangsdaten und Zertifikate in öffentlichen Repositories gefunden, da die Nutzer diese im Quellcode hinterlegt hatten oder sogar als Ressourcen direkt eingebunden hatten.</p>
</ld-supplemental></dd>
<dt>Baiting (<span class="ger">Ködern</span>)<span class="colon">:</span></dt>
<dd><p>Der Angreifer bietet etwas an, um an Informationen zu gelangen (z. B. ein USB-Stick mit einem Virus, der sich beim Einstecken des USB-Sticks auf dem Rechner installiert.)</p>
</dd>
<dt>Watering Hole Attack<span class="colon">:</span></dt>
<dd><p>Der Angreifer infiziert eine Webseite, die von der Zielgruppe häufig besucht wird, um dann die Besucher der Webseite anzugreifen.</p>
</dd>
<dt>Typo Squatting<span class="colon">:</span></dt>
<dd><p>Ausnutzen von Tippfehlern durch das Registrieren einer Domain, die der Domain eines Zielunternehmens ähnelt, um dann Besucher der Webseite auf eine gefälschte Webseite zu leiten. (z. B. <cite>www.gooogle.com</cite>)</p>
</dd>
<dt>Juice Jacking/Choice Jacking<span class="colon">:</span></dt>
<dd><p>Angriffe auf Smartphones über manipulierte Ladegeräte. Beim Laden wird gleichzeitig Malware auf die Handys gespielt.</p>
<ld-supplemental><p>Klassisches Juice Jacking spielt (Stand 2025) auf aktuellen Smartphones von Apple und Google keine relevante Rolle mehr.</p>
<p>Choice Jacking war zum Beispiel bis iOS 18.4 möglich. Hierbei wird auf Fehler in den USB Implementierungen gesetzt. Insbesondere darauf, dass manche Geräte gleichzeitig USB Host und USB Device sein können - wider der Spezifikation. Dies wird dann ausgenutzt um zum Beispiel gleichzeitig eine Tastatur ein Ladegerät und eine Tastatur zu simulieren. Alternativ ist es ggf. möglich eine Bluetooth Tastatur zu simulieren. Beides wird dazu benötigt um die Dialoge, die vom Betriebssystem bei Geräteverbindungen aufgehen und als Schutz dienen sollen, unmittelbar abzunicken.</p>
<aside class="admonition admonition-links"><p class="admonition-title">Links</p>
<p><a class="reference external" href="https://www.derstandard.at/story/3000000266075/choice-jacking-grazer-forscher-zeigen-wie-man-daten-vom-handy-abzapft">https://www.derstandard.at/story/3000000266075/choice-jacking-grazer-forscher-zeigen-wie-man-daten-vom-handy-abzapft</a></p>
<p>bzw.</p>
<p><a class="reference external" href="https://www.blackhat.com/asia-25/briefings/schedule/index.html#watch-your-phone-novel-usb-based-file-access-attacks-against-mobile-devices-43262">https://www.blackhat.com/asia-25/briefings/schedule/index.html#watch-your-phone-novel-usb-based-file-access-attacks-against-mobile-devices-43262</a></p>
</aside>
</ld-supplemental></dd>
<dt>Dangling DNS/Subdomain Takeover<span class="colon">:</span></dt>
<dd><p>Angreifer registrieren alte Domains, die von Firmen (temporär genutzt) wurden, in der Hoffnung, dass es noch (relevanten) Datenverkehr mit diesen Domains gibt, da möglicherweise nicht aller Code/alle Konfigurationen entsprechend umgestellt wurden. Zum Beispiel auch im Zusammenhang mit Subdomains bei Diensten wie AWS oder GitHub.</p>
</dd>
<dt>Slopsquatting<span class="colon">:</span></dt>
<dd><p>Implementation von Sofwarepaketen/-bibliotheken, die es (bisher) <em>nicht</em> gibt, die jedoch von bestimmten LLMs häufig systematisch halluziniert werden und im generierten Code eingebunden werden. Die Pakete werden dann implementiert inkl. von den Nutzern ungewünschter Funktionalität.</p>
<ld-supplemental><p>Slopsquatting ist (Stand Anfang 2025) deswegen möglich, da LLMs beim Generieren von Code häufiger auf nicht-existierende Pakete verweisen und diese im generierten Code importieren. Welche Paket importiert werden ist pro LLM relativ stabil aber über LLM-Grenzen hinweg sehr unterschiedlich.</p>
</ld-supplemental></dd>
</dl>
</ld-story></ld-topic>
<ld-topic id="allgemeine-social-engineering-angriffe">
<h2>Allgemeine Social-Engineering Angriffe</h2>
<ld-story>
<dl class="incremental-list field-list">
<dt>Tailgating<span class="colon">:</span></dt>
<dd><p>Ein Angreifer nutzt die Zugangsberechtigung einer Person, um sich Zugang zu einem Gebäude zu verschaffen ohne dass die Person dies bemerkt oder gar zustimmt.</p>
<p>Dies kann z. B. durch Zugangsschleusen verhindert werden, die immer nur einer Person den Zugang gewähren.</p>
</dd>
<dt>Doxing<span class="colon">:</span></dt>
<dd><p>Sammeln und veröffentlichen von privaten Informationen über eine Person, um diese zu belästigen oder zu erpressen.</p>
</dd>
<dt>Hoax<span class="colon">:</span></dt>
<dd><p>Eine bewusste Falschmeldung, die Menschen dazu veranlasst etwas falsches zu glauben.</p>
<ld-supplemental><p>Ein Beispiel eines nicht-harmlosen Streichs (Hoax) ist die Falschmeldung vom 1. April 2003, dass Bill Gates gestorben sei. Diese Falschmeldung wurde von vielen Menschen geglaubt und hatte relevanten Einfluss auf den Aktienmarkt.</p>
</ld-supplemental></dd>
<dt>Impersonation oder Pretexting<span class="colon">:</span></dt>
<dd><p>Vorgabe einer falschen Identität (z. B. als Mitarbeiter des IT-Supports); d. h. der Angreifer gibt sich persönlich als jemand anderes aus, um an Informationen zu gelangen und nutzt dafür keine elektronischen Hilfsmittel.</p>
<p class="subtext">(Impersonation ≘ <span class="ger">Identitätsbetrug</span>, Pretexting ≘ <span class="ger">vortäuschen</span>)</p>
</dd>
<dt>Eavesdropping<span class="colon">:</span></dt>
<dd><p>Abhören von Gesprächen, um an relevante Informationen zu gelangen.</p>
</dd>
<dt>Eliciting Information<span class="colon">:</span></dt>
<dd><p>Der Angreifer versucht durch geschicktes Fragen an Informationen zu gelangen, die für einen Angriff nützlich sein könnten.</p>
</dd>
</dl>
</ld-story></ld-topic>
<ld-topic id="social-engineering-angriffe-quo-vadis">
<h2>Social-Engineering Angriffe - Quo Vadis</h2>
<dl class="field-list">
<dt><em>Noch zu benennen</em><span class="colon">:</span></dt>
<dd><p><em>Die Liste der Social-Engineering Angriffe darf nicht als abschließend betrachtet werden!</em></p>
<p>Neue Technologien (insbesondere durch KI getrieben) haben bereits zu neuen Angriffen geführt und werden vermutlich weitere Angriffe ermöglichen.</p>
</dd>
</dl>
</ld-topic>
<ld-topic id="angriffe-durch-ki">
<h2>Angriffe durch KI<a class="brackets" href="#footnote-2" id="footnote-reference-2" role="doc-noteref"><span class="fn-bracket">[</span>2<span class="fn-bracket">]</span></a></h2>
<blockquote class="epigraph">
<p><strong>Anthropic findet Antwort: Darum erpresste Claude Software-Entwickler</strong></p>
<p>Claude Opus 4 drohte in 96 Prozent der Tests mit Erpressung, um einer Abschaltung zu entgehen. [...]</p>
<ld-supplemental embed-in-document-flow><p>[Die Erpressung durch die KI war gegen den Mitarbeiter gerichtet, der für die Abschaltung/Ablösung der KI verantwortlich war und die KI nutzte dazu Wissen über eine Affäre des Mitarbeiters, die die KI aus der Beobachtung der Mail Kommunikation abgeleitet hat.]</p>
</ld-supplemental><p>[...] Laut Anthropic war besonders auffällig, dass die Modelle nicht impulsiv, sondern strategisch agierten.</p>
<p>[...] Das bedeutet, dass die Modelle in keinem Fall mehr erpressen. Den entscheidenden Durchbruch brachte das Training mit Dokumenten über Claudes Verfassung sowie fiktiven Geschichten über vorbildlich handelnde KI. [...]</p>
<p class="attribution">—<a class="reference external" href="https://www.heise.de/news/Anthropic-findet-Antwort-Darum-erpresste-Claude-Software-Entwickler-11290625.html">Heise.de; 12.5.2026</a></p>
</blockquote>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-2" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-2">2</a><span class="fn-bracket">]</span></span>
<p>Es handelt sich (noch) um ein Test-/Trainingsszenario.</p>
</aside>
</aside>
</ld-topic>
<ld-topic id="motivationstechniken-von-angreifern">
<h2>„Motivationstechniken“ von Angreifern</h2>
<ul class="incremental-list simple">
<li><p>Autorität: Der Angreifer gibt sich z. B. als Mitarbeiter des IT-Supports aus.</p></li>
<li><p>Einschüchterung (<span class="eng">Intimidation</span>)</p></li>
<li><p>Dringlichkeit (<em>„In 10 Minuten verschlüssele ich den Rechner.“</em>)</p></li>
<li><p>Konsens (<em>„Alle machen das so.“</em>)</p></li>
<li><p>Knappheit (<em>„Es sind nur noch drei Rechner nicht infiziert.“</em>)</p></li>
<li><p>Vertrautheit</p></li>
<li><p>Vertrauen</p></li>
</ul>
</ld-topic>

<ld-topic class="transition-scale" id="die-nis-2-richtlinie">
<h2>Die NIS 2 Richtlinie</h2>
<div class="peripheral docutils container">
<p><a class="reference external" href="https://eur-lex.europa.eu/legal-content/DE/TXT/HTML/?uri=CELEX:32022L2555#d1e40-80-1">Directive (EU) 2022/2555 of the European Parliament and of the Council of 14 December 2022 on measures for a high common level of cybersecurity across the Union, amending Regulation (EU) No 910/2014 and Directive (EU) 2018/1972, and repealing Directive (EU) 2016/1148 (NIS 2 Directive)</a></p>
</div>
</ld-topic>
<ld-topic id="nis-2-richtlinie-nis-2-directive">
<h2>NIS 2 Richtlinie (<span class="eng">NIS 2 Directive</span>)</h2>
<ld-story>
<ul class="incremental-list list-with-explanations">
<li><p>Die NIS2-Richtlinie ist die zweite EU-Richtlinie zur Netz- und Informationssicherheit (NIS) in der EU.</p></li>
<li><p><em>seit 17. Oktober 2024 hätten alle nationalstaaten entsprechende Regelungen in nationales Recht umgesetzt haben sollen und ab 18. Oktober 2024 anwenden sollen</em>; Deutschland hat dies im Nov. 2025 getan.</p></li>
<li><p>Das Hauptziel ist die Verbesserung der Widerstandsfähigkeit gegen Cyberkriminalität und die Verbesserung des europäischen und nationalen Cybersecurity-Managements.</p>
<p>Die neue NIS-2-Richtlinie zielt darauf ab, die Widerstandsfähigkeit und Reaktionsfähigkeit des öffentlichen und privaten Sektors zu verbessern. Der Schwerpunkt der Richtlinie liegt auf der Bekämpfung der Cyberkriminalität.</p>
</li>
<li><p>Die NIS-2-Richtlinie gilt für Organisationen, inkl. Unternehmen und Zulieferer, die durch Erbringung wesentlicher oder wichtiger Dienstleistungen eine entscheidende Rolle für die Aufrechterhaltung der europäischen Wirtschaft und Gesellschaft spielen.</p></li>
<li><p>Die Führungskräfte von betroffenen Einrichtungen sind für die Überwachung der Umsetzung der NIS-2-Richtlinie verantwortlich und können für Verstöße gegen die NIS-2-Richtlinie haftbar gemacht werden (Artikel 20).</p></li>
</ul>
</ld-story><ld-supplemental><blockquote class="epigraph">
<p><strong>Artikel 20, Governance</strong></p>
<ol class="arabic simple">
<li><p>Die Mitgliedstaaten stellen sicher, dass die Leitungsorgane wesentlicher und wichtiger Einrichtungen die von diesen Einrichtungen zur Einhaltung von Artikel 21 ergriffenen Risikomanagementmaßnahmen im Bereich der Cybersicherheit billigen, ihre Umsetzung überwachen und für Verstöße gegen diesen Artikel durch die betreffenden Einrichtungen verantwortlich gemacht werden können. [...]</p></li>
<li><p>Die Mitgliedstaaten stellen sicher, dass die Mitglieder der Leitungsorgane wesentlicher und wichtiger Einrichtungen an Schulungen teilnehmen müssen, und fordern wesentliche und wichtige Einrichtungen auf, allen Mitarbeitern regelmäßig entsprechende Schulungen anzubieten, um ausreichende Kenntnisse und Fähigkeiten zur Erkennung und Bewertung von Risiken sowie Managementpraktiken im Bereich der Cybersicherheit und deren Auswirkungen auf die von der Einrichtung erbrachten Dienste zu erwerben.</p></li>
</ol>
<p class="attribution">—NIS 2 - KAPITEL IV <a class="reference external" href="https://eur-lex.europa.eu/legal-content/DE/TXT/HTML/?uri=CELEX:32022L2555#d1e3310-80-1">RISIKOMANAGEMENTMAẞNAHMEN UND BERICHTSPFLICHTEN IM BEREICH DER CYBERSICHERHEIT</a></p>
</blockquote>
</ld-supplemental></ld-topic>
<ld-topic id="nis-2-berichtspflichten">
<h2>NIS 2 - Berichtspflichten</h2>
<ul class="simple">
<li><p>Wesentliche und wichtige Einrichtungen müssen unverzüglich (<em>in jeden Fall aber innerhalb von 24 Stunden</em>) über jeden Sicherheitsvorfall unterrichten, der erhebliche Auswirkungen auf die Erbringung ihrer Dienste hat</p></li>
<li><p>Ein Sicherheitsvorfall gilt als erheblich, wenn:</p>
<ol class="loweralpha simple incremental">
<li><p>er schwerwiegende Betriebsstörungen der Dienste oder finanzielle Verluste für die betreffende Einrichtung verursacht hat oder verursachen kann;</p></li>
<li><p>er andere natürliche oder juristische Personen durch erhebliche materielle oder immaterielle Schäden beeinträchtigt hat oder beeinträchtigen kann.</p></li>
</ol>
</li>
</ul>
</ld-topic>
<ld-topic id="von-nis2-betroffene-off-und-priv-einrichtungen">
<h2>Von NIS2 betroffene öff. und priv. Einrichtungen<a class="brackets" href="#footnote-4" id="footnote-reference-4" role="doc-noteref"><span class="fn-bracket">[</span>4<span class="fn-bracket">]</span></a></h2>
<p>Folgende Organisation mit mehr als 50 Mitarbeitern und einem Umsatz von mehr als 10 Millionen Euro müssen die NIS-2-Richtlinie einhalten (obligatorisch).</p>
<ul class="columns incremental-list">
<li><p></p>
<blockquote>
<ul class="simple">
<li><p>Post- und Kurierdienste</p></li>
<li><p>Abfallwirtschaft</p></li>
<li><p>Chemie</p></li>
<li><p>Lebensmittel</p></li>
<li><p>Herstellung medizinischer Geräten</p></li>
<li><p>Computer und Elektronik</p></li>
<li><p>Maschinen</p></li>
<li><p>Kraftfahrzeuge</p></li>
<li><p>Energie</p></li>
</ul>
</blockquote>
</li>
<li><p></p>
<blockquote>
<ul class="simple">
<li><p>Verkehrswesen</p></li>
<li><p>Bankwesen</p></li>
<li><p>Finanzmarkt-Infrastrukturen</p></li>
<li><p>Gesundheitswesen</p></li>
<li><p>Trinkwasserversorgung und -verteilung</p></li>
<li><p>Digitale Infrastrukturen</p></li>
<li><p>Online-Marktplätze</p></li>
<li><p>Online-Suchmaschinen</p></li>
<li><p>Cloud Computing-Dienste</p></li>
</ul>
</blockquote>
</li>
</ul>
<ld-supplemental><p>Bis zum 17. April 2025 erstellen die Mitgliedstaaten eine Liste von wesentlichen und wichtigen Einrichtungen und von Einrichtungen, die Domänennamen-Registrierungsdienste erbringen und aktualisieren sie gegebenenfalls regelmäßig — spätestens alle 2 Jahre.</p>
</ld-supplemental><aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-4" role="doc-footnote">

<p><a class="reference external" href="https://eur-lex.europa.eu/legal-content/DE/TXT/HTML/?uri=CELEX:32022L2555#d1e32-143-1">Details siehe Anhang I und II der NIS 2 Richtlinie</a></p>
</aside>
</aside>
</ld-topic>
<ld-topic class="no-title center-content" id="nis-2-nationale-cybersicherheitsstrategie">
<h2>NIS 2 - Nationale Cybersicherheitsstrategie</h2>
<aside class="admonition" data-theme="attention"><p class="admonition-title" data-theme="attention-header">Achtung!</p>
<p>Jeder Mitgliedstaat erlässt eine <em>nationale Cybersicherheitsstrategie</em>, die die strategischen Ziele, die zur Erreichung dieser Ziele erforderlichen Ressourcen sowie angemessene politische und regulatorische Maßnahmen zur Erreichung und Aufrechterhaltung eines hohen Cybersicherheitsniveaus enthält.</p>
</aside>
</ld-topic>
<ld-topic id="nis-2-zentrale-einrichtungen">
<h2>NIS 2 - zentrale Einrichtungen</h2>
<object class="light-image align-center" data="images/nis_2.svg" role="img" type="image/svg+xml">
</object><ld-supplemental><p>Ein zentraler Gedanke ist die Vernetzung der zuständigen Behörden sowohl auf nationaler als auch auf europäischer Ebene sicherzustellen.</p>
<aside class="admonition dd-margin-left-2em" data-theme="legend"><p class="admonition-title" data-theme="legend-header"><span>Legende</span></p><dl class="field-list simple">
<dt>CSIRT<span class="colon">:</span></dt>
<dd><p>Computer Security Incident Response Team</p>
</dd>
<dt>Behörden für das Krisenmanagement<span class="colon">:</span></dt>
<dd><p>Sollte es mehr als eine geben, so wird eine explizit benannt, die für die Koordination und das  Management von <em>Cybersicherheitsvorfällen großen Ausmaßes und Krisen</em> zuständig ist</p>
</dd>
</dl>
</aside></ld-supplemental></ld-topic>
<ld-topic class="new-section transition-fade" id="von-der-bedeutung-von-schwachstellen">
<h2>Von der Bedeutung von Schwachstellen</h2>
<p class="rubric">CVSS, CVE, CWE, CVD, KEV, EPSS, VEP</p>
</ld-topic>
<ld-topic class="new-subsection" id="common-vulnerability-scoring-system-cvss">
<h2>Common Vulnerability Scoring System (CVSS)</h2>
</ld-topic>
<ld-topic id="definition-von-schwachstellen-nach-cve">
<h2>Definition von Schwachstellen nach CVE</h2>
<ld-deck>
<ld-card>
<blockquote class="epigraph">
<p>&quot;Eine Schwachstelle in der Berechnungslogik (z. B. Code), die in Software- und Hardwarekomponenten gefunden wird <span class="incremental">und die, wenn sie ausgenutzt wird, zu einer negativen Auswirkung auf die Vertraulichkeit, Integrität oder Verfügbarkeit führt.</span> <span class="incremental">Die Behebung der Schwachstellen in diesem Zusammenhang umfasst in der Regel Änderungen am Code, kann aber auch Änderungen an der Spezifikation oder sogar die Ablehnung der Spezifikation (z. B. die vollständige Entfernung der betroffenen Protokolle oder Funktionen) beinhalten.&quot;</span></p>
<p class="attribution">—<a class="reference external" href="https://nvd.nist.gov/vuln">https://nvd.nist.gov/vuln</a> (Übersetzt mit DeepL)</p>
</blockquote>
</ld-card><ld-card class="incremental">
<p>Unterscheidung von Schwachstellen:</p>
<aside class="admonition incremental incremental-list" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: 0-Day</span></p><p>Eine Schwachstelle, die zum Zeitpunkt ihrer Entdeckung noch nicht (öffentlich) bekannt ist und für die es noch keinen (öffentlich verfügbaren) Patch gibt.</p>
</aside><aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: n-Day</span></p><p>Eine Schwachstelle, die bereits öffentlich bekannt ist und für die es einen Patch gibt, der (kontextabhängig) jedoch noch nicht angewendet wurde.</p>
</aside><aside class="admonition incremental" data-theme="attention"><p class="admonition-title" data-theme="attention-header">Achtung!</p>
<p>Auch N-Days sind häufig für Angreifer von Interesse, da es oft eine gewisse Zeit dauert, bis alle Systeme gepatcht sind bzw. überhaupt gepatcht werden (können).</p>
</aside>
</ld-card><ld-card class="incremental">
<blockquote class="epigraph">
<p><strong>Zero-Day Exploits Surge, Nearly 30% of Flaws Attacked Before Disclosure</strong></p>
<p>[...] shows zero-day and one-day exploitation is accelerating, up from 23.6% in 2024. [...]</p>
<p class="attribution">—<a class="reference external" href="https://www.infosecurity-magazine.com/news/zeroday-exploits-surge-vulncheck/">Infosecurity Magazine</a></p>
</blockquote>
<div class="incremental docutils container">
<p>Daten von <a class="reference external" href="https://www.vulncheck.com/blog/state-of-exploitation-2026">Vulncheck</a> zeigen, dass es in 2025 884 Schwachstellen gab, die ausgenutzt wurden:</p>
<ul class="simple">
<li><p>254 waren <em>0-Day</em> Schwachstellen (28.7%)</p></li>
<li><p>80 waren <em>1-31-Days</em> Schwachstellen (9.0%)</p></li>
<li><p>228 waren <em>32-365-Days</em> Schwachstellen (25.8%)</p></li>
<li><p>92 waren <em>1-2-Year</em> Schwachstellen (10.4%)</p></li>
<li><p>117 waren <em>2-4-Years</em> Schwachstellen (13.2%)</p></li>
<li><p>111 waren <em>4+ Years</em> Schwachstellen (12.5%)</p></li>
</ul>
</div>
</ld-card></ld-deck></ld-topic>
<ld-topic id="das-common-vulnerability-scoring-system-cvss">
<h2>Das Common Vulnerability Scoring System (CVSS)<a class="brackets" href="#footnote-5" id="footnote-reference-5" role="doc-noteref"><span class="fn-bracket">[</span>5<span class="fn-bracket">]</span></a></h2>
<div class="foundations docutils container">
<p>CVSS 4.0 stellt einen Rahmen bereit für die Beschreibung und Bewertung des Schweregrads von Software-/Hardware-/Firmwareschwachstellen.</p>
<div class="incremental docutils container">
<p>Die Bewertung der Basiskennzahlen ergibt eine Punktzahl zwischen 0,0 und 10,0. Wobei 0 bedeutet, dass die Schwachstelle (bisher) harmlos ist und 10,0 bedeutet, dass die Schwachstelle sehr gravierend ist.</p>
</div>
</div>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-5" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-5">5</a><span class="fn-bracket">]</span></span>
<p><a class="reference external" href="https://www.first.org/cvss/v4.0/specification-document">CVSS 4.0</a></p>
</aside>
</aside>
<ld-supplemental><p>Harmlos ist im Prinzip damit gleichzusetzen, dass die Schwachstelle nicht ausgenutzt werden kann oder dass die Auswirkungen nicht weiter relevant sind.</p>
</ld-supplemental></ld-topic>
<ld-topic id="gegensatzliche-krafte-bei-der-bewertung">
<h2>Gegensätzliche Kräfte bei der Bewertung</h2>
<ld-grid class="default-layout">
<ld-cell class="width-40" style="align-self:auto;">
<p><strong>Hersteller</strong> versuchen tendenziell eine Bewertung zu erhalten, die möglichst niedrig ist.</p>
</ld-cell><ld-cell class="width-20 font-size-400 text-align-center" style="align-self:auto;">
<p>⇔</p>
</ld-cell><ld-cell class="width-40" style="align-self:auto;">
<p><strong>Sicherheitsforscher</strong> versuchen eine möglichst hohe Bewertung zu erhalten.</p>
</ld-cell></ld-grid></ld-topic>
<ld-topic id="cvss-umfasst-vier-gruppen-von-metriken">
<h2>CVSS umfasst vier Gruppen von Metriken</h2>
<ol class="arabic simple incremental-list dhbw">
<li><p>Basis-Metriken (<span class="eng">Base Metrics</span>) erfassen die inhärenten Eigenschaften einer Schwachstelle, die sich nicht ändern, wenn sich die Umgebung ändert.</p></li>
<li><p>Bedrohungs-Metriken (<span class="eng">Threat Metric Group</span>) spiegelt die Merkmale einer Schwachstelle wieder, die sich im Laufe der Zeit verändern.</p></li>
</ol>
<ol class="arabic simple incremental-list dhbw fade-out" start="3">
<li><p>Umgebungs-Metriken (<span class="eng">Environmental Metric Group</span>) erfassen die Eigenschaften einer Schwachstelle, die sich ändern, wenn sich die Umgebung ändert.</p></li>
<li><p>Ergänzende-Metriken (<span class="eng">Supplemental</span>) liefern zusätzliche Informationen, die für die Bewertung einer Schwachstelle nützlich sein können, aber den Schweregrad nicht direkt beeinflussen.</p></li>
</ol>
</ld-topic>
<ld-topic id="cvss-basis-metriken-base-metric-group">
<h2>CVSS - Basis-Metriken (<span class="eng">Base Metric Group</span>)</h2>
<ld-grid class="default-layout">
<ld-cell class="width-45" style="align-self:auto;">
<p><strong>Bewertung der Ausnutzbarkeit</strong> (<span class="eng">Exploitability Metrics</span>)</p>
<ul class="incremental-list simple">
<li><p>Angriffsvektor (<span class="eng">Attack Vector</span>)</p></li>
<li><p>Angriffskomplexität (<span class="eng">Attack Complexity</span>)</p></li>
<li><p>Angriffsanforderungen (<span class="eng">Attack Requirements</span>)</p></li>
<li><p>Benötigte Privilegien (<span class="eng">Privileges Required</span>)</p></li>

<ld-topic id="cvss-bewertung-der-ausnutzbarkeit-exploitability-metrics">
<h2>CVSS - Bewertung der Ausnutzbarkeit (<span class="eng">Exploitability Metrics</span>)</h2>
<dl class="field-list simple">
<dt>Attack Vector (AV)<span class="colon">:</span></dt>
<dd><p>Network, Adjacent, Local, Physical</p>
</dd>
<dt>Attack Complexity (AC)<span class="colon">:</span></dt>
<dd><p>Low, High</p>
</dd>
<dt>Attack Requirements (AT)<span class="colon">:</span></dt>
<dd><p>None, Present</p>
</dd>
<dt>Privileges Required (PR)<span class="colon">:</span></dt>
<dd><p>None, Low, High</p>
</dd>
<dt>User Interaction (UI)<span class="colon">:</span></dt>
<dd><p>None, Passive, Active</p>
</dd>
</dl>
<ld-supplemental><p><strong>Attack Vector</strong></p>
<p><em>Network</em></p>
<p>Schwachstellen, die häufig „aus der Ferne ausnutzbar“ sind und als ein Angriff betrachtet werden können, der auf Protokollebene über einen oder mehrere Netzknoten hinweg (z. B. über einen oder mehrere Router) ausgenutzt werden kann.</p>
<p><em>Adjacent</em></p>
<p>Der Angriff ist auf eine logisch benachbarte Topologie beschränkt. Dies kann z. B.  bedeuten, dass ein Angriff aus demselben gemeinsamen Nahbereich (z. B. Bluetooth, NFC oder IEEE 802.11) oder logischen Netz (z. B. lokales IP-Subnetz) gestartet werden muss.</p>
<p><em>Local</em></p>
<p>Der Angreifer nutzt die Schwachstelle aus, indem er lokal auf das Zielsystem zugreift (z. B. Tastatur, Konsole) oder über eine Terminalemulation (z. B. SSH); oder der Angreifer verlässt sich auf die Interaktion des Benutzers, um die zum Ausnutzen der Schwachstelle erforderlichen Aktionen durchzuführen (z. B. mithilfe von Social-Engineering-Techniken, um einen legitimen Benutzer zum Öffnen eines bösartigen Dokuments zu verleiten).</p>
<p><em>Physical</em></p>
<p>Der Angreifer muss physisch Zugriff auf das Zielsystem haben, um die Schwachstelle auszunutzen.</p>
<p><strong>Attack Complexity</strong></p>
<p>Wie aufwendig ist es explizite Schutzmaßnahmen ((K)ASLR, Stack Canaries, ...) zu umgehen. Wie wahrscheinlich ist es, dass ein Angriff erfolgreich ist. Im Falle von <span class="eng">Race Conditions</span> können ggf. sehr viele Ausführungen notwendig sein bevor die Race Condition erfüllt ist.</p>
<p><strong>Attack Requirements</strong></p>
<p>Welcher Vorbedingungen (unabhängig von den expliziten Sicherungsmaßnahmen) müssen erfüllt sein, damit die Schwachstelle ausgenutzt werden kann. (z. B. der Nutzer muss sich an seinem Smartphone mindestens einmal seit dem Boot angemeldet haben (<em>After-First-Use</em> vs. <em>Before-First-Use</em>.))</p>
<p><strong>Privileges Required</strong></p>
<p>Welche Privilegien muss der Angreifer mindestens haben, um die Schwachstelle auszunutzen (Sind Adminstratorrechte erforderlich oder reichen normale Benutzerrechte).</p>
<p><strong>User Interaction</strong></p>
<p>Passiv bedeutet hier, dass der Nutzer unfreiwillig die Schwachstelle ausnutzt ohne bewusst Schutzmechanismen zu unterlaufen. Aktiv bedeutet, dass der Nutzer aktiv Interaktionen unternimmt, um die Schutzmechanismen des Systems auszuhebeln (z. B. durch das Installieren einer nicht-signierten Anwendung aus dem Internet).</p>
</ld-supplemental></ld-topic>

<ld-topic class="exercises transition-move-left" id="diskussion-schwachstellen-und-ihre-bewertung">
<h2>Diskussion: Schwachstellen und Ihre Bewertung</h2>
<div class="ld-exercise" data-exercise-id="2" data-exercise-title="2" id="ld-exercise-2">
<p>Ihnen liegt eine externe Festplatte mit AES-256-XTX basierter Hardwareverschlüsselung vor. Das entsperren der Festplatte geschieht mit Hilfe eines speziellen Programms, dass ggf. vorher installiert werden muss und als Schutzmechanismus ein Passwort vorsieht.</p>
<p>Das Clientprogramm hasht erst das Passwort clientseitig, bevor es den Hash an den Controller der Festplatte überträgt. Die Firmware des Controllers validiert das Passwort in dem es den gesendeten Hash direkt mit dem bei der Einrichtung übermittelten Hash vergleicht; d. h. es finden keine weiteren sicherheitsrelevanten Operationen außer dem direkten Vergleich statt. Zum Entsperren der Festplatte ist es demzufolge ausreichend, den Hash aus der Hardware auszulesen und diesen an den Controller zu senden, um die Festplatte zu entsperren. Danach kann auf die Daten frei zugegriffen werden.</p>
<ol class="arabic simple">
<li><p>Ermitteln Sie den <a class="reference external" href="https://www.first.org/cvss/v4-0/">CVSS 4.0 Score</a> für diese Schwachstelle. (<a class="reference external" href="https://www.first.org/cvss/calculator/4.0">CVSS Rechner</a>)</p></li>
<li><p>Welche Anwendungsfälle sind für diese Schwachstelle denkbar?</p></li>
</ol>
</div>
</ld-topic>

<ld-topic id="national-vulnerability-database-nvd">
<h2>National Vulnerability Database (<a class="reference external" href="https://nvd.nist.gov/">NVD</a>)<a class="brackets" href="#footnote-7" id="footnote-reference-7" role="doc-noteref"><span class="fn-bracket">[</span>7<span class="fn-bracket">]</span></a></h2>
<ul class="incremental-list simple">
<li><p>Auflistung aller CVEs und deren Bewertung</p></li>
<li><p>Alle Schwachstellen in der NVD sind mit einer CVE-Kennung versehen</p></li>
<li><p>Die NVD ist ein Produkt der NIST Computer Security Division, Information Technology Laboratory</p></li>
<li><p>Verlinkt häufig weiterführend Seiten, die Lösungshinweise und Tools bereitstellen, um die Schwachstelle zu beheben</p></li>
<li><p>Verweist auf entsprechende Schwachstellen gemäß <a class="reference external" href="https://cwe.mitre.org/">CWEs</a></p></li>

<ld-supplemental><p>Die Lücke ist auf die folgenden Zeilen zurückzuführen:</p>
<pre class="code c literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name">Var</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="keyword">const</span><span class="whitespace"> </span><span class="keyword type">char</span><span class="whitespace"> </span><span class="operator">*</span><span class="punctuation">)</span><span class="name">websGetVar</span><span class="punctuation">(</span><span class="name">a1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="error">“</span><span class="name">FileName</span><span class="error">”</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="operator">&amp;</span><span class="name">byte_42FE28</span><span class="punctuation">);</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="punctuation">...</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace"></span><span class="name">doSystem</span><span class="punctuation">(</span><span class="error">“</span><span class="name">mv</span><span class="whitespace"> </span><span class="operator">%</span><span class="name">s</span><span class="whitespace"> </span><span class="operator">%</span><span class="name">s</span><span class="error">”</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">Var</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">v52</span><span class="punctuation">);</span></code></pre>
<p>Der Aufruf von <code>doSystem</code> ermöglicht die Ausführung von beliebigem Code. Der Angreifer kann den Wert von <code>Var</code> so manipulieren, dass er quasi beliebigen Code ausführen kann.</p>
</ld-supplemental></ld-topic>
<ld-topic id="ausgenutzte-schwachstellen">
<h2>Ausgenutzte Schwachstellen</h2>
<p>Der <a class="reference external" href="https://www.cisa.gov/known-exploited-vulnerabilities-catalog">Known Exploited Vulnerabilities (KEV) Katalog der CISA</a> umfasst Produkte deren Schwachstellen ausgenutzt wurden oder aktiv ausgenutzt werden.</p>
<ul class="incremental-list list-with-sublists simple">
<li><p>Kriterien für die Aufnahme in den KEV Katalog:</p>
<ol class="arabic simple">
<li><p>Eine CVE-Id liegt vor.</p></li>
<li><p>Die Schwachstelle wird aktiv ausgenutzt (<span class="eng">Active Exploitation</span>) (ggf. reicht es jedoch wenn „nur“ ein <em>Honeypot</em> aktiv angegriffen wurde) - ein PoC reicht nicht aus.</p></li>
<li><p>Eine Handlungsempfehlung liegt vor (z. B. Patch, Workaround oder vollständige Abschaltung).</p></li>
</ol>
</li>
<li><p>Firmen sollten die KEV <em>Schwachstellen priorisieren</em>, um die Wahrscheinlichkeit eines erfolgreichen Angriffs zu verringern.</p></li>
</ul>
<ld-supplemental><p>CISA = <em>Cybersecurity and Infrastructure Security Agency</em> (oder <em>America's Cyber Defense Agency</em>)</p>
<p>Ausgewählte Amerikanische Behörden sind sogar verpflichtet innerhalb vorgegebener Zeiträume zu reagieren.</p>
</ld-supplemental></ld-topic>
