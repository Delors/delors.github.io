<div class="ld-exercise" data-exercise-id="15" data-exercise-title="15 - Zweistufige Indexberechnung" id="ld-exercise-15">
<p class="ld-exercise-title rubric">Zweistufige Indexberechnung</p>
<p>Bei der konkreten Verwendung entsteht der Tabellenindex in <strong>zwei Stufen</strong>: zuerst die Hashfunktion, dann der eigentliche Index.</p>
<ol class="loweralpha simple">
<li><p>Beschreiben Sie beide Stufen und ordnen Sie zu, wer jeweils zuständig ist (Schlüsseltyp vs. Datenstruktur).</p></li>
<li><p>Was passiert mit dem Hashwert und mit dem Index, wenn die Tabelle vergrößert wird?</p></li>
<li><p>Warum ist diese Trennung sinnvoll?</p></li>
