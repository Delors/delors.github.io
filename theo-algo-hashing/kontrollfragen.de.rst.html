<li><p>Beschreiben Sie beide Stufen und ordnen Sie zu, wer jeweils zuständig ist (Schlüsseltyp vs. Datenstruktur).</p></li>
<li><p>Was passiert mit dem Hashwert und mit dem Index, wenn die Tabelle vergrößert wird?</p></li>
