<div class="ld-exercise" data-exercise-id="1" data-exercise-title="1 - Grundlagen" id="ld-exercise-1">
<p class="ld-exercise-title rubric">Grundlagen</p>
<ol class="arabic incremental-list list-with-explanations">
<li><p>Warum sind Betriebsmodi von Nöten? Begründen Sie mit einem Beispiel.</p></li>
<li><p>Eignet sich CBC für die Verwendung einer Blockchiffre als Stromchiffre?</p></li>
<li><p>Nennen Sie zwei <em>allg.</em> Verfahren für das Padding von Nachrichten und erklären Sie diese kurz.</p></li>
<li><p>Welche Kriterien können zur Bewertung eines Operationsmodus herangezogen werden?</p></li>
<li><p>Verhalten sich alle Betriebsmodi bei Bitfehlern im Chiffretext - zum Beispiel aufgrund von Übertragungsfehlern - gleich?</p>
<p>(D.h. wenn einzelne Bits des Chiffretexts gekippt sind.)</p>
</li>
</ol>
