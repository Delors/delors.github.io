<ld-topic id="betriebsmodi">
<h2>Betriebsmodi</h2>
<ul class="simple">
<li><p>Eine Technik zur Verbesserung der Wirkung eines kryptografischen Algorithmus oder zur Anpassung des Algorithmus an ein Anwendungsszenario. Insbesondere in Abhängigkeit von der Länge des Klartexts.</p></li>
</ul>
<ul class="incremental simple">
<li><p>Um eine Blockchiffre in einer Vielzahl von Anwendungen einsetzen zu können, hat das NIST fünf Betriebsmodi definiert.</p>
<ul>
<li><p>Die fünf Modi decken eine breite Palette von Verschlüsselungsanwendungen ab, für die eine Blockchiffre verwendet werden kann.</p></li>
<li><p>Diese Modi sind für die Verwendung mit jeder symmetrischen Blockchiffre vorgesehen, einschließlich 3DES und AES.</p></li>
</ul>
</li>
</ul>
</ld-topic>

<ld-topic id="padding-modi-in-blockchiffren">
<h2>Padding-Modi in Blockchiffren</h2>
<ld-deck>
<ld-card>
<aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><p>Bei Blockchiffren (z. B. AES mit 128 Bit = 16 Byte Blockgröße) muss die zu verschlüsselnde Nachricht eine exakte Vielfache der Blockgröße sein. Ist das nicht der Fall, wird Padding verwendet, um die Nachricht auf ein vielfaches der Blockgröße zu bringen.</p>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">PKCS#7</p>
<p>Füllt den restlichen Block mit Bytes, deren Wert gleich der Anzahl hinzugefügter Bytes ist.</p>
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><ul class="simple">
<li><p>Nachricht mit 13 Byte → 3 Bytes Padding → <span class="docutils literal">03 03 03</span></p></li>
<li><p>Nachricht mit Blocklänge (z. B. 16 Byte) → ein kompletter zusätzlicher Block mit 16 × <span class="docutils literal">0x10</span></p></li>
</ul>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">ANSI X.923</p>
<p>Auffüllen mit <span class="docutils literal">0x00</span>, außer dem letzten Byte, das die Anzahl Padding-Bytes angibt.</p>
</ld-card><ld-card class="incremental">
<p class="rubric">ISO/IEC 7816-4</p>
<p>Beginnt mit <span class="docutils literal">0x80</span>, gefolgt von Nullen.</p>
</ld-card><ld-card class="incremental">
<p class="rubric">Zero Padding</p>
<p>Füllt mit Nullen (<span class="docutils literal">0x00</span>) auf.</p>
<aside class="admonition incremental" data-theme="attention"><p class="admonition-title" data-theme="attention-header">Achtung!</p>
<p>Funktioniert <em>nur</em>, wenn die Nachricht nie mit <span class="docutils literal">0x00</span> endet, sonst ist Entschlüsselung mehrdeutig!</p>
</aside>
</ld-card><ld-card class="incremental">
<p class="rubric">Verhalten bei voller Blockgröße - Zusammenfassung</p>
<p>Angenommen, die Nachricht ist exakt 16 Byte lang (z. B. <cite>&quot;1234567890ABCDEF&quot;</cite>), so ergibt sich:</p>
<table class="table-data-monospaced font-size-90">
<thead>
<tr><th class="head"><p><strong>Padding-Modus</strong></p></th>
<th class="head"><p><strong>Erweiterte Nachricht (hex)</strong></p></th>
</tr>
</thead>
<tbody>
<tr><td><p>PKCS#7</p></td>
<td><p>... 10 10 10 10 10 10 10 10 10 10 10 10 10 10 10 10</p></td>
</tr>
<tr><td><p>ANSI X.923</p></td>
<td><p>... 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 10</p></td>
</tr>
<tr><td><p>ISO/IEC 7816-4</p></td>
<td><p>... 80 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00</p></td>
</tr>
<tr><td><p>Zero Padding</p></td>
<td><p>... 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00</p></td>
</tr>
</tbody>
</table>
<aside class="admonition incremental" data-theme="hint"><p class="admonition-title" data-theme="hint-header">Hinweis</p>
<p>Bei allen Modi wird bei Nachrichten mit dem x-fachen der Blocklänge ein <strong>zusätzlicher</strong> Padding-Block hinzugefügt, um bei der Entschlüsselung korrekt erkennen zu können, ob Padding entfernt werden muss.</p>
</aside>
</ld-card></ld-deck></ld-topic>

</ld-topic>
<ld-topic id="konvertierung-von-blockchiffren-in-stromchiffre">
<h2>Konvertierung von Blockchiffren in Stromchiffre</h2>
<aside class="admonition float-right width-40 incremental" data-theme="hint"><p class="admonition-title" data-theme="hint-header">Hinweis</p>
<p>Es gibt drei Modi, die es ermöglichen, eine Blockchiffre in eine zeichenorientierte Stromchiffre umzuwandeln:</p>
<ul class="simple">
<li><p>Cipher Feedback Mode (CFB)</p></li>
<li><p>Output Feedback Mode (OFB)</p></li>
<li><p>Counter Mode (CTR)</p></li>
</ul>
<p>D. h., es ist kein Auffüllen (<span class="eng">Padding</span>) erforderlich, wenn die Nachricht nicht ein Vielfaches der Blockgröße ist.</p>
</aside>
<p>Bei AES, DES oder jeder anderen Blockchiffre erfolgt die Verschlüsselung immer Block-für-Block mit Blockgrößen von b Bits:</p>
<ul class="simple">
<li><p>Im Fall von (3)DES: b = 64</p></li>
<li><p>Im Fall von AES: b = 128</p></li>
</ul>
</ld-topic>

<ld-topic id="counter-mode-vorteile">
<h2><em>Counter Mode</em> - Vorteile</h2>
<dl class="incremental-list field-list simple">
<dt>Hardware-Effizienz<span class="colon">:</span></dt>
<dd><p>kann von der Parallelisierung der Hardware profitieren</p>
</dd>
<dt>Software-Effizienz<span class="colon">:</span></dt>
<dd><p>leicht parallelisierbar in Software</p>
</dd>
<dt>Vorverarbeitung<span class="colon">:</span></dt>
<dd><p>die Verschlüsselung der Zähler</p>
</dd>
<dt>Zufälliger Zugriff<span class="colon">:</span></dt>
<dd><p>der i-te Block des Klartextes/des Chiffretextes kann im Zufallszugriff verarbeitet werden</p>
</dd>
<dt>Nachweisbare Sicherheit<span class="colon">:</span></dt>
<dd><p>genauso sicher wie die anderen Verfahren</p>
</dd>
<dt>Einfachheit<span class="colon">:</span></dt>
<dd><p>es wird nur der Verschlüsselungsalgorithmus benötigt</p>
</dd>
</dl>
</ld-topic>
<ld-topic id="betriebsmodi-ubersicht">
<h2>Betriebsmodi - Übersicht</h2>
<ld-story>
<table class="accentuate-header zebra incremental-table-rows sticky-header" style="width: 100%;">
<colgroup>
<col style="width: 20.0%" />
<col style="width: 40.0%" />
<col style="width: 40.0%" />
</colgroup>
<thead>
<tr><th class="head"><p>Modus</p></th>
<th class="head"><p>Beschreibung</p></th>
<th class="head"><p>Typische Anwendung</p></th>
</tr>
</thead>
<tbody>
<tr><td><p><strong>Electronic Codebook (ECB)</strong></p></td>
<td><p>Jeder Block von Klartextbits wird unabhängig voneinander mit demselben Schlüssel verschlüsselt.</p></td>
<td><ul class="simple">
<li><p>Sichere Übertragung einzelner Werte (z. B. eines Verschlüsselungsschlüssels)</p></li>
</ul>
</td>
</tr>
<tr><td><p><strong>Cipher Block Chaining (CBC)</strong></p></td>
<td><p>Die Eingabe für den Verschlüsselungsalgorithmus ist die XOR-Verknüpfung des nächsten Klartextblocks mit dem vorangegangenen Chiffretextblock.</p></td>
<td><ul class="simple">
<li><p>Universelle blockorientierte Übertragung</p></li>
<li><p>Authentifizierung</p></li>
</ul>
</td>
</tr>
<tr><td><p><strong>Cipher Feedback (CFB)</strong></p></td>
<td><p>Die Eingabe wird <em>Bit für Bit</em> verarbeitet.
Der vorhergehende Chiffretext wird als Eingabe für den Verschlüsselungsalgorithmus verwendet, um eine pseudozufällige Ausgabe zu erzeugen, die mit dem Klartext XOR-verknüpft wird, um die nächste Einheit des Chiffretextes zu erzeugen.</p></td>
<td><ul class="simple">
<li><p>Allgemeine stromorientierte Übertragung</p></li>
<li><p>Authentifizierung</p></li>
</ul>
</td>
</tr>
<tr><td><p><strong>Output Feedback (OFB)</strong></p></td>
<td><p>Ähnlich wie CFB, mit dem Unterschied, dass die Eingabe für den Verschlüsselungsalgorithmus die vorangegangene Verschlüsselungsausgabe ist, und volle Blöcke verwendet werden.</p></td>
<td><ul class="simple">
<li><p>Stromorientierte Übertragung über verrauschte Kanäle (z. B. Satellitenkommunikation)</p></li>
</ul>
</td>
</tr>
<tr><td><p><strong>Counter (CTR</strong>)</p></td>
<td><p>Jeder Klartextblock wird mit einem verschlüsselten Zähler XOR-verknüpft. Der Zähler wird für jeden nachfolgenden Block erhöht.</p></td>
<td><ul class="simple">
<li><p>Blockorientierte Übertragung für allgemeine Zwecke</p></li>
<li><p>Nützlich für Hochgeschwindigkeitsanforderungen</p></li>
</ul>
</td>
</tr>
</tbody>
</table>
</ld-story></ld-topic>
<ld-topic class="new-section transition-fade" id="spezielle-betriebsmodi">
<h2>Spezielle Betriebsmodi</h2>
</ld-topic>
<ld-topic id="xts-aes-modus-fur-block-orientierte-speichergerate">
<h2>XTS-AES Modus für block-orientierte Speichergeräte</h2>
<p>2010 vom NIST als zusätzlicher Blockchiffre-Betriebsmodus genehmigt.</p>
<p>Modus ist auch ein IEEE-Standard, IEEE Std 1619-2007</p>
<aside class="admonition" data-theme="note"><p class="admonition-title" data-theme="note-header">Frage</p>
<p>Welche potenziellen Bedrohungen sind relevant?</p>
</aside>
<ul class="simple">
<li><p>Die Norm beschreibt eine Verschlüsselungsmethode für Daten, die in sektor-basierten Geräten gespeichert sind, wobei das Bedrohungsmodell einen möglichen Zugriff des Gegners auf die gespeicherten Daten beinhaltet.</p></li>
<li><p>Hat breite Unterstützung der Industrie erhalten.</p></li>
</ul>
</ld-topic>
<ld-topic id="tweakable-blockchiffren-bestandteile">
<h2><em>Tweakable</em> Blockchiffren - Bestandteile</h2>
<ul class="simple">
<li><p>Der XTS-AES-Modus basiert auf dem Konzept einer veränderbaren (<span class="eng">tweakable</span>) Blockchiffre.</p></li>
<li><p>Um den Chiffriertext zu berechnen, wird benötigt:</p>
<ul>
<li><p><strong>Klartext</strong></p></li>
<li><p><strong>Symmetrischer Schlüssel</strong></p></li>
<li><p><strong>Tweak</strong></p></li>
</ul>
</li>
<li><p>Der <em>Tweak</em> muss nicht geheim gehalten werden; der Zweck ist, Variabilität zu bieten.</p></li>
</ul>
<ld-supplemental><p>Ein Tweak ist insbesondere bei der Verschlüsselung von Daten auf Speichergeräten wichtig, da der gleiche Klartext an verschiedenen Stellen in verschiedene Chiffretexte verschlüsselt wird, aber immer in denselben Chiffretext, wenn er wieder an dieselbe Stelle geschrieben wird. Ein Tweak ist ein Modifikator, der für die unterschiedliche Verarbeitung gleicher Daten sorgt.</p>
</ld-supplemental></ld-topic>
<ld-topic id="tweakable-blockchiffren-grundlegende-struktur">
<h2><em>Tweakable</em> Blockchiffren - grundlegende Struktur</h2>
<ld-deck class="light-image">
<ld-card>
<object class="align-center" data="drawings/operationsmodi/tweakable_block_cipher-encryption.svg" role="img" type="image/svg+xml">
</object></ld-card><ld-card class="overlay incremental">
<object class="align-center" data="drawings/operationsmodi/tweakable_block_cipher-decryption.svg" role="img" type="image/svg+xml">
</object></ld-card></ld-deck><ld-supplemental embed-in-document-flow><dl class="dd-margin-left-2em field-list simple">
<dt>P<sub>j</sub><span class="colon">:</span></dt>
<dd><p>Der j-te Block des Klartexts. Alle Blöcke haben eine feste Länge. Eine (Klartext)dateneinheit – in der Regel ein Festplattensektor – besteht aus einer Folge von Klartextblöcken.</p>
</dd>
<dt>C<sub>j</sub><span class="colon">:</span></dt>
<dd><p>Der j-te Block des Chiffretextes.</p>
</dd>
<dt>j<span class="colon">:</span></dt>
<dd><p>Die fortlaufende Nummer des Blocks innerhalb der Dateneinheit.</p>
</dd>
<dt>T<sub>i</sub><span class="colon">:</span></dt>
<dd><p>Der Wert des Tweaks.</p>
</dd>
</dl>
</ld-supplemental></ld-topic>
<ld-topic id="anforderungen-an-die-speicherverschlusselung">
<h2>Anforderungen an die Speicherverschlüsselung</h2>
<p>Die Anforderungen an die Verschlüsselung gespeicherter Daten, die auch als <em>data at rest</em> bezeichnet werden, unterscheiden sich von denen für übertragene Daten.</p>
<p>Die IEEE Norm P1619 wurde in Hinblick auf folgende Eigenschaften entwickelt:</p>
<ld-story>
<ul class="incremental-list simple">
<li><p>Der Chiffretext ist für einen Angreifer frei verfügbar.</p></li>
<li><p>Das Datenlayout wird auf dem Speichermedium und beim Transport nicht verändert.</p></li>
<li><p>Der Zugriff auf die Daten erfolgt in Blöcken fester Größe und unabhängig voneinander.</p></li>
<li><p>Die Verschlüsselung erfolgt in 16-Byte-Blöcken, die unabhängig voneinander sind.</p></li>
<li><p>Es werden keine weiteren Metadaten verwendet, außer der Position der Datenblöcke innerhalb des gesamten Datensatzes.</p></li>
<li><p>Derselbe Klartext wird an verschiedenen Stellen in verschiedene Chiffretexte verschlüsselt, aber immer in denselben Chiffretext, wenn er wieder an dieselbe Stelle geschrieben wird.</p></li>
<li><p>Ein standardkonformes Gerät kann für die Entschlüsselung von Daten konstruiert werden, die von einem anderen standardkonformen Gerät verschlüsselt wurden.</p></li>
</ul>
</ld-story></ld-topic>
<ld-topic id="xts-aes-operation-auf-einem-block">
<h2>XTS-AES Operation auf einem Block</h2>
<object class="light-image align-center" data="drawings/operationsmodi/xts_aes.svg" role="img" type="image/svg+xml">
</object><ld-supplemental embed-in-document-flow><dl class="dd-margin-left-2em field-list simple">
<dt>Schlüssel<span class="colon">:</span></dt>
<dd><p>es gilt: Schlüssel = Schlüssel<sub>1</sub> || Schlüssel<sub>2</sub></p>
</dd>
<dt>P<sub>j</sub><span class="colon">:</span></dt>
<dd><p>Der j-te Block des Klartexts. Alle Blöcke haben eine Länge von 128 bits. Eine (Klartext)dateneinheit – in der Regel ein Festplattensektor – besteht aus einer Folge von Klartextblöcken.</p>
</dd>
<dt>C<sub>j</sub><span class="colon">:</span></dt>
<dd><p>Der j-te Block des Chiffretextes.</p>
</dd>
<dt>j<span class="colon">:</span></dt>
<dd><p>Die fortlaufende Nummer des 128-Bit-Blocks innerhalb der Dateneinheit.</p>
</dd>
<dt>i<span class="colon">:</span></dt>
<dd><p>Der Wert des 128-Bit-Tweaks.</p>
</dd>
<dt>⍺<span class="colon">:</span></dt>
<dd><p>Ein primitives Element des GF(2¹²⁸) welches dem Polynom x (d. h. 0000...0010<sub>b</sub>) entspricht.</p>
</dd>
<dt>⍺<sub>j</sub><span class="colon">:</span></dt>
<dd><p>⍺ j mal mit sich selbst multipliziert im Körper GF(2¹²⁸)</p>
</dd>
<dt>⊕<span class="colon">:</span></dt>
<dd><p>Bitwise XOR</p>
</dd>
<dt>⊗<span class="colon">:</span></dt>
<dd><p>Modulare Multiplikation mit Binärkoeffizienten modulo x¹²⁸+x⁷+x²+x+1.</p>
</dd>
</dl>
<aside class="admonition" data-theme="hint"><p class="admonition-title" data-theme="hint-header">Hinweis</p>
<p>Dargestellt ist der Fall, dass alle zu verschlüsselnden (Klartext-)Blöcke eine Größe von 128 Bit haben. Sollt der letzte Block nicht eine Größe von 128 Bit haben, dann kommt „Cipher Text Stealing“ zum Einsatz.</p>
</aside>
</ld-supplemental></ld-topic>

<div class="ld-exercise" data-exercise-id="2" data-exercise-title="2 - Durchführen von Padding" id="ld-exercise-2">
<p class="ld-exercise-title rubric"><span>Durchführen von Padding</span></p>
<p>Die Blockchiffre arbeitet mit einer Blockgröße von <em>8 Byte</em>.
Gegeben seien die folgenden zwei Nachrichten (hexadezimal):</p>
<ol class="arabic simple">
<li><p><span class="docutils literal">4D 65 73 73 61 67 65</span> (7 Byte)</p></li>
<li><p><span class="docutils literal">48 61 73 68 46 75 6E 6B</span> (8 Byte)</p></li>
</ol>
<p>Geben Sie für jede Nachricht den vollständigen, aufgefüllten Block (bzw. die Blöcke) an gemäß:</p>
<ol class="arabic simple">
<li><p><em>PKCS#7</em>,</p></li>
<li><p><em>ANSI X.923</em></p></li>
<li><p><em>ISO/IEC 7816-4</em></p></li>

<p class="ld-exercise-title rubric"><span>OFB-Modus</span></p>
<p>Verwenden Sie den OFB-Modus in Kombination mit einer Caesar-Chiffre, bei der die <em>Blockgröße</em> ein Zeichen sei.</p>
<p>Der Schlüssel ist die Anzahl der Zeichen, um die Sie ein Zeichen verschieben wollen - wie zuvor. Der IV ist ein Zeichen. Damit Sie ein XOR durchführen können, ordnen wir jedem Zeichen einen Wert zu und erweitern das Alphabet um die folgenden 6 Zeichen: { 1, 2, 3, !, ?, _ }. Auf diese Weise ist es immer möglich, ein sinnvolles Zeichen auszugeben.</p>
