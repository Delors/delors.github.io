<ld-topic class="new-section" id="java-projekte-bauen">
<h2>Java Projekte bauen</h2>
</ld-topic>
<ld-topic id="ziele">
<h2>Ziele</h2>
<ol class="arabic simple" start="0">
<li><p><strong>Management der Projektabhängigkeiten</strong> (z. B. JUnit, Log4J, Hibernate, Spring, ....)</p></li>
</ol>
<ol class="arabic simple incremental-list">
<li><p><strong>Kompilieren</strong> des Quellcodes</p></li>
<li><p><strong>Testen</strong> des Quellcodes</p></li>
<li><p><strong>Paketieren</strong> des Quellcodes (.jar oder .war Datei erzeugen inkl. <em>aller</em> Abhängigkeiten)</p></li>
<li><p><strong>Dokumentation</strong> erstellen</p></li>
<li><p><strong>Reports</strong> erstellen (z.B. Testabdeckung, Code-Qualität)</p></li>
<li><p>... und vieles mehr, dass dann aber häufig Projektabhängig ist.</p></li>
</ol>
<aside class="admonition incremental attention">
<p class="admonition-title">Achtung!</p>
<p>Ein wichtiges Meta-Ziel ist es, das Bauen der Software zu automatisieren und zu vereinfachen und <em>stabile Builds zu gewährleisten</em>.</p>
<div class="peripheral docutils container">
<p>D. h. zwei Entwickler, die das selbe Projekt auf unterschiedlichen Rechnern mit initial ggf. unterschiedlichen Versionen installierter Werkzeuge und Bibliotheken bauen, sollten dennoch das selbe Ergebnis erhalten.</p>
</div>
</aside>
</ld-topic>
<ld-topic id="etablierte-build-tools">
<h2>Etablierte Build-Tools</h2>
<ul class="incremental-list simple">
<li><p><span class="obsolete">Ant</span><a class="brackets" href="#footnote-1" id="footnote-reference-1" role="doc-noteref"><span class="fn-bracket">[</span>1<span class="fn-bracket">]</span></a></p></li>
<li><p><strong>Maven</strong></p></li>
<li><p>Gradle</p></li>
<li><p><span class="peripheral">sbt</span></p></li>
<li><p><span class="peripheral">make</span> (nicht spezifisch für Java)</p></li>
</ul>
<aside class="admonition incremental warning">
<p class="admonition-title">Warnung</p>
<p>IDEs wie IntelliJ IDEA, Eclipse, Visual Studio Code oder NetBeans bieten ebenfalls „Build-Unterstützung“. Diese ist aber bestenfalls für kleine Ein-Entwickler-Projekte geeignet.</p>
</aside>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-1" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-1">1</a><span class="fn-bracket">]</span></span>
<p>Wurde in der Anfangsphase häufig verwendet. Heute nicht mehr.</p>
</aside>
</aside>
</ld-topic>
<ld-topic id="projektstruktur">
<h2>Projektstruktur</h2>
<p>Konvention, die praktisch über alle Build-Tools und IDEs hinweg gilt<a class="brackets" href="#footnote-2" id="footnote-reference-2" role="doc-noteref"><span class="fn-bracket">[</span>2<span class="fn-bracket">]</span></a>:</p>
<ul class="incremental-list simple">
<li><p>Quellcode im Verzeichnis <span class="docutils literal">src/main/java</span></p></li>
<li><p>Testcode im Verzeichnis <span class="docutils literal">src/test/java</span></p></li>
<li><p>Ressourcen im Verzeichnis <span class="docutils literal">src/main/resources</span></p></li>
<li><p>Testressourcen im Verzeichnis <span class="docutils literal">src/test/resources</span></p></li>
<li><p>Konfigurationen und andere Ressourcen im Verzeichnis <span class="docutils literal">src/main/resources</span></p></li>
<li><p>gebaute Artefakte im Verzeichnis <span class="docutils literal">target</span></p></li>
</ul>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-2" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-2">2</a><span class="fn-bracket">]</span></span>
<p>Andere Sprachen verwenden häufig ähnliche Strukturen. (Selbstverständlich, wird <span class="docutils literal">java</span>  dann durch den Namen der entsprechenden Sprache ersetzt.)</p>
</aside>
</aside>
</ld-topic>
<ld-topic class="new-section transition-move-to-top" id="grundlagen-des-testens-mit-junit-jupiter">
<h2>Grundlagen des Testens mit JUnit (Jupiter)</h2>
</ld-topic>
<ld-topic id="junit-einfuhrung">
<h2>JUnit - Einführung</h2>
<ul class="incremental-list simple">
<li><p>JUnit ist das Standard-Test-Framework für Java.</p></li>
<li><p>Für das Schreiben von einfachen Tests ist das Modul <em>JUnit Jupiter</em> zu verwenden.</p></li>
<li><p>Tests liegen (per Konvention) in <span class="docutils literal">src/test/java</span> und werden <em>nicht</em> mit der Anwendung ausgeliefert.</p></li>
</ul>
</ld-topic>
<ld-topic id="aufbau-einer-testklasse">
<h2>Aufbau einer Testklasse</h2>
<ld-story>
<pre class="code java literal-block"><small class="ln"> 1 </small><code data-lineno=" 1 "><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">org.junit.jupiter.api.Test</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 2 </small><code data-lineno=" 2 "><span class="whitespace"></span><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">org.junit.jupiter.api.Assertions.*</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 3 </small><code data-lineno=" 3 "><span class="whitespace">
</span></code><small class="ln"> 4 </small><code data-lineno=" 4 "><span class="whitespace"></span><span class="keyword declaration">class</span> <span class="name class">CalculatorTest</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="comment single">// Konvention: &lt;Klasse&gt;Test</span><span class="whitespace">
</span></code><small class="ln"> 5 </small><code data-lineno=" 5 "><span class="whitespace">
</span></code><small class="ln"> 6 </small><code data-lineno=" 6 "><span class="whitespace">    </span><span class="name decorator">&#64;Test</span><span class="whitespace"> </span><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">testAddition</span><span class="punctuation">()</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln"> 7 </small><code data-lineno=" 7 "><span class="whitespace">        </span><span class="name">Calculator</span><span class="whitespace"> </span><span class="name">r</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="keyword">new</span><span class="whitespace"> </span><span class="name">Calculator</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln"> 8 </small><code data-lineno=" 8 "><span class="whitespace">        </span><span class="name">assertEquals</span><span class="punctuation">(</span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">r</span><span class="punctuation">.</span><span class="name attribute">addiere</span><span class="punctuation">(</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">));</span><span class="whitespace">
</span></code><small class="ln"> 9 </small><code data-lineno=" 9 "><span class="whitespace">    </span><span class="punctuation">}</span><span class="whitespace">
</span></code><small class="ln">10 </small><code data-lineno="10 "><span class="whitespace">
</span></code><small class="ln">11 </small><code data-lineno="11 "><span class="whitespace">    </span><span class="name decorator">&#64;Test</span><span class="whitespace"> </span><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">testDivisionDurchNull</span><span class="punctuation">()</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln">12 </small><code data-lineno="12 "><span class="whitespace">        </span><span class="name">Calculator</span><span class="whitespace"> </span><span class="name">r</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="keyword">new</span><span class="whitespace"> </span><span class="name">Calculator</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln">13 </small><code data-lineno="13 "><span class="whitespace">        </span><span class="name">assertThrows</span><span class="punctuation">(</span><span class="whitespace">
</span></code><small class="ln">14 </small><code data-lineno="14 "><span class="whitespace">            </span><span class="name">ArithmeticException</span><span class="punctuation">.</span><span class="name attribute">class</span><span class="punctuation">,</span><span class="whitespace">
</span></code><small class="ln">15 </small><code data-lineno="15 "><span class="whitespace">            </span><span class="punctuation">()</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">r</span><span class="punctuation">.</span><span class="name attribute">dividiere</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln">16 </small><code data-lineno="16 "><span class="whitespace">        </span><span class="punctuation">);</span><span class="whitespace">
</span></code><small class="ln">17 </small><code data-lineno="17 "><span class="whitespace"></span><span class="punctuation">}</span><span class="whitespace">   </span><span class="punctuation">}</span></code></pre>
<aside class="admonition incremental attention">
<p class="admonition-title">Achtung!</p>
<p>Testklassen, die mit dem Namen <span class="docutils literal">Test</span> enden, werden von Buildtools automatisch erkannt. Es handelt sich um eine fest etablierte und weit verbreitete Konvention.</p>
</aside>
</ld-story><div class="supplemental docutils container">
<ul class="simple">
<li><p>Jede mit <code class="java"><span class="name decorator">&#64;Test</span></code> annotierte Methode ist ein Testfall.</p></li>
<li><p>Testmethoden müssen <code class="java"><span class="keyword type">void</span></code> zurückgeben und dürfen keine Parameter haben.</p></li>
<li><p>Es wird für <strong>jeden</strong> Testfall ein <strong>neues</strong> Objekt der Testklasse erzeugt; Tests sind daher voneinander isoliert.</p></li>
</ul>
</div>
</ld-topic>
<ld-topic id="die-wichtigsten-assertions">
<h2>Die wichtigsten Assertions</h2>
<p>Alle Methoden befinden sich in <code class="java"><span class="name">org</span><span class="punctuation">.</span><span class="name attribute">junit</span><span class="punctuation">.</span><span class="name attribute">jupiter</span><span class="punctuation">.</span><span class="name attribute">api</span><span class="punctuation">.</span><span class="name attribute">Assertions</span></code>:</p>
<table class="highlight-on-hover incremental-table-rows">
<colgroup>
<col style="width: 45.0%" />
<col style="width: 55.0%" />
</colgroup>
<thead>
<tr><th class="head"><p>Methode</p></th>
<th class="head"><p>Prüft</p></th>
</tr>
</thead>
<tbody>
<tr><td><p><code class="java"><span class="name">assertEquals</span><span class="punctuation">(</span><span class="name">expected</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">actual</span><span class="punctuation">)</span></code></p></td>
<td><p><code class="java"><span class="name">expected</span><span class="punctuation">.</span><span class="name attribute">equals</span><span class="punctuation">(</span><span class="name">actual</span><span class="punctuation">)</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">assertNotEquals</span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">)</span></code></p></td>
<td><p><code class="java"><span class="operator">!</span><span class="name">a</span><span class="punctuation">.</span><span class="name attribute">equals</span><span class="punctuation">(</span><span class="name">b</span><span class="punctuation">)</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">assertTrue</span><span class="punctuation">(</span><span class="name">condition</span><span class="punctuation">)</span></code></p></td>
<td><p><code class="java"><span class="name">condition</span><span class="whitespace"> </span><span class="operator">==</span><span class="whitespace"> </span><span class="keyword constant">true</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">assertFalse</span><span class="punctuation">(</span><span class="name">condition</span><span class="punctuation">)</span></code></p></td>
<td><p><code class="java"><span class="name">condition</span><span class="whitespace"> </span><span class="operator">==</span><span class="whitespace"> </span><span class="keyword constant">false</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">assertNull</span><span class="punctuation">(</span><span class="name">object</span><span class="punctuation">)</span></code></p></td>
<td><p><code class="java"><span class="name">object</span><span class="whitespace"> </span><span class="operator">==</span><span class="whitespace"> </span><span class="keyword constant">null</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">assertNotNull</span><span class="punctuation">(</span><span class="name">object</span><span class="punctuation">)</span></code></p></td>
<td><p><code class="java"><span class="name">object</span><span class="whitespace"> </span><span class="operator">!=</span><span class="whitespace"> </span><span class="keyword constant">null</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">assertThrows</span><span class="punctuation">(</span><span class="name">Exc</span><span class="punctuation">.</span><span class="name attribute">class</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="punctuation">()</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="error">…</span><span class="punctuation">)</span></code></p></td>
<td><p>Lambda wirft erwartete Exception</p></td>
</tr>
<tr><td><p><code class="java"><span class="name">assertArrayEquals</span><span class="punctuation">(</span><span class="name">exp</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">act</span><span class="punctuation">)</span></code></p></td>
<td><p>Arrays elementweise gleich</p></td>
</tr>
</tbody>
</table>
<aside class="admonition incremental hint">
<p class="admonition-title">Hinweis</p>
<p>Jede Assertion akzeptiert als <em>letzten</em> Parameter eine optionale Fehlermeldung (<code class="java"><span class="name">String</span></code>), die bei einem Fehlschlag ausgegeben wird:</p>
<pre class="code java copy-to-clipboard literal-block"><code><span class="name">assertEquals</span><span class="punctuation">(</span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">r</span><span class="punctuation">.</span><span class="name attribute">addiere</span><span class="punctuation">(</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">),</span><span class="whitespace"> </span><span class="literal string">&quot;2+3 sollte 5 sein&quot;</span><span class="punctuation">);</span></code></pre>
</aside>
</ld-topic>
<ld-topic id="setup-und-teardown">
<h2>Setup und Teardown</h2>
<pre class="code java literal-block"><small class="ln"> 1 </small><code data-lineno=" 1 "><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">org.junit.jupiter.api.*</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 2 </small><code data-lineno=" 2 "><span class="whitespace"></span><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">org.junit.jupiter.api.Assertions.*</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 3 </small><code data-lineno=" 3 "><span class="whitespace">
</span></code><small class="ln"> 4 </small><code data-lineno=" 4 "><span class="whitespace"></span><span class="keyword declaration">class</span> <span class="name class">ListTest</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln"> 5 </small><code data-lineno=" 5 "><span class="whitespace">

</span></code><small class="ln"> 7 </small><code data-lineno=" 7 "><span class="whitespace">
</span></code><small class="ln"> 8 </small><code data-lineno=" 8 "><span class="whitespace">    </span><span class="name decorator">&#64;BeforeEach</span><span class="whitespace">   </span><span class="comment single">// vor JEDEM einzelnen Test</span><span class="whitespace">
</span></code><small class="ln"> 9 </small><code data-lineno=" 9 "><span class="whitespace">    </span><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">setUp</span><span class="punctuation">()</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">          </span><span class="name">list</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="keyword">new</span><span class="whitespace"> </span><span class="name">List</span><span class="punctuation">();</span><span class="whitespace">                          </span><span class="punctuation">}</span><span class="whitespace">

</span></code><small class="ln">11 </small><code data-lineno="11 "><span class="whitespace">    </span><span class="name decorator">&#64;AfterEach</span><span class="whitespace">    </span><span class="comment single">// nach JEDEM einzelnen Test</span><span class="whitespace">
</span></code><small class="ln">12 </small><code data-lineno="12 "><span class="whitespace">    </span><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">tearDown</span><span class="punctuation">()</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">       </span><span class="comment multiline">/* z.B. Ressourcen freigeben */</span><span class="whitespace">             </span><span class="punctuation">}</span><span class="whitespace">
</span></code><small class="ln">13 </small><code data-lineno="13 "><span class="whitespace">
</span></code><small class="ln">14 </small><code data-lineno="14 "><span class="whitespace">    </span><span class="name decorator">&#64;Test</span><span class="whitespace">
</span></code><small class="ln">15 </small><code data-lineno="15 "><span class="whitespace">    </span><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">testIsEmpty</span><span class="punctuation">()</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">    </span><span class="name">assertTrue</span><span class="punctuation">(</span><span class="name">list</span><span class="punctuation">.</span><span class="name attribute">isEmpty</span><span class="punctuation">());</span><span class="whitespace">                 </span><span class="punctuation">}</span><span class="whitespace">
</span></code><small class="ln">16 </small><code data-lineno="16 "><span class="whitespace">
</span></code><small class="ln">17 </small><code data-lineno="17 "><span class="whitespace">    </span><span class="name decorator">&#64;Test</span><span class="whitespace">
</span></code><small class="ln">18 </small><code data-lineno="18 "><span class="whitespace">    </span><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">testAddElement</span><span class="punctuation">()</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="name">list</span><span class="punctuation">.</span><span class="name attribute">add</span><span class="punctuation">(</span><span class="literal number integer">42</span><span class="punctuation">);</span><span class="whitespace"> </span><span class="name">assertEquals</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">list</span><span class="punctuation">.</span><span class="name attribute">size</span><span class="punctuation">());</span><span class="whitespace"> </span><span class="punctuation">}</span><span class="whitespace">
</span></code><small class="ln">19 </small><code data-lineno="19 "><span class="whitespace"></span><span class="punctuation">}</span></code></pre>
<div class="supplemental docutils container">
<p><code class="java"><span class="name decorator">&#64;BeforeEach</span></code> und <code class="java"><span class="name decorator">&#64;AfterEach</span></code> werden vor bzw. nach <em>jedem</em> Testfall ausgeführt und eignen sich ideal, um einen definierten Ausgangszustand herzustellen.</p>
<p>Daneben gibt es <code class="java"><span class="name decorator">&#64;BeforeAll</span></code> und <code class="java"><span class="name decorator">&#64;AfterAll</span></code> (müssen <code class="java"><span class="keyword declaration">static</span></code> sein), die nur <em>einmal</em> pro Testklasse aufgerufen werden.</p>
</div>
</ld-topic>
<ld-topic id="typische-vorgehensweise-beim-testen">
<h2>Typische Vorgehensweise beim Testen</h2>
<div class="accentuate docutils container">
<p class="rubric">Arrange – Act – Assert (AAA-Muster)</p>
<ol class="arabic simple incremental-list">
<li><p><strong>Arrange</strong> – Testdaten und Objekte vorbereiten.</p></li>
<li><p><strong>Act</strong> – Die zu testende Methode aufrufen.</p></li>
<li><p><strong>Assert</strong> – Das Ergebnis mit dem erwarteten Wert vergleichen.</p></li>
</ol>
</div>
<pre class="code java incremental literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name decorator">&#64;Test</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">testAbsoluterBetrag</span><span class="punctuation">()</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace">    </span><span class="comment multiline">/* Arrange:*/</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">eingabe</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="operator">-</span><span class="literal number integer">7</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace">    </span><span class="comment multiline">/* Act:    */</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">ergebnis</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Math</span><span class="punctuation">.</span><span class="name attribute">abs</span><span class="punctuation">(</span><span class="name">eingabe</span><span class="punctuation">);</span><span class="whitespace">
</span></code><small class="ln">5 </small><code data-lineno="5 "><span class="whitespace">    </span><span class="comment multiline">/* Assert: */</span><span class="whitespace"> </span><span class="name">assertEquals</span><span class="punctuation">(</span><span class="literal number integer">7</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">ergebnis</span><span class="punctuation">);</span><span class="whitespace">
</span></code><small class="ln">6 </small><code data-lineno="6 "><span class="whitespace"></span><span class="punctuation">}</span></code></pre>
<aside class="admonition incremental hint">
<p class="admonition-title">Hinweis</p>
<p><strong>Ein</strong> Test sollte genau <strong>einen</strong> Aspekt prüfen. Besser mehrere kleine Tests als ein großer.</p>
</aside>
</ld-topic>
<ld-topic class="new-section transition-move-to-top" id="maven">
<h2>Maven</h2>
<p class="section-subtitle"><a class="reference external" href="https://maven.apache.org">https://maven.apache.org</a></p>
</ld-topic>
<ld-topic id="aufsetzen-eines-projekts-mittels-scaffolding">
<h2>Aufsetzen eines Projekts mittels <em>Scaffolding</em></h2>
<p>Maven ermöglicht es, den Rumpf für ein Java-Projekt mit einer einfachen Befehlszeile zu erstellen:</p>
<pre class="code console copy-to-clipboard literal-block"><code><span class="generic output">mvn archetype:generate \
    -DgroupId=com.mycompany.app \
    -DartifactId=my-app \
    -DarchetypeArtifactId=maven-archetype-quickstart \
    -DarchetypeVersion=1.5 \
    -DinteractiveMode=false</span></code></pre>
<p>Dies erzeugt eine initiale Build-Konfiguration für ein einfaches Java-Projekt und erzeugt die Projektstruktur.<a class="brackets" href="#footnote-3" id="footnote-reference-3" role="doc-noteref"><span class="fn-bracket">[</span>3<span class="fn-bracket">]</span></a></p>
<div class="supplemental docutils container">
<p>Die <span class="docutils literal">GroupId</span> folgt dabei den selben Konventionen wie Java-Packages. Die <span class="docutils literal">ArtifactId</span> ist der Name des Projekts.</p>
</div>
<aside class="footnote-list brackets">
<aside class="footnote brackets" id="footnote-3" role="doc-footnote">
<span class="label"><span class="fn-bracket">[</span><a role="doc-backlink" href="#footnote-reference-3">3</a><span class="fn-bracket">]</span></span>
<p>Es gibt eine Vielzahl von Archetypen, die unterschiedliche Projektstrukturen erzeugen und für unterschiedliche Anwendungsfälle optimiert sind.</p>
</aside>
</aside>
</ld-topic>
<ld-topic id="maven-build-phasen">
<h2>Maven - Build Phasen</h2>
<ld-deck>
<ld-card>
<ul class="incremental-list list-with-sublists simple">
<li><p>Eine Phase ist ein Schritt im Build-Lebenszyklus. Die <em>ersten</em> Phasen des Standardlebenszyklus sind:</p>
<ol class="arabic simple incremental-list">
<li><p><span class="docutils literal">validate</span></p></li>
<li><p><span class="docutils literal"><span class="pre">generate-sources</span></span></p></li>
<li><p><span class="docutils literal"><span class="pre">process-sources</span></span></p></li>
<li><p><span class="docutils literal"><span class="pre">generate-resources</span></span></p></li>
<li><p><span class="docutils literal"><span class="pre">process-resources</span></span></p></li>
<li><p><span class="docutils literal">compile</span></p></li>
</ol>
</li>
<li><p>Wenn eine Phase angegeben wird, dann werden alle vorherigen Phasen ausgeführt. Zum Beispiel führt <span class="docutils literal">mvn compile</span> alle genannten Phasen in obiger Reihenfolge aus.</p></li>
</ul>
</ld-card><ld-card class="incremental">
<p class="rubric">die wichtigsten Phasen des Standardlebenszyklus</p>
<dl class="field-list simple">
<dt><span class="docutils literal">validate</span><span class="colon">:</span></dt>
<dd><p>überprüfen, ob das Projekt korrekt konfiguriert ist</p>
</dd>
<dt><span class="docutils literal">compile</span><span class="colon">:</span></dt>
<dd><p>kompilieren des Quellcodes des Projekts</p>
</dd>
<dt><span class="docutils literal">test</span><span class="colon">:</span></dt>
<dd><p>testet den kompilierten Quellcode mit einem geeigneten Unit-Testing-Framework.</p>
</dd>
<dt><span class="docutils literal">package</span><span class="colon">:</span></dt>
<dd><p>den kompilierten Code in ein verteilbares Format, z. B. ein JAR, verpacken.</p>
</dd>
<dt><span class="docutils literal"><span class="pre">integration-test</span></span><span class="colon">:</span></dt>
<dd><p>Verarbeitet  das Paket und stellt es, wenn nötig, in einer Umgebung bereit, in der Integrationstests ausgeführt werden können.</p>
</dd>
<dt><span class="docutils literal">deploy</span><span class="colon">:</span></dt>
<dd><p>bereitstellen in einer Integrations- oder Release-Umgebung</p>
</dd>
</dl>
</ld-card><ld-card class="incremental">
<p class="rubric">Spezialisierte Lebenszyklen (mit eigenen Phasen)</p>
<dl class="field-list">
<dt><span class="docutils literal">clean</span><span class="colon">:</span></dt>
<dd><p>bereinigt Artefakte, die von früheren Builds erzeugt wurden.</p>
<p>Phasen: <span class="docutils literal"><span class="pre">pre-clean</span></span>, <span class="docutils literal">clean</span>, <span class="docutils literal"><span class="pre">post-clean</span></span></p>
</dd>
<dt><span class="docutils literal">site</span><span class="colon">:</span></dt>
<dd><p>generiert eine Site-Dokumentation für dieses Projekt</p>
<p>Phasen: <span class="docutils literal"><span class="pre">pre-site</span></span>, <span class="docutils literal">site</span>, <span class="docutils literal"><span class="pre">post-site</span></span>, <span class="docutils literal"><span class="pre">site-deploy</span></span></p>
</dd>
</dl>
</ld-card></ld-deck></ld-topic>

<div class="incremental docutils container">
<p><em>(Herausforderung: Testing System.out)</em></p>
<p><strong>Header</strong></p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">10 </small><code data-lineno="10 "><span class="keyword declaration">public</span><span class="whitespace"> </span><span class="keyword declaration">class</span> <span class="name class">HelloYouTest</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln">11 </small><code data-lineno="11 "><span class="whitespace">

<h2>Übung</h2>
<ld-scrollable>
<div class="ld-exercise" data-exercise-id="1" data-exercise-title="1 - Build-Konfiguration eines Java Projekts" id="ld-exercise-1">
<p class="ld-exercise-title rubric">Build-Konfiguration eines Java Projekts</p>
<p>(Falls Maven (<span class="docutils literal">mvn</span>) noch nicht installiert ist, installieren Sie es.)</p>
<ul class="simple">
<li><p>entpacken Sie das Projekt <a class="reference external" href="prog-adv-java-projects/code/newton/newton-1.0-sources.zip">prog-adv-java-projects/code/newton/newton-1.0-sources.zip</a>.</p></li>
<li><p>legen Sie eine <span class="docutils literal">pom.xml</span> Datei an, um das Projekt zu bauen.</p></li>
<li><p>Konfigurieren Sie eine Abhängigkeit zu JUnit 5.14.3 und konfigurieren Sie das <span class="docutils literal">surefire</span> Plugin, um die Tests auszuführen.</p></li>
<li><p>Nutzen Sie <code class="console"><span class="generic output">mvn test</span></code>, um die Tests auszuführen.</p></li>
<li><p>Konfigurieren Sie das <span class="docutils literal"><span class="pre">maven-jar-plugin</span></span>, um ein ausführbares JAR zu erzeugen. Vergessen sie nicht die <span class="docutils literal">mainClass</span> zu konfigurieren.</p></li>
<li><p>Nutzen Sie <code class="console"><span class="generic output">mvn package</span></code>, um das Projekt zu bauen.</p></li>
<li><p>Nutzen Sie <code class="console"><span class="generic output">mvn site</span></code>, um eine Dokumentation des Projekts zu erstellen.</p></li>
<li><p>Schauen Sie sich die erzeugten Artefakte an.</p></li>
<li><p>Testen Sie ob Sie die Anwendung mit <span class="docutils literal">java <span class="pre">-jar</span> <span class="pre">target/newton-1.0-SNAPSHOT.jar</span></span> starten können.</p></li>
</ul>
<p class="rubric">Weiterführende Aufgaben</p>
<p>(In diesem Fall ist es Ihrer Aufgabe zu recherchieren wie die Einbindung/Konfiguration zu erfolgen hat.)</p>
<ul>
<li><p>Binden Sie Checkstyle in Ihre Projekt ein. D. h. wenn Sie die <code class="console"><span class="generic output">mvn site</span></code> ausführen, dann soll automatisch ein Report in Hinblick auf die Einhaltung der Checkstyle-Regeln erstellt werden.</p>
<p>Schauen Sie sich den Report an und versuchen Sie für die Klasse Liste eine besser Einhaltung der Checkstyle Regeln zu erreichen.</p>
</li>
<li><p>Binden Sie das Maven-Plugin JaCoCo ein, dass automatisch die Testabdeckung berechnet und in einem Report darstellt. Führen Sie danach <code class="console"><span class="generic output">mvn test</span></code> aus (und ggf. mvn site) und schauen Sie sich den Report an.</p>
<p>Wie hoch ist bereits die Testabdeckung für die Klasse <code class="java"><span class="name">List</span></code> obwohl diese gar nicht explizit getestet wurde?</p>
</li>
<li><p>Schreiben Sie sinnvolle Tests für die Klasse <code class="java"><span class="name">List</span></code> und erhöhen Sie die Anweisungsüberdeckung auf 100% - abgesehen von den Zeilen, die nur Exceptions werfen. D. h. Sie brauchen sich in den Tests nicht um den Code kümmern, der Exceptions wirft; ignorieren Sie diesen Aspekt für den Moment.</p></li>
<li><p>Binden Sie ein Maven-Plugin ein, dass automatisch die JavaDoc erstellt und in einem Report darstellt.</p></li>
</ul>
