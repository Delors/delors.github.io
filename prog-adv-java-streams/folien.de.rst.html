<ld-topic class="global-information" id="glossar-funktionale-programmierung-in-java">
<h2>[λ] Glossar - Funktionale Programmierung in Java</h2>
<ld-scrollable>
<table style="width: 100%;">
<colgroup>
<col style="width: 25.0%" />
<col style="width: 35.0%" />
<col style="width: 40.0%" />
</colgroup>
<thead>
<tr><th class="head"><p>Konzept</p></th>
<th class="head"><p>Beschreibung</p></th>
<th class="head"><p>Beispiel</p></th>
</tr>
</thead>
<tbody>
<tr><td><p>Lambda-Ausdruck</p></td>
<td><p>Eine anonyme Funktion, die als Wert übergeben werden kann. Syntax:</p>
<ul class="simple">
<li><p><code class="java"><span class="punctuation">(</span><span class="name">Parameter</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">Ausdruck</span></code></p></li>
<li><p><code class="java"><span class="punctuation">(</span><span class="name">Parameter</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="name">Anweisungen</span><span class="punctuation">;</span><span class="whitespace"> </span><span class="punctuation">}</span></code></p></li>
</ul>
</td>
<td><p><code class="java"><span class="punctuation">(</span><span class="name">x</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">y</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">y</span></code></p>
<p><code class="java"><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">x</span></code></p>
<p><code class="java"><span class="punctuation">()</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="literal number integer">42</span></code></p>
<blockquote>
<p><code class="java"><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">sum</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">a</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">;</span><span class="whitespace"> </span><span class="keyword">return</span><span class="whitespace"> </span><span class="name">sum</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">;</span><span class="whitespace"> </span><span class="punctuation">}</span></code></p>
</blockquote>
</td>
</tr>
<tr><td><p>Methoden-Referenz</p></td>
<td><p>Kurzschreibweise für Lambdas, die lediglich eine bestehende Methode aufrufen. Varianten:</p>
<ul class="simple">
<li><p>statisch: <code class="java"><span class="name label">Klasse</span><span class="punctuation">::</span><span class="name">methode</span></code></p></li>
<li><p>auf Instanz: <code class="java"><span class="name label">objekt</span><span class="punctuation">::</span><span class="name">methode</span></code></p></li>
<li><p>auf Typ: <code class="java"><span class="name label">Klasse</span><span class="punctuation">::</span><span class="name">instanzMethode</span></code></p></li>
<li><p>Konstruktor: <code class="java"><span class="name label">Klasse</span><span class="punctuation">::</span><span class="keyword">new</span></code></p></li>
</ul>
</td>
<td><p><code class="java"><span class="name label">Integer</span><span class="punctuation">::</span><span class="name">parseInt</span></code></p>
<p><code class="java"><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">out</span><span class="punctuation">::</span><span class="name">println</span></code></p>
<p><code class="java"><span class="name label">String</span><span class="punctuation">::</span><span class="name">length</span></code></p>
<p><code class="java"><span class="name label">ArrayList</span><span class="punctuation">::</span><span class="keyword">new</span></code></p>
</td>
</tr>
<tr><td><p>Funktionales Interface</p></td>
<td><p>Ein Interface mit genau <strong>einer</strong> abstrakten Methode (SAM — <em>Single Abstract Method</em>). Kann mit <code class="java"><span class="name decorator">&#64;FunctionalInterface</span></code> annotiert werden und ermöglicht die Verwendung von Lambda-Ausdrücken.</p></td>
<td><pre class="code java literal-block"><code><span class="name decorator">&#64;FunctionalInterface</span><span class="whitespace">
</span><span class="keyword declaration">interface</span> <span class="name class">MyFunc</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
    </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name function">apply</span><span class="punctuation">(</span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">);</span><span class="whitespace">
</span><span class="punctuation">}</span></code></pre>
</td>
</tr>
<tr><td><p><code class="java"><span class="name">Predicate</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Prüft eine Bedingung auf einem Wert und gibt <code class="java"><span class="keyword type">boolean</span></code> zurück.</p></td>
<td><p><code class="java"><span class="name">Predicate</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">isEven</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">%</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="whitespace"> </span><span class="operator">==</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">Function</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="name">R</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Bildet einen Wert vom Typ <code class="java"><span class="name">T</span></code> auf einen Wert vom Typ <code class="java"><span class="name">R</span></code> ab.</p></td>
<td><p><code class="java"><span class="name">Function</span><span class="operator">&lt;</span><span class="name">String</span><span class="punctuation">,</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">len</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">String</span><span class="punctuation">::</span><span class="name">length</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">Consumer</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Konsumiert einen Wert, gibt nichts zurück (<code class="java"><span class="keyword type">void</span></code>).</p></td>
<td><p><code class="java"><span class="name">Consumer</span><span class="operator">&lt;</span><span class="name">String</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">printer</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">out</span><span class="punctuation">::</span><span class="name">println</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">Supplier</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Liefert einen Wert ohne Eingabe.</p></td>
<td><p><code class="java"><span class="name">Supplier</span><span class="operator">&lt;</span><span class="name">Double</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">random</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Math</span><span class="punctuation">::</span><span class="name">random</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">BinaryOperator</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Verknüpft zwei Werte desselben Typs zu einem Ergebnis.</p></td>
<td><p><code class="java"><span class="name">BinaryOperator</span><span class="operator">&lt;</span><span class="name">String</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">wrap</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">b</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">a</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">Comparator</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface für den Vergleich von zwei Objekten; gibt einen <code class="java"><span class="keyword type">int</span></code>-Wert zurück.</p></td>
<td><p><code class="java"><span class="name">Comparator</span><span class="operator">&lt;</span><span class="name">String</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">byLen</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">.</span><span class="name attribute">length</span><span class="punctuation">()</span><span class="whitespace"> </span><span class="operator">-</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">.</span><span class="name attribute">length</span><span class="punctuation">();</span></code></p>
<p><code class="java"><span class="name">Comparator</span><span class="punctuation">.</span><span class="name attribute">comparing</span><span class="punctuation">(</span><span class="name">String</span><span class="punctuation">::</span><span class="name">length</span><span class="punctuation">)</span></code></p>
</td>
</tr>
<tr><td><p>Funktionen höherer Ordnung</p></td>
<td><p>Funktionen, die andere Funktionen als Parameter nehmen oder als Ergebnis zurückgeben. Grundlage aller Stream-Operationen.</p></td>
<td><p><code class="java"><span class="name">stream</span><span class="punctuation">.</span><span class="name attribute">filter</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="punctuation">)</span></code> <code class="java"><span class="punctuation">.</span><span class="name attribute">map</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">)</span></code></p></td>
</tr>
<tr><td><p>Closure</p></td>
<td><p>Ein Lambda-Ausdruck, der auf Variablen aus dem umgebenden Kontext zugreift. Diese Variablen müssen <code class="java"><span class="keyword declaration">final</span></code> oder <em>effektiv final</em> sein.</p></td>
<td><pre class="code java literal-block"><code><span class="keyword declaration">final</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">factor</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="punctuation">;</span><span class="whitespace">
</span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">).</span><span class="whitespace">
    </span><span class="name">map</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">factor</span><span class="punctuation">).</span><span class="whitespace">
    </span><span class="name">toList</span><span class="punctuation">();</span></code></pre>
</td>
</tr>
<tr><td><p><code class="java"><span class="name">Optional</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Ein Container, der einen Wert enthalten kann oder leer ist. Ersetzt die Verwendung von <code class="java"><span class="keyword constant">null</span></code>.</p></td>
<td><p><code class="java"><span class="name">Optional</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">42</span><span class="punctuation">)</span></code></p>
<p><code class="java"><span class="name">Optional</span><span class="punctuation">.</span><span class="name attribute">empty</span><span class="punctuation">()</span></code></p>
</td>
</tr>
</tbody>
</table>

<ld-topic id="aktuelle-herausforderungen">
<h2>(Aktuelle) Herausforderungen</h2>
<ld-deck>
<ld-card>
<p><strong>Verarbeitung von</strong>:</p>
<ul class="list-with-sublists incremental-list simple">
<li><p>großen Datenmengen</p>
<ul class="incremental-list">
<li><p>die nicht (ohne weiteres) in den Speicher passen oder</p></li>
<li><p>bei denen es keinen Sinn macht diese vorab vollständig in den Speicher zu laden, da immer nur ein kleiner Abschnitt analysiert werden muss</p></li>
</ul>
</li>
<li><p>Daten, die kontinuierlich verarbeitet werden müssen</p></li>
</ul>
</ld-card><ld-card class="incremental">
<aside class="admonition incremental example">
<p class="admonition-title">Beispiel</p>
<p class="rubric">Konkrete Szenarien</p>
<ul class="simple">
<li><p>HTTP Request/Response Handling (Audio/Video Streaming)</p></li>
<li><p>Verarbeitung von AI Streaming Responses</p></li>
<li><p>Ver-/Entschlüsselung von großen Datenmengen</p></li>
<li><p>Verarbeitung große Logdateien</p></li>
<li><p>Kontinuierliche Verarbeitung von Daten</p></li>
<li><p>Verarbeitung von Ereignissen (Event)</p></li>
<li><p>Echtzeitdatenverarbeitung von kontinuierlichen Daten von (IoT) Sensoren, Finanzdaten/-transaktionen</p></li>
<li><p>Aufbereitung großer Wörterbücher (z.B. für Passwortwiederherstellung)</p></li>
</ul>
</aside>
</ld-card><ld-card class="incremental">
<ul class="simple">
<li><p>Parallele Verarbeitung und effiziente Nutzung von modernen CPU-Architekturen</p></li>
</ul>
<div class="supplemental docutils container">
<p>Insbesondere die korrekte Nutzung ist häufig schwierig und hier ist die Verwendung von transparent parallelisierten Streams sehr hilfreich.
(Z. B. mit Java Parallel Streams oder <code class="scala"><span class="punctuation">.</span><span class="name">par</span></code> in Scala ist eine transparente Parallelisierung möglich.)</p>
</div>
</ld-card><ld-card class="incremental">
<ul class="simple">
<li><p>Entwicklung von Software nahe am Domänenmodell, um die korrekte Implementierung zu unterstützen. Das Ziel sollte eine möglichst geringe Repräsentationslücke (<span class="eng">Low representational gap</span>) zwischen Code und Domänenmodell sein.</p></li>
</ul>
</ld-card></ld-deck></ld-topic>
<ld-topic class="no-title center-content" id="java-i-o-streams-vs-java-stream-api">
<h2>Java I/O Streams vs. Java Stream API</h2>
<aside class="admonition attention">
<p class="admonition-title">Achtung!</p>
<p>Im Folgenden betrachten wir die Java Stream API und nicht Java I/O Streams.</p>
<table style="width: 100%;">
<colgroup>
<col style="width: 20.0%" />
<col style="width: 40.0%" />
<col style="width: 40.0%" />
</colgroup>
<thead>
<tr><th class="head stub"></th>
<th class="head"><p>Java I/O Streams</p></th>
<th class="head"><p>Java Stream API</p></th>
</tr>
</thead>
<tbody>
<tr><th class="stub"><p>Package</p></th>
<td><p><code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">io</span><span class="punctuation">.</span><span class="operator">*</span></code> / <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">nio</span><span class="punctuation">.</span><span class="operator">*</span></code></p></td>
<td><p><code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="operator">*</span></code></p></td>
</tr>
<tr><th class="stub"><p>Fokus</p></th>
<td><p>Byte-/Zeichentransport</p></td>
<td><p>Datenverarbeitung</p></td>
</tr>
<tr><th class="stub"><p>Paradigma</p></th>
<td><p>Imperativ</p></td>
<td><p>Funktional/Deklarativ</p></td>
</tr>
</tbody>
</table>
</aside>
<div class="supplemental docutils container">
<dl class="field-list">
<dt>Imperativ Programmierung<span class="colon">:</span></dt>
<dd><p>Das Vorgehen wird detailliert durch konkrete Anweisungen beschrieben, die genau vorgeben welche einzelnen Schritte von dem Computer ausgeführt werden sollen, um das Ziel zu erreichen.</p>
<p>Viele gängige <em>general-purpose</em> Programmiersprachen (C, C++, Rust, Java, Go, JavaScript, Python) sind im Kern imperative Programmiersprachen.</p>
</dd>
<dt>Deklarative Programmierung<span class="colon">:</span></dt>
<dd><p>Das Ziel ist es auszudrücken <em>was</em> erreicht werden soll, ohne das <em>wie</em> genau anzugeben.</p>
<p>(Prominentes Beispiel für eine deklarative Programmiersprache: SQL als Datenbankabfragesprache.)</p>
</dd>
</dl>
<aside class="admonition remark">
<p class="admonition-title">Bemerkung</p>
<ul class="simple">
<li><p>Auch für gängige Programmiersprachen, die im Kern imperativ sind, ist zu beobachten, dass mehr und mehr Ideen und Konzepte aus der deklarativen Programmierung Einzug in diese Sprachen - insbesondere auch über APIs - finden.</p></li>
<li><p>Es ist in der Zwischenzeit so, dass die Grenzen zwischen (klassischen) prozeduralen (d. h. primär imperativen) Programmiersprachen und funktionalen sowie deklarativen Programmiersprachen verschwimmen.</p></li>
<li><p>Scala - als ein Beispiel für eine moderne Programmiersprache - ist von Grund auf als objektorientiert-funktionale Sprache entworfen wurde.</p></li>
</ul>
</aside>
</div>
</ld-topic>
<ld-topic id="streams-einfuhrung">
<h2>Streams - Einführung</h2>
<dl class="incremental-list field-list simple">
<dt>Pragmatische Sicht<span class="colon">:</span></dt>
<dd><p>Streams<a class="brackets" href="#footnote-1" id="footnote-reference-1" role="doc-noteref"><span class="fn-bracket">[</span>1<span class="fn-bracket">]</span></a> sind umgeformte Sammlungen<span class="incremental">, die durch die Umformung für funktional-orientiere Massen-Operationen geeignet sind.</span></p>
</dd>
<dt>Konzeptionelle Sicht<span class="colon">:</span></dt>
<dd><p>Streams erlauben die „korrekte, lesbare (domänennahe)“ Verarbeitung von Daten mit Hilfe von Konzepten und Ideen aus der funktionalen und deklarativen Programmierung.</p>
</dd>
</dl>
<aside class="admonition incremental example">
<p class="admonition-title">Beispiel</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln"> 1 </small><code data-lineno=" 1 "><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.Arrays</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 2 </small><code data-lineno=" 2 "><span class="whitespace"></span><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.List</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 3 </small><code data-lineno=" 3 "><span class="whitespace"></span><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.Collectors</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 4 </small><code data-lineno=" 4 "><span class="whitespace">
</span></code><small class="ln"> 5 </small><code data-lineno=" 5 "><span class="whitespace"></span><span class="name">List</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">l</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">asList</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">6</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">7</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">8</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">9</span><span class="punctuation">);</span><span class="whitespace">
</span></code><small class="ln"> 6 </small><code data-lineno=" 6 "><span class="whitespace"></span><span class="name">List</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">ll</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">l</span><span class="whitespace">
</span></code><small class="ln"> 7 </small><code data-lineno=" 7 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">()</span><span class="whitespace">                       </span><span class="comment single">// list → stream</span><span class="whitespace">
</span></code><small class="ln"> 8 </small><code data-lineno=" 8 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">filter</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">%</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="whitespace"> </span><span class="operator">==</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="punctuation">)</span><span class="whitespace">        </span><span class="comment single">// filter list with predicate</span><span class="whitespace">
</span></code><small class="ln"> 9 </small><code data-lineno=" 9 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">map</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">x</span><span class="punctuation">)</span><span class="whitespace">               </span><span class="comment single">// map each element to a new one</span><span class="whitespace">
</span></code><small class="ln">10 </small><code data-lineno="10 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">collect</span><span class="punctuation">(</span><span class="name">Collectors</span><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">());</span><span class="whitespace">  </span><span class="comment single">// back to a list</span><span class="whitespace">
</span></code><small class="ln">11 </small><code data-lineno="11 "><span class="whitespace"></span><span class="name">ll</span><span class="punctuation">.</span><span class="name attribute">forEach</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">out</span><span class="punctuation">.</span><span class="name attribute">println</span><span class="punctuation">(</span><span class="name">x</span><span class="punctuation">));</span></code></pre>

<ld-topic id="streams-mit-primitiven-daten-und-objekten">
<h2>Streams mit primitiven Daten und Objekten</h2>
<ul>
<li><p><code class="java"><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code> ist der Typ der Streams mit Objekten vom Typ <code class="java"><span class="name">T</span></code></p></li>
<li><p>Streams mit primitiven Daten:</p>
<ul class="simple">
<li><p><code class="java"><span class="name">IntStream</span></code></p></li>
<li><p><code class="java"><span class="name">LongStream</span></code></p></li>
<li><p><code class="java"><span class="name">DoubleStream</span></code></p></li>
</ul>
<p>Dies Streams mit primitiven Daten arbeiten in vielen Fällen effizienter jedoch sind manche Operationen nur auf <code class="java"><span class="name">Object</span></code>-Streams erlaubt. „Primitive“ Streams können mit der Methode <code class="java"><span class="name">boxed</span></code> in <code class="java"><span class="name">Object</span></code>-Streams umgewandelt werden.</p>
</li>
</ul>
<aside class="admonition incremental example">
<p class="admonition-title">Beispiel</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name">IntStream</span><span class="whitespace"> </span><span class="name">isPrim</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">IntStream</span><span class="punctuation">.</span><span class="name attribute">range</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="punctuation">);</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">isObj</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">isPrim</span><span class="punctuation">.</span><span class="name attribute">boxed</span><span class="punctuation">();</span></code></pre>
</aside>
</ld-topic>
<ld-topic id="erzeugung-von-streams">
<h2>Erzeugung von Streams</h2>
<ld-deck>
<ld-card>
<p class="rubric">Statische Methoden in <code class="java"><span class="name">Arrays</span></code></p>
<ul class="simple">
<li><p>Die Klasse <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">Arrays</span></code> hat mehrere überladene statische stream-Methoden, mit denen Arrays in Ströme umgewandelt werden können.</p></li>
<li><p>Die Streams können Objekte oder primitive Daten enthalten.</p></li>
</ul>
<aside class="admonition incremental example">
<p class="admonition-title">Beispiel</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="comment single">// Stream of primitive data:</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="name">IntStream</span><span class="whitespace"> </span><span class="name">isP</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">(</span><span class="keyword">new</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="operator">[]</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">6</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">7</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">8</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">9</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace"> </span><span class="punctuation">});</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace"></span><span class="comment single">// Stream of objects:</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace"></span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">isO</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">(</span><span class="whitespace">
</span></code><small class="ln">5 </small><code data-lineno="5 "><span class="whitespace">    </span><span class="keyword">new</span><span class="whitespace"> </span><span class="name">Integer</span><span class="operator">[]</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">6</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">7</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">8</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">9</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace"> </span><span class="punctuation">}</span><span class="whitespace">
</span></code><small class="ln">6 </small><code data-lineno="6 "><span class="whitespace"></span><span class="punctuation">);</span></code></pre>
</aside>
</ld-card><ld-card class="incremental">
<p class="rubric">Statische Methoden in <code class="java"><span class="name">Stream</span></code></p>
<ul class="simple">
<li><p>Das Interface <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">Stream</span></code> enthält mehrere statische Methoden mit denen Streams erzeugt werden können.</p></li>
<li><p>Für die Klassen der Streams mit primitiven Werten (z.B. <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">IntStream</span></code>) gibt es äquivalente Methoden.</p></li>
</ul>
<ld-deck>
<ld-card>
<ul class="simple">
<li><p>Mit <code class="java"><span class="name">of</span></code> werden die übergebenen Wert in einen Stream gepackt.</p></li>
<li><p>Mit <code class="java"><span class="name">iterate</span></code> und <code class="java"><span class="name">generate</span></code> hat man eine einfache Möglichkeit unendliche Ströme zu erzeugen.</p></li>
</ul>
</ld-card><ld-card class="incremental">
<aside class="admonition incremental example">
<p class="admonition-title">Beispiel</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="comment single">// Object-Stream 1, 2 ... 9, 0:</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">is1a</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="literal number integer">6</span><span class="punctuation">,</span><span class="literal number integer">7</span><span class="punctuation">,</span><span class="literal number integer">8</span><span class="punctuation">,</span><span class="literal number integer">9</span><span class="punctuation">,</span><span class="literal number integer">0</span><span class="punctuation">);</span></code></pre>
<pre class="code java copy-to-clipboard incremental literal-block"><small class="ln">2 </small><code data-lineno="2 "><span class="comment single">// int-Stream 1, 2, ... 9, 0</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace"></span><span class="name">IntStream</span><span class="whitespace"> </span><span class="name">is1b</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">IntStream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="literal number integer">6</span><span class="punctuation">,</span><span class="literal number integer">7</span><span class="punctuation">,</span><span class="literal number integer">8</span><span class="punctuation">,</span><span class="literal number integer">9</span><span class="punctuation">,</span><span class="literal number integer">0</span><span class="punctuation">);</span></code></pre>
<pre class="code java copy-to-clipboard incremental literal-block"><small class="ln">3 </small><code data-lineno="3 "><span class="comment single">// (infinite) Stream 1, 2, ...</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace"></span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">is2</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">iterate</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="punctuation">((</span><span class="name">x</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="operator">+</span><span class="literal number integer">1</span><span class="punctuation">));</span></code></pre>
<pre class="code java copy-to-clipboard incremental literal-block"><small class="ln">4 </small><code data-lineno="4 "><span class="keyword type">int</span><span class="operator">[]</span><span class="whitespace"> </span><span class="name">z</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="keyword">new</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="operator">[]</span><span class="punctuation">{</span><span class="literal number integer">1</span><span class="punctuation">};</span><span class="whitespace">
</span></code><small class="ln">5 </small><code data-lineno="5 "><span class="whitespace"></span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">is3</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">generate</span><span class="punctuation">((()</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">z</span><span class="operator">[</span><span class="literal number integer">0</span><span class="operator">]++</span><span class="punctuation">));</span><span class="whitespace"> </span><span class="comment single">// (infinite) Stream 1, 2, ...</span></code></pre>
</aside>
</ld-card></ld-deck></ld-card><ld-card class="incremental">
<p class="rubric">Statische range-Methoden in <code class="java"><span class="name">IntStream</span></code> und <code class="java"><span class="name">LongStream</span></code></p>
<p>Die Interfaces <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">IntStream</span></code> und <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">LongStream</span></code> enthalten jeweils zwei statische <code class="java"><span class="name">range</span></code>-Methoden mit denen Streams erzeugt werden können.</p>
<aside class="admonition incremental example">
<p class="admonition-title">Beispiel</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name">IntStream</span><span class="whitespace"> </span><span class="name">isPrimA</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">IntStream</span><span class="punctuation">.</span><span class="name attribute">range</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="punctuation">);</span><span class="whitespace"> </span><span class="comment single">// 1,2, .. 9</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="name">IntStream</span><span class="whitespace"> </span><span class="name">isPrimA</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">IntStream</span><span class="punctuation">.</span><span class="name attribute">rangeClosed</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="punctuation">);</span><span class="whitespace"> </span><span class="comment single">// 1,2, .. 9, 10</span></code></pre>
</aside>
</ld-card><ld-card class="incremental">
<p class="rubric">Nicht-statische Methoden der Collection-API</p>
<p>Das Interface <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">Collection</span></code> enthält die Methode stream mit der die jeweilige Kollektion in einen Stream umgewandelt werden kann.</p>

</aside>
</ld-card></ld-deck></ld-topic>
<ld-topic id="verwendung-von-streams">
<h2>Verwendung von Streams</h2>
<ld-deck>
<ld-card>
<p>Streams werden typischerweise in einer Pipeline-artigen Struktur genutzt:</p>
<ol class="arabic simple incremental-list">
<li><p>Erzeugung</p></li>
<li><p>Folge von Verarbeitungs-/Transformationsschritten</p></li>
<li><p>Abschluss mit einer terminalen Operation</p></li>
</ol>
</ld-card><ld-card class="incremental">
<p class="rubric">Verarbeitungsoperationen</p>
<p>Verarbeitungs-Operationen transformieren die Elemente eines Streams. Man unterscheidet:</p>
<ul class="incremental-list list-with-explanations">
<li><p>zustandslose Operationen</p>
<p>Transformieren die Elemente jeweils völlig unabhängig von allen anderen.</p>
</li>
<li><p>zustandsbehaftete Operationen</p>
<p>Transformieren die Elemente abhängig von anderen.</p>
</li>
</ul>
</ld-card><ld-card class="incremental">
<p class="rubric">Zustandslose Verarbeitungsoperationen</p>
<ld-deck>
<ld-card>
<ul class="incremental-list simple">
<li><p><code class="java"><span class="name">map</span><span class="punctuation">(</span><span class="name">Function</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">super</span><span class="whitespace"> </span><span class="name">T</span><span class="punctuation">,</span><span class="operator">?</span><span class="whitespace"> </span><span class="keyword declaration">extends</span><span class="whitespace"> </span><span class="name">R</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">mapper</span><span class="punctuation">)</span></code>: Transformiert jedes Element in ein anderes.</p></li>
<li><p><code class="java"><span class="name">filter</span><span class="punctuation">(</span><span class="name">Predicate</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">super</span><span class="whitespace"> </span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">predicate</span><span class="punctuation">)</span></code>: Filtert Elemente heraus.</p></li>
<li><p><code class="java"><span class="name">flatMap</span><span class="punctuation">(</span><span class="name">Function</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">super</span><span class="whitespace"> </span><span class="name">T</span><span class="punctuation">,</span><span class="operator">?</span><span class="whitespace"> </span><span class="keyword declaration">extends</span><span class="whitespace"> </span><span class="name">Stream</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">extends</span><span class="whitespace"> </span><span class="name">R</span><span class="operator">&gt;&gt;</span><span class="whitespace"> </span><span class="name">mapper</span><span class="punctuation">)</span></code>: Transformiert jedes Element in einen Stream und fügt die Streams zusammen.</p></li>
</ul>
</ld-card><ld-card class="incremental">
<aside class="admonition example">
<p class="admonition-title">Beispiel</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln"> 1 </small><code data-lineno=" 1 "><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.List</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 2 </small><code data-lineno=" 2 "><span class="whitespace"></span><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.Collectors</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 3 </small><code data-lineno=" 3 "><span class="whitespace"></span><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.IntStream</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 4 </small><code data-lineno=" 4 "><span class="whitespace">
</span></code><small class="ln"> 5 </small><code data-lineno=" 5 "><span class="whitespace"></span><span class="name">List</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">is</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">IntStream</span><span class="punctuation">.</span><span class="name attribute">range</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln"> 6 </small><code data-lineno=" 6 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">filter</span><span class="punctuation">(</span><span class="name">i</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">i</span><span class="whitespace"> </span><span class="operator">%</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="whitespace"> </span><span class="operator">!=</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln"> 7 </small><code data-lineno=" 7 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">peek</span><span class="punctuation">(</span><span class="name">i</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">out</span><span class="punctuation">.</span><span class="name attribute">print</span><span class="punctuation">(</span><span class="name">i</span><span class="operator">+</span><span class="whitespace"> </span><span class="literal string">&quot; &quot;</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln"> 8 </small><code data-lineno=" 8 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">map</span><span class="punctuation">(</span><span class="name">i</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">i</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln"> 9 </small><code data-lineno=" 9 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">boxed</span><span class="punctuation">()</span><span class="whitespace">
</span></code><small class="ln">10 </small><code data-lineno="10 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">collect</span><span class="punctuation">(</span><span class="name">Collectors</span><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">());</span><span class="whitespace">
</span></code><small class="ln">11 </small><code data-lineno="11 "><span class="whitespace"></span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">out</span><span class="punctuation">.</span><span class="name attribute">println</span><span class="punctuation">(</span><span class="name">is</span><span class="punctuation">);</span></code></pre>
<div class="incremental docutils container">
<p><em>Ausgabe:</em> <code class="console"><span class="generic output">1 3 5 7 9 [10, 30, 50, 70, 90]</span></code></p>
</div>
</aside>
</ld-card><ld-card class="incremental">
<aside class="admonition example">
<p class="admonition-title">Beispiel</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln"> 1 </small><code data-lineno=" 1 "><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.List</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 2 </small><code data-lineno=" 2 "><span class="whitespace"></span><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.Collectors</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 3 </small><code data-lineno=" 3 "><span class="whitespace"></span><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.IntStream</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 4 </small><code data-lineno=" 4 "><span class="whitespace"></span><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.Stream</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 5 </small><code data-lineno=" 5 "><span class="whitespace">
</span></code><small class="ln"> 6 </small><code data-lineno=" 6 "><span class="whitespace"></span><span class="keyword declaration">static</span><span class="whitespace"> </span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name function">range</span><span class="punctuation">(</span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">from</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">to</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln"> 7 </small><code data-lineno=" 7 "><span class="whitespace">    </span><span class="keyword">return</span><span class="whitespace"> </span><span class="name">IntStream</span><span class="punctuation">.</span><span class="name attribute">range</span><span class="punctuation">(</span><span class="name">from</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">to</span><span class="punctuation">).</span><span class="name attribute">boxed</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln"> 8 </small><code data-lineno=" 8 "><span class="whitespace"></span><span class="punctuation">}</span><span class="whitespace">
</span></code><small class="ln"> 9 </small><code data-lineno=" 9 "><span class="whitespace">
</span></code><small class="ln">10 </small><code data-lineno="10 "><span class="whitespace"></span><span class="name">List</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">is</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">0</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln">11 </small><code data-lineno="11 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">flatMap</span><span class="punctuation">(</span><span class="name">i</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">range</span><span class="punctuation">(</span><span class="literal number integer">10</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">i</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">i</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln">12 </small><code data-lineno="12 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">collect</span><span class="punctuation">(</span><span class="name">Collectors</span><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">());</span></code></pre>

</div>
</aside>
</ld-card></ld-deck></ld-card><ld-card class="incremental">
<p class="rubric">Zustandsbehaftete Verarbeitungsoperationen</p>
<ld-deck>
<ld-card>
<ul class="incremental-list simple">
<li><p><code class="java"><span class="name">distinct</span><span class="punctuation">()</span></code>: Entfernt Duplikate.</p></li>
<li><p><code class="java"><span class="name">sorted</span><span class="punctuation">()</span></code>: Sortiert die Elemente.</p></li>
<li><p><code class="java"><span class="name">sorted</span><span class="punctuation">(</span><span class="name">Comparator</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">super</span><span class="whitespace"> </span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">comparator</span><span class="punctuation">)</span></code>: Sortiert die Elemente mit einem gegebenen Comparator.</p></li>
<li><p><code class="java"><span class="name">limit</span><span class="punctuation">(</span><span class="keyword type">long</span><span class="whitespace"> </span><span class="name">maxSize</span><span class="punctuation">)</span></code>: Begrenzt die Anzahl der Elemente.</p></li>
<li><p><code class="java"><span class="name">skip</span><span class="punctuation">(</span><span class="keyword type">long</span><span class="whitespace"> </span><span class="name">n</span><span class="punctuation">)</span></code>: Überspringt die ersten n Elemente.</p></li>
</ul>
</ld-card><ld-card class="incremental">
<aside class="admonition example">
<p class="admonition-title">Beispiel</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln"> 1 </small><code data-lineno=" 1 "><span class="whitespace">    </span><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.List</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 2 </small><code data-lineno=" 2 "><span class="whitespace">    </span><span class="keyword namespace">import</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.Collectors</span><span class="punctuation">;</span><span class="whitespace">

<p class="rubric">Verarbeitungsoperationen</p>
<p>Eine terminale Operation hat im Gegensatz zu den Verarbeitungsoperationen <em>keinen Stream</em> als
Ergebnis.</p>
<ld-deck class="incremental">
<ld-card>
<p class="rubric">Terminale Operationen ohne Ergebnis</p>
<ul class="incremental-list list-with-explanations">
<li><p><code class="java"><span class="name">forEach</span><span class="punctuation">(</span><span class="name">Consumer</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">super</span><span class="whitespace"> </span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">action</span><span class="punctuation">)</span></code></p>
<p>Wendet die übergebene Aktion auf alle Elemente des Streams an.</p>
</li>
</ul>
</ld-card><ld-card class="incremental">
<p class="rubric">Terminale Operationen mit Ergebnis</p>
<ul class="incremental-list list-with-explanations">
<li><p>Operationen mit Array-Ergebnis: <code class="java"><span class="name">Stream</span><span class="whitespace"> </span><span class="operator">=&gt;</span><span class="whitespace"> </span><span class="name">Array</span></code></p>
<p>Operationen die den Stream in ein äquivalentes Array umwandeln.</p>
</li>
<li><p>Operationen mit Kollektions-Ergebnis: <code class="java"><span class="name">Stream</span><span class="whitespace"> </span><span class="operator">=&gt;</span><span class="whitespace"> </span><span class="name">Kollektion</span></code></p>
<p>Operationen die den Stream in eine äquivalente Kollektion umwandeln.</p>
</li>
<li><p>Operationen mit Einzel-Ergebnis: Aggregierende Operationen</p>
<p>Operationen die den Stream zu einem einzigen Wert verarbeiten.</p>
</li>
</ul>
</ld-card><ld-card class="incremental">

<div class="supplemental docutils container">
<p class="rubric">Terminale Operationen mit Kollektions-Ergebnis</p>
<ul>
<li><p>Die Methode <code class="java"><span class="name">collect</span></code> erzeugt eine Kollektion aus den Elementen des Streams.</p></li>
<li><p><code class="java"><span class="name">IntStream</span></code> und andere Streams mit primitiven Daten haben keine entsprechende Operation.</p></li>
<li><p>Das Argument von <code class="java"><span class="name">collect</span></code> ist ein <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">Collector</span></code>. Die Erzeugung einer Kollektion ist damit Sonderfall einer aggregierenden Operation.</p></li>
<li><p>Für die Erzeugung einer Kollektion verwendet man typischerweise einen vordefinierten <code class="java"><span class="name">Collector</span></code> aus der Klasse <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">Collectors</span></code>.</p></li>
<li><p>Einfache Kollektionserzeuger in Collectors sind:</p>
<blockquote>
<ul class="simple">
<li><p><code class="java"><span class="name">toList</span><span class="punctuation">()</span></code></p></li>
<li><p><code class="java"><span class="name">toSet</span><span class="punctuation">()</span></code></p></li>
<li><p><code class="java"><span class="name">toCollection</span><span class="punctuation">(</span><span class="name">Supplier</span><span class="operator">&lt;</span><span class="name">C</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">collectionFactory</span><span class="punctuation">)</span></code></p></li>
</ul>
</blockquote>
</li>
</ul>
</div>

<p>Das Interface Stream bietet die Funktion</p>
<blockquote>
<p><code class="java"><span class="name">Optional</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name function">reduce</span><span class="punctuation">(</span><span class="name">BinaryOperator</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">accumulator</span><span class="punctuation">)</span></code></p>
</blockquote>
<p>mit der eine Funktion auf jedes Element und das bisherige Zwischenergebnis  angewendet werden kann.</p>
<p>Falls der erste Wert nicht der Startwert sein soll, verwendet man:</p>
<blockquote>
<p><code class="java"><span class="name">Optional</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name function">reduce</span><span class="punctuation">(</span><span class="name">T</span><span class="whitespace"> </span><span class="name">identity</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">BinaryOperator</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">accumulator</span><span class="punctuation">)</span></code></p>
</blockquote>
</ld-card><ld-card class="incremental">
<aside class="admonition example">
<p class="admonition-title">Beispiel</p>
<p class="rubric"><code class="java"><span class="name">reduce</span></code></p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name">Optional</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">sumOfAll</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">5</span><span class="punctuation">).</span><span class="name attribute">reduce</span><span class="punctuation">(</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">x</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">a</span><span class="operator">+</span><span class="name">x</span><span class="whitespace"> </span><span class="punctuation">);</span></code></pre>
<div class="incremental docutils container">
<p><em>Ausgabe:</em> <code class="console"><span class="generic output">sumOfAll ==&gt; Optional[15]</span></code></p>
</div>
<pre class="code java copy-to-clipboard incremental literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name">Optional</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">subOfAll</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">5</span><span class="punctuation">).</span><span class="name attribute">reduce</span><span class="punctuation">(</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">x</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">a</span><span class="operator">-</span><span class="name">x</span><span class="whitespace"> </span><span class="punctuation">);</span></code></pre>
<div class="incremental docutils container">

</div>
<pre class="code java copy-to-clipboard incremental literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">sumOfAllPlus100</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">5</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace">        </span><span class="punctuation">.</span><span class="name attribute">reduce</span><span class="punctuation">(</span><span class="literal number integer">100</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">x</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">a</span><span class="operator">+</span><span class="name">x</span><span class="whitespace"> </span><span class="punctuation">);</span></code></pre>

</aside>
</ld-card><ld-card class="incremental">
<p>Es gibt einen Kollektor mit dem String-Elemente zu einem String konkateniert werden können:</p>
