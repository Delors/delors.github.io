<dt>Quellen<span class="colon">:</span></dt>
<dd><p>Die Folien wurden insbesondere basierend auf der offiziellen Java Dokumentation (JavaDoc 24 und JEPs), sowie basierend auf der Scala (2.13 bzw. 3) Documentation erstellt. Die Folien bzgl. der konkreten <em>Java Streams API (Deepdive)</em> basieren auf Folien von <a class="reference external" href="https://homepages.thm.de/~hg51/Veranstaltungen/A_D/Folien/java-8-kurzeinfuehrung.pdf">Th. Letschert</a></p>
</dd>
<dt>KI Verwendung<span class="colon">:</span></dt>
<dd><p>Bei der Erstellung der Folien wurden KI Assistenten unterstützend eingesetzt. Dies erfolgte insbesondere, um effizient Grafiken zu generieren, die sich leicht in die Folien integrieren lassen, oder um sich Übersichtstabellen generieren zu lassen. Weiterhin wurde KI zur allgemeinen Qualitätssicherung eingesetzt. Alle Inhalte, die in diesem Rahmen von der KI (zusäztlich) vorgeschlagen wurden, wurden überprüft.</p>
<p>Es wurde <strong>keine</strong> KI verwendet für den Aufbau, die Struktur und insbesondere die Auswahl der grundlegenden Inhalte.</p>
</dd>
</dl>
</ld-supplemental><ld-global-information type="cheat-sheet" title="Funktionale Programmierung in Java" symbol="Funktionale Prog. in Java"><blockquote>
<table style="width: 100%;">

<thead>
<tr><th class="head"><p>Konzept</p></th>
<th class="head"><p>Beschreibung</p></th>
<th class="head"><p>Beispiel</p></th>
</tr>
</thead>
<tbody>
<tr><td><p>Lambda-Ausdruck</p></td>
<td><p>Eine anonyme Funktion, die als Wert übergeben werden kann. Syntax:</p>
<ul class="simple">
<li><p><code class="java"><span class="punctuation">(</span><span class="name">Parameter</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">Ausdruck</span></code></p></li>
<li><p><code class="java"><span class="punctuation">(</span><span class="name">Parameter</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="name">Anweisungen</span><span class="punctuation">;</span><span class="whitespace"> </span><span class="punctuation">}</span></code></p></li>
</ul>
</td>
<td><p><code class="java"><span class="punctuation">(</span><span class="name">x</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">y</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">y</span></code></p>
<p><code class="java"><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">x</span></code></p>
<p><code class="java"><span class="punctuation">()</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="literal number integer">42</span></code></p>
<p><code class="java"><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">s</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">a</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">;</span><span class="whitespace"> </span><span class="keyword">return</span><span class="whitespace"> </span><span class="name">s</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">;</span><span class="whitespace"> </span><span class="punctuation">}</span></code></p>
</td>
</tr>
<tr><td><p>Methoden-Referenz</p></td>
<td><p>Kurzschreibweise für Lambdas, die lediglich eine bestehende Methode aufrufen. Varianten:</p>
<ul class="simple">
<li><p>statisch: <code class="java"><span class="name label">Klasse</span><span class="punctuation">::</span><span class="name">methode</span></code></p></li>
<li><p>auf Instanz: <code class="java"><span class="name label">objekt</span><span class="punctuation">::</span><span class="name">methode</span></code></p></li>
<li><p>auf Typ: <code class="java"><span class="name label">Klasse</span><span class="punctuation">::</span><span class="name">instanzMethode</span></code></p></li>
<li><p>Konstruktor: <code class="java"><span class="name label">Klasse</span><span class="punctuation">::</span><span class="keyword">new</span></code></p></li>
</ul>
</td>
<td><p><code class="java"><span class="name label">Integer</span><span class="punctuation">::</span><span class="name">parseInt</span></code></p>
<p><code class="java"><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">out</span><span class="punctuation">::</span><span class="name">println</span></code></p>
<p><code class="java"><span class="name label">String</span><span class="punctuation">::</span><span class="name">length</span></code></p>
<p><code class="java"><span class="name label">ArrayList</span><span class="punctuation">::</span><span class="keyword">new</span></code></p>
</td>
</tr>
<tr><td><p>Funktionales Interface</p></td>
<td><p>Ein Interface mit genau <strong>einer</strong> abstrakten Methode (SAM — <em>Single Abstract Method</em>). Kann mit <code class="java"><span class="name decorator">&#64;FunctionalInterface</span></code> annotiert werden und ermöglicht die Verwendung von Lambda-Ausdrücken.</p></td>
<td><pre class="code java literal-block"><code><span class="name decorator">&#64;FunctionalInterface</span><span class="whitespace">
</span><span class="keyword declaration">interface</span> <span class="name class">MyFunc</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
    </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name function">apply</span><span class="punctuation">(</span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">);</span><span class="whitespace">
</span><span class="punctuation">}</span></code></pre>
</td>
</tr>
<tr><td><p><code class="java"><span class="name">Predicate</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Prüft eine Bedingung auf einem Wert und gibt <code class="java"><span class="keyword type">boolean</span></code> zurück.</p></td>
<td><p><code class="java"><span class="name">Predicate</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">isEven</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">%</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="whitespace"> </span><span class="operator">==</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">Function</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="name">R</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Bildet einen Wert vom Typ <code class="java"><span class="name">T</span></code> auf einen Wert vom Typ <code class="java"><span class="name">R</span></code> ab.</p></td>
<td><p><code class="java"><span class="name">Function</span><span class="operator">&lt;</span><span class="name">String</span><span class="punctuation">,</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">len</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">String</span><span class="punctuation">::</span><span class="name">length</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">Consumer</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Konsumiert einen Wert, gibt nichts zurück (<code class="java"><span class="keyword type">void</span></code>).</p></td>
<td><p><code class="java"><span class="name">Consumer</span><span class="operator">&lt;</span><span class="name">String</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">printer</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">out</span><span class="punctuation">::</span><span class="name">println</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">Supplier</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Liefert einen Wert ohne Eingabe.</p></td>
<td><p><code class="java"><span class="name">Supplier</span><span class="operator">&lt;</span><span class="name">Double</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">random</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Math</span><span class="punctuation">::</span><span class="name">random</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">BinaryOperator</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface: Verknüpft zwei Werte desselben Typs zu einem Ergebnis.</p></td>
<td><p><code class="java"><span class="name">BinaryOperator</span><span class="operator">&lt;</span><span class="name">String</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">wrap</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">b</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">a</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">;</span></code></p></td>
</tr>
<tr><td><p><code class="java"><span class="name">Comparator</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Funktionales Interface für den Vergleich von zwei Objekten; gibt einen <code class="java"><span class="keyword type">int</span></code>-Wert zurück.</p></td>
<td><p><code class="java"><span class="name">Comparator</span><span class="operator">&lt;</span><span class="name">String</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">byLen</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="name">a</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">.</span><span class="name attribute">length</span><span class="punctuation">()</span><span class="whitespace"> </span><span class="operator">-</span><span class="whitespace"> </span><span class="name">b</span><span class="punctuation">.</span><span class="name attribute">length</span><span class="punctuation">();</span></code></p>
<p><code class="java"><span class="name">Comparator</span><span class="punctuation">.</span><span class="name attribute">comparing</span><span class="punctuation">(</span><span class="name">String</span><span class="punctuation">::</span><span class="name">length</span><span class="punctuation">)</span></code></p>
</td>
</tr>
<tr><td><p>Funktionen höherer Ordnung</p></td>
<td><p>Funktionen, die andere Funktionen als Parameter nehmen oder als Ergebnis zurückgeben. Grundlage aller Stream-Operationen.</p></td>
<td><p><code class="java"><span class="name">stream</span><span class="punctuation">.</span><span class="name attribute">filter</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="punctuation">)</span></code> <code class="java"><span class="punctuation">.</span><span class="name attribute">map</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">)</span></code></p></td>
</tr>
<tr><td><p>Closure</p></td>
<td><p>Ein Lambda-Ausdruck, der auf Variablen aus dem umgebenden Kontext zugreift. Diese Variablen müssen <code class="java"><span class="keyword declaration">final</span></code> oder <em>effektiv final</em> sein.</p></td>
<td><pre class="code java literal-block"><code><span class="keyword declaration">final</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="whitespace"> </span><span class="name">factor</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="punctuation">;</span><span class="whitespace">
</span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">).</span><span class="whitespace">
    </span><span class="name">map</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">factor</span><span class="punctuation">).</span><span class="whitespace">
    </span><span class="name">toList</span><span class="punctuation">();</span></code></pre>
</td>
</tr>
<tr><td><p><code class="java"><span class="name">Optional</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code></p></td>
<td><p>Ein Container, der einen Wert enthalten kann oder leer ist. Ersetzt die Verwendung von <code class="java"><span class="keyword constant">null</span></code>.</p></td>
<td><p><code class="java"><span class="name">Optional</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">42</span><span class="punctuation">)</span></code></p>
<p><code class="java"><span class="name">Optional</span><span class="punctuation">.</span><span class="name attribute">empty</span><span class="punctuation">()</span></code></p>
</td>
</tr>
</tbody>
</table>
</blockquote>

<h2>(Aktuelle) Herausforderungen</h2>
<ld-deck>
<ld-card>
<p><strong>Bei der Datenverarbeitung von</strong>:</p>
<ul class="list-with-sublists incremental-list simple">
<li><p>großen Datenmengen,</p>
<ul class="incremental-list">
<li><p>die nicht (ohne weiteres) in den Speicher passen oder</p></li>
<li><p>bei denen es keinen Sinn macht diese vorab vollständig in den Speicher zu laden, da immer nur ein kleiner Abschnitt analysiert werden muss</p></li>
</ul>
</li>
<li><p>Daten, die kontinuierlich verarbeitet werden müssen</p></li>
</ul>
</ld-card><ld-card class="incremental">
<aside class="admonition example"><p class="admonition-title"><span>Beispiel: Konkrete Szenarien der Datenverarbeitung</span></p><ul class="simple">

<li><p>Ver-/Entschlüsselung von großen Datenmengen</p></li>
<li><p>kontinuierliche/echtzeit Verarbeitung von allg. Daten (z. B. Finanzdaten/-transaktionen) oder (IoT) Sensoren</p></li>
<li><p>Verarbeitung von Ereignissen (Event)</p></li>
<li><p>Aufbereitung großer Wörterbücher (z.B. für Passwortwiederherstellung)</p></li>
<li><p>Verarbeitung von AI Streaming Responses</p></li>
<li><p>Verarbeitung große Logdateien</p></li>
</ul>
</aside></ld-card><ld-card class="incremental">

<ld-topic class="no-title center-content" id="java-i-o-streams-vs-java-stream-api">
<h2>Java I/O Streams vs. Java Stream API</h2>
<aside class="admonition attention">
<p class="admonition-title">Achtung!</p>
<p>Im Folgenden betrachten wir die <strong>Java Stream API</strong> und nicht <strong>Java I/O Streams</strong>.</p>
<table style="width: 100%;">
<colgroup>
<col style="width: 20.0%" />
<col style="width: 40.0%" />
<col style="width: 40.0%" />
</colgroup>
<thead>
<tr><th class="head stub"></th>
<th class="head"><p>Java I/O Streams</p></th>
<th class="head"><p>Java Stream API</p></th>
</tr>
</thead>
<tbody>
<tr><th class="stub"><p>Package</p></th>
<td><p><code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">io</span><span class="punctuation">.</span><span class="operator">*</span></code> / <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">nio</span><span class="punctuation">.</span><span class="operator">*</span></code></p></td>
<td><p><code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="operator">*</span></code></p></td>
</tr>
<tr><th class="stub"><p>Fokus</p></th>
<td><p>Byte-/Zeichentransport</p></td>
<td><p>Datenverarbeitung</p></td>
</tr>
<tr><th class="stub"><p>Paradigma</p></th>
<td><p>Imperativ</p></td>
<td><p>Funktional/Deklarativ</p></td>
</tr>
</tbody>
</table>
</aside>
<ld-supplemental><dl class="field-list">
<dt>Imperativ Programmierung<span class="colon">:</span></dt>
<dd><p>Das Vorgehen wird detailliert durch konkrete Anweisungen beschrieben, die genau vorgeben welche einzelnen Schritte von dem Computer ausgeführt werden sollen, um das Ziel zu erreichen.</p>
<p>Viele gängige <em>general-purpose</em> Programmiersprachen (C, C++, Rust, Java, Go, JavaScript, Python) sind im Kern imperative Programmiersprachen.</p>
</dd>
<dt>Deklarative Programmierung<span class="colon">:</span></dt>
<dd><p>Das Ziel ist es auszudrücken <em>was</em> erreicht werden soll, ohne das <em>wie</em> genau anzugeben.</p>
<p>(Prominentes Beispiel für eine deklarative Programmiersprache: SQL als Datenbankabfragesprache.)</p>
</dd>
</dl>
<aside class="admonition remark">
<p class="admonition-title">Bemerkung</p>
<ul class="simple">
<li><p>Auch für gängige Programmiersprachen, die im Kern imperativ sind, ist zu beobachten, dass mehr und mehr Ideen und Konzepte aus der deklarativen Programmierung Einzug in diese Sprachen - insbesondere auch über APIs - finden.</p></li>
<li><p>Es ist in der Zwischenzeit so, dass die Grenzen zwischen (klassischen) prozeduralen (d. h. primär imperativen) Programmiersprachen und funktionalen sowie deklarativen Programmiersprachen verschwimmen.</p></li>
<li><p>Scala - als ein Beispiel für eine moderne Programmiersprache - ist von Grund auf als objektorientiert-funktionale Sprache entworfen wurde.</p></li>
</ul>
</aside>
</ld-supplemental></ld-topic>
<ld-topic id="streams-einfuhrung-am-beispiel">
<h2>Streams - Einführung am Beispiel</h2>
<ld-deck>
<ld-card>
<dl class="incremental-list dd-margin-left-4em field-list simple">
<dt>Pragmatische Sicht<span class="colon">:</span></dt>
<dd><p>Streams<a class="brackets" href="#footnote-1" id="footnote-reference-1" role="doc-noteref"><span class="fn-bracket">[</span>1<span class="fn-bracket">]</span></a> sind umgeformte Sammlungen<span class="incremental">, die durch die Umformung für funktional-orientierte Massen-Operationen geeignet sind.</span></p>
</dd>
<dt>Konzeptionelle Sicht<span class="colon">:</span></dt>
<dd><p>Streams erlauben die „korrekte, effiziente, lesbare (domänennahe)“ Verarbeitung von Daten mit Hilfe von Konzepten und Ideen aus der funktionalen und deklarativen Programmierung.</p>
</dd>
</dl>
</ld-card><ld-card class="incremental">
<aside class="admonition example"><p class="admonition-title"><span>Beispiel</span></p><ld-supplemental embed-in-document-flow><p><em>Benötigte Imports (nicht in der JShell)</em></p>

</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="name">List</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">ll</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">l</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">()</span><span class="whitespace">                       </span><span class="comment single">// list → stream</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">filter</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">x</span><span class="whitespace"> </span><span class="operator">%</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="whitespace"> </span><span class="operator">==</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="punctuation">)</span><span class="whitespace">        </span><span class="comment single">// filter list with predicate</span><span class="whitespace">
</span></code><small class="ln">5 </small><code data-lineno="5 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">map</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="whitespace"> </span><span class="operator">*</span><span class="whitespace"> </span><span class="name">x</span><span class="punctuation">)</span><span class="whitespace">               </span><span class="comment single">// map each element to a new one</span><span class="whitespace">
</span></code><small class="ln">6 </small><code data-lineno="6 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">collect</span><span class="punctuation">(</span><span class="name">Collectors</span><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">());</span><span class="whitespace">  </span><span class="comment single">// back to a list (alt. toList())</span><span class="whitespace">
</span></code><small class="ln">7 </small><code data-lineno="7 "><span class="whitespace"></span><span class="name">ll</span><span class="punctuation">.</span><span class="name attribute">forEach</span><span class="punctuation">(</span><span class="name">x</span><span class="whitespace"> </span><span class="operator">-&gt;</span><span class="whitespace"> </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">out</span><span class="punctuation">.</span><span class="name attribute">println</span><span class="punctuation">(</span><span class="name">x</span><span class="punctuation">));</span></code></pre>

</div></div><ld-supplemental embed-in-document-flow><p>Es ist möglich als terminale Operation einen <code class="java"><span class="name">Iterator</span></code> bzw. <code class="java"><span class="name">Spliterator</span></code> zu erzeugen. In diesen beiden Fällen erfolgt die Evaluation der Pipeline nicht vollständig (d.h. nicht <em>eager</em> sondern <em>lazy</em>). Es wird somit nur so viel ausgewertet, wie für die Erzeugung des <code class="java"><span class="name">Iterator</span></code>/<code class="java"><span class="name">Spliterator</span></code> notwendig ist. Das hat zur Folge, dass die Elemente des Streams erst dann verarbeitet werden, wenn sie tatsächlich über den <code class="java"><span class="name">Iterator</span></code>/<code class="java"><span class="name">Spliterator</span></code> angefordert werden.</p>
<p>Die Verwendung dieser beiden Methoden führt zu einem Bruch des deklarativen Pipeline-Modells, der in den allermeisten Fällen vermieden werden kann. Häufig nur noch im Zusammenhang mit Legacy-APIs relevant, die mit <code class="java"><span class="name">Iterator</span></code>/<code class="java"><span class="name">Spliterator</span></code> arbeiten.</p>
</ld-supplemental></ld-topic>

<ld-topic id="streams-mit-primitiven-daten-und-objekten">
<h2>Streams mit primitiven Daten und Objekten</h2>
<ul>
<li><p><code class="java"><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code> ist der Typ der Streams mit Objekten vom Typ <code class="java"><span class="name">T</span></code></p></li>
<li><p>Streams mit primitiven Daten:</p>
<ul class="simple">
<li><p><code class="java"><span class="name">IntStream</span></code></p></li>
<li><p><code class="java"><span class="name">LongStream</span></code></p></li>
<li><p><code class="java"><span class="name">DoubleStream</span></code></p></li>
</ul>
<p>Diese Streams mit primitiven Daten arbeiten in vielen Fällen effizienter jedoch sind manche Operationen nur auf <code class="java"><span class="name">Object</span></code>-Streams erlaubt. „Primitive“ Streams können mit der Methode <code class="java"><span class="name">boxed</span></code> in <code class="java"><span class="name">Object</span></code>-Streams umgewandelt werden.</p>
</li>
</ul>
<aside class="admonition example incremental"><p class="admonition-title"><span>Beispiel</span></p><pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name">IntStream</span><span class="whitespace"> </span><span class="name">isPrim</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">IntStream</span><span class="punctuation">.</span><span class="name attribute">range</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">10</span><span class="punctuation">);</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">isObj</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">isPrim</span><span class="punctuation">.</span><span class="name attribute">boxed</span><span class="punctuation">();</span></code></pre>
</aside></ld-topic>
<ld-topic id="erzeugung-von-streams">
<h2>Erzeugung von Streams</h2>
<ld-deck>
<ld-card>
<p class="rubric">Statische Methoden in <code class="java"><span class="name">Arrays</span></code></p>
<ul class="simple">
<li><p>Die Klasse <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">Arrays</span></code> hat mehrere überladene statische stream-Methoden, mit denen Arrays in Ströme umgewandelt werden können.</p></li>
<li><p>Die Streams können Objekte oder primitive Daten enthalten.</p></li>
</ul>
<aside class="admonition example incremental"><p class="admonition-title"><span>Beispiel</span></p><pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="comment single">// Stream of primitive data:</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="name">IntStream</span><span class="whitespace"> </span><span class="name">isP</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">(</span><span class="keyword">new</span><span class="whitespace"> </span><span class="keyword type">int</span><span class="operator">[]</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">6</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">7</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">8</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">9</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace"> </span><span class="punctuation">});</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace"></span><span class="comment single">// Stream of objects:</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace"></span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">isO</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Arrays</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">(</span><span class="whitespace">
</span></code><small class="ln">5 </small><code data-lineno="5 "><span class="whitespace">    </span><span class="keyword">new</span><span class="whitespace"> </span><span class="name">Integer</span><span class="operator">[]</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">6</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">7</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">8</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">9</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace"> </span><span class="punctuation">}</span><span class="whitespace">
</span></code><small class="ln">6 </small><code data-lineno="6 "><span class="whitespace"></span><span class="punctuation">);</span></code></pre>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">Statische Methoden in <code class="java"><span class="name">Stream</span></code></p>
<ul class="simple">
<li><p>Das Interface <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">Stream</span></code> enthält mehrere statische Methoden mit denen Streams erzeugt werden können.</p></li>
<li><p>Für die Klassen der Streams mit primitiven Werten (z.B. <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">IntStream</span></code>) gibt es äquivalente Methoden.</p></li>
</ul>
<ld-deck>
<ld-card>
<ul class="simple">
<li><p>Mit <code class="java"><span class="name">of</span></code> werden die übergebenen Wert in einen Stream gepackt.</p></li>
<li><p>Mit <code class="java"><span class="name">iterate</span></code> und <code class="java"><span class="name">generate</span></code> hat man eine einfache Möglichkeit unendliche Ströme zu erzeugen.</p></li>
</ul>
</ld-card><ld-card class="incremental">
<aside class="admonition example incremental"><p class="admonition-title"><span>Beispiel</span></p><pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="comment single">// Object-Stream 1, 2 ... 9, 0:</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">is1a</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">Stream</span><span class="punctuation">.</span><span class="name attribute">of</span><span class="punctuation">(</span><span class="literal number integer">1</span><span class="punctuation">,</span><span class="literal number integer">2</span><span class="punctuation">,</span><span class="literal number integer">3</span><span class="punctuation">,</span><span class="literal number integer">4</span><span class="punctuation">,</span><span class="literal number integer">5</span><span class="punctuation">,</span><span class="literal number integer">6</span><span class="punctuation">,</span><span class="literal number integer">7</span><span class="punctuation">,</span><span class="literal number integer">8</span><span class="punctuation">,</span><span class="literal number integer">9</span><span class="punctuation">,</span><span class="literal number integer">0</span><span class="punctuation">);</span></code></pre>

</aside></ld-card></ld-deck></ld-card><ld-card class="incremental">
<p class="rubric">Verarbeitungsoperationen</p>
<p>Eine terminale Operation hat im Gegensatz zu den Verarbeitungsoperationen <em>keinen Stream</em> als
Ergebnis.</p>
<ld-deck class="incremental">
<ld-card>
<p class="rubric">Terminale Operationen ohne Ergebnis</p>
<ul class="incremental-list list-with-explanations">
<li><p><code class="java"><span class="name">forEach</span><span class="punctuation">(</span><span class="name">Consumer</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">super</span><span class="whitespace"> </span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">action</span><span class="punctuation">)</span></code></p>
<p>Wendet die übergebene Aktion auf alle Elemente des Streams an.</p>
</li>
</ul>
</ld-card><ld-card class="incremental">
<p class="rubric">Terminale Operationen mit Ergebnis</p>
<ul class="incremental-list list-with-explanations">
<li><p>Operationen mit Array-Ergebnis: <code class="java"><span class="name">Stream</span><span class="whitespace"> </span><span class="operator">=&gt;</span><span class="whitespace"> </span><span class="name">Array</span></code></p>
<p>Operationen die den Stream in ein äquivalentes Array umwandeln.</p>
</li>
<li><p>Operationen mit Kollektions-Ergebnis: <code class="java"><span class="name">Stream</span><span class="whitespace"> </span><span class="operator">=&gt;</span><span class="whitespace"> </span><span class="name">Kollektion</span></code></p>
<p>Operationen die den Stream in eine äquivalente Kollektion umwandeln.</p>
</li>
<li><p>Operationen mit Einzel-Ergebnis: Aggregierende Operationen</p>
<p>Operationen die den Stream zu einem einzigen Wert verarbeiten.</p>
</li>
</ul>
</ld-card><ld-card class="incremental">

<ld-supplemental><p class="rubric">Terminale Operationen mit Kollektions-Ergebnis</p>
<ul>
<li><p>Die Methode <code class="java"><span class="name">collect</span></code> erzeugt eine Kollektion aus den Elementen des Streams.</p></li>
<li><p><code class="java"><span class="name">IntStream</span></code> und andere Streams mit primitiven Daten haben keine entsprechende Operation.</p></li>
<li><p>Das Argument von <code class="java"><span class="name">collect</span></code> ist ein <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">Collector</span></code>. Die Erzeugung einer Kollektion ist damit Sonderfall einer aggregierenden Operation.</p></li>
<li><p>Für die Erzeugung einer Kollektion verwendet man typischerweise einen vordefinierten <code class="java"><span class="name">Collector</span></code> aus der Klasse <code class="java"><span class="name">java</span><span class="punctuation">.</span><span class="name attribute">util</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">.</span><span class="name attribute">Collectors</span></code>.</p></li>
<li><p>Einfache Kollektionserzeuger in Collectors sind:</p>
<blockquote>
<ul class="simple">
<li><p><code class="java"><span class="name">toList</span><span class="punctuation">()</span></code></p></li>
<li><p><code class="java"><span class="name">toSet</span><span class="punctuation">()</span></code></p></li>
<li><p><code class="java"><span class="name">toCollection</span><span class="punctuation">(</span><span class="name">Supplier</span><span class="operator">&lt;</span><span class="name">C</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">collectionFactory</span><span class="punctuation">)</span></code></p></li>
</ul>
</blockquote>
</li>
</ul>

<p>In <code class="java"><span class="name">Collectors</span></code> finden sich <strong>Kollektoren mit denen Maps erzeugt werden können</strong>, die eine Gruppierung bzw. eine Partitionierung der Stream-Elemente darstellen:</p>
<ul>
<li><p><code class="java"><span class="keyword declaration">static</span><span class="whitespace"> </span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="name">K</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">Collector</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="operator">?</span><span class="punctuation">,</span><span class="name">Map</span><span class="operator">&lt;</span><span class="name">K</span><span class="punctuation">,</span><span class="name">List</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;&gt;&gt;</span><span class="whitespace"> </span><span class="name function">groupingBy</span><span class="punctuation">(</span><span class="name">Function</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">super</span><span class="whitespace"> </span><span class="name">T</span><span class="punctuation">,</span><span class="operator">?</span><span class="whitespace"> </span><span class="keyword declaration">extends</span><span class="whitespace"> </span><span class="name">K</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">classifier</span><span class="punctuation">)</span></code></p>
<p>Gruppiert die Elemente entsprechend einer Klassifizierungsfunktion.</p>
</li>
<li><p><code class="java"><span class="keyword declaration">static</span><span class="whitespace"> </span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">Collector</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="operator">?</span><span class="punctuation">,</span><span class="name">Map</span><span class="operator">&lt;</span><span class="name">Boolean</span><span class="punctuation">,</span><span class="name">List</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;&gt;&gt;</span><span class="whitespace"> </span><span class="name function">partitioningBy</span><span class="punctuation">(</span><span class="name">Predicate</span><span class="operator">&lt;?</span><span class="whitespace"> </span><span class="keyword declaration">super</span><span class="whitespace"> </span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">predicate</span><span class="punctuation">)</span></code></p>

<p>Das Interface Stream bietet die Funktion</p>
<blockquote>
<p><code class="java"><span class="name">Optional</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name function">reduce</span><span class="punctuation">(</span><span class="name">BinaryOperator</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">accumulator</span><span class="punctuation">)</span></code></p>

</blockquote>

<ld-topic id="streams-fortgeschrittene-konzepte">

<pre class="code java literal-block"><small class="ln"> 1 </small><code data-lineno=" 1 "><span class="keyword namespace">package</span><span class="whitespace"> </span><span class="name namespace">java.util.stream</span><span class="punctuation">;</span><span class="whitespace">

</span></code><small class="ln"> 3 </small><code data-lineno=" 3 "><span class="whitespace"></span><span class="keyword declaration">public</span><span class="whitespace"> </span><span class="keyword declaration">interface</span> <span class="name class">BaseStream</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">S</span><span class="whitespace"> </span><span class="keyword declaration">extends</span><span class="whitespace"> </span><span class="name">BaseStream</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="name">S</span><span class="operator">&gt;&gt;</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">

<ld-supplemental><p>Die Interfacedefintion (<code class="java"><span class="name">BaseStream</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="whitespace"> </span><span class="name">S</span><span class="whitespace"> </span><span class="keyword declaration">extends</span><span class="whitespace"> </span><span class="name">BaseStream</span><span class="operator">&lt;</span><span class="name">T</span><span class="punctuation">,</span><span class="name">S</span><span class="operator">&gt;&gt;</span></code>) ist eine Anwendung des CRTP; d. h. des <em>Curiously Recurring Template Pattern</em>s. Bei diesem Idiom haben wir eine Klasse <code class="java"><span class="name">X</span></code>, die von einer  generischen Klasse oder einem generischen Interface <code class="java"><span class="name">S</span></code> abgeleitet wird, wobei die ableitende Klasse <code class="java"><span class="name">X</span></code> sich selber als Typparameter verwendet. Dies erlaubt die Definition einer Fluent-API, bei der Methoden, die in der Basisklasse definiert sind, den abgeleiteten Typ zurückgeben.</p>
</ld-supplemental></ld-card><ld-card class="incremental">
<p class="rubric">Erzeugen von eigenen Streams mittels <a class="reference external" href="https://docs.oracle.com/en/java/javase/24/docs/api/java.base/java/util/stream/StreamSupport.html">StreamSupport</a></p>
<p>Die Implementierung des Interfaces <code class="java"><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">T</span><span class="operator">&gt;</span></code> ist ggf. sehr aufwändig. Alternativ kann die Klasse <code class="java"><span class="name">StreamSupport</span></code> verwendet werden, um auf einem <code class="java"><span class="name">Spliterator</span></code> basierende Streams zu erzeugen.</p>
<pre class="code java literal-block"><small class="ln"> 1 </small><code data-lineno=" 1 "><span class="keyword namespace">package</span><span class="whitespace"> </span><span class="name namespace">java.util.stream</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln"> 2 </small><code data-lineno=" 2 "><span class="whitespace">
</span></code><small class="ln"> 3 </small><code data-lineno=" 3 "><span class="whitespace"></span><span class="keyword declaration">public</span><span class="whitespace"> </span><span class="keyword declaration">final</span><span class="whitespace"> </span><span class="keyword declaration">class</span> <span class="name class">StreamSupport</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">

</span></code><small class="ln"> 8 </small><code data-lineno=" 8 "><span class="whitespace">    </span><span class="comment single">// ...</span><span class="whitespace">

<ld-topic class="exercises" id="ubung">
<h2>Übung</h2>
<div class="ld-exercise" data-exercise-id="2" data-exercise-title="2 - Java Streams" id="ld-exercise-2">
<p class="ld-exercise-title rubric">Java Streams</p>
<aside class="admonition remark">
<p class="admonition-title">Bemerkung</p>
<p>Verwenden Sie ausschließlich Streams und Lambda-Ausdrücke.</p>
</aside>
<ol class="arabic simple">
<li><p>Schreiben Sie eine Methode <code class="java"><span class="keyword type">int</span><span class="whitespace"> </span><span class="name function">sumOfSquares</span><span class="punctuation">(</span><span class="keyword type">int</span><span class="operator">[]</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">)</span></code> die die Elemente des Arrays quadriert und dann die Summe berechnet.</p></li>
<li><p>Schreiben Sie eine Methode <code class="java"><span class="keyword type">int</span><span class="whitespace"> </span><span class="name function">sumOfSquaresEven</span><span class="punctuation">(</span><span class="keyword type">int</span><span class="operator">[]</span><span class="whitespace"> </span><span class="name">a</span><span class="punctuation">)</span></code> die die Elemente des Arrays quadriert, und dann die Summe berechnet für alle Elemente die gerade sind.</p></li>
<li><p>Schreiben Sie eine Methode, die eine Liste von Strings (<code class="java"><span class="name">List</span><span class="operator">&lt;</span><span class="name">String</span><span class="operator">&gt;</span></code>) in eine flache Liste von Zeichen (<code class="java"><span class="name">List</span><span class="operator">&lt;</span><span class="name">Integer</span><span class="operator">&gt;</span></code>) umwandelt.</p></li>
<li><p>Schreiben Sie eine Methode, die die Zahlen von <code class="java"><span class="literal number integer">1</span></code> bis <code class="java"><span class="name">Integer</span><span class="punctuation">.</span><span class="name attribute">MAX_VALUE</span></code> addiert. Nutzen Sie <code class="java"><span class="name">IntStream</span><span class="punctuation">.</span><span class="name attribute">range</span><span class="punctuation">()</span></code> um die Zahlen zu iterieren. Messen Sie die Ausführungsdauer für die <em>sequentielle</em> und <em>parallele</em> Ausführung (siehe Anhang für eine entsprechende Methode zur Zeitmessung.)</p></li>
</ol>
<ld-supplemental><p>Um die Ausführungsdauer Ihrer Methode zu messen, können Sie folgenden Methode verwenden:</p>
<pre class="code java copy-to-clipboard literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="keyword type">void</span><span class="whitespace"> </span><span class="name function">time</span><span class="punctuation">(</span><span class="name">Runnable</span><span class="whitespace"> </span><span class="name">r</span><span class="punctuation">)</span><span class="whitespace"> </span><span class="punctuation">{</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace">    </span><span class="keyword declaration">final</span><span class="whitespace"> </span><span class="keyword declaration">var</span><span class="whitespace"> </span><span class="name">startTime</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">nanoTime</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace">    </span><span class="name">r</span><span class="punctuation">.</span><span class="name attribute">run</span><span class="punctuation">();</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace">    </span><span class="keyword declaration">final</span><span class="whitespace"> </span><span class="keyword declaration">var</span><span class="whitespace"> </span><span class="name">endTime</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">System</span><span class="punctuation">.</span><span class="name attribute">nanoTime</span><span class="punctuation">();</span><span class="whitespace">

<ld-topic id="herausforderung-low-representational-gap-gelost">
<h2>Herausforderung <em>Low-representational Gap</em> gelöst?</h2>
<p class="rubric">Lösung mit standard <em>Stream</em> Primitiven (≤ Java 24)</p>
<ld-supplemental embed-in-document-flow><p><em>Benötigte Imports</em></p>
<pre class="code java literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">java.util.Comparator.comparingDouble</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace"></span><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">java.util.function.Predicate.not</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace"></span><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.Collectors.groupingBy</span><span class="punctuation">;</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace"></span><span class="keyword namespace">import static</span><span class="whitespace"> </span><span class="name namespace">java.util.stream.Collectors.minBy</span><span class="punctuation">;</span></code></pre>
</ld-supplemental><p><em>Geschäftslogik</em></p>
<pre class="code java literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name">List</span><span class="operator">&lt;</span><span class="name">Student</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name">empfehlungenS</span><span class="whitespace"> </span><span class="operator">=</span><span class="whitespace"> </span><span class="name">alleStudierenden</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">()</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">filter</span><span class="punctuation">(</span><span class="name">not</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">hatStipendium</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">collect</span><span class="punctuation">(</span><span class="name">groupingBy</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">studiengang</span><span class="punctuation">,</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace">                        </span><span class="name">minBy</span><span class="punctuation">(</span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">schnitt</span><span class="punctuation">))))</span><span class="whitespace">
</span></code><small class="ln">5 </small><code data-lineno="5 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">values</span><span class="punctuation">().</span><span class="name attribute">stream</span><span class="punctuation">().</span><span class="name attribute">flatMap</span><span class="punctuation">(</span><span class="name">Optional</span><span class="punctuation">::</span><span class="name">stream</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln">6 </small><code data-lineno="6 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">sorted</span><span class="punctuation">(</span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">schnitt</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln">7 </small><code data-lineno="7 "><span class="whitespace">    </span><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">();</span></code></pre>
<aside class="admonition incremental assessment">
<p class="admonition-title">Bewertung</p>
<p>Wir sind näher an der Geschäftslogik, aber technische Artefakte scheinen noch durch!</p>
<ld-deck class="incremental">
<ld-card>
<ul class="simple">
<li><p>Um die gewünschte Gruppierung zu erhalten, werden die besten Studierenden in einer Zwischendatenstruktur (<em>Map</em>) aufgesammelt (<code class="java"><span class="name">collect</span><span class="punctuation">(...)</span></code>). Diese muss - um eine Stream-orientierte Weiterverarbeitung zu ermöglichen - wieder in einen Stream verwandelt werden, der über den <em>Values</em> der <em>Map</em> operiert (<code class="java"><span class="name">values</span><span class="punctuation">().</span><span class="name attribute">stream</span><span class="punctuation">()</span></code>).</p></li>
</ul>
</ld-card><ld-card class="incremental">
<ul class="simple">
<li><p>Da wir in eine <em>Map</em> aufgesammelt hatten, haben wir einen <em>Stream of Optionals</em>;  <code class="java"><span class="name">minBy</span><span class="punctuation">(...)</span></code> liefert ein <code class="java"><span class="name">Optional</span></code>. Somit müssen wir die <code class="java"><span class="name">Optional</span></code>s im <code class="java"><span class="name">Stream</span><span class="operator">&lt;</span><span class="name">Optional</span><span class="operator">&lt;</span><span class="name">Student</span><span class="operator">&gt;&gt;</span></code> über <code class="java"><span class="name">flatMap</span><span class="punctuation">(</span><span class="name">Optional</span><span class="punctuation">::</span><span class="name">stream</span><span class="punctuation">)</span></code> entpacken.</p></li>
</ul>
</ld-card></ld-deck></aside>
</ld-topic>

<ld-topic class="new-section transition-flip" id="java-streams-abschlieszende-betrachtung">
<h2>Java Streams - abschließende Betrachtung</h2>
<p class="section-subtitle">(Java) Streams unterstützen die effiziente, korrekte Verarbeitung von (Massen-)Daten durch die Anwendung von funktionalen und deklarativen Konzepten mit dem Ziel einer möglichst geringen Repräsentationslücke (<span class="eng">Low representational gap</span>).</p>
</ld-topic>
<ld-topic class="new-section transition-flip" id="vergleich-von-java-s-stream-api-mit-scala-s-stream-api">
<h2>Vergleich von Java's Stream-API mit Scala's Stream-API</h2>
</ld-topic>
<ld-topic id="java-streams-vs-scala-collections-konzeptioneller-vergleich">
<h2>Java Streams vs. Scala Collections — Konzeptioneller Vergleich</h2>
<table class="incremental-table-rows dhbw">
<colgroup>
<col style="width: 23.1%" />
<col style="width: 38.5%" />
<col style="width: 38.5%" />
</colgroup>
<thead>
<tr><th class="head"></th>
<th class="head"><p>Java Streams</p></th>
<th class="head"><p>Scala Collections</p></th>
</tr>
</thead>
<tbody>
<tr><td><p><strong>Pipeline-Modell</strong></p></td>
<td><p>Deklarativ, verkettet</p></td>
<td><p>Deklarativ, verkettet</p></td>
</tr>
<tr><td><p><strong>Funktionen als Parameter</strong></p></td>
<td><p>Lambdas, Method References</p></td>
<td><p>Funktionsliterale, Platzhalter <span class="docutils literal">_</span></p></td>
</tr>
<tr><td><p><strong>Quelle unveränderlich</strong></p></td>
<td><p>Ja</p></td>
<td><p>Ja</p></td>
</tr>
<tr><td><p><strong>Streams = Collections?</strong></p></td>
<td><p>Nein — separates Konzept, explizites <span class="docutils literal">.stream()</span> / <span class="docutils literal">.toList()</span></p></td>
<td><p>Ja — Operationen direkt auf Collections</p></td>
</tr>
<tr><td><p><strong>Auswertung</strong></p></td>
<td><p>Lazy (erst bei Terminal Op)</p></td>
<td><p>Eager (sofort); <span class="docutils literal">LazyList</span> als Opt-in</p></td>
</tr>
<tr><td><p><strong>Erweiterbarkeit</strong></p></td>
<td><p>Collectors seit Java 8, Gatherers seit Java 24</p></td>
<td><p>'<em>„Nicht nötig“</em> — umfangreiche Standardbibliothek'</p></td>
</tr>
<tr><td><p><strong>Parallelisierung</strong></p></td>
<td><p>Tief integriert (<span class="docutils literal">.parallelStream()</span>)</p></td>
<td><p>Separate Bibliothek (<span class="docutils literal">.par</span>) seit Scala 2.13</p></td>
</tr>
</tbody>
</table>
<ld-supplemental><p>Scala verfolgt einen anderen Designansatz: Collections <em>sind</em> die Pipeline. Es gibt keine Trennung zwischen Datenstruktur und Transformations-API. Das macht den Einstieg einfacher und den Code kürzer, bedeutet aber auch, dass Laziness explizit gewählt werden muss.</p>
<p>Javas Trennung in Collection und Stream ist verboseer, ermöglicht dafür aber Lazy Evaluation als Standard und eine tief integrierte Parallelisierung.</p>
</ld-supplemental></ld-topic>

<p class="rubric">Java (mit Gatherer)</p>
<pre class="code java literal-block"><small class="ln"> 1 </small><code data-lineno=" 1 "><span class="name">alleStudierenden</span><span class="punctuation">.</span><span class="name attribute">stream</span><span class="punctuation">()</span><span class="whitespace">
</span></code><small class="ln"> 2 </small><code data-lineno=" 2 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name attribute">filter</span><span class="punctuation">(</span><span class="name">not</span><span class="punctuation">(</span><span class="name">Student</span><span class="punctuation">::</span><span class="name">hatStipendium</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln"> 3 </small><code data-lineno=" 3 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name attribute">gather</span><span class="punctuation">(</span><span class="name">reducePerGroup</span><span class="punctuation">(</span><span class="whitespace">

</span></code><small class="ln"> 5 </small><code data-lineno=" 5 "><span class="whitespace">      </span><span class="name">BinaryOperator</span><span class="punctuation">.</span><span class="name attribute">minBy</span><span class="punctuation">(</span><span class="whitespace">
</span></code><small class="ln"> 6 </small><code data-lineno=" 6 "><span class="whitespace">        </span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="whitespace">
</span></code><small class="ln"> 7 </small><code data-lineno=" 7 "><span class="whitespace">          </span><span class="name">Student</span><span class="punctuation">::</span><span class="name">schnitt</span><span class="punctuation">))))</span><span class="whitespace">
</span></code><small class="ln"> 8 </small><code data-lineno=" 8 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name attribute">sorted</span><span class="punctuation">(</span><span class="name">comparingDouble</span><span class="punctuation">(</span><span class="whitespace">
</span></code><small class="ln"> 9 </small><code data-lineno=" 9 "><span class="whitespace">      </span><span class="name">Student</span><span class="punctuation">::</span><span class="name">schnitt</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln">10 </small><code data-lineno="10 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name attribute">toList</span><span class="punctuation">();</span></code></pre>
</ld-cell><ld-cell class="width-50" style="align-self:auto;">
<p class="rubric">Scala</p>
<pre class="code scala literal-block"><small class="ln">1 </small><code data-lineno="1 "><span class="name">alleStudierenden</span><span class="whitespace">
</span></code><small class="ln">2 </small><code data-lineno="2 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name">filterNot</span><span class="punctuation">(</span><span class="name">_</span><span class="punctuation">.</span><span class="name">hatStipendium</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln">3 </small><code data-lineno="3 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name">groupBy</span><span class="punctuation">(</span><span class="name">_</span><span class="punctuation">.</span><span class="name">studiengang</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln">4 </small><code data-lineno="4 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name">values</span><span class="whitespace">
</span></code><small class="ln">5 </small><code data-lineno="5 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name">map</span><span class="punctuation">(</span><span class="name">_</span><span class="punctuation">.</span><span class="name">minBy</span><span class="punctuation">(</span><span class="name">_</span><span class="punctuation">.</span><span class="name">schnitt</span><span class="punctuation">))</span><span class="whitespace">
</span></code><small class="ln">6 </small><code data-lineno="6 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name">toList</span><span class="whitespace">
</span></code><small class="ln">7 </small><code data-lineno="7 "><span class="whitespace">  </span><span class="punctuation">.</span><span class="name">sortBy</span><span class="punctuation">(</span><span class="name">_</span><span class="punctuation">.</span><span class="name">schnitt</span><span class="punctuation">)</span></code></pre>
</ld-cell></ld-grid><aside class="admonition incremental assessment">
<p class="admonition-title">Bewertung</p>
<ld-deck class="incremental">
<ld-card>
<p><strong>Syntaktisches Rauschen:</strong> Java erfordert <span class="docutils literal">.stream()</span> / <span class="docutils literal">.toList()</span> als Rahmen, Typnamen in Method References (<span class="docutils literal"><span class="pre">Student::schnitt</span></span>) und Wrapper wie <span class="docutils literal">comparingDouble</span>. Scala's <span class="docutils literal">_</span>-Platzhalter und die direkte Arbeit auf Collections eliminieren diesen Overhead.</p>
</ld-card><ld-card class="incremental">
<p><strong>Gruppierung:</strong> In Scala ist <span class="docutils literal">groupBy</span> eine normale Collection-Methode — kein Pipeline-Bruch, kein Collector. Java brauchte für denselben Effekt zunächst den <span class="docutils literal">collect</span>/<span class="docutils literal">Collector</span>-Umweg und seit Java 24 die <span class="docutils literal">Gatherer</span>-API.</p>
</ld-card><ld-card class="incremental">
<p><strong>Vergleich und Reduktion:</strong> <span class="docutils literal">_.minBy(_.schnitt)</span> in Scala vs. <span class="docutils literal"><span class="pre">BinaryOperator.minBy(comparingDouble(Student::schnitt))</span></span> in Java — die explizite Typmaschinerie des Java-Typsystems ist hier deutlich sichtbar.</p>
</ld-card><ld-card class="incremental">
<p><strong>Lazy vs. Eager:</strong> Scalas Code wird sofort ausgewertet — <span class="docutils literal">groupBy</span> erzeugt <em>sofort</em> eine <span class="docutils literal">Map</span>. Javas Pipeline hingegen ist vollständig lazy; erst <span class="docutils literal">.toList()</span> löst die Berechnung aus. Für große Datenmengen kann das ein relevanter Unterschied sein.</p>
</ld-card></ld-deck></aside>
</ld-topic>
