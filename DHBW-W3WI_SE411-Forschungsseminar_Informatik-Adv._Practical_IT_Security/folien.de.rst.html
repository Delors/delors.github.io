<ld-topic id="teaser">
<h2>Teaser</h2>
<ld-deck>
<ld-card>
<p>In dieser Veranstaltung werden wir uns mit den Grundlagen praktischer Angriffe und Verteidigungsmaßnahmen im Bereich IT Security auseinandersetzen. Wir werden uns der Frage widmen wie, wann und in welcher Form man - auf den ersten Blick abgesicherte Systeme/geschützte Daten - einerseits angreifen (<span class="eng">to exploit</span>) kann und wie man die Sicherheit weiter erhöhen kann.</p>
<p>Wir werden uns in diesem und dem nächsten Semester ausgewählten Themen widmen, die von der Sicherheit von Passwörtern und Angriffen auf selbige bis hin zu der Sicherheit von Netzwerken und Webanwendungen reichen.</p>
<p><span class="peripheral">Wir werden uns somit auf praktische Aspekte der IT Sicherheit fokussieren. Theoretische Grundlagen sind nur in so weit relevant, dass sie in der Praxis eine Relevanz haben.</span></p>
</ld-card><ld-card class="incremental">
<aside class="admonition" data-theme="hint"><p class="admonition-title" data-theme="hint-header">Hinweis</p>
<p>Für diese Veranstaltung sind Grundkenntnisse in Linux/Unix/MacOS hilfreich aber nicht notwendig. Notwendig ist aber Interesse an tiefer gehenden technischen Details.</p>
<p>Es wird  empfohlen sich eine virtuelle Maschine (z. B. mit VirtualBox) aufzusetzen, auf der Sie Linux (z. B. Kali Linux) installieren. Ggf. können Sie auch WSL2 unter Windows verwenden. Mac User können viele der Tools direkt installieren oder über Homebrew bzw. MacPorts beziehen.</p>
</aside>
</ld-card></ld-deck></ld-topic>

<ld-topic class="fade-out" id="fachprasentationen">
<h2>Fachpräsentationen</h2>
<ld-story>
<p class="rubric">Vortragsthemen 1.12.2025</p>
<ul class="incremental-list list-with-explanations">
<li><p>scrpyt, bcrypt und Argon2: moderne Passwort Hashing Algorithmen - Vorstellung und Shout-out</p>
<p>(3 Personen)</p>
</li>
<li><p>John the Ripper: Passwort Cracking Tool - Einführung und Demonstration</p>
<p>(1 Person)</p>
</li>
<li><p>WIFI Passwortsicherheit: Hacking WEP und WPA2 mit Aircrack-ng - Einführung und Demonstration; WPA3: <a class="reference external" href="https://wpa3.mathyvanhoef.com">Besprechung von Dragonblood</a></p>
<p>(2 Personen)</p>
</li>
<li><p>Wireshark: Einführung in die Konzepte und praktische Anwendung (Kali Linux, Mac OS, Windows) - Anwendung bei verschlüsselten Protokollen (TLS, HTTPS, ...)</p>
<p>(3 Personen)</p>
</li>
<li><p>YSoSerial: Java Deserialization Exploits (aka Serialization gadgets) - Einführung in das Thema und Demonstration/Besprechung von Beispielen</p>
<p>(2 Person)</p>
</li>
<li><p>Fuzzy Hashing und Yara: Malware Detection/Description</p>
<p>(1 Person)</p>
</li>
</ul>
<p class="rubric">Vortragsthemen 15.12.2025</p>
<ul class="incremental-list list-with-explanations">
<li><p>Aufbau von APKs (Android Apps) und der grobe Aufbau des Dex File Formats</p>
<p>(2 Person)</p>
</li>
<li><p>DexGuard und Proguard: Obfuscator für Android und Java Anwendungen - Einführung und Demonstration (z.B. mit Hilfe von JadX, CFR/JD-GUI)</p>
<p>(1 Personen)</p>
</li>
<li><p>Einsatz von FRIDA zur dynamischen Instrumentierung von Android und iOS Anwendungen</p>
<p>(1 Personen)</p>
</li>
<li><p>xdbg64 (Windows): Hacking Applications mit dem x64 Debugger - Einführung und Demonstration</p>
<p>(1 Person)</p>
</li>
</ul>
<ul class="incremental-list">
<li><p>Native Binary Reverse Engineering</p>
<p>(Bitte Gegenseitig absprechen, um Überschneidungen zu vermeiden!)</p>
<ul class="list-with-explanations">
<li><p>Assembler: x86 oder ARM Assembler Grundlagen für Reverse Engineering</p>
<p>(2 Personen)</p>
</li>
<li><p><em>Function Call Semantics</em> in Binaries und <em>Syscalls</em></p>
<p>(1 Person)</p>
</li>
<li><p>Virtuelle Methodenaufrufe und deren Umsetzung in Assembler</p>
<p>(1 Person)</p>
</li>
<li><p>Sicherheitsmechanismen in Native-Binaries: insbesondere Stack canaries, Position-independent Code &amp; Address Space Layout Randomization</p>
<p>(1 Person)</p>
</li>
<li><p>Ghidra: Binary-Reverse-Engineering - kurze Einführung und Demonstration</p>
<p>(2 Personen)</p>
</li>
</ul>
</li>
</ul>
</ld-story></ld-topic>

<ld-topic class="no-title center-content" id="bewertungskriterien">
<h2>Bewertungskriterien</h2>
<aside class="admonition" data-theme="attention"><p class="admonition-title" data-theme="attention-header">Achtung!</p>
<p>Geänderte Bewertungskriterien für alle Formen von Abgaben (Präsentationen, Dokumentationen).</p>
<p>Zu Punktabzügen führen:</p>
<ul class="simple">
<li><p>Aussagen, die faktisch falsch oder unsinnig sind</p></li>
<li><p>Aussagen, die überflüssig sind (<em>„Blah Blah“</em>) und nicht dem Kernthema der Präsentation zugeordnet werden können</p></li>
<li><p>Unnötige Aussagen, die bekannte Inhalte (zum Beispiel aus dieser oder anderen Vorlesungen) wiederholen</p></li>
<li><p>Aussagen, die nicht durch eine Quelle oder durch eigene Experimente belegt werden können</p></li>
<li><p>Qualifizierende Attribute („schneller“, „besser“, „schwerer“ ...), die nicht durch konkrete Metriken belegt bzw. definiert werden</p></li>
</ul>
</aside>
</ld-topic>

<ld-topic id="vortragsthemen-grundlagen">
<h2>Vortragsthemen - Grundlagen</h2>
<p><strong>Dauer pro Person: 15 Minuten</strong></p>
<ld-story>
<ul class="list-with-explanations incremental-list">
<li><p>[1 Person] Grenzen der Multi-Faktor-Authentifizierung</p>
<p>(MFA fatigue, <a class="reference external" href="https://www.heise.de/en/news/Microsoft-Authenticator-Critical-vulnerability-allows-token-theft-11296758.html">Token Theft</a>, ...)</p>
</li>
<li><p>[1 Person] <a class="reference external" href="https://www.shodan.io">Shodan</a> and OSINT im Pentesting</p></li>
<li><p>[1 Person] Server-Side Request Forgery (<a class="reference external" href="https://portswigger.net/web-security/ssrf">Portswigger - SSRF</a>)</p>
<p>(Ggf. inkl. Demonstration und Erklärung wie man sich schützt.)</p>
</li>
<li><p>[2 Personen] <a class="reference external" href="https://attack.mitre.org">MITRE ATT&amp;CK</a></p>
<p>(Knowledge base of adversary tactics and techniques based on real-world observations.)</p>
<ol class="arabic simple">
<li><p>Person - allgemeine Einführung</p></li>
<li><p>Person - Darstellung ausgewähter Themen</p></li>
</ol>
<p>(Bitte darauf achten, dass es mit den OWASP Vorträgen zu keinen relevanten Überschneidungen kommt.)</p>
</li>
<li><p>[1 Person] <a class="reference external" href="https://owasp.org/www-project-web-security-testing-guide/v42/">OWASP Web Security Testing Guide</a></p></li>
<li><p>[1 Person] <a class="reference external" href="https://owasp.org/www-project-mobile-app-security/">OWASP Mobile Application Security</a></p></li>
<li><p>[1 Person] Copy Fail (<a class="reference external" href="https://copy.fail">https://copy.fail</a>) (case study)</p>
<p>Als Case-study aufarbeiten und auch die Entstehungsgeschichte erklären. Bitte auch in Relation zu den entsprechenden klassischen Sicherheitsprinzipien von Saltzer und Schroeder (1975) setzen.</p>
</li>
<li><p>[1 Person] <cite>Scapy &lt;https://scapy.net/&gt;</cite></p>
<p>(Interactive packet manipulation library)</p>
<p>Eine Demo ist sehr wünschenswert.</p>
</li>
<li><p>[1 Person] <a class="reference external" href="https://greenbone.github.io/docs/latest/background.html#architecture">OpenVAS - Community Edition</a> (<a class="reference external" href="https://github.com/greenbone/openvas-scanner">Scanner</a>)</p>
<p>(Vulnerability Testing)</p>
<p><em>Achtung: bei der Community Edition handelt es sich wohl um ein „rohes Produkt“.</em></p>
</li>
<li><p>[2 Personen] <a class="reference external" href="https://owasp.org/Top10/2025/">OWASP Top Ten 2025</a> (z. B. 1. Person Lücke 1-5; 2. Person Lücke 6 - 10; die konkrete Einteilung ist aber freigestellt!)</p>
<p>Jeweils mit konkreten Beispielen in etablierten Sprachen/Frameworks.</p>
</li>
<li><p>[2 Personen] <a class="reference external" href="https://genai.owasp.org/resource/owasp-top-10-for-llm-applications-2025/">OWASP Top Ten for LLM Applications</a> (z. B. 1. Person Lücke 1-5; 2. Person Lücke 6 - 10; die konkrete Einteilung ist aber freigestellt!)</p></li>
<li><p>[1 Person] Wireshark für Pentester</p>
<p>Fokus auf: typische Filter, Credentials finden, verdächtige Muster</p>
</li>
<li><p>[1 Person] <a class="reference external" href="https://github.com/OJ/gobuster">Gobuster</a></p>
<p>(A directory/file, DNS and virtual host brute-forcing tool)</p>
</li>
</ul>
