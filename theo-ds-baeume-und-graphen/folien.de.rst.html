<ld-topic id="gerichteter-graph">
<h2>Gerichteter Graph</h2>
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition</span></p><p>Ein gerichteter Graph <span class="math">\(G = (V, E)\)</span> wird durch eine Knotenmenge <span class="math">\(V\)</span> und eine Kantenmenge <span class="math">\(E\)</span> beschrieben.</p>
<p><span class="math">\(V= \{ v_1, v_2, . . . , v_n \}\)</span></p>
<p><span class="math">\(E= \{ (v_i, v_j ) | v_i, v_j \in  V \}\)</span></p>
</aside><aside class="admonition incremental" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><ul class="incremental-list simple">
<li><p>Es ist erlaubt, dass ein Knoten (Vertex) eine Kante (Edge) zu sich selbst besitzt</p></li>
<li><p>Da <span class="math">\(E\)</span> eine Menge ist, kann es keine doppelten Elemente geben; folglich gilt:</p>
<ul>
<li><p>Es gibt maximal zwei Kanten zwischen zwei Knoten vi und vj (i ̸= j)</p></li>
<li><p>Ein Knoten kann maximal eine Kante zu sich selbst haben</p></li>
<li><p>Statt <span class="math">\(v_1, . . . v_n\)</span> werden häufig (Groß-) Buchstaben A, B, C etc. verwendet</p></li>
</ul>
</li>
</ul>
</aside></ld-topic>

<ld-topic id="ungerichteter-graph">
<h2>Ungerichteter Graph</h2>
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition</span></p><p>Ein ungerichteter Graph <span class="math">\(G = (V, E)\)</span> ist ein gerichteter Graph, in dem die Relation <span class="math">\(E\)</span> symmetrisch ist:</p>
<p><span class="math">\((v_i, v_j ) \in  E \Rightarrow  (v_j , v_i) \in  E\)</span></p>
<p>Die Kanten <span class="math">\(\{(v_i, v_j ), (v_j, v_i)\}\)</span> werden dann als eine Kante gezählt.</p>
</aside></ld-topic>

<ld-topic id="gewichteter-graph">
<h2>Gewichteter Graph</h2>
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition</span></p><p>Bei einem gewichteten Graphen <span class="math">\(G = (V, E)\)</span> besitzt jede Kante <span class="math">\((v_i, v_j)\)</span> eine Attributierung <span class="math">\(w(v_i, v_j)\)</span>.</p>
</aside><aside class="admonition incremental" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><ul class="simple">
<li><p>Sowohl gerichtete als auch ungerichtete Graphen können gewichtet sein</p></li>
<li><p>Die Funktion <span class="math">\(w\)</span> hat als Wertebereich oft <span class="math">\(\mathbb{N}, \mathbb{Z}\)</span> oder <span class="math">\(\mathbb{R}\)</span></p></li>
<li><p>Die Attributierung kann aber auch aus mehreren Attributen bestehen, z. B. aus einer Zahl und einer (Kanten-) Farbe; für dieses Beispiel sind die Ergebnisse von <span class="math">\(w\)</span> dann Zweitupel</p></li>
</ul>
</aside></ld-topic>

<ld-topic id="markierte-graphen">
<h2>Markierte Graphen</h2>
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition</span></p><p>In einem markierter Graphen <span class="math">\(G = (V, E)\)</span> besitzt jeder Knoten <span class="math">\(v_i\)</span> eine Markierung <span class="math">\(m(v_i)\)</span>.</p>
</aside><aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><ul class="simple">
<li><p>Die Markierung stellt eine Attributierung des Knotens dar</p></li>
<li><p>Die Markierung ist häufig ein Farbwert</p></li>
<li><p>Alle Typen von Graphen (gerichtet, ungerichtet, gewichtet) können markiert werden</p></li>
<li><p>Die Markierung spielt in vielen Graphenalgorithmen eine Rolle (z. B. bei der Breite-zuerst-Suche)</p></li>
</ul>
</aside></ld-topic>

<ld-topic id="pfad">
<h2>Pfad</h2>
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition</span></p><p>Ein Pfad in einem Graphen <span class="math">\(G = (V, E)\)</span> mit <span class="math">\(V= \{ v_1, . . . , v_n \}\)</span> ist eine Folge von Knoten <span class="math">\(v_{a_1}, v_{a_2}, . . . , v_{a_k}\)</span> mit folgender Eigenschaft: <span class="math">\((v_{a_i}, v_{a_{i+1}}) \in  E\)</span> für <span class="math">\(i \in  \{ 1, . . . , k- 1 \}\)</span>.</p>
<p>Die Länge des Pfades ist die Anzahl der Kanten auf dem Pfad, d. h. <span class="math">\(k- 1\)</span>.</p>
</aside><aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><ul class="simple">
<li><p>In einem Pfad dürfen Knoten mehrfach auftreten</p></li>
<li><p>Für Pfade wird häufig eine Listenschreibweise verwendet: <span class="math">\(&lt; v3, v1, v2, v3, v4 &gt;\)</span></p></li>
</ul>
</aside></ld-topic>
<ld-topic id="fragestellungen-auf-graphen">
<h2>Fragestellungen auf Graphen</h2>
<ul class="incremental-list simple">
<li><p>Welche Knoten sind von einem (Start-) Knoten aus erreichbar? → Erreichbarkeitsbaum</p></li>
<li><p>Existiert zwischen 2 Knoten A und B ein Pfad, d. h. ist B von A aus erreichbar?</p></li>
<li><p>Wenn mehrere Pfade zwischen 2 Knoten existieren, welcher ist der kürzeste?</p></li>
<li><p>Existieren in einem Graphen Zyklen?</p></li>
</ul>
</ld-topic>
<ld-topic id="implementierung-von-graphen">
<h2>Implementierung von Graphen</h2>
<ld-grid class="default-layout">
<ld-cell class="width-40" style="align-self:auto;">
<div class="center-content"><div    style="width: 24ch; height: 14ch">

        <text x="0.5" y="8.25">B</text>
        </g>

        <g>
        <circle cx="15" cy="6" r="0.5" />
        <line x1="14.65" y1="5.65" x2="8.35" y2="1.35" marker-end="url(#arrow)"/>
        <text x="15.75" y="6.75">C</text>
        </g>

        <g>
        <circle cx="8" cy="11" r="0.5" />

</div></div></ld-cell><ld-cell class="width-60" style="align-self:auto;">
<ld-deck>
<ld-card>
<p class="rubric">Adjazenzliste</p>
<ld-deck>
<ld-card>
<p>Struktur der Adjazenzlisten für einen Graphen <span class="math">\(G = (V, E)\)</span>:</p>
<p>Es gibt eine Knotenliste <span class="math">\(L_0\)</span>, die alle Knoten aus <span class="math">\(V\)</span> enthält.</p>
<p>Jedem Element <span class="math">\(v_i (i \in  { v_1, . . . , v_n })\)</span> der Knotenliste <span class="math">\(L_0\)</span> ist eine weitere Knotenliste <span class="math">\(L_i\)</span> zugeordnet, die die Endknoten der Kanten aus <span class="math">\(E\)</span> enthält, die von <span class="math">\(v_i\)</span> ausgehen</p>
<div class="accentuate docutils container">
<p>Wir speichern einen Graphen somit als Liste von Listen.</p>
</div>
</ld-card><ld-card class="incremental">
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>Seien <code class="java"><span class="name">A</span></code> bis <code class="java"><span class="name">E</span></code> Instanzen der Klasse <code class="java"><span class="name">Node</span></code>, die einen Knoten im Graphen repräsentieren.</p>
<pre class="literal-block">// Konzeptionell
// L0 = List&lt;Tuple&lt;Node,List&lt;Node&gt;&gt;&gt;(
L0 = Map&lt;Node,List&lt;Node&gt;&gt;.of(
    A, List.of(B),
    B, List.of(A),
    C, List.of(A),
    D, List.of(D,C),
    E, List.of(D,A),
)</pre>
</aside></ld-card><ld-card class="incremental">
<p><strong>Bewertung</strong></p>
<ul class="incremental-list positive-list simple">
<li><p>Kompaktere Speicherung</p></li>
<li><p>Erweiterbarkeit</p></li>
</ul>
<ul class="incremental-list negative-list simple">
<li><p>Aufwändigerer Zugriﬀ z. B. bei der Adressierung der Kanten</p></li>
<li><p>Höhere Komplexität für die Beantwortung von Fragen wie</p>
<ul>
<li><p>Existiert eine Kante von x nach y?</p></li>
<li><p>Welche Kanten enden an einem Knoten x?</p></li>
</ul>
</li>
</ul>
</ld-card></ld-deck></ld-card><ld-card class="incremental">
<p class="rubric">Adjazenzmatrix</p>
<ld-deck>
<ld-card>
<p>Struktur der Adjazenzmatrix für einen Graphen <span class="math">\(G = (V, E)\)</span>:</p>
<ul class="simple">
<li><p>Die Zeilen und Spalten der Adjazenzmatrix sind mit der Knotenmenge V beschriftet</p></li>
<li><p>Die Matrixelemente dienen zur Darstellung der Kantenrelation E eines Graphen G = (V, E)</p></li>
</ul>
<p>AJ[x, y] = 1 ⇔ es existiert eine gerichtete Kante von x nach y
- Bei einem gewichteten Graphen enthält die Adjazenzmatrix die Kantengewichte w(x, y)</p>
</ld-card><ld-card class="incremental">
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><table class="highlight-cell-on-hover">
<thead>
<tr><th class="head stub"></th>
<th class="head"><p>A</p></th>

<th class="head"><p>D</p></th>
<th class="head"><p>E</p></th>
</tr>
</thead>
<tbody>

</tr>

<td><p>0</p></td>
<td><p>0</p></td>
</tr>
<tr><th class="stub"><p>C</p></th>
<td><p>1</p></td>
<td><p>0</p></td>
<td><p>0</p></td>
<td><p>0</p></td>
<td><p>0</p></td>
</tr>
<tr><th class="stub"><p>D</p></th>

</aside></ld-card><ld-card class="incremental">
<p><strong>Bewertung</strong></p>
<ul class="positive-list incremental-list simple">
<li><p>Extrem schnelle und einfache Adressierbarkeit der Kanten</p></li>
<li><p>Semantik einer Zeile: Welche Kanten gehen von dem zugehörigen Knoten weg</p></li>
<li><p>Semantik einer Spalte: Welche Kanten enden an dem zugehörigen Knoten</p></li>
</ul>
<ul class="negative-list incremental-list simple">
<li><p>Bei wenigen Kante ist die Matrix nur dünn besetzt → Speicherplatzverschwendung</p></li>
<li><p>Arrays als typische Implementierung für Matrizen erfordern Reorganisationsaufwand, wenn dem Graphen neue Knoten hinzugefügt werden</p></li>
</ul>
</ld-card></ld-deck></ld-card></ld-deck></ld-cell></ld-grid></ld-topic>
<ld-topic class="new-subsection" id="suchalgorithmen-auf-graphen">
<h2>Suchalgorithmen auf Graphen</h2>
</ld-topic>
<ld-topic id="suchalgorithmen-auf-graphen-grundlegendes">
<h2>Suchalgorithmen auf Graphen - Grundlegendes</h2>
<ld-deck>
<ld-card>
<p><strong>Eingaben</strong></p>
<ul class="simple">
<li><p>(Gerichteter) Graph <span class="math">\(G = (V, E)\)</span></p></li>
<li><p>Startknoten <span class="math">\(v_s\)</span></p></li>
</ul>
<p><strong>Ablauf</strong></p>
<ul>
<li><p>S1: Markiere Startknoten <span class="math">\(v_s\)</span></p></li>
<li><p>S2: Wähle Kante <span class="math">\((v_i, v_j)\)</span> mit folgenden Eigenschaften:</p>
<p><span class="math">\(v_i\)</span> ist markiert und <span class="math">\(v_j\)</span> ist nicht markiert</p>
</li>
<li><p>S3: Markiere <span class="math">\(v_j\)</span> und setze mit Schritt S2 fort</p></li>
</ul>
<p><strong>Endebedingung</strong></p>
<p>Es existiert in Schritt S2 kein unmarkierter Knoten mehr</p>
<p><strong>Ergebnis</strong></p>
<p>Genau ein Erreichbarkeitsbaum wird markiert.</p>
</ld-card><ld-card class="incremental">
<p><strong>Wichtige Varianten</strong></p>
<ul class="simple">
<li><p>Breite-zuerst-Suche</p></li>
<li><p>Tiefe-zuerst-Suche</p></li>
</ul>
<p>(Die Unterscheidung erfolgt im Schritt S2 in Hinblick auf die auszuwählende Kante.)</p>
</ld-card><ld-card class="incremental">
<p><strong>Benötigte Konzepte</strong></p>
<ul>
<li><p>Aktiver und passiver Knoten</p>
<p>Kennzeichnung eines Knotens als aktiv, wenn von ihm aus die Suche (gegebenenfalls) später fortgesetzt werden kann.</p>
</li>
<li><p>allg. Vorgehensweise</p>
<ul>
<li><p>Kennzeichnung eines neu markierten Knotens als aktiv</p></li>
<li><p>Ein aktiver Knoten <span class="math">\(v\)</span> wird passiv, wenn gilt:</p>
<p>Alle von <span class="math">\(v\)</span> ausgehenden Kanten wurden dahingehend untersucht, ob sie zu einem noch nichtmarkierten Knoten führen.</p>
</li>
</ul>
</li>
</ul>
<p><strong>Ergebnis</strong></p>
<ul class="simple">
<li><p>Weitersuche ist nur von aktiven Knoten aus sinnvoll</p></li>
<li><p>Nur markierte Knoten können aktiv sein</p></li>
</ul>
</ld-card></ld-deck></ld-topic>
<ld-topic id="breite-zuerst-suche-breadth-first-search">
<h2>Breite-zuerst-Suche (<span class="eng">Breadth-first-Search</span>)</h2>
<ld-deck>
<ld-card>
<p><strong>Im Schritt S2</strong></p>
<ul class="incremental-list list-with-explanations">
<li><p>Durchsuchung aller vom Suchknoten ausgehenden Kanten dahingehend, ob sie zu einem (bisher) unmarkierten Knoten führen.</p></li>
<li><p>Markierung eines derartigen Knotens.</p></li>
<li><p>Aufnahme des Knotens in die Liste aktiver Knoten.</p></li>
<li><p>Gibt es keine derartige Kante mehr, wähle als neuen Suchknoten den ältesten noch aktiven Knoten.</p>
<p>(Als Datenstruktur dient die Verwendung einer FIFO-Warteschlange)</p>
</li>
</ul>
<div class="incremental docutils container">
<p><strong>Endekriterium</strong></p>
<p>Vom Suchknoten aus wird kein unmarkierter Nachfolgerknoten mehr gefunden und die Liste aktiver Knoten ist leer.</p>
</div>
</ld-card><ld-card class="incremental">
<aside class="admonition" data-theme="important"><p class="admonition-title" data-theme="important-header">Wichtig</p>
<p>Unter allen möglichen Erreichbarkeitsbäumen wird derjenige mit den kürzesten Pfaden erzeugt.</p>
<p>Dies liegt an der Struktur der Suchsteuerung in S2:</p>
<ul class="simple">
<li><p>Inkrementeller Aufbau der Pfade</p></li>
<li><p>Weiterhin werden die Pfade nicht sequentiell, sondern simultan aufgebaut</p></li>
</ul>
<p>⇒ Knoten werden markiert, bevor lange Pfade entstehen können</p>
</aside>
</ld-card></ld-deck></ld-topic>

<ld-topic id="tiefe-zuerst-suche">
<h2>Tiefe-zuerst-Suche</h2>
<p><strong>Im Schritt S2</strong></p>
<ul class="incremental-list list-with-explanations">
<li><p>Suche vom aktuellen Suchknoten <span class="math">\(nd\)</span> eine Kante zu einem (bisher) unmarkierten Knoten <span class="math">\(nd_{neu}\)</span></p></li>
<li><p>Markierung von <span class="math">\(nd_{neu}\)</span></p></li>
<li><p>Aufnahme des Knotens <span class="math">\(nd\)</span> (nicht <span class="math">\(nd_{neu}\)</span>!) in die Liste aktiver Knoten</p></li>
<li><p><span class="math">\(nd_{neu}\)</span> wird zum neuen Suchknoten und die Suche wird mit <span class="math">\(nd_{neu}\)</span> fortgesetzt</p></li>
<li><p>Gibt es keine derartige Kante mehr, wähle als neuen Suchknoten den jüngsten noch aktiven Knoten</p>
<p>(Zu verwendende Datenstruktur: Stack (LiFO))</p>
</li>
</ul>
<div class="incremental docutils container">
<p><strong>Endekriterium</strong></p>
<p>Vom Suchknoten aus wird kein unmarkierter Nachfolgerknoten mehr gefunden und die Liste aktiver Knoten ist leer.</p>
</div>
</ld-topic>

</ld-topic>
<ld-topic id="baume-einfuhrung">
<h2>Bäume - Einführung</h2>
<ul>
<li><p>Bäume sind eine Datenstruktur für hierarchische Daten</p>
<p class="rubric">Beispiele</p>
<ul class="incremental-list simple">
<li><p>Stammbaum</p></li>
<li><p>Dateisystem</p></li>
<li><p>Organisationsstruktur</p></li>
</ul>
</li>
</ul>
<ul class="incremental-list simple">
<li><p>relevante Operationen</p>
<ul>
<li><p>Schnelles Abändern</p></li>
<li><p>Schnelles Suchen</p></li>
</ul>
</li>
</ul>
</ld-topic>

<ld-deck>
<ld-card>
<p class="rubric">Elternknoten (<span class="eng">Parent</span>)</p>
<p>Ein Elternknoten ist ein Knoten, der einen oder mehrere Kinder hat.</p>
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>2 ist der Elternknoten von 7.</p>
<p>4 ist der Elternknoten von 3.</p>
<p>…</p>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">Kindknoten (<span class="eng">Child(ren)</span>)</p>
<p>Kindknoten sind Knoten, die einen Elternknoten haben.</p>
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>1 und 7 sind Kindknoten von 2.</p>
<p>5 ist Kindknoten von 6.</p>
<p>…</p>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">Wurzel (<span class="eng">Root</span>)</p>
<p>Der Wurzelknoten ist der einzige Knoten, der keinen Elternknoten hat.</p>
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>2 ist die Wurzel/der Wurzelknoten.</p>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">Blattknoten (<span class="eng">Leaf</span>)</p>
<p>Ein Blattknoten ist ein Knoten, der keine Kinder hat.</p>
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>1, 8, 3, 5 sind Blattknoten.</p>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">Innerer Knoten (<span class="eng">Inner Node</span>)</p>
<p>Ein Knoten, der kein Blattknoten ist, ist ein innerer Knoten.</p>
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>4, 7 und 6 sind innere Knoten. Auch der Wurzelknoten ist ein innerer Knoten, wenn der Baum nicht degeniert ist.</p>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">Höhe eines Baumes (<span class="eng">Height</span>)</p>
<p>Die Höhe eines Baumes ist die Länge des längsten Pfades vom Wurzelknoten zu einem Blattknoten.</p>
</ld-card><ld-card class="incremental">
<p class="rubric">Tiefe eines Knotens (<span class="eng">Depth</span>)</p>
<p>Die Tiefe eines Knotens <span class="math">\(p\)</span> ist die Länge des Pfades vom Wurzelknoten zu <span class="math">\(p\)</span>.</p>
</ld-card><ld-card class="incremental">
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Binärbaum</span></p><p>Ein Baum, bei dem jeder Knoten höchstens zwei Kinder hat.</p>
</aside></ld-card><ld-card class="incremental">
<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Binärer Suchbaum</span></p><p>Ein Binärbaum, bei dem für jeden Knoten gilt: Alle Schlüssel in den linken Unterbaum sind kleiner und alle Schlüssel in den rechten Unterbaum sind größer.</p>
<p>Beide Unterbäume sind wiederum binäre Suchbäume (rekursive Definition).</p>
</aside><p>Optional kann jeder Knoten neben dem Schlüssel auch weitere Nutzdaten speichern.</p>
<aside class="admonition" data-theme="example"><p class="admonition-title" data-theme="example-header"><span>Beispiel</span></p><p>(siehe Darstellung)</p>
</aside></ld-card><ld-card class="incremental">
<aside class="admonition" data-theme="attention"><p class="admonition-title" data-theme="attention-header">Achtung!</p>
<p>Da die Kanten in einem Baum grundsätzlich von einem Eltern- zu einem Kindknoten gehen (d. h. es sind gerichtete Kanten), wird die Kantenrichtung typischerweise nicht angegeben (d. h. es wird keine Pfeilspitze gezeichnet).</p>
</aside>
</ld-card></ld-deck></ld-cell></ld-grid></ld-topic>
<ld-topic id="traversierung-von-baumen">
<h2>Traversierung von Bäumen</h2>

<li><p>Präorder</p></li>
<li><p>Inorder und</p></li>
<li><p>Postorder</p></li>

<aside class="admonition" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition</span></p><p>Eine Postorder-Traversierung eines Baumes beginnt mit den linken Unterbaum und besucht dann den rechten Unterbaum, bevor der (Wurzel-)knoten besucht wird.</p>
</aside></ld-cell></ld-grid></ld-card></ld-deck></ld-topic>
<ld-topic id="suche-in-einem-binaren-suchbaum-bst">
<h2>Suche in einem binären Suchbaum (BST)</h2>
<p><strong>Ziel:</strong> Finde Schlüssel <span class="docutils literal">x</span></p>
<ol class="arabic simple incremental-list">
<li><p>Setze den aktuellen Knoten <span class="docutils literal">n</span> auf den Wurzelknoten des Baums.</p></li>
<li><p>Falls der aktuelle Knoten <span class="docutils literal">n</span> „leer“ ist, dann ist <span class="docutils literal">x</span> nicht enthalten im Baum.</p></li>
<li><p>Falls <span class="docutils literal">x == key(n)</span>: Der Schlüssel wurde gefunden.</p></li>
<li><p>Falls <span class="docutils literal">x &lt; key(n)</span>: Setze <span class="docutils literal">n</span> auf den Wurzelknoten des linken Unterbaums.</p></li>
<li><p>Sonst: Setze <span class="docutils literal">n</span> auf den Wurzelknoten des rechten  Unterbaums.</p></li>
<li><p>Gehe zu Schritt 2.</p></li>
</ol>
<div class="accentuate incremental docutils container">
<p><strong>Laufzeit:</strong> proportional zur Höhe <span class="docutils literal">h</span> des Baums, also <span class="docutils literal">O(h)</span>.</p>
</div>
</ld-topic>

<ld-topic class="exercises" id="ubung-traversierung-von-binaren-suchbaumen">

<div class="ld-exercise" data-exercise-id="4" data-exercise-title="4 - Rückgabe in absteigender Reihenfolge" id="ld-exercise-4">
<p class="ld-exercise-title rubric"><span>Rückgabe in absteigender Reihenfolge</span></p>
<p>Implementieren Sie eine Methode <code class="java"><span class="keyword declaration">public</span><span class="whitespace"> </span><span class="name">Iterable</span><span class="operator">&lt;</span><span class="name">Key</span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="name function">descending</span><span class="punctuation">(){...</span><span class="whitespace"> </span><span class="punctuation">}</span></code>, die die Schlüssel in umgekehrter Reihenfolge zurückgibt (d. h. der größte Schlüssel zuerst, der kleinste Schlüssel zuletzt). Implementieren Sie diese Methode rekursiv.</p>

<ld-topic class="new-section transition-move-left" id="prioritatswarteschlangen">
<h2>Prioritätswarteschlangen</h2>
<p class="section-subtitle"><span class="ger">Vorrangwarteschlange</span> / <span class="eng">Priority Queue</span></p>
</ld-topic>
<ld-topic id="prioritatswarteschlangen-uberblick">
<h2>Prioritätswarteschlangen - Überblick</h2>
<ul class="incremental-list simple">
<li><p>Eine häufige Anforderung ist, dass wir Datensätze mit Schlüsseln der Reihe nach verarbeiten möchten. <span class="incremental">Wobei der Schlüssel den Prioritätswert für die Reihenfolge der Verarbeitung repräsentiert.</span> <span class="incremental">Die Verarbeitungsreihenfolge erfolgt dann von der größten zu der kleinsten Priorität oder umgekehrt.</span></p></li>
<li><p>Anwendungsbeispiele:</p>
<ul>
<li><p>Job-Scheduling (Schlüssel repräsentieren die Priorität)</p></li>
<li><p>Heapsort</p></li>
<li><p>Huffman-Codierung</p></li>
</ul>
</li>
</ul>
</ld-topic>
<ld-topic id="prioritatswarteschlangen-abstrakte-definition">
<h2>Prioritätswarteschlangen - Abstrakte Definition</h2>
<p>Standardoperationen:</p>
<ul class="incremental-list">
<li><p>erzeugen (einer leeren Prioritätswarteschlange)</p></li>
<li><p>einfügen eines neuen Elements mit einer bestimmten Priorität</p></li>
<li><p>abfragen des Elements mit der höchsten Priorität</p>
<p>(oder ggf. der niedrigsten Priorität je nach Typ der Warteschlange)</p>
</li>
<li><p>entfernen des Elements mit der höchsten Priorität</p>
<p>(oder ggf. der niedrigsten Priorität je nach Typ der Warteschlange)</p>
</li>
</ul>
<aside class="admonition incremental" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><p>Eine <em>Prioritätswarteschlange</em> (<em>Priority Queue</em>) ist somit eine Verallgemeinerung von Stacks und Queues. Beides lässt sich mit Hilfe von Prioritätswarteschlangen implementieren, wenn man als Schlüssel den Einfügezeitpunkt verwendet.</p>
</aside></ld-topic>
<ld-topic id="prioritatswarteschlangen-implementierung">
<h2>Prioritätswarteschlangen - Implementierung</h2>
<p>Verschiedene Implementierungen sind denkbar:</p>
<ul class="simple">
<li><p>basierend auf einer (unsortierten) Liste</p></li>
<li><p>basierend auf einem sortierten Array</p></li>
<li><p>basierend auf einem Heap (als nächstes)</p></li>
</ul>
<aside class="admonition" data-theme="hint"><p class="admonition-title" data-theme="hint-header">Hinweis</p>
<p>Jede Implementierung hat andere Abwägungen und Einsatzszenarien.</p>
<p>Die Verwendung eines Heaps ist jedoch effizient für viele Anwendungen, da das Einfügen und das Entfernen des höchsten Elements in <span class="math-i">O(log n)</span> Zeit erfolgen.</p>
</aside>
</ld-topic>
<ld-topic id="heap">
<h2>Heap</h2>
<ul class="incremental-list">
<li><p>Binärbaum, bei dem das Elternelement immer größer oder gleich seinen Kindern ist (Max-Heap).</p>
<p>(Bei Min-Heaps ist das Elternelement immer kleiner oder gleich seinen Kindern.)</p>
</li>
<li><p>basierend auf einem fast <em>vollständigen</em> Binärbaum (alle Ebenen bis auf die letzte sind vollständig besetzt)</p></li>
<li><p>aus effizienzgründen in einem Array gespeichert</p>
<p>(Von einem Element <code>i</code> aus kann auf das Elternelement bzw. die Kinder über die Index-Formel: <code>parent = (i-1)/2</code> und <code>children = 2i+1, 2i+2</code> zugegriffen werden, wenn der Wurzelknoten im Array an Position <code>0</code>  (d. h. Index 0) gespeichert ist.)</p>
</li>
</ul>
</ld-topic>

<ld-topic class="exercises" id="ubung-heap-zum-sortieren">
<h2>Übung - Heap zum Sortieren</h2>
<ld-scrollable>
<div class="ld-exercise" data-exercise-id="6" data-exercise-title="6 - Sortierte Liste" id="ld-exercise-6">
<p class="ld-exercise-title rubric"><span>Sortierte Liste</span></p>
<p>Implementieren Sie eine generische, statische Methode <span class="docutils literal">sort</span> auf Ihrer Heapklasse aus der vorhergehenden Übung. Die methode <span class="docutils literal">sort</span> soll eine passende typisierte <span class="docutils literal">java.util.Collection</span> übernehmen und diese als sortierte Liste zurückgeben.</p>
<p><em>Achten Sie auf die korrekte Verwendung der generischen Typparameter.</em> Beachten Sie, dass Sie für den Aufruf des Heap-Konstruktors den <code class="java"><span class="name">elementType</span></code> angeben müssen. Weiterhin soll es möglich sein, dass der Typ der Elemente der übergebenen Collection ein Subtype des <code class="java"><span class="name">elementTypes</span></code> ist.</p>
<p>Nutzen Sie die folgende <code class="java"><span class="name">main</span></code> Methode, um Ihre Implementierung zu testen. Nehmen Sie keine Änderungen an dieser Methode vor.</p>
