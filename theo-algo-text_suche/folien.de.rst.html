<ld-topic class="center-content" id="arrays-und-textsuche">
<h2>Arrays und Textsuche</h2>
<p>Texte können als unsortierte Arrays von Zeichen verstanden werden. Eine typische

<ld-topic class="new-section" id="knuth-morris-pratt-kmp-verfahren">
<h2>Knuth-Morris-Pratt (KMP) Verfahren</h2>
</ld-topic>
<ld-topic id="grundlagen">
<h2>Grundlagen</h2>
<ld-deck>
<ld-card>
<p>Das Verfahren von Knuth-Morris-Pratt vermeidet unnötige Vergleiche, da es zunächst die Suchwortteile auf den größten Rand, also das größte Präfix, das auch Postfix ist, untersucht.</p>
<aside class="admonition incremental" data-theme="definition"><p class="admonition-title" data-theme="definition-header"><span>Definition: Präfix, Postfix und Rand</span></p><p>Für ein Wort <span class="math">\(w = (w_1,...,w_n)\)</span> mit <span class="math">\(0 \leq  k \leq  n\)</span>. sind:</p>
<ul class="simple">
<li><p>die Präfixe <span class="math">\(p^{(k)} = (w_1,...,w_k )\)</span> und</p></li>
<li><p>die Postfixe <span class="math">\(q^{(k)} = (w_{n-k+1},...,w_{n})\)</span></p></li>
</ul>
<p>Ist <span class="math">\(p^{(k)} = q^{(k)} = r^{(k)}\)</span> für ein <span class="math">\(0 \leq k &lt;n\)</span>, so ist <span class="math">\(r(k)\)</span> ein Rand von <span class="math">\(w\)</span>.</p>
<p>Für <span class="math">\(k &lt;n\)</span> werden <span class="math">\(p^{(k)}\)</span> und <span class="math">\(q^{(k)}\)</span> auch echte Prä- und Postfixe genannt.</p>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">Beispiel/Idee</p>
<pre class="literal-block">Text              010110101
Gesucht/Muster    010101
Übereinstimmung   ✓✓✓✓✗</pre>
<div class="incremental margin-top-1em docutils container">
<p><strong>Beobachtungen:</strong></p>
<ol class="arabic simple">
<li><p>Wir haben an Stelle 5 ein Mismatch.</p></li>
<li><p>Wenn wir im Text das Muster um eine Stelle nach rechts verschoben suchen, so haben wir wieder ein Mismatch.</p></li>
</ol>
<aside class="admonition question far-smaller incremental"><p class="admonition-title">Frage</p>
<p>Wie weit kann man also das Muster im Allgemeinen verschoben werden ohne ein Vorkommen zu übersehen?</p>
</aside>
</div>
</ld-card><ld-card class="incremental">
<p class="rubric">Beispiel/Idee</p>
<pre class="literal-block">                    1.                    2.
Text                01101100              0102111
Gesucht/Muster      01100                 010201
Übereinstimmungen   ✓✓✓✓✗                 ✓✓✓✓✗</pre>
<ld-presenter-note encrypted="">
MTAwMDAw:aSxr4svrREkv77lzoYlVvM78LdcpfA/s+WS/M4W6jW8=:Ky4LyKxc63dE8VXQ:D5gbqk/k6urDAonX+gqqs2klcb4+cetx98RX+QKrJYxZzA9Bg7/wROtdNUmdsJ8TUuptcOZW+p85oT0o85Ph29lhQvowafBe1MwMi+e6WrCA1fOPKrARmXUQ/y09wgzpObde2fGz2bSqKm1eiDTzWofcX5ZoNF5cehE8o125VBrXNkOClSgUaDLCWiJ/xAbGYke9j56w0u/H5Ma33BWwiVGN+L9S0u9iGoTpuj4xuRqk6sAhh2FC80F1gICHvRm5Pob/5ZpQg9zHY1Tjg8+MnX8JbGCQwPwRb/gzR3DZqCkYNTfAcMEgzxbGdlU6AmyThIZA6ZVzbWewU1dyb0FD0OdKbhrLQPcvJsIRcuhvxnvGrxAO5y8+wDbsIkx9l7kF/fkjooHvxiYISZr+yTs9oW7hzmr2+9QqwpGFI4EKpDBcFvun3AUC/0xAOTFTLa+0lk6GtTFddJR2mw+yNXsS+rVUnA3DESPTtoI4Nso9YedaKJt4O39e/pSu7X0IbxGd/dq2t5iz1EBj1NAwswuyHpgaGSEEfSehp8PiE+gGgpso77gb5jOxPkcNuAF/yUDu5Qa6FV23aJ5ZEqoPuVytHkDFQWXrZtdMA726fpFY8p0ptntWupOli5IY3we31u8YhKD3Sr4a3WxrRJ6WXofv57y0uRSuSjk1Ol8jz6cKKrQdsb3RZc7jXsrtVQ==</ld-presenter-note>
<div class="incremental docutils container">
<p><strong>Beobachtungen bzgl.:</strong></p>
<ol class="arabic incremental-list list-with-explanations">
<li><p>Beim Mismatch an Stelle 5 kann das Muster „nur“ um 3 Stellen nach rechts verschoben werden.</p>
<p><span class="incremental">(Wir haben 4 Übereinstimmungen und einen Rand von 1 für den Teil mit den Übereinstimmungen. Daraus ergibt sich eine Verschiebung von 4 - 1 = 3!)</span></p>
</li>
<li><p>Beim Mismatch an Stelle 5 kann das Muster um 4 Stellen nach rechts verschoben werden.</p></li>
</ol>
<div class="incremental docutils container">
<p>Wie weit wir das Muster verschieben können, hängt also vom Rand des Teils des Musters ab, der bereits übereinstimmt.</p>
<ld-supplemental embed-in-document-flow><p>Bei einem Mismatch betrachtet man die Anzahl j der bereits übereinstimmenden Zeichen (das gematchte Präfix des Musters) und bestimmt dessen längsten echten Rand der Länge b. Das Muster wird dann um j − b Stellen nach rechts verschoben; der Textzeiger bleibt auf dem Mismatch-Zeichen, und der Vergleich wird ab Position b im Muster fortgesetzt, da die b Randzeichen bereits übereinstimmen. Gibt es keinen Rand (b = 0), verschiebt man entsprechend um j Stellen und vergleicht das Mismatch-Zeichen erneut mit dem Musteranfang.</p>
</ld-supplemental></div>
</div>
</ld-card><ld-card class="incremental">
<p class="rubric">Beispiel</p>
<p>Das Wort <span class="math">\(aufkauf\)</span> hat die <em>echten</em> Präfixe und Postfixe:</p>
<blockquote>
<p><span class="math">\(\{p^{(k)} : 0 \leq  k &lt;n\}=\{\varepsilon ,a,au,auf,aufk,aufka,aufkau\}\)</span></p>
<p><span class="math">\(\{q^{(k)} : 0 \leq k &lt;n\}=\{\varepsilon ,f,uf,auf,kauf,fkauf,ufkauf\}\)</span></p>
</blockquote>
<p>und die Ränder:</p>
<blockquote>
<p><span class="math">\(\{r^{(k)} : 0 \leq k &lt;n\}= \{\varepsilon ,auf\}\)</span>.</p>
</blockquote>
<p>Das bedeutet, dass wenn <span class="math">\(aufkauf\)</span> erkannt wurde, die letzten drei Buchstaben schon den nächsten Treffer einleiten können, wie beispielsweise in <span class="math">\(aufkaufkauf\)</span>.</p>
</ld-card><ld-card class="incremental">
<p>Das KMP-Verfahren fängt nicht immer von vorne an, sondern prüft, ob <em>ein Rand eines Präfixes</em> (ohne das leere Wort ε) ausgenutzt werden kann. Dazu werden die entsprechenden größten Ränder bestimmt.</p>
<ld-grid class="default-layout">
<ld-cell class="width-50" style="align-self:auto;">
<p class="rubric">Beispiel: ananas</p>
<table class="highlight-row-on-hover incremental-table-cells" style="width: 100%;">
<thead>
<tr><th class="head"><p>Präfixe <span class="math">\(\setminus \{\varepsilon \}\)</span></p></th>
<th class="head"><p>Größter Rand</p></th>
<th class="head"><p>Länge des Randes</p></th>
</tr>
</thead>
<tbody>
<tr><td><p>a</p></td>
<td><p>ε</p></td>
<td><p>0</p></td>
</tr>
<tr><td><p>an</p></td>
<td><p>ε</p></td>
<td><p>0</p></td>
</tr>
<tr><td><p>a̲na̅</p></td>
<td><p>a</p></td>
<td><p>1</p></td>
</tr>
<tr><td><p>a̲n̲a̅n̅</p></td>
<td><p>an</p></td>
<td><p>2</p></td>
</tr>
<tr><td><p>a̲n̲a̲̅n̅a̅</p></td>
<td><p>ana</p></td>
<td><p>3</p></td>
</tr>
<tr><td><p>ananas</p></td>
<td><p>ε</p></td>
<td><p>0</p></td>
</tr>
</tbody>
</table>
</ld-cell><ld-cell class="width-50 incremental" style="align-self:auto;">
<p class="rubric">Beispiel: axaaxax</p>
<table class="highlight-row-on-hover incremental-table-cells" style="width: 100%;">
<thead>
<tr><th class="head"><p>Präfixe <span class="math">\(\setminus \{\varepsilon \}\)</span></p></th>
<th class="head"><p>Größter Rand</p></th>
<th class="head"><p>Länge des Randes</p></th>
</tr>
</thead>
<tbody>
<tr><td><p>a</p></td>

<td><p>0</p></td>
</tr>
<tr><td><p>ax</p></td>

</tr>
<tr><td><p>a̲xa̅</p></td>

</tr>

<td><p>a</p></td>
<td><p>1</p></td>
</tr>

</ld-cell></ld-grid></ld-card></ld-deck><ld-supplemental><p>Die Idee ist also, dass wir beim Musterabgleich nach einem Mismatch, wenn der übereinstimmende
Teil einen Rand hat, beim Abgleich des Musters an einer späteren Stelle - basierend auf der Größe des Randes - weitermachen können. Wir müssen also nicht immer das ganze Muster von vorne anfangen zu vergleichen.</p>
</ld-supplemental></ld-topic>
<ld-topic class="exercises transition-fade" id="ubung">
<h2>Übung</h2>
<div class="ld-exercise" data-exercise-id="1" data-exercise-title="1 - Ränder und Randlängen bestimmen" id="ld-exercise-1">
<p class="ld-exercise-title rubric"><span>Ränder und Randlängen bestimmen</span></p>
<p>Bestimmen Sie die Ränder und die Längen der <span class="math">\(Präfixe - \varepsilon \)</span> für die Worte:</p>
<ol class="arabic simple">
<li><p><span class="math">\(tultatul\)</span></p></li>
<li><p><span class="math">\(eikleike\)</span></p></li>
<li><p><span class="math">\(okokorok\)</span></p></li>
<li><p><span class="math">\(trattrad\)</span></p></li>

<ld-topic id="beispiel-fur-eine-kmp-textsuche">
<h2>Beispiel für eine KMP-Textsuche</h2>
<p>Gesucht wird <span class="docutils literal">ananas</span> in <span class="docutils literal">saansanananas</span></p>
<div class="far-smaller monospaced docutils container">
<pre class="literal-block">   s a a n s a n a n a n a s
i  ⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯
1  a̶
...
3    a n̶
...
5      a n a̶
...                          Hinweise zum Algorithmus:
11           a n a n a s̶     Beim Auftreten des Mismatch (Zeile 7) ist
...                          q=5 und wird auf p[5]=3 (Zeile 8) gesetzt
13               a n a n a s</pre>
</div>
<aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><p>Dargestellt sind die Fälle, in denen ein Mismatch auftritt. <span class="docutils literal">i</span> ist der Index des aktuellen Zeichen im Text, das mit dem Muster verglichen wird.</p>
</aside></ld-topic>
<ld-topic id="algorithmus">
<h2>Algorithmus</h2>
<ld-deck>
<ld-card>
<pre class="code pascal copy-to-clipboard literal-block"><small class="ln"> 1</small><code data-lineno=" 1"><span class="keyword">function</span><span class="whitespace"> </span><span class="name function">ComputePrefixFunction</span><span class="punctuation">(</span><span class="name">needle</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln"> 2</small><code data-lineno=" 2"><span class="whitespace">    </span><span class="name">m</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="name builtin">length</span><span class="punctuation">(</span><span class="name">needle</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln"> 3</small><code data-lineno=" 3"><span class="whitespace">    </span><span class="name">sei</span><span class="whitespace"> </span><span class="name">B</span><span class="punctuation">[</span><span class="literal number integer">1</span><span class="operator">...</span><span class="name">m</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="name">ein</span><span class="whitespace"> </span><span class="keyword">Array</span><span class="whitespace">  </span><span class="comment single">// Array für die Längen der Ränder der Teilworte</span><span class="whitespace">
</span></code><small class="ln"> 4</small><code data-lineno=" 4"><span class="whitespace">    </span><span class="name">B</span><span class="punctuation">[</span><span class="literal number integer">1</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace">
</span></code><small class="ln"> 5</small><code data-lineno=" 5"><span class="whitespace">    </span><span class="name">j</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace">                  </span><span class="comment single">// j ist die Länge des echten Randes</span><span class="whitespace">
</span></code><small class="ln"> 6</small><code data-lineno=" 6"><span class="whitespace">    </span><span class="keyword">for</span><span class="whitespace"> </span><span class="name">i</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="literal number integer">2</span><span class="operator">,...,</span><span class="name">m</span><span class="whitespace"> </span><span class="keyword">do</span><span class="whitespace">
</span></code><small class="ln"> 7</small><code data-lineno=" 7"><span class="whitespace">        </span><span class="name">j</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="name">j</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="whitespace">
</span></code><small class="ln"> 8</small><code data-lineno=" 8"><span class="whitespace">        </span><span class="keyword">while</span><span class="whitespace"> </span><span class="name">j</span><span class="whitespace"> </span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace"> </span><span class="keyword">and</span><span class="whitespace"> </span><span class="name">needle</span><span class="punctuation">[</span><span class="name">j</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="error">≠</span><span class="whitespace"> </span><span class="name">needle</span><span class="punctuation">[</span><span class="name">i</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="keyword">do</span><span class="whitespace">
</span></code><small class="ln"> 9</small><code data-lineno=" 9"><span class="whitespace">            </span><span class="keyword">if</span><span class="whitespace"> </span><span class="name">j</span><span class="whitespace"> </span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="whitespace"> </span><span class="keyword">then</span><span class="whitespace">
</span></code><small class="ln">10</small><code data-lineno="10"><span class="whitespace">                </span><span class="name">j</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="name">B</span><span class="punctuation">[</span><span class="name">j</span><span class="operator">-</span><span class="literal number integer">1</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="whitespace">
</span></code><small class="ln">11</small><code data-lineno="11"><span class="whitespace">            </span><span class="keyword">else</span><span class="whitespace">
</span></code><small class="ln">12</small><code data-lineno="12"><span class="whitespace">                </span><span class="name">j</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace">
</span></code><small class="ln">13</small><code data-lineno="13"><span class="whitespace">        </span><span class="name">B</span><span class="punctuation">[</span><span class="name">i</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="name">j</span><span class="whitespace">
</span></code><small class="ln">14</small><code data-lineno="14"><span class="whitespace">    </span><span class="name">return</span><span class="whitespace"> </span><span class="name">B</span></code></pre>
<ld-supplemental embed-in-document-flow><p>Die Funktion <span class="math">\(ComputePrefixFunction\)</span> berechnet die größten Werte der Präfixe für das Suchwort <span class="math">\(needle\)</span> der Länge <span class="math">\(m\)</span> und gibt diese als Array <span class="math">\(B\)</span> zurück.
Das Array <span class="math">\(B\)</span> enthält somit die größten Ränder der Präfixe <span class="math">\(needle[1,...,i]\)</span>.</p>
<p>(Der Wert von <span class="math">\(B[1]\)</span> ist immer 0, da es keinen Rand gibt.)</p>
</ld-supplemental><p>Komplexität: O(m)</p>
</ld-card><ld-card class="incremental">
<pre class="code pascal literal-block"><small class="ln"> 1</small><code data-lineno=" 1"><span class="keyword">function</span><span class="whitespace"> </span><span class="name function">KMP</span><span class="punctuation">(</span><span class="name">text</span><span class="operator">,</span><span class="name">needle</span><span class="punctuation">)</span><span class="whitespace">

</span></code><small class="ln"> 3</small><code data-lineno=" 3"><span class="whitespace">    </span><span class="name">B</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="name">ComputePrefixFunction</span><span class="punctuation">(</span><span class="name">needle</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln"> 4</small><code data-lineno=" 4"><span class="whitespace">    </span><span class="name">q</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace">               </span><span class="comment single">// Anzahl der übereinstimmenden Zeichen</span><span class="whitespace">
</span></code><small class="ln"> 5</small><code data-lineno=" 5"><span class="whitespace">    </span><span class="name">R</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="punctuation">[]</span><span class="whitespace">              </span><span class="comment single">// Ergebnisliste der Indizes der Übereinstimmungen</span><span class="whitespace">
</span></code><small class="ln"> 6</small><code data-lineno=" 6"><span class="whitespace">    </span><span class="keyword">for</span><span class="whitespace"> </span><span class="name">i</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="operator">,...,</span><span class="name">n</span><span class="whitespace"> </span><span class="keyword">do</span><span class="whitespace">
</span></code><small class="ln"> 7</small><code data-lineno=" 7"><span class="whitespace">        </span><span class="keyword">while</span><span class="whitespace"> </span><span class="name">q</span><span class="whitespace"> </span><span class="operator">&gt;</span><span class="whitespace"> </span><span class="literal number integer">0</span><span class="whitespace"> </span><span class="keyword">and</span><span class="whitespace"> </span><span class="name">needle</span><span class="punctuation">[</span><span class="name">q</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="error">≠</span><span class="whitespace"> </span><span class="name">text</span><span class="punctuation">[</span><span class="name">i</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="keyword">do</span><span class="whitespace">
</span></code><small class="ln"> 8</small><code data-lineno=" 8"><span class="whitespace">            </span><span class="name">q</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="name">B</span><span class="punctuation">[</span><span class="name">q</span><span class="punctuation">]</span><span class="whitespace">    </span><span class="comment single">// ... die nächsten Zeichen stimmen nicht überein</span><span class="whitespace">
</span></code><small class="ln"> 9</small><code data-lineno=" 9"><span class="whitespace">        </span><span class="keyword">if</span><span class="whitespace"> </span><span class="name">needle</span><span class="punctuation">[</span><span class="name">q</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="operator">==</span><span class="whitespace"> </span><span class="name">text</span><span class="punctuation">[</span><span class="name">i</span><span class="punctuation">]</span><span class="whitespace"> </span><span class="keyword">then</span><span class="whitespace">
</span></code><small class="ln">10</small><code data-lineno="10"><span class="whitespace">            </span><span class="name">q</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="name">q</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="whitespace">   </span><span class="comment single">// Übereinstimmung</span><span class="whitespace">

</span></code><small class="ln">12</small><code data-lineno="12"><span class="whitespace">            </span><span class="name">R</span><span class="whitespace"> </span><span class="name builtin">append</span><span class="whitespace"> </span><span class="punctuation">(</span><span class="name">i</span><span class="whitespace"> </span><span class="operator">-</span><span class="whitespace"> </span><span class="name">m</span><span class="whitespace"> </span><span class="operator">+</span><span class="whitespace"> </span><span class="literal number integer">1</span><span class="punctuation">)</span><span class="whitespace">
</span></code><small class="ln">13</small><code data-lineno="13"><span class="whitespace">            </span><span class="name">q</span><span class="whitespace"> </span><span class="operator">:=</span><span class="whitespace"> </span><span class="name">B</span><span class="punctuation">[</span><span class="name">q</span><span class="punctuation">]</span><span class="whitespace">    </span><span class="comment single">// Suche nach nächster Übereinstimmung</span><span class="whitespace">

<ld-topic class="new-section transition-move-to-top" id="boyer-moore-algorithmus-vereinfacht">
<h2>Boyer-Moore-Algorithmus (vereinfacht)</h2>
</ld-topic>
<ld-topic id="grundlagen-1">
<h2>Grundlagen</h2>
<ld-deck>
<ld-card>
<aside class="admonition" data-theme="observation"><p class="admonition-title" data-theme="observation-header"><span>Beobachtung</span></p><p>Häufig ist das Alphabet des Textes größer als das des Musters.</p>
</aside><ul class="incremental-list list-with-explanations">
<li><p>Der Algorithmus vergleicht das Muster (Pattern) von rechts nach links mit dem Text.</p>
<aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><p>Viele andere Algorithmen führen die Vergleiche von links nach rechts durch.</p>
</aside></li>
<li><p>Der Boyer-Moore-Algorithmus nutzt dies aus, indem er die Verschiebung des Musters anhand des letzten Zeichens des Musters und des Textes vornimmt.</p></li>
</ul>
</ld-card><ld-card class="incremental">
<p>Wird beispielsweise das Wort</p>
<p><span class="docutils literal">Banane</span></p>
<p>im Text</p>
<p><span class="docutils literal"><span class="pre">Orangen,␣Ananas␣und␣Bananen</span></span></p>
<p>gesucht, so wird zunächst die Sprungtabelle für das verwendete Alphabet in Bezug auf das Suchwort (<span class="docutils literal">Banane</span> mit Länge 6) bestimmt:</p>

<pre class="literal-block">O r a n g̲ e̲ n , ␣ A n̲ a̲ n a̲ s ␣̲ u n d ␣ B̲ a̲ n̲ a̲ n̲ e̲ n̲
B a n a n̶̲ e̶̲

                                          B a n a n e̶̲</pre>
<aside class="admonition" data-theme="remark"><p class="admonition-title" data-theme="remark-header"><span>Bemerkung</span></p><p>Unterschrichen sind die durchgeführten Vergleiche. Die Verschiebung des Musters erfolgt anhand des letzten Zeichens des Musters und des Textes, dass nicht übereinstimmt. Dabei ist die Verschiebung durch das Zeichen des Textes gegeben, das nicht mit dem Muster übereinstimmt.</p>
</aside></ld-card><ld-card class="incremental">
<p class="rubric">Komplexität</p>
<p>Im guten und häufigen Fall erreicht das Verfahren <span class="math">\(O(\frac{n}{m})\)</span>, aber in speziellen Fällen ist auch <span class="math">\(O(n·m)\)</span> möglich.</p>
</ld-card></ld-deck><ld-supplemental><p>Bei der Sprungtabelle handelt es sich um eine Tabelle, die <em>für jedes Zeichen des Alphabets des Textes</em> die Verschiebung des Musters angibt, wenn das Zeichen im Text mit dem Muster nicht übereinstimmt. Die Zeichen <code class="java"><span class="name">A</span></code>, <code class="java"><span class="name">O</span></code>, <code class="java"><span class="name">d</span></code>, <code class="java"><span class="name">g</span></code>, <code class="java"><span class="name">r</span></code>, <code class="java"><span class="name">s</span></code>, <code class="java"><span class="name">u</span></code>, <code class="java"><span class="punctuation">,</span></code> und das Leerzeichen haben die größte Verschiebung, da sie nicht im Muster vorkommen. Das Zeichen <code class="java"><span class="name">e</span></code> hat die kleinste Verschiebung, da es das letzte Zeichen des Musters ist. Das Zeichen <code class="java"><span class="name">n</span></code> hat eine Verschiebung von 1, da es im Muster  als vorletztes Zeichen vorkommt, das Zeichen <code class="java"><span class="name">a</span></code> hat eine Verschiebung von 2, da das späteste Vorkommen an drittletzer Stelle ist, und das Zeichen <code class="java"><span class="name">B</span></code> hat eine Verschiebung von 5, da es nur einmal vorkommt und das erste Zeichen des Musters ist.</p>
</ld-supplemental></ld-topic>
